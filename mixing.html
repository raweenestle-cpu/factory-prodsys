<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Sarabun:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8ecf0;--s1:#f2f4f7;--s2:#e0e4ea;--s3:#1a2030;
  --b1:#1e2535;--b2:#2a3348;
  --text:#111827;--t2:#374151;--t3:#3d4560;
  --blue:#60a5fa;--blue2:#93c5fd;
  --green:#34d399;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;--cyan:#22d3ee;--purple:#a855f7;
  --sans:'Sarabun',sans-serif;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{background:#0b1120;color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

/* NAV */
nav{display:flex;align-items:center;height:52px;background:#0f172a;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:200;padding:0 16px;gap:8px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.06em;margin-right:8px;color:#e2e8f0}
.nav-logo b{color:var(--blue)}
.nav-tab{font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:none;background:none;color:#94a3b8;cursor:pointer;white-space:nowrap}
.nav-tab:hover{color:#e2e8f0;background:#1e293b}
.nav-tab.on{color:#60a5fa;background:#1e3a5f;border:1px solid rgba(96,165,250,.3)}
.nav-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-user{font-family:var(--mono);font-size:11px;color:#64748b}
.nav-role{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;background:#0c2340;color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.btn-logout{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #334155;background:none;color:#94a3b8;cursor:pointer}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* PAGE */
.page{display:none;padding:14px 16px}
.page.on{display:block}

/* TABLE */
.tw{overflow-x:auto;border-radius:14px;border:2px solid #cbd5e1;margin:0 18px 14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
table{width:100%;min-width:1100px;border-collapse:collapse;font-size:13px;table-layout:auto}
tbody td{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);background:var(--s1);color:var(--text);font-weight:600}
thead th{border-right:1px solid var(--b2)!important}
tr:hover td{background:#e0e7ff!important}
thead th{background:#e2e8f0;padding:10px 10px;text-align:left;white-space:nowrap;font-family:var(--mono);font-size:12px;color:#111827;font-weight:900;border-bottom:2px solid #94a3b8;vertical-align:middle}
tbody td,tbody td span{color:#111827!important;font-weight:700!important}
tbody td input,tbody td select{color:#111827!important;font-size:12px!important}
tbody tr:hover td{background:rgba(241,245,249,.8)!important}
tbody tr:nth-child(even) td{background:#fafbff}

/* STATUS ROW COLORS */
.row-mixing td{background:var(--s2)!important}
.row-mixing td:first-child{border-left:3px solid var(--yellow)!important}
.row-past td{background:var(--s2)!important}
.row-past td:first-child{border-left:3px solid var(--yellow)!important}
.row-done td{background:var(--s2)!important}
.row-done td:first-child{border-left:3px solid var(--green)!important}

/* INPUTS */
.ci{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 7px;outline:none}
.ci:focus{border-color:var(--blue)}
.ca{font-family:var(--mono);font-size:12px;color:var(--t2);white-space:nowrap}
.cr{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;background:var(--blue);border:2px solid #3b82f6;border-radius:50%;width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;}

/* STAMP BUTTON */
.stamp-btn{display:flex;align-items:center;gap:4px;background:rgba(29,78,216,.08);border:1.5px solid rgba(29,78,216,.3);border-radius:7px;color:var(--blue);font-size:11px;font-family:var(--mono);font-weight:700;padding:5px 10px;cursor:pointer;white-space:nowrap}
.stamp-btn:hover{background:rgba(29,78,216,.15);border-color:var(--blue)}
.stamp-btn.stamped{background:rgba(21,128,61,.08);border-color:rgba(21,128,61,.4);color:var(--green)}
.stamp-time{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text)}
.stamp-wrap{display:flex;flex-direction:column;gap:3px;min-width:110px}

/* ACTUAL INPUT */
.act-input{background:#fff;border:1.5px solid var(--b1);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:5px 8px;outline:none;width:80px;text-align:right;position:relative;z-index:20}
.act-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(29,78,216,.15)}
.act-input:focus{border-color:var(--green)}

/* STATUS BADGE */
.stat-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap}

/* BUTTONS */
.btn{font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid var(--b2);background:var(--s3);color:var(--text);cursor:pointer;font-family:var(--sans);white-space:nowrap}
.btn:hover{background:var(--b2)}
.btn-b{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-b:hover{background:#2563eb}
.btn-s{font-size:11px;padding:5px 10px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px}
.kpi-label{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700;font-family:var(--mono)}

/* CHART CARD */
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:16px;margin-bottom:14px}
.chart-title{font-family:var(--mono);font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
.chart-wrap{height:220px;position:relative}

/* PERIOD BTNS */
.period-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.period-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;font-family:var(--mono)}
.period-btn.on{background:var(--s2);border-color:var(--blue);color:var(--blue2)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1d4ed8;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes blink{0%,100%{opacity:1}40%{opacity:.15}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(234,179,8,.4)}70%{box-shadow:0 0 0 6px rgba(234,179,8,0)}}
.mixing-pulse{animation:pulse 1.5s infinite}

/* ── MOBILE RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:768px){
  /* NAV */
  nav{padding:0 10px;gap:4px}
  .nav-logo{font-size:12px}
  .nav-tab{font-size:11px;padding:5px 8px}
  .nav-user{display:none}
  .btn-logout{font-size:10px;padding:4px 8px}

  /* PAGE */
  .page{padding:10px 10px}

  /* TABLE — เปลี่ยนเป็น card layout บนมือถือ */
  .tw{border:none;background:none;overflow:visible}
  table,thead,tbody,tr,td,th{display:block;width:100%}
  thead tr{display:none} /* ซ่อน header */
  tbody tr{
    background:var(--s1);
    border:1px solid var(--b1);
    border-radius:12px;
    margin-bottom:10px;
    padding:12px;
    position:relative;
  }
  tbody tr.row-mixing{border-left:4px solid var(--yellow)!important;background:var(--s2)!important}
  tbody tr.row-done{border-left:4px solid var(--green)!important;background:var(--s2)!important}
  tbody tr.row-past{border-left:4px solid var(--yellow)!important}
  tbody td{
    border:none!important;
    padding:3px 0;
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13px;
    background:var(--s1)!important;
    color:var(--text)!important;
  }
  /* ซ่อน td ที่ไม่สำคัญบนมือถือ */
  tbody td:nth-child(1){display:none} /* drag handle */
  tbody td:nth-child(2){display:none} /* # */

  /* Set point columns — ซ่อนบนมือถือ แสดงแค่ Actual */
  tbody td:nth-child(9){display:none}  /* Glc Set */
  tbody td:nth-child(11){display:none} /* Sgr Set */
  tbody td:nth-child(13){display:none} /* Plm Set */

  /* Mix Code + Mix Name — ใหญ่ขึ้น */
  tbody td:nth-child(3) select{width:100%!important;font-size:13px!important}
  tbody td:nth-child(4) span{font-size:14px!important;font-weight:700!important;color:var(--blue2)!important}

  /* Batch + Volume — inline */
  tbody td:nth-child(5),tbody td:nth-child(6){display:inline-flex;width:auto;margin-right:10px}

  /* Stamp area — full width */
  tbody td:nth-child(7),tbody td:nth-child(8){
    padding:4px 0;
  }
  tbody td:nth-child(7) div,tbody td:nth-child(8) div{
    width:100%;
  }

  /* label ก่อน actual input */
  tbody td:nth-child(10)::before{content:"🍬 Glucose: ";font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0}
  tbody td:nth-child(12)::before{content:"🧂 Sugar: ";font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0}
  tbody td:nth-child(14)::before{content:"🌴 Palm: ";font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0}

  /* Status badge — full width centered */
  tbody td:last-child{justify-content:center;padding-top:8px}

  /* Stamp buttons — ใหญ่ขึ้น กดง่าย */
  .stamp-btn{
    min-height:44px;
    font-size:13px!important;
    padding:8px 14px!important;
    border-radius:10px!important;
    flex:1;
    justify-content:center;
  }

  /* Act input — ใหญ่ขึ้น */
  .act-input{
    width:90px!important;
    font-size:14px!important;
    padding:8px 10px!important;
    min-height:44px;
  }

  /* Toolbar */
  .toolbar{flex-direction:column;align-items:stretch;gap:8px}
  .toolbar .btn{min-height:44px;font-size:13px;text-align:center}

  /* KPI */
  .kpi-row{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-val{font-size:20px}

  /* Chart */
  .chart-wrap{height:180px}
}

@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.45}}
.status-blink{animation:statusPulse 1.4s ease-in-out infinite}

.sig-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b;}
.sig-btn:hover{background:var(--s2);color:#818cf8;}

/* ===== TANK CARD v3 — OPERATOR DARK EDITION ===== */
.tv3-card{
  background:linear-gradient(160deg,#0f172a 0%,#1e293b 100%);
  border:2px solid #334155;border-radius:20px;overflow:hidden;
  margin-bottom:18px;transition:opacity .3s,filter .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.35)
}
.tv3-card.tv3-mixing{
  border-color:#f59e0b;
  box-shadow:0 0 0 3px rgba(245,158,11,.25),0 6px 32px rgba(245,158,11,.2)
}
.tv3-card.tv3-wait{
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,.25),0 6px 32px rgba(59,130,246,.2);

}

  0%,100%{box-shadow:0 0 0 3px rgba(59,130,246,.25),0 6px 32px rgba(59,130,246,.2)}

/* HEAD */
.tv3-head{display:flex;align-items:stretch;border-bottom:2px solid #1e293b}

  width:120px;display:flex;flex-direction:column;align-items:center;

}

.tv3-meta{font-family:var(--mono);font-size:14px;font-weight:700;color:#cbd5e1;margin-top:5px}

/* STEPS */
.tv3-steps{display:flex;align-items:center;gap:0;flex-shrink:0;width:100%}
.tv3-sw{display:flex;align-items:center;flex:1;min-width:0}
.tv3-sw:last-child{flex:0 0 auto}
.tv3-step{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0}

/* วงกลมใหญ่ขึ้น 72→96px */
.tv3-circle{
  width:96px;height:96px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:34px;border:3px solid #334155;
  background:#1e293b;flex-shrink:0;
  transition:all .3s;position:relative;
  box-shadow:0 2px 10px rgba(0,0,0,.4)
}
.tv3-circle.done{
  border-color:#10b981;border-width:3px;
  background:linear-gradient(135deg,#064e3b,#065f46);
  box-shadow:0 0 0 2px rgba(16,185,129,.3),0 4px 16px rgba(16,185,129,.25)
}
.tv3-circle.done::after{
  content:'✓';position:absolute;bottom:-5px;right:-5px;
  font-size:13px;font-weight:900;color:#fff;
  background:#10b981;border-radius:50%;
  width:26px;height:26px;display:flex;align-items:center;
  justify-content:center;line-height:1;border:3px solid #0f172a
}
.tv3-circle.active{
  border-color:#f59e0b;border-width:4px;
  background:linear-gradient(135deg,#451a03,#78350f);
  animation:tv3gy 1.2s ease-in-out infinite;
  box-shadow:0 0 0 3px rgba(245,158,11,.3)
}
.tv3-circle.pwr{
  border-color:#ea580c!important;border-width:4px!important;
  background:linear-gradient(135deg,#431407,#7c2d12)!important;
  animation:tv3go 1.2s ease-in-out infinite!important;
  box-shadow:0 0 0 3px rgba(234,88,12,.35)!important
}
.tv3-circle.nxt{
  border-color:#3b82f6!important;border-width:4px!important;
  background:linear-gradient(135deg,#1e3a5f,#1e40af)!important;
  animation:tv3gb 1.2s ease-in-out infinite!important;
  box-shadow:0 0 0 3px rgba(59,130,246,.35)!important
}
.tv3-circle.skip{opacity:.25;border-style:dashed;border-color:#475569;background:#0f172a}

.tv3-ir:last-child{border-bottom:none}

.tv3-iv{font-family:var(--mono);font-size:13px;font-weight:900;color:#e2e8f0}
.tv3-iv.ok{color:#34d399}.tv3-iv.warn{color:#fbbf24}.tv3-iv.hot{color:#f87171}.tv3-iv.info{color:#60a5fa}

/* stamp strip */
.tv3-stamp{display:flex;gap:10px;align-items:center;padding:14px 18px;border-top:2px solid #1e293b;background:rgba(0,0,0,.25)}
.tv3-sbtn{font-family:var(--mono);font-size:13px;font-weight:900;padding:10px 18px;border-radius:10px;cursor:pointer;white-space:nowrap;flex:1;text-align:center;letter-spacing:.3px}
.tv3-sbtn.y{border:2px solid #f59e0b;background:rgba(245,158,11,.15);color:#fbbf24}
.tv3-sbtn.g{border:2px solid #10b981;background:rgba(16,185,129,.15);color:#34d399}
.tv3-sbtn.r{border:2px solid #ef4444;background:rgba(239,68,68,.15);color:#f87171}
.tv3-sig{font-size:15px;background:none;border:2px dashed #475569;border-radius:9px;padding:5px 11px;cursor:pointer;color:#94a3b8}

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";



import { getFirestore, collection, query, where, orderBy, onSnapshot, updateDoc, doc, getDocs, getDoc, addDoc, setDoc, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";


import {resolveStatus,statusLabel,statusColor,statusBlink,statusBadge,expireBox,calcExpireAt,displayVol,getProductColor,getMaxTemp,tempBox} from "./shared.js";


const app  = initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth = getAuth(app);
const db   = getFirestore(app);

let ME=null, productMap={};

// ── AGING TANK STATES real-time ────────────────────────────
window._agingStates={};
onSnapshot(collection(db,'aging_tank_states'),snap=>{
  snap.docs.forEach(d=>{window._agingStates[d.id]={id:d.id,...d.data()};});
  ['m1','m2'].forEach(m=>renderMixTanks(m, rowsData[m]||[]));
});

let rowsData={m1:[],m2:[]};
let unsub={m1:null,m2:null};
let charts={};
let period={m1:"day",m2:"day"};

const today  = () => {const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const $      = id => document.getElementById(id);
const fmt    = n  => Math.round(n||0).toLocaleString();
const nowHHMM= () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const nowHMS = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0"); };

function toast(msg,t="blue"){
  const el=$("toast"); el.textContent=msg;
  el.style.background=t==="green"?"#15803d":t==="red"?"#991b1b":"#1d4ed8";
  el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2500);
}

// ── AUTH ──────────────────────────────────────────────────────────────

// ── IDLE TIMEOUT ──────────────────────────────────────────────────────
async function initIdleTimeout(){
  try{
    const snap=await getDoc(doc(db,'settings','idle_timeout'));
    const minutes=snap.exists()?(snap.data().minutes||0):0;
    if(!minutes||minutes<=0)return;
    let t;
    const reset=()=>{
      clearTimeout(t);
      t=setTimeout(async()=>{
        alert('ระบบ logout อัตโนมัติ เนื่องจากไม่มีการใช้งาน '+minutes+' นาที');
        await signOut(auth);
        window.location.href='index.html';
      },minutes*60*1000);
    };
    ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(e=>{
      document.addEventListener(e,reset,{passive:true});
    });
    reset();
  }catch(e){console.warn('idleTimeout:',e);}
}

onAuthStateChanged(auth, async user=>{
  if(!user){window.location.href="index.html";return;}
  ME=user;
  try{
    const snap=await getDocs(query(collection(db,"users"),where("uid","==",user.uid)));
    const role=snap.empty?"mixing":(snap.docs[0].data().role||"mixing");
    if(role!=="mixing"&&role!=="admin"&&role!=="leadman"&&role!=="operator"){window.location.href="index.html";return;}
  }catch{}

  // load productMap แบบ realtime
  onSnapshot(collection(db,"products"), snap=>{
    snap.docs.forEach(d=>{const p={id:d.id,...d.data()};if(p.mix_code)productMap[p.mix_code]=p;});
    window._productMap=productMap;
    // re-render ถังเมื่อ product colors โหลดแล้ว
    ['m1','m2'].forEach(m=>renderMixTanks(m, rowsData[m]||[]));
  }, e=>console.error('products error:',e));

  $("nav-user").textContent=user.email.replace("@filling.local","");
  $("date-m1").value=today();
  $("date-m2").value=today();
  loadPlan("m1");
  loadPlan("m2");
});

window.doLogout=async()=>{
  if(unsub.m1)unsub.m1();
  if(unsub.m2)unsub.m2();
  await signOut(auth);
  window.location.href="index.html";
};

// ── LOAD PLAN ─────────────────────────────────────────────────────────
const planCol=(m)=>m==="m1"?"production_plans":"production_plans_m2";

window.loadPlan=(m)=>{
  const d=$(m==="m1"?"date-m1":"date-m2").value||today();
  if(unsub[m])unsub[m]();
  const q=query(collection(db,planCol(m)),where("date","==",d));
  unsub[m]=onSnapshot(q,snap=>{
    rowsData[m]=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(r=>(r.mix_code||r.mix_name||r.process_order)&&r.status!=='past_done'&&r.status!=='ready'&&r.status!=='sent_filling'&&r.status!=='filling'&&r.status!=='curing')
      .sort((a,b)=>(a.seq||0)-(b.seq||0));
    renderMixTanks(m, rowsData[m]||[]);
    autoAssignTank(m);
  });
};

// ── STAMP TIME ────────────────────────────────────────────────────────
// ── GENERIC UPDATE ──────────────────────────────────────────────────────
window._up=async(col,id,field,val)=>{
  try{
    await updateDoc(doc(db,col,id),{[field]:val});
  }catch(e){toast("บันทึกไม่สำเร็จ: "+e.message,"red");}
};

window.stampTime=async(col,id,field,m)=>{
  const now=nowHHMM();
  const upd={[field]:now};
  const row=rowsData[m]?.find(r=>r.id===id);

  if(field==="mix_start_time"){
    upd.status="mixing";
  }

  if(field==="mix_end_time"){
    // trigger auto assign ถังถัดไป หลัง stamp เสร็จ
    setTimeout(()=>autoAssignTank(m),1000);
    // เช็คว่า actual ครบหรือยัง
    if(row){
      const glcOk=+(row.glc_set||0)<=0||(+(row.glc_actual||0)>0);
      const sgrOk=+(row.sgr_set||0)<=0||(+(row.sgr_actual||0)>0);

function getProcessState(row){
  if(!row) return {id:'empty',lbl:'🏁 EMPTY',cls:'b-wait',color:'#94a3b8',bg:'#f1f5f9',anim:'none'};
  const st=row.status||'';
  const mixDone=!!row.mix_end_time;
  const pastStarted=!!row.past_start_time;
  const pastDone=st==='past_done';
  const prepDone=row.prep_status==='ready';

  // PREPARING
  if(!row.mix_start_time && !prepDone && !st.includes('mix'))
    return {id:'preparing',lbl:'🔧 กำลังเตรียม',cls:'b-wait',color:'#f59e0b',bg:'#fef3c7',anim:'glow-y'};
  // READY TO MIX
  if(!row.mix_start_time && prepDone)
    return {id:'ready_mix',lbl:'✅ พร้อมผสม',cls:'b-wait',color:'#10b981',bg:'#d1fae5',anim:'glow-g'};
  // MIXING
  if(st==='mixing'&&!mixDone)
    return {id:'mixing',lbl:'🔄 MIXING',cls:'b-mix',color:'#f59e0b',bg:'#fef3c7',anim:'glow-y'};
  // MIX DONE — WAITING PAST
  if(mixDone && !pastStarted && !pastDone)
    return {id:'wait_past',lbl:'⏳ รอ Pasteurize',cls:'b-wait',color:'#3b82f6',bg:'#dbeafe',anim:'glow-b'};
  // PASTEURISING
  if(st==='pasteurising' && pastStarted && !pastDone)
    return {id:'pasteurising',lbl:'🔵 PASTEURISING',cls:'b-past',color:'#3b82f6',bg:'#dbeafe',anim:'glow-b'};
  // PAST DONE
  if(pastDone)
    return {id:'past_done',lbl:'✅ PAST. เสร็จ',cls:'b-done',color:'#10b981',bg:'#d1fae5',anim:'none'};
  // FALLBACK
  const fallbacks={
    pending:{id:'pending',lbl:'⏳ PENDING',cls:'b-wait',color:'#94a3b8',bg:'#f1f5f9',anim:'none'},
    cip:{id:'cip',lbl:'🧹 CIP',cls:'b-wait',color:'#8b5cf6',bg:'#ede9fe',anim:'glow-p'},
    ready:{id:'ready',lbl:'✅ พร้อม',cls:'b-done',color:'#10b981',bg:'#d1fae5',anim:'none'},
  };
  return fallbacks[st]||{id:st,lbl:st.toUpperCase(),cls:'b-wait',color:'#94a3b8',bg:'#f1f5f9',anim:'none'};
}


function buildFlowSteps(row){
  var s=[];
  var started=!!row.mix_start_time;
  var p=started;
  var rwKg=+(row.rework_kg||0);
  var glcKg=+(row.glc_set||0);
  var sgrKg=+(row.sgr_set||0);
  var plmKg=+(row.plm_set||0);
  var oilKg=+(row.oil_mix_set||0);
  var fatKg=+(row.fat_milk_set||0);
  // 1
  s.push({id:'start',ico:'\u{1F680}',name:'\u0E40\u0E23\u0E34\u0E48\u0E21\u0E1C\u0E2A\u0E21',kg:'',done:started,active:!started,btn:false,skip:false,pwd:false});
  // 2 rework
  if(rwKg>0){var d=!!row.rw_confirmed;s.push({id:'rw',ico:'\u267B\uFE0F',name:'Rework',kg:rwKg+' kg',done:d,active:p&&!d,btn:true,skip:false,pwd:false});p=p&&d;}
  else{s.push({id:'nrw',ico:'\uD83D\uDEAB',name:'No Rework',kg:'',done:false,active:false,btn:false,skip:true,pwd:false});}
  // 3 glc
  if(glcKg>0){var d=+(row.glc_actual||0)>0;s.push({id:'glc',ico:'\uD83C\uDF6F',name:'Glucose',kg:glcKg+' kg',done:d,active:p&&!d,btn:false,skip:false,pwd:false,isIngr:true,actField:'glc_actual',actVal:row.glc_actual||'',setVal:glcKg});p=p&&d;}
  // 4 sgr
  if(sgrKg>0){var d=+(row.sgr_actual||0)>0;s.push({id:'sgr',ico:'\uD83C\uDF6C',name:'Sugar',kg:sgrKg+' kg',done:d,active:p&&!d,btn:false,skip:false,pwd:false,isIngr:true,actField:'sgr_actual',actVal:row.sgr_actual||'',setVal:sgrKg});p=p&&d;}
  // 5 powder
  var pd=!!row.pwd_confirmed;
  s.push({id:'pwd',ico:'\uD83E\uDDEA',name:'Powder',kg:'\u2191 \u0E0A\u0E34\u0E1B!',done:pd,active:p&&!pd,btn:true,skip:false,pwd:true});
  p=p&&pd;
  // 6 oil
  if(plmKg>0){var d=+(row.plm_actual||0)>0;s.push({id:'plm',ico:'\uD83C\uDF34',name:'Palm Oil',kg:plmKg+' kg',done:d,active:p&&!d,btn:false,skip:false,pwd:false,isIngr:true,actField:'plm_actual',actVal:row.plm_actual||'',setVal:plmKg});p=p&&d;}
  else if(oilKg>0){var d=+(row.oil_mix_actual||0)>0;s.push({id:'oil',ico:'\uD83D\uDEE2\uFE0F',name:'Oil Mix',kg:oilKg+' kg',done:d,active:p&&!d,btn:false,skip:false,pwd:false,isIngr:true,actField:'oil_mix_actual',actVal:row.oil_mix_actual||'',setVal:oilKg});p=p&&d;}
  else if(fatKg>0){var d=+(row.fat_milk_actual||0)>0;s.push({id:'fat',ico:'\uD83E\uDD5B',name:'Fat Milk',kg:fatKg+' kg',done:d,active:p&&!d,btn:false,skip:false,pwd:false,isIngr:true,actField:'fat_milk_actual',actVal:row.fat_milk_actual||'',setVal:fatKg});p=p&&d;}
  // ── Salt (เฉพาะถ้า has_salt = true ใน product master) ──
  var _prod=productMap[row.mix_code||'']||{};
  if(!!_prod.has_salt){
    var saltDone=!!row.salt_confirmed;
    s.push({id:'salt',ico:'\uD83E\uDDC2',name:'Salt',kg:'',done:saltDone,active:p&&!saltDone,btn:true,skip:false,pwd:false});
    p=p&&saltDone;
  }
  // ── Final Flush ──
  var fvDone=!!(row.final_flush&&+(row.final_flush)>0);
  s.push({id:'fflush',ico:'\uD83E\uDDEA',name:'Final Flush',kg:fvDone?(+(row.final_flush)).toLocaleString()+' L':'',done:fvDone,active:p&&!fvDone,btn:false,skip:false,pwd:false,isInput:true,actField:'final_flush',actVal:row.final_flush||''});
  p=p&&fvDone;
  // 7
  s.push({id:'done',ico:'\u2705',name:'\u0E1C\u0E2A\u0E21\u0E40\u0E2A\u0E23\u0E47\u0E08',kg:'',done:!!row.mix_end_time,active:p&&!row.mix_end_time,btn:false,skip:false,pwd:false});
  return s;
}

function renderFlowBar(row,pcol,rid){
  var steps=buildFlowSteps(row);
  var html='<div class="fbar">';
  steps.forEach(function(st,i){
    var isDone=st.done,isSkip=st.skip,isActive=!isDone&&!isSkip&&st.active;
    var cls=isSkip?'fw-skip':isDone?'fw-done':isActive?(st.pwd?'fw-ora':'fw-blue'):'fw-wait';
    var fc=isDone?'#15803d':isActive?(st.pwd?'#c2410c':'#1d4ed8'):'#6b7280';
    var btnH='';
    if(st.btn&&isActive){
      if(st.id==='salt'){
        btnH='<button class="fbtn" style="background:#0891b2" onclick="window._cfm(\''+pcol+'\',\''+rid+'\',\'salt\')">🧂 Salt OK</button>';
      } else {
        var bg=st.pwd?'#c2410c':'#1d4ed8';
        var lbl=st.pwd?'\u2705 Powder':'\u2705 Rework';
        btnH='<button class="fbtn" style="background:'+bg+'" onclick="window._cfm(\'' +pcol+ '\'\,' +'\'' +rid+ '\'\,' +'\'' +st.id+ '\')">'+lbl+'</button>';
      }
    }
    // Final Flush — input box
    if(st.id==='fflush'&&isActive){
      btnH='<div style="display:flex;gap:4px;margin-top:4px"><input id="fflush-'+rid+'" type="number" min="0" step="1" placeholder="ลิตร" style="width:56px;font-family:var(--mono);font-size:11px;padding:3px 6px;border:1.5px solid #1d4ed8;border-radius:6px;outline:none" value="'+(st.actVal||'')+'"><button class="fbtn" style="background:#1d4ed8;padding:4px 8px" onclick="window._setFinalVol(\''+pcol+'\',\''+rid+'\')">OK</button></div>';

    html+='<div class="sw"><div class="stepc" style="width:80px"><div class="fsc '+cls+'"><div class="fic">'+st.ico+'</div></div><div class="snm" style="color:'+fc+'">'+st.name+'</div><div class="skg" style="color:'+fc+'">'+(isSkip?'':st.kg)+'</div>'+btnH+'</div>'+(i<steps.length-1?'<div class="fconn'+(isDone?' done':'')+'"></div>':'')+'</div>';
  });
  html+='</div>';
  return html;
}

window._saveIngr=async function(pcol,rid,field,val,setVal){
  if(!val||+val<=0){toast('กรุณากรอกค่า Actual','red');return;}
  const actual=+val;
  const set=+(setVal||0);
  // ── TOLERANCE CHECK 5% ──
  if(set>0){
    const diff=Math.abs(actual-set);
    const pct=(diff/set)*100;
    if(pct>5){
      const dir=actual>set?'มากกว่า':'น้อยกว่า';
      const fieldName={glc_actual:'Glucose',sgr_actual:'Sugar',plm_actual:'Palm Oil',oil_mix_actual:'Oil Mix',fat_milk_actual:'Fat Milk'}[field]||field;
      const ok=confirm(
        `⚠️ WARNING — ${fieldName}\n`+
        `Set point : ${set.toLocaleString()} kg\n`+
        `Actual    : ${actual.toLocaleString()} kg\n`+
        `ผลต่าง    : ${dir} ${pct.toFixed(1)}% (เกิน 5%)\n\n`+
        `ยืนยันบันทึกต่อหรือไม่?`
      );
      if(!ok) return;
    }
  }
  try{
    await updateDoc(doc(db,pcol,rid),{[field]:actual, updated_at:new Date().toISOString()});
    toast('✅ บันทึก '+actual+' kg','green');
  }catch(e){toast('❌ '+e.message,'red');}
};

function renderMixTanks(m, rowsArg){
  const el=document.getElementById(`tank-visual-${m}`);
  if(!el)return;
  // ใช้ rowsArg ถ้ามี ไม่งั้นใช้ global rowsData
  const rows=rowsArg||rowsData[m]||[];

  const t1Row=rows.find(r=>(r.mixing_tank==='Tank 1'||r.mixing_tank==='T1'||r.mixing_tank==='1')&&+(r.volume_liter||0)>0)||rows.find(r=>(r.mixing_tank==='Tank 1'||r.mixing_tank==='T1'||r.mixing_tank==='1'))||null;
  const t2Row=rows.find(r=>(r.mixing_tank==='Tank 2'||r.mixing_tank==='T2'||r.mixing_tank==='2')&&+(r.volume_liter||0)>0)||rows.find(r=>(r.mixing_tank==='Tank 2'||r.mixing_tank==='T2'||r.mixing_tank==='2'))||null;

  function autoTextColor(hex){
    if(!hex||hex[0]!=='#') return '#e2e8f0';
    var r=parseInt(hex.slice(1,3),16)||0,g=parseInt(hex.slice(3,5),16)||0,b=parseInt(hex.slice(5,7),16)||0;
    return (0.299*r+0.587*g+0.114*b)>160?'#111827':'#e2e8f0';
  }

  function tankSVG(row,cap){
    cap=cap||3000;
    const st=row?.status||'';
    const totalVol=+(row?.volume_liter||0);
    const flowed=st==='pasteurising'||st==='past_done'?+(row?.current_vol||0):0;
    const vol=st==='pasteurising'?Math.max(0,totalVol-flowed):totalVol;
    const prod=productMap[row?.mix_code||'']||{};
    const col=prod.color||'#3b82f6';
    const isActive=['mixing','pasteurising','past_done','waiting_past','ready','busy'].includes(st);
    const pct=isActive&&vol>0?Math.min(100,(vol/cap)*100):0;
    const hasLiq=pct>0;
    const sw=100,sh=210,bX=10,bY=40,bW=80,bH=138;
    const fillH=Math.max(0,(pct/100)*(bH-4)*0.92);
    const wy=bY+bH-fillH;
    const A=5,midY=bY+bH/2;
    const uid='tv3'+(row?.mix_code||'x').replace(/[^a-z0-9]/gi,'');
    const gid='g'+uid,cid='c'+uid;
    const r2=parseInt(col.slice(1,3),16)||0,g2=parseInt(col.slice(3,5),16)||0,b2=parseInt(col.slice(5,7),16)||0;
    const ST2={mixing:'🔄',pasteurising:'🔵',past_done:'✅',pending:'⏳'};
    const stTxt=ST2[st]||`${Math.round(pct)}%`;
    const stLabel={mixing:'MIXING',pasteurising:'PAST.',past_done:'DONE',pending:'รอ'};
    const stLbl=stLabel[st]||'';
    function waveD(yBase,amp,nc){
      const W=bW*2,segW=W/(nc*2);let d=`M${bX},${yBase}`;
      for(let i=0;i<nc*2;i++){const x1=bX+i*segW,x2=bX+(i+1)*segW;const cy=i%2===0?yBase-amp:yBase+amp;d+=` C${x1+segW*.4},${cy} ${x2-segW*.4},${cy} ${x2},${yBase}`;}
      return d+` L${bX+W},${bY+bH} L${bX},${bY+bH} Z`;
    }
    let s=`<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">`;
    s+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".55"/><stop offset="100%" stop-color="${col}" stop-opacity=".9"/></linearGradient><clipPath id="${cid}"><rect x="${bX-1}" y="${bY-1}" width="${bW+2}" height="${bH+2}" rx="10"/></clipPath></defs>`;
    // หัวถัง style เดียวกับ aging — nozzle + cap
    const nW=24,nH=10,cW=34,cH=6;
    const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
    s+=`<rect x="${nX}" y="${bY-nH}" width="${nW}" height="${nH+5}" rx="4" fill="${hasLiq?'#16a34a':'rgba(100,116,139,.2)'}" stroke="${hasLiq?col:'#475569'}" stroke-width="1.5" stroke-opacity=".6"/>`;
    s+=`<rect x="${cX}" y="${bY-nH-cH}" width="${cW}" height="${cH+3}" rx="4" fill="${hasLiq?'#16a34a':'rgba(100,116,139,.15)'}" stroke="${hasLiq?col:'#475569'}" stroke-width="1.5" stroke-opacity=".5"/>`;
    if(hasLiq){
      s+=`<circle cx="${sw/2}" cy="${bY-nH-2}" r="4" fill="#22c55e" opacity=".9"/>`;
      s+=`<circle cx="${sw/2}" cy="${bY-nH-2}" r="4" fill="none" stroke="#22c55e" stroke-width="1.5"><animate attributeName="r" from="4" to="10" dur="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" from=".7" to="0" dur="1.6s" repeatCount="indefinite"/></circle>`;
    }
    // body
    s+=`<rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="10" fill="${hasLiq?`rgba(${r2},${g2},${b2},.07)`:'rgba(71,85,105,.2)'}" stroke="${hasLiq?col:'#475569'}" stroke-width="2" stroke-opacity="${hasLiq?'.35':'.5'}"/>`;
    if(hasLiq){
      s+=`<g clip-path="url(#${cid})">`;
      s+=`<rect x="${bX}" y="${wy+A}" width="${bW*2}" height="${bY+bH-(wy+A)}" fill="url(#${gid})"/>`;
      s+=`<path d="${waveD(wy,A,3)}" fill="${col}" fill-opacity=".5"><animateTransform attributeName="transform" type="translate" from="0,0" to="${-bW},0" dur="2.8s" repeatCount="indefinite"/></path>`;

  function buildStepHtml(st, i, stepsLen, pcol, rid){
    const isDone=st.done;
    const isSkip=st.skip;
    const isActive=st.active&&!isDone&&!isSkip;
    let cls='idle';
    if(isDone) cls='done';
    else if(isSkip) cls='skip';
    else if(isActive){
      // กำหนด animation ตาม step id
      if(st.pwd) cls='active pwr';
      else if(st.isStatus&&st.id==='wait_past') cls='active nxt'; // รอ Past = blue
      else if(st.isStatus&&st.id==='pasteurising') cls='active nxt';
      else if(st.isStatus&&st.id==='empty') cls='active nxt';
      else cls='active';
    }
    let connCls='';
    if(isDone) connCls='done';
    else if(isActive) connCls=st.isStatus?'nxt':'active';
    let btnH='';
    if(st.isIngr&&isActive){
      // ingredient active — แสดง input + confirm
      btnH=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:3px">
        <input id="act-${rid}-${st.id}" type="number" step="0.1" 
          style="width:72px;font-family:var(--mono);font-size:11px;font-weight:900;padding:3px 6px;border:2px solid #f59e0b;border-radius:6px;text-align:center;background:#fff;color:#111827"
          placeholder="Actual" value="${st.actVal||''}"
          onkeydown="if(event.key==='Enter')window._saveIngr('${pcol}','${rid}','${st.actField}',this.value,${st.setVal||0})">
        <button class="tv3-fbtn rw" onclick="window._saveIngr('${pcol}','${rid}','${st.actField}',document.getElementById('act-${rid}-${st.id}').value,${st.setVal||0})">✅ OK</button>
      </div>`;
    } else if(st.isIngr&&isDone){
      // ingredient done — แสดงค่า actual
      btnH=`<div style="font-family:var(--mono);font-size:11px;font-weight:900;color:#059669">${st.actVal} kg</div>`;
    } else if(st.id==='salt'&&st.btn&&isActive){
      btnH=`<button class="tv3-fbtn" style="background:#0891b2" onclick="window._cfm('${pcol}','${rid}','salt')">🧂 Salt OK</button>`;
    } else if(st.btn&&isActive){
      const bg=st.pwd?'pwr':'rw';
      const lbl=st.pwd?'✅ Powder':'✅ Rework';
      btnH=`<button class="tv3-fbtn ${bg}" onclick="window._cfm('${pcol}','${rid}','${st.id}')">${lbl}</button>`;
    } else if(st.id==='fflush'&&isActive){
      btnH=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;margin-top:3px">
        <input id="fflush-${rid}" type="number" min="0" step="1" placeholder="ลิตร"
          style="width:72px;font-family:var(--mono);font-size:11px;font-weight:900;padding:3px 6px;border:2px solid #0891b2;border-radius:6px;text-align:center;background:#fff;color:#111827"
          value="${st.actVal||''}"
          onkeydown="if(event.key==='Enter')window._setFinalVol('${pcol}','${rid}')">
        <button class="tv3-fbtn" style="background:#0891b2" onclick="window._setFinalVol('${pcol}','${rid}')">✅ OK</button>
      </div>`;
    } else if(st.id==='fflush'&&isDone){
      btnH=`<div style="font-family:var(--mono);font-size:11px;font-weight:900;color:#0891b2">${(+(st.actVal)).toLocaleString()} L</div>`;
    }
    let sv2='';
    if(st.id==='rw'&&isDone&&st.tanks) sv2=`<div class="tv3-sv2">${st.tanks} ถัง</div>`;
    const snCls=isDone?'done':isActive?(st.pwd?'pwr':st.isStatus?'nxt':'active'):'';
    const svCls=isDone?'done':isActive?(st.pwd?'pwr':'active'):'';
    const connHtml=i<stepsLen-1?`<div class="tv3-conn ${connCls}"></div>`:'';

    const icoHtml=(st.id==='wait_past'&&isActive)
      ?`<span class="hg-spin">${st.ico}</span>`

    return `<div class="tv3-sw">

  function buildStepsWithStatus(row, pcol, rid){
    const ps=getProcessState(row); // single source of truth
    var steps=buildFlowSteps(row);
    // เพิ่ม tank count ใน rework
    const rwKg=+(row.rework_kg||0);
    if(rwKg>0){
      const rwIdx=steps.findIndex(s=>s.id==='rw');
      if(rwIdx>=0) steps[rwIdx].tanks=+(row.rework_tanks||0)||'';
    }
    // sync status steps จาก process state
    const isWaitPast=ps.id==='wait_past';
    const isPast=ps.id==='pasteurising';
    const isPastDone=ps.id==='past_done';
    const isMixDone=!!row.mix_end_time;
    steps.push({
      id:'wait_past',ico:'⏳',name:'รอ Past.',
      kg:isWaitPast?'รอ...':'',
      done:isPast||isPastDone,
      active:isWaitPast,
      btn:false,skip:false,pwd:false,isStatus:true
    });
    steps.push({
      id:'pasteurising',ico:'🔵',name:'Pasteurising',
      kg:row.past_start_time||'',
      done:isPastDone,
      active:isPast,
      btn:false,skip:false,pwd:false,isStatus:true
    });
    steps.push({
      id:'empty',ico:'🏁',name:'Empty',
      kg:'',
      done:false,
      active:isPastDone,
      btn:false,skip:false,pwd:false,isStatus:true
    });
    return steps;
  }

      ?`<img src="${row.sig_mix_start}" style="height:32px;max-width:70px;object-fit:contain;border:1.5px solid #10b981;border-radius:8px" title="${row.sig_mix_start_name||''}">`

    } else {

      btns+=`<button class="tv3-sbtn y" ${disabled} onclick="window._stampMixStart('${pcol}','${rid}','${m}')">⏱ Start ผสม</button>`;

// AUTO TANK ASSIGNMENT — โยน row ที่ ready เข้าถังว่างอัตโนมัติ
// ============================================================
async function autoAssignTank(m){
  const pcol = planCol(m);
  const allRows = rowsData[m]||[];
  
  // หาถังที่ "ว่าง" — ไม่มี row ที่ status=mixing หรือ pasteurising ในถังนั้น
  function isTankBusy(tank){
    // ถังไม่ว่างถ้ามีของอยู่ — mixing, pasteurising, wait_past, หรือ assign แล้วรอเริ่ม
    return allRows.some(r=>
      (r.mixing_tank===tank) &&
      (r.status==='mixing'||
       r.status==='pasteurising'||
       r.status==='wait_past'||
       (r.mixing_tank===tank&&!r.mix_end_time&&r.prep_status==='ready') // assign แล้วรอเริ่ม
      )
    );
  }
  
  const tank1Busy = isTankBusy('Tank 1');
  const tank2Busy = isTankBusy('Tank 2');
  
  // หา row ที่ ready และยังไม่มีถัง ยังไม่เริ่มผสม
  const readyRows = allRows.filter(r=>
    r.prep_status==='ready' &&
    !r.mixing_tank &&        // ยังไม่ถูก assign ถัง
    r.status!=='mixing' &&
    r.status!=='pasteurising' &&
    r.status!=='wait_past' &&
    r.status!=='past_done'
  ).sort((a,b)=>(a.seq||0)-(b.seq||0));
  
  if(!readyRows.length) return; // ไม่มี row ที่รอ
  
  // หาถังว่างแรก
  let assignTank = null;
  if(!tank1Busy) assignTank = 'Tank 1';
  else if(!tank2Busy) assignTank = 'Tank 2';
  
  if(!assignTank) return; // ทั้งสองถังยังไม่ว่าง — รอ
  
  // โยน row แรกที่ ready เข้าถังว่าง
  const row = readyRows[0];
  try{
    await updateDoc(doc(db,pcol,row.id),{
      mixing_tank: assignTank,
      updated_at: new Date().toISOString()
    });
    toast(`✅ Auto assign ${row.mix_name||row.mix_code} → ${assignTank}`,'green');
  }catch(e){
    toast('❌ Auto assign error: '+e.message,'red');
  }
}

// ── CHART ─────────────────────────────────────────────────────────────
const SHIFTS=[
  {label:"กะเช้า",  color:"rgba(59,130,246,.8)",  start:6*60,  end:14*60},
  {label:"กะบ่าย", color:"rgba(234,179,8,.8)",   start:14*60, end:22*60},
  {label:"กะดึก",  color:"rgba(168,85,247,.8)",  start:22*60, end:30*60},
];

function toMin(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function overlap(bS,bE,sS,sE){
  if(bE<=bS)bE+=1440;
  const o1=Math.max(0,Math.min(bE,sE)-Math.max(bS,sS));
  const o2=Math.max(0,Math.min(bE+1440,sE)-Math.max(bS+1440,sS));
  const o3=Math.max(0,Math.min(bE,sE+1440)-Math.max(bS,sS+1440));
  return Math.max(o1,o2,o3);
}

window.setPeriod=async(m,p,btn)=>{
  period[m]=p;
  document.querySelectorAll(`#page-chart-${m} .period-btn`).forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  await renderChart(m);
};

async function renderChart(m){
  const col=planCol(m);
  const now=new Date();
  let dates=[];

  if(period[m]==="day"){
    dates=[today()];
  } else if(period[m]==="week"){
    for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
  } else if(period[m]==="month"){
    for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.toISOString().slice(0,10));}
  } else {
    for(let i=11;i>=0;i--){const d=new Date();d.setMonth(d.getMonth()-i);dates.push(d.toISOString().slice(0,7));}
  }

  // Load data
  let allRows=[];
  try{
    const startDate=period[m]==="year"?dates[0]+"-01":dates[0];
    const endDate=period[m]==="year"?dates[dates.length-1]+"-31":dates[dates.length-1];
    const snap=await getDocs(query(collection(db,col),where("date",">=",startDate),where("date","<=",endDate)));
    allRows=snap.docs.map(d=>({...d.data()}));
  }catch{}

  // Group by date/month
  const labels=dates;
  const shiftData=SHIFTS.map(()=>new Array(dates.length).fill(0));

  allRows.forEach(r=>{
    const vol=+r.volume_liter||0;
    if(!vol||!r.mix_start_time||!r.mix_end_time)return;
    const p=productMap[r.mix_code];
    const kg=vol*(p?.density||1);
    const bS=toMin(r.mix_start_time);
    const bE=toMin(r.mix_end_time);
    if(bS===null||bE===null)return;
    const dur=bE>=bS?bE-bS:(1440-bS)+bE;
    if(!dur)return;

    const key=period[m]==="year"?r.date?.slice(0,7):r.date;
    const idx=dates.indexOf(key);
    if(idx===-1)return;

    SHIFTS.forEach((sh,si)=>{
      shiftData[si][idx]+=kg*(overlap(bS,bE,sh.start,sh.end)/dur);
    });
  });

  // Render chart
  const canvasId=`chart-${m}`;
  if(charts[m]){charts[m].destroy();}
  const ctx=$(canvasId).getContext("2d");
  charts[m]=new Chart(ctx,{
    type:"bar",
    data:{
      labels:period[m]==="year"?dates.map(d=>{const[y,mo]=d.split("-");return ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."][+mo-1]})
        :dates.map(d=>{const p=d.split("-");return `${p[2]}/${p[1]}`}),
      datasets:SHIFTS.map((sh,si)=>({
        label:sh.label,
        data:shiftData[si].map(v=>Math.round(v)),
        backgroundColor:sh.color,
        borderRadius:4,
      }))
    },
    options:{
      plugins:{legend:{labels:{color:"#7a8499",font:{family:"DM Mono",size:11}}}},
      scales:{
        x:{stacked:true,ticks:{color:"#3d4560",font:{size:10}},grid:{color:"#1e2535"}},
        y:{stacked:true,ticks:{color:"#3d4560",font:{size:10}},grid:{color:"#1e2535"},title:{display:true,text:"kg",color:"#3d4560"}}
      },
      responsive:true,maintainAspectRatio:false
    }
  });
}

// ── HISTORY ────────────────────────────────────────────────────────────
window.showHistory=(btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('on'));
  document.getElementById('page-history').classList.add('on');
  if(btn) btn.classList.add('on');
  loadMixHistory();
};

async function loadMixHistory(){
  const el=document.getElementById('history-content');
  if(!el) return;
  el.innerHTML=`<div style="text-align:center;padding:30px;color:#64748b;font-family:'DM Mono',monospace">⏳ กำลังโหลด...</div>`;
  try{
    const q=query(collection(db,'mixing_history'),orderBy('archived_date','desc'),limit(500));
    const snap=await getDocs(q);
    if(snap.empty){
      el.innerHTML=`<div style="text-align:center;padding:30px;color:#64748b;font-family:'DM Mono',monospace">ไม่มีข้อมูลประวัติ</div>`;
      return;
    }
    window._mixHistoryRows=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>{
        const dc=(b.archived_date||'').localeCompare(a.archived_date||'');
        if(dc!==0) return dc;
        return (b.archived_at||'').localeCompare(a.archived_at||'');
      });
    window.filterMixHistory();
  }catch(e){
    el.innerHTML=`<div style="text-align:center;padding:20px;color:#f87171;font-family:'DM Mono',monospace">❌ โหลดไม่สำเร็จ: ${e.message}</div>`;
    console.error('loadMixHistory error:',e);
  }
}

window.filterMixHistory=function(){
  const el=document.getElementById('history-content');
  if(!el) return;
  const rows=window._mixHistoryRows||[];
  const q=(document.getElementById('hist-search')?.value||'').trim().toLowerCase();
  const unit=(document.getElementById('hist-unit')?.value||'').toLowerCase();
  const filtered=rows.filter(r=>{
    if(unit&&(r.mixing_unit||'').toLowerCase()!==unit) return false;
    if(!q) return true;
    return (r.process_order||'').toLowerCase().includes(q)
        || (r.mix_code||'').toLowerCase().includes(q)
        || (r.mix_name||'').toLowerCase().includes(q);
  });
  window._filteredMixRows=filtered;
  const countEl=document.getElementById('hist-count');
  if(countEl) countEl.textContent=filtered.length+' รายการ'+(q||unit?' (กรองจาก '+rows.length+')':'');
  if(!filtered.length){
    el.innerHTML=`<div style="text-align:center;padding:30px;color:#64748b;font-family:'DM Mono',monospace">ไม่พบข้อมูล${q?' สำหรับ "'+q+'"':''}</div>`;
    return;
  }
  const hl=(txt)=>{
    if(!q||!txt) return txt||'—';
    const idx=txt.toLowerCase().indexOf(q);
    if(idx<0) return txt;
    return txt.slice(0,idx)+'<mark style="background:#854d0e;color:#fef08a;border-radius:2px">'+txt.slice(idx,idx+q.length)+'</mark>'+txt.slice(idx+q.length);
  };
  el.innerHTML=`<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#0f172a">
      ${['วันที่','เวลา Archive','Unit','Mix Code','Process Order','ชื่อ Mix','Batch','Vol (L)','Tank','เริ่ม Mix','Mix เสร็จ','ใช้เวลา','Eff%',
        '🍬 Glc Set','🍬 Glc Act.','🧂 Sgr Set','🧂 Sgr Act.','🌴 Plm Set','🌴 Plm Act.','🛢️ Oil Set','🛢️ Oil Act.','🥛 Fat Set','🥛 Fat Act.','Final Flush']
        .map(h=>`<th style="padding:8px 10px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;color:#64748b;border-bottom:1.5px solid #334155;white-space:nowrap">${h}</th>`).join('')}
    </tr></thead>
    <tbody>${filtered.map((r,i)=>{
      const eff=r.eff||0;
      const ec=eff>=99.9&&eff<=100.5?'#34d399':eff>100.5?'#fb923c':eff>0?'#f87171':'#64748b';
      const el2=eff>=99.9&&eff<=100.5?'✅':eff>100.5?'⚠️':eff>0?'❌':'—';
      const unitColor=(r.mixing_unit||'').toLowerCase()==='m1'?'#1d4ed8':'#7c3aed';
      const unitLabel=(r.mixing_unit||'').toLowerCase()==='m1'?'MIX 1':'MIX 2';
      let elapsed='—';
      if(r.mix_start_time&&r.mix_end_time){
        const t1=r.mix_start_time.split(':').map(Number);
        const t2=r.mix_end_time.split(':').map(Number);
        let m2=(t2[0]*60+t2[1])-(t1[0]*60+t1[1]);
        if(m2<0) m2+=1440;
        elapsed=m2+' min';
      }
      const rowBg=i%2===0?'#0f172a':'#111827';
      const td=(v,extra='')=>`<td style="padding:7px 10px;${extra}">${v}</td>`;
      const mono='font-family:"DM Mono",monospace;';
      return`<tr style="border-bottom:1px solid #1e293b;background:${rowBg}">
        ${td(`<span style="${mono}font-size:11px;color:#64748b">${r.archived_date||'—'}</span>`)}
        ${td(`<span style="${mono}font-size:11px;color:#64748b">${r.archived_at||'—'}</span>`)}
        ${td(`<span style="${mono}font-size:11px;font-weight:900;color:#fff;background:${unitColor};padding:2px 8px;border-radius:4px">${unitLabel}</span>`,'text-align:center')}
        ${td(`<span style="${mono}font-weight:700;color:#e2e8f0">${hl(r.mix_code||'—')}</span>`)}
        ${td(`<span style="${mono}font-weight:700;color:#60a5fa">${hl(r.process_order||'—')}</span>`)}
        ${td(`<span style="color:#cbd5e1">${hl(r.mix_name||'—')}</span>`)}
        ${td(`<span style="${mono}color:#94a3b8">${r.batch_no||'—'}</span>`,'text-align:center')}
        ${td(`<span style="${mono}color:#e2e8f0">${(+(r.volume_liter||0)).toLocaleString()}</span>`,'text-align:right')}
        ${td(`<span style="${mono}color:#94a3b8">${r.mixing_tank||'—'}</span>`)}
        ${td(`<span style="${mono}color:#34d399">${r.mix_start_time||'—'}</span>`)}
        ${td(`<span style="${mono}color:#f87171">${r.mix_end_time||'—'}</span>`)}
        ${td(`<span style="${mono}color:#94a3b8">${elapsed}</span>`)}
        ${td(`<span style="${mono}font-weight:700;color:${ec}">${el2} ${eff?eff+'%':'—'}</span>`)}
        ${td(`<span style="${mono}font-size:11px;color:#94a3b8">${r.glc_set||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:${r.glc_actual?'#34d399':'#475569'}">${r.glc_actual||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:#94a3b8">${r.sgr_set||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:${r.sgr_actual?'#34d399':'#475569'}">${r.sgr_actual||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:#94a3b8">${r.plm_set||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:${r.plm_actual?'#34d399':'#475569'}">${r.plm_actual||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:#94a3b8">${r.oil_mix_set||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:${r.oil_mix_actual?'#34d399':'#475569'}">${r.oil_mix_actual||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:#94a3b8">${r.fat_milk_set||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:${r.fat_milk_actual?'#34d399':'#475569'}">${r.fat_milk_actual||'—'}</span>`,'text-align:right')}
        ${td(`<span style="${mono}font-size:11px;color:#38bdf8">${r.final_flush?(+(r.final_flush)).toLocaleString()+' L':'—'}</span>`,'text-align:right')}
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
};

window.exportMixHistory=function(){
  const rows=window._filteredMixRows||window._mixHistoryRows||[];
  if(!rows.length){alert('ไม่มีข้อมูลที่จะ Export');return;}
  const headers=['วันที่','เวลา Archive','Unit','Mix Code','Process Order','ชื่อ Mix','Batch','Vol (L)','Tank','เริ่ม Mix','Mix เสร็จ','ใช้เวลา (min)','Eff%',
    'Glc Set','Glc Act.','Sgr Set','Sgr Act.','Plm Set','Plm Act.','Oil Set','Oil Act.','Fat Set','Fat Act.','Final Flush (L)'];
  const esc=v=>'"'+(String(v||'').replace(/"/g,'""'))+'"';
  const csv=[headers.map(esc).join(','),...rows.map(r=>{
    let elapsed='';
    if(r.mix_start_time&&r.mix_end_time){
      const t1=r.mix_start_time.split(':').map(Number);
      const t2=r.mix_end_time.split(':').map(Number);
      let m2=(t2[0]*60+t2[1])-(t1[0]*60+t1[1]);
      if(m2<0) m2+=1440;
      elapsed=m2;
    }
    return[
      r.archived_date||'',r.archived_at||'',(r.mixing_unit||'').toUpperCase(),
      r.mix_code||'',r.process_order||'',r.mix_name||'',r.batch_no||'',
      r.volume_liter||'',r.mixing_tank||'',r.mix_start_time||'',r.mix_end_time||'',
      elapsed,r.eff?r.eff+'%':'',
      r.glc_set||'',r.glc_actual||'',r.sgr_set||'',r.sgr_actual||'',
      r.plm_set||'',r.plm_actual||'',r.oil_mix_set||'',r.oil_mix_actual||'',
      r.fat_milk_set||'',r.fat_milk_actual||'',r.final_flush||''
    ].map(esc).join(',');
  })].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='mixing_history_'+(new Date().toISOString().slice(0,10))+'.csv';
  a.click();URL.revokeObjectURL(url);
};

window.archiveMixRow=async function(col,row,mixingUnit){
  if(!row||!row.id) return;
  try{
    const prod=productMap[row.mix_code||'']||{};
    let eff=0;
    if(row.mix_start_time&&row.mix_end_time){
      const speed=mixingUnit==='m1'?+(prod.speed_m1||prod.speed||0):+(prod.speed_m2||prod.speed||0);
      const density=+(prod.density||1);
      const vol=+(row.volume_liter||0);
      const reqSec=speed>0?Math.round(vol*density*3600/speed):0;
      const t1=row.mix_start_time.split(':').map(Number);
      const t2=row.mix_end_time.split(':').map(Number);
      let actualSec=(t2[0]*3600+t2[1]*60)-(t1[0]*3600+t1[1]*60);
      if(actualSec<0) actualSec+=86400;
      eff=actualSec>0?Math.round(reqSec/actualSec*1000)/10:0;
    }
    const now=new Date();
    await addDoc(collection(db,'mixing_history'),{
      archived_date:now.toISOString().slice(0,10),
      archived_at:now.toTimeString().slice(0,8),
      mixing_unit:mixingUnit,
      date:row.date||today(),
      mix_code:row.mix_code||'',mix_name:row.mix_name||'',
      process_order:row.process_order||'',batch_no:row.batch_no||'',
      volume_liter:row.volume_liter||0,mixing_tank:row.mixing_tank||'',
      mix_start_time:row.mix_start_time||'',mix_end_time:row.mix_end_time||'',
      past_start_time:row.past_start_time||'',past_end_time:row.past_end_time||'',
      glc_set:row.glc_set||'',glc_actual:row.glc_actual||'',
      sgr_set:row.sgr_set||'',sgr_actual:row.sgr_actual||'',
      plm_set:row.plm_set||'',plm_actual:row.plm_actual||'',
      oil_mix_set:row.oil_mix_set||'',oil_mix_actual:row.oil_mix_actual||'',
      fat_milk_set:row.fat_milk_set||'',fat_milk_actual:row.fat_milk_actual||'',
      rework_kg:row.rework_kg||0,final_flush:row.final_flush||0,
      status:row.status||'',eff:eff,
      source_id:row.id,source_col:col,
    });
  }catch(e){console.error('archiveMixRow error:',e);}
};

// ── PAGE SWITCH ────────────────────────────────────────────────────────
window.switchMix=(m,btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('on'));
  const pg=document.getElementById('page-'+m);
  if(pg) pg.classList.add('on');
  if(btn) btn.classList.add('on');
  // sync date และ load data
  const dateEl=document.getElementById('date-'+m);
  if(dateEl&&!dateEl.value){ dateEl.valueAsDate=new Date(); }
  loadPlan(m);
};
window.showPage=(type,m,btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('on'));
  $(`page-${type}-${m}`).classList.add('on');
  btn.classList.add('on');
  if(type==="chart") renderChart(m);
};
