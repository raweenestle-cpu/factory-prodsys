<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
  
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROD.SYS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIP Man — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Sarabun:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8ecf0;--s1:#f2f4f7;--s2:#e0e4ea;--s3:#d0d6de;
  --b1:#b0bac8;--b2:#8896aa;
  --text:#111827;--t2:#374151;--t3:#6b7280;
  --blue:#3b7ef6;--blue2:#7ab3ff;
  --green:#1fd17a;--yellow:#f5c842;--red:#f04f5e;
  --cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{min-height:100%;background:#e8ecf0;color:#111827;font-family:var(--sans)}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,126,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,246,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 14px;gap:8px;overflow-x:auto}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:600;letter-spacing:.06em;flex-shrink:0}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.ntab{font-size:11px;font-weight:600;padding:5px 10px;border-radius:7px;border:none;background:none;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.ntab.on{color:var(--cyan);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.manage-btn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid rgba(155,109,255,.3);background:rgba(155,109,255,.1);color:var(--purple);cursor:pointer;display:none}
.manage-btn.show{display:block}
.btn-logout{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer}

/* MAIN */
main{position:relative;z-index:1;padding:10px 12px;}
.page{display:none}
.page.on{display:block}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.kpi.c1::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.kpi.c2::after{background:linear-gradient(90deg,var(--green),#6efcb4)}
.kpi.c3::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.c4::after{background:var(--b2)}
.kpi-lbl{font-size:9px;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.kpi-val{font-size:22px;font-weight:700;font-family:var(--mono)}

/* LINE CARD */
.lcard{background:var(--s1);border:2px solid var(--b1);border-radius:18px;overflow:hidden;margin-bottom:12px;width:100%;min-height:460px}
.lcard.running{border-color:#15803d;box-shadow:0 4px 20px rgba(21,128,61,.12)}
.lcard.curing{border-color:#b45309;box-shadow:0 4px 20px rgba(180,83,9,.12)}
.lcard.stopped{border-color:#1d4ed8;box-shadow:0 4px 20px rgba(29,78,216,.1)}
.lcard.empty{opacity:.5}

/* ACCENT LINE */
.accent{height:5px}
.running .accent{background:linear-gradient(90deg,var(--green),var(--cyan));animation:shimmer 3s linear infinite;background-size:200%}
.curing .accent{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.stopped .accent{background:linear-gradient(90deg,var(--blue),var(--purple))}
.empty .accent{background:var(--b2)}

/* LINE HEADER CARD */
.lhead{padding:14px 16px;border-bottom:1px solid var(--b1)}
.lhead-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lname{font-family:var(--mono);font-size:22px;font-weight:900;letter-spacing:.04em;color:#111827}
.spill{font-family:var(--mono);font-size:11px;font-weight:800;padding:5px 14px;border-radius:999px;white-space:nowrap}
.sp-run{background:#15803d;color:#fff;border:none;box-shadow:0 1px 4px rgba(21,128,61,.3)}
.sp-cur{background:#b45309;color:#fff;border:none;animation:blink-st .9s step-end infinite;mation:blink .9s infinite}
.sp-stp{background:#1d4ed8;color:#fff;border:none}
.sp-emp{background:#6b7280;color:#fff;border:none}

.lhead-info{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.mix-code{font-family:var(--mono);font-size:15px;font-weight:900;color:#111827}
.mix-sep{color:var(--t3)}
.mix-name{font-size:13px;font-weight:700;color:#374151}
.batch-pill{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:5px;background:var(--s3);color:var(--t3);border:1px solid var(--b1)}

.lhead-tags{display:flex;gap:6px;flex-wrap:wrap}
.ltag{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:7px;background:var(--s2);color:var(--t2);border:1px solid var(--b1);display:flex;align-items:center;gap:5px;white-space:nowrap}
.ltag.hi{background:rgba(0,212,255,.08);color:var(--cyan);border-color:rgba(0,212,255,.2)}

/* FP SELECTS */
.fp-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.fp-item{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:6px 10px}
.fp-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.fp-sel{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 7px;outline:none;cursor:pointer}
.fp-sel:focus{border-color:var(--cyan)}

/* TANK AREA */
.tank-area{padding:20px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;border-bottom:1px solid var(--b1);background:rgba(0,0,0,.15)}
.tank-num-badge{font-family:var(--mono);font-size:16px;font-weight:900;padding:6px 20px;border-radius:8px;background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3);letter-spacing:.06em}
.tank-stats{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%}
.tank-vol{font-family:var(--mono);font-size:28px;font-weight:900;text-align:center;font-variant-numeric:tabular-nums}
.tank-pct{font-family:var(--mono);font-size:18px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}
.tank-eta{font-size:13px;font-weight:700;color:#374151;text-align:center;min-height:16px}
/* Progress bar */
.prog-wrap{width:100%;max-width:300px;margin:2px auto 0}
.prog-bg{height:8px;background:var(--s3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* CURING BOX */
.curing-box{width:100%;max-width:300px;border-radius:10px;padding:12px 16px;text-align:center}
.curing-box.done{background:rgba(31,209,122,.08);border:1px solid rgba(31,209,122,.2)}
.curing-box.pend{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.2);animation:blink 1.2s infinite}
.curing-icon{font-size:20px;margin-bottom:4px}
.curing-txt{font-family:var(--mono);font-size:13px;font-weight:700}
.curing-time{font-family:var(--mono);font-size:11px;color:var(--t2);margin-top:3px}

/* HOT WATER */
.hw-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;user-select:none;width:100%;max-width:300px}
.hw-row.on{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.2)}
.hw-row.off{background:rgba(240,79,94,.06);border:1px dashed rgba(240,79,94,.25)}
.hw-cb{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.hw-txt{font-family:var(--mono);font-size:11px;font-weight:600}

/* CONTROLS */
.ctrl-area{padding:14px 16px;border-bottom:1px solid var(--b1)}
.ctrl-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.cbtn{padding:14px 8px;border-radius:10px;border:none;font-size:13px;font-family:var(--mono);font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cbtn-icon{font-size:18px}
.cbtn.start{background:rgba(31,209,122,.12);color:var(--green);border:1px solid rgba(31,209,122,.3)}
.cbtn.stop{background:rgba(240,79,94,.1);color:var(--red);border:1px solid rgba(240,79,94,.25)}
.cbtn.reset{background:rgba(245,200,66,.08);color:var(--yellow);border:1px solid rgba(245,200,66,.2)}
.empty-btn{width:100%;padding:14px;border-radius:10px;border:1px dashed rgba(240,79,94,.4);background:rgba(240,79,94,.06);color:var(--red);font-size:13px;font-family:var(--mono);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.empty-btn:active{background:rgba(240,79,94,.15)}

/* QUEUE */
.queue-area{padding:14px 16px}
.queue-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.qlist{display:flex;flex-direction:column;gap:6px}
.qitem{padding:10px 12px;border-radius:12px;border:1.5px solid var(--b1);background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.qitem.current{background:rgba(29,78,216,.08);border-color:rgba(29,78,216,.35);border-left:4px solid #1d4ed8}
.qitem.ready{background:rgba(21,128,61,.08);border-color:rgba(21,128,61,.3);border-left:4px solid #15803d}
.qitem.curing{background:rgba(180,83,9,.07);border-color:rgba(180,83,9,.25);border-left:4px solid #b45309}
.qitem.pasting{background:rgba(234,88,12,.07);border-color:rgba(234,88,12,.25);border-left:4px solid #ea580c}
.qrow1{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.qrow2{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.qnum{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:16px}
.qdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.qtank{font-family:var(--mono);font-size:12px;font-weight:900;padding:3px 10px;border-radius:6px;background:rgba(0,212,255,.08);color:var(--cyan);border:1px solid rgba(0,212,255,.15)}
.qcode{font-family:var(--mono);font-size:13px;font-weight:900;color:#111827}
.qbatch{font-family:var(--mono);font-size:11px;font-weight:700;color:#374151}
.qstat{font-family:var(--mono);font-size:11px;font-weight:800;padding:4px 12px;border-radius:999px;white-space:nowrap}
.qtime{font-family:var(--mono);font-size:11px}
.spin-hg{display:inline-block;animation:hgspin 2s ease-in-out infinite}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:flex-end;justify-content:center}
.mbg.show{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.mbox.center{border-radius:16px;margin:20px;max-height:80vh}
.micon{font-size:32px;text-align:center;margin-bottom:8px}
.mtitle{font-family:var(--mono);font-size:14px;font-weight:700;margin-bottom:6px}
.msub{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6}
.mbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mconfirm{padding:13px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--mono)}
.mcancel{padding:13px;border-radius:10px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:13px;cursor:pointer;font-family:var(--mono)}
.msec-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--b1);margin-top:16px}
.mlist{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.mlist-item{display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:8px;padding:8px 12px;border:1px solid var(--b1)}
.mlist-name{font-family:var(--mono);font-size:12px;flex:1}
.mdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px 6px}
.mdel:hover{color:var(--red)}
.madd-row{display:flex;gap:8px}
.minput{background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:9px 12px;outline:none;flex:1}
.minput:focus{border-color:var(--purple)}
.madd-btn{padding:9px 16px;border-radius:8px;border:none;background:var(--purple);color:#fff;font-family:var(--mono);font-size:12px;cursor:pointer;white-space:nowrap}

/* QUEUE PAGE */
.queue-page-item{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.queue-page-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);padding:10px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.line-sel-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--b1);background:var(--s1);flex-wrap:wrap}
.lsel-lbl{font-family:var(--mono);font-size:10px;color:var(--t2)}
.lsel-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .2s}
.lsel-btn:hover,.lsel-btn.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
.lsel-btn.all.on{border-color:var(--orange);color:var(--orange);background:rgba(255,140,66,.08)}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes wave2{0%{transform:translateX(-30%)}100%{transform:translateX(20%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-50px);opacity:0}}
@keyframes hgspin{0%{transform:rotate(0deg)}45%{transform:rotate(0deg)}55%{transform:rotate(180deg)}100%{transform:rotate(180deg)}}

/* ── MOBILE RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:768px){
  nav{padding:0 10px;gap:4px;flex-wrap:nowrap;overflow-x:auto}
  .nav-logo{font-size:12px;flex-shrink:0}
  .ntab{font-size:10px;padding:4px 8px;flex-shrink:0}
  .btn-logout{font-size:10px;padding:4px 8px}
  main{padding:8px}

  /* LINE SELECTOR */
  .line-sel-bar{padding:6px 10px;gap:5px;overflow-x:auto;flex-wrap:nowrap}
  .lsel-btn{font-size:10px;padding:4px 10px;flex-shrink:0}

  /* LCARD — stack vertically */
  .lcard > div[style*="display:flex"]{flex-direction:column!important}

  /* LEFT — current tank full width */
  .lcard > div > div:first-child{
    width:100%!important;
    border-right:none!important;
    border-bottom:1px solid rgba(255,140,66,.2)!important;
  }

  /* RIGHT — queue full width */
  .lcard > div > div:last-child{width:100%!important}

  /* CTRL BUTTONS — larger */
  .cbtn{padding:14px 8px;font-size:14px}
  .empty-btn{font-size:14px;padding:16px}

  /* FP SELECTS */
  .fp-sel{font-size:12px;padding:7px 8px;min-height:44px}

  /* TANK NUM BADGE */
  .tank-num-badge{font-size:16px}

  /* CURING BOX */
  .curing-box{width:100%}

  /* QUEUE ITEMS */
  .qitem{padding:12px 14px}
  .qcode{font-size:14px}
  .qtime{font-size:12px}
}


  /* Queue card — ใช้ style เหมือน Filling */
  --fs:12px;
  .cq-tc{width:240px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;background:var(--s1);border:1.5px solid var(--b1);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .cq-ch{padding:9px 10px 6px;border-bottom:1px solid var(--b1)}
  .cq-ch-top{display:flex;align-items:baseline;gap:5px;margin-bottom:3px;flex-wrap:wrap}
  .cq-code{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--orange)}
  .cq-batch{font-family:var(--mono);font-size:12px;color:#8899bb;margin-top:2px;font-weight:600}
  .cq-rp{font-family:var(--mono);font-size:12px;font-weight:700;color:#c084fc;letter-spacing:.08em;margin-top:3px}
  .cq-ab{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--cyan);padding:5px 10px;text-align:center;border-bottom:1px solid var(--b1)}
  .cq-sw{position:relative;margin:8px 10px 4px}
  .cq-so{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:90%}
  .cq-sv{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.9)}
  .cq-st{text-align:center;padding:5px 8px 9px}
  .cq-stb{font-family:var(--mono);font-size:12px;font-weight:700;border-radius:99px;padding:3px 10px}
  .cq-cb{padding:6px 10px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:5px}

@keyframes statusPulse{0%,100%{opacity:1}50%{opacity:.45}}
.status-blink{animation:statusPulse 1.4s ease-in-out infinite}

.sig-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s;display:inline-flex;align-items:center;gap:4px;font-size:11px;color:#64748b;}
.sig-btn:hover{background:rgba(99,102,241,.15);color:#818cf8;}
.sig-preview{height:28px;vertical-align:middle;opacity:.95;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ CIP MAN</span></div>
  <button class="ntab on" onclick="showPage('bangchan',this)">🏭 Bangchan</button>
  <button class="ntab" onclick="showPage('twin',this)">🏭 Twin</button>
  <button class="ntab" onclick="showPage('queue',this)">📋 คิวถัง</button>
  <div class="nav-r">
    <button id="btn-manage" class="manage-btn" onclick="openManage()">⚙️</button>
    <a href="index.html" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;text-decoration:none;white-space:nowrap">🏠</a>
    <button class="btn-logout" onclick="doLogout()">ออก</button>
  </div>
</nav>
<div class="line-sel-bar" id="cip-lsb"><span class="lsel-lbl">แสดง LINE:</span><button class="lsel-btn all on" onclick="cipSel('all',this)">ทั้งหมด</button></div>
<main>
  <!-- BANGCHAN -->
  <div class="page on" id="page-bangchan">

    <div id="grid-bangchan"></div>
  </div>

  <!-- TWIN -->
  <div class="page" id="page-twin">

    <div id="grid-twin"></div>
  </div>

  <!-- QUEUE -->
  <div class="page" id="page-queue">
    <div style="font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px">📋 คิวถังรอส่ง Filling — วันนี้</div>
    <div id="queue-list"></div>
  </div>
</main>

<!-- EMPTY MODAL -->
<div class="mbg" id="m-empty">

// HELPERS
function getTanksForLine(lineName){
  const raw=planRows
    .filter(r=>r.filling_line===lineName&&(r.status==='ready'||r.status==='past_done'||r.status==='pasteurising'))
    .sort((a,b)=>{const dd=(b.date||'').localeCompare(a.date||'');return dd!==0?dd:(a.seq||0)-(b.seq||0);});

  // Group rows ที่ process_order + aging_tank เดียวกัน → รวมเป็น row เดียว
  const grouped=[];
  const seen=new Set();
  raw.forEach(row=>{
    const key=row.process_order&&row.aging_tank?`${row.process_order}__${row.aging_tank}`:'';
    if(key&&seen.has(key))return;
    if(key){
      seen.add(key);
      const group=raw.filter(r=>r.process_order===row.process_order&&r.aging_tank===row.aging_tank);
      if(group.length>1){
        const totalVol=group.reduce((s,r)=>s+(+(r.volume_liter||0)),0);
        const batchBase=String(row.batch_no||'').replace(/[\/\-]\d+$/,'');
        const activeRow=group.reduce((best,r)=>{
          const cv=r.current_vol!=null?+r.current_vol:-1;
          const bcv=best.current_vol!=null?+best.current_vol:-1;
          return cv>bcv?r:best;
        }, group.find(r=>r.status==='pasteurising')||group[0]);
        grouped.push({...activeRow,volume_liter:totalVol,batch_no:batchBase,_group:group});
        return;
      }
    }
    grouped.push(row);
  });
  return grouped;
}
function calcCuringEnd(pastEnd,agingHr){
  if(!pastEnd||!agingHr)return'—';
  // ใช้วันปัจจุบันเป็น base แล้วบวก agingHr
  const[h,m]=pastEnd.split(':').map(Number);
  const base=new Date();
  base.setHours(h,m,0,0);
  // ถ้าเวลา past_end_time > เวลาปัจจุบัน → น่าจะเป็นวันก่อนหน้า ให้ลบ 1 วัน
  // แต่ถ้าน้อยกว่า → วันนี้
  // เพื่อความปลอดภัย ใช้ base ตามที่ set แล้วบวก aging hours ไปเลย
  const endTs=new Date(base.getTime()+(+agingHr)*3600000);
  const dStr=endTs.toLocaleDateString('th-TH',{weekday:'short',day:'2-digit',month:'short'});
  const tStr=endTs.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  return dStr+' '+tStr;
}
function calcCuringEndTs(pastEnd,agingHr,dateStr){
  // คำนวณ timestamp จริงจาก past_end_date + past_end_time + agingHr
  if(!pastEnd)return null;
  if(!agingHr||+agingHr===0)return new Date(Date.now()-1000);
  const[h,m]=pastEnd.split(':').map(Number);
  // ถ้ามี dateStr ใช้วันนั้น ไม่งั้นใช้วันนี้
  let base;
  if(dateStr){
    base=new Date(dateStr+'T00:00:00');
    base.setHours(h,m,0,0);
  } else {
    base=new Date();
    base.setHours(h,m,0,0);
    // ถ้าเวลา past_end ผ่านมานานแล้วในวันนี้ ก็ถือวันนี้
  }
  return new Date(base.getTime()+(+agingHr)*3600000);
}
function getCuringInfo(row,lineId){
  if(!row||!row.past_end_time)return{done:false,endTime:'—'};
  const p=productMap[row.mix_code];const agingHr=+(p?.aging_time||0);
  if(agingHr===0)return{done:true,endTime:'✅ ไม่ต้องบ่ม'};
  // ใช้ past_end_at (ISO) ถ้ามี ไม่งั้น fallback ใช้ date+past_end_time
  let endTs=null;
  if(row.past_end_at){
    const base=new Date(row.past_end_at);
    endTs=new Date(base.getTime()+agingHr*3600000);
  } else {
    endTs=calcCuringEndTs(row.past_end_time,agingHr,row.date||null);
  }
  const endTime=endTs?endTs.toLocaleDateString('th-TH',{weekday:'short',day:'2-digit',month:'short'})+' '+endTs.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):'—';
  const done=endTs?Date.now()>=endTs.getTime():false;
  return{done:done||(lineStates[lineId]||{}).curing_done||false,endTime};
}
function getEtaStr(rem,flow,run){

  return'หมด ~'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function tankSVGSm(uid,pct,col,run){
  const sw=90,sh=155;
  const bX=10,bY=30,bW=sw-20,bH=sh-45;
  const nW=16,nH=7,cW=22,cH=4;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const hasLiq=pct>0;
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(pct/100)*maxFillH);
  const wy=bY+bH-fillH;
  const A=4;
  const gid='gs'+uid,cid='cs'+uid;
  const bodyFill=hasLiq?col+'22':'#f8fafc';
  const bodyStroke=hasLiq?col:'#b0bac8';
  function waveD(yBase,amp,nc){
    const W=bW*2,segW=W/(nc*2);
    let d='M'+bX+','+yBase;
    for(let i=0;i<nc*2;i++){
      const x1=bX+i*segW,x2=bX+(i+1)*segW;
      const cy=i%2===0?yBase-amp:yBase+amp;
      d+=' C'+(x1+segW*.4)+','+cy+' '+(x2-segW*.4)+','+cy+' '+x2+','+yBase;
    }
    return d+' L'+(bX+W)+','+(bY+bH)+' L'+bX+','+(bY+bH)+' Z';
  }
  let s='<svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'" style="display:block">';
  s+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".5"/><stop offset="100%" stop-color="'+col+'" stop-opacity=".85"/></linearGradient>';
  s+='<clipPath id="'+cid+'"><rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="10"/></clipPath></defs>';
  s+='<rect x="'+nX+'" y="'+(bY-nH)+'" width="'+nW+'" height="'+(nH+4)+'" rx="3" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".6"/>';
  s+='<rect x="'+cX+'" y="'+(bY-nH-cH)+'" width="'+cW+'" height="'+(cH+3)+'" rx="3" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".5"/>';
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="10" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity="'+(hasLiq?'.4':'.6')+'"/>';

function tankSVG(uid,pct,col,run,statusTxt,statusCol,sw,sh){
  statusCol=statusCol||col;
  sw=sw||160; sh=sh||280;
  const bX=14,bY=18,bW=sw-28,bH=sh-45;
  const nW=24,nH=10,cW=34,cH=6;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(pct/100)*maxFillH);
  const wy=bY+bH-fillH;
  const A=6,midY=bY+bH/2;
  const hasLiq=pct>0;
  const bodyFill=hasLiq?col+'22':'rgba(176,186,200,.12)';
  const bodyStroke=hasLiq?col:'#b0bac8';
  const gid='g'+uid,cid='cl'+uid;
  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  function waveD(yBase,amp,nc){
    const W=bW*2,segW=W/(nc*2);
    let d='M'+bX+','+yBase;
    for(let i=0;i<nc*2;i++){
      const x1=bX+i*segW,x2=bX+(i+1)*segW;
      const cy=i%2===0?yBase-amp:yBase+amp;
      d+=' C'+(x1+segW*.4)+','+cy+' '+(x2-segW*.4)+','+cy+' '+x2+','+yBase;
    }
    return d+' L'+(bX+W)+','+(bY+bH)+' L'+bX+','+(bY+bH)+' Z';
  }
  let s='';
  s+='<svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs>';
  s+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">';
  s+='<stop offset="0%" stop-color="'+col+'" stop-opacity=".5"/>';
  s+='<stop offset="100%" stop-color="'+col+'" stop-opacity=".85"/>';
  s+='</linearGradient>';
  s+='<clipPath id="'+cid+'"><rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12"/></clipPath>';
  s+='</defs>';
  // motor/neck
  s+='<rect x="'+nX+'" y="'+(bY-nH)+'" width="'+nW+'" height="'+(nH+5)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".6"/>';
  s+='<rect x="'+cX+'" y="'+(bY-nH-cH)+'" width="'+cW+'" height="'+(cH+3)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".5"/>';
  if(hasLiq) s+='<circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="#22c55e" opacity=".9"/><circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0"><animate attributeName="r" from="4" to="10" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/></circle>';
  // body
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity="'+(hasLiq?'.4':'.6')+'"/>';
  // fill + wave
  if(hasLiq){
    s+='<g clip-path="url(#'+cid+')">';
    s+='<rect x="'+bX+'" y="'+(wy+A)+'" width="'+(bW*2)+'" height="'+(bY+bH-(wy+A))+'" fill="url(#'+gid+')"/>';
    s+='<path d="'+waveD(wy,A,3)+'" fill="'+col+'" fill-opacity=".55"><animateTransform attributeName="transform" type="translate" from="0,0" to="'+(-bW)+',0" dur="2.8s" repeatCount="indefinite"/></path>';
    s+='<path d="'+waveD(wy,A*.6,4)+'" fill="'+col+'" fill-opacity=".3"><animateTransform attributeName="transform" type="translate" from="'+(bW*.5)+',0" to="'+(-bW*.5)+',0" dur="4s" repeatCount="indefinite"/></path>';
    s+='<ellipse cx="'+(bX+bW*.35)+'" cy="'+(wy-2)+'" rx="'+(bW*.12)+'" ry="2.5" fill="white" fill-opacity=".3"/>';
    s+='</g>';
  }
  // border overlay
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="none" stroke="'+bodyStroke+'" stroke-width="2.5" stroke-opacity="'+(hasLiq?'.8':'.6')+'"/>';
  // ขาถัง
  s+='<rect x="'+(bX+8)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+bW-16)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+3)+'" y="'+(bY+bH+13)+'" width="'+(bW-6)+'" height="5" rx="2" fill="rgba(255,255,255,.12)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".5"/>';
  // text
  const tc='#111827';

  if(hasLiq){

  }
  s+='</svg>';
  return s;
}

        <button style="width:100%;padding:8px;border-radius:10px;font-family:var(--mono);font-size:11px;font-weight:700;background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2);cursor:pointer"

          <div style="display:flex;justify-content:space-between"><span style="color:var(--t3)">โดย</span><span style="color:var(--blue);font-weight:800">${st.started_by||'—'}</span></div>
          <div style="display:flex;justify-content:space-between;margin-top:4px;padding-top:4px;border-top:1px solid var(--b1)"><span style="color:var(--t3);font-weight:700">⏸ STOP</span><span style="color:#111827;font-weight:900">${st.stopped_at||'—'}</span></div>

        </div>

        <!-- หมดถัง -->
        <button style="width:100%;padding:10px;border-radius:10px;font-family:var(--mono);font-size:12px;font-weight:700;border:1px dashed rgba(240,79,94,.4);background:rgba(240,79,94,.06);color:var(--red);cursor:pointer;margin-top:4px"
          onclick="askEmpty('${line.id}','${current._col}','${current.id}','${line.name}')">🪣 หมดถัง — โหลดถัดไป</button>
      </div>

      <!-- Queue — card เหมือน Filling -->
      <div style="flex:1;padding:10px 12px;overflow-y:auto;max-height:340px;border:1px solid rgba(6,182,212,.2);border-radius:12px;background:rgba(6,182,212,.03)">

// RENDER ALL
function renderAll(){
  // Build line selector buttons
  const lsb=document.getElementById('cip-lsb');
  if(lsb){lsb.querySelectorAll('.lsel-btn:not(.all)').forEach(b=>b.remove());lines.forEach(l=>{const b=document.createElement('button');b.className='lsel-btn'+(cipSL===l.name?' on':'');b.textContent=l.name;b.onclick=()=>cipSel(l.name,b);lsb.appendChild(b);});}
  // Deduplicate by name
  const seen=new Set();
  const uniqueLines=lines.filter(l=>{if(seen.has(l.name))return false;seen.add(l.name);return true;});
  const bangchan=uniqueLines.filter(l=>(l.group||'bangchan')==='bangchan'&&(cipSL==='all'||cipSL===l.name));
  const twin=uniqueLines.filter(l=>l.group==='twin'&&(cipSL==='all'||cipSL===l.name));
  const render=(group,gridId)=>{
    const g=$(gridId);if(!g)return;
    g.innerHTML=group.length?group.map(l=>buildCard(l)).join(''):`<div style="color:var(--t3);font-family:var(--mono);padding:30px;text-align:center">ยังไม่มี LINE</div>`;
  };
  render(bangchan,'grid-bangchan');
  render(twin,'grid-twin');
  renderQueuePage();
}


function buildFlowDiagram(lineId,agingTank,col,isRunning){
  const lineObj=lines.find(l=>l.id===lineId)||{};
  const curRow=(getTanksForLine(lineObj.name)||[])[0]||{};
  const mixCode=curRow.mix_code||'';
  const lineProd=(lineObj.products||[]).find(p=>(p.mix_codes||[]).some(m=>m.code===mixCode));
  const fr=lineProd?.flow_rate||(lineStates[lineId]||{}).flow_rate||lineObj.flow_rate||300;
  const fz=(lineStates[lineId]||{}).fz_A||'Freezer';
  const ac=isRunning?col:'#94a3b8';
  const bg=isRunning?col+'18':'rgba(176,186,200,.15)';
  const anim='<animate attributeName="stroke-dashoffset" from="24" to="0" dur=".55s" repeatCount="indefinite"/>';
  // ซ้ายไปขวา: Nozzle(ก้นถัง) → Pump → FlowMeter → Freezer → Line
  const W=550,H=120,PIPY=60;
  const NCX=40,NOZZLE_Y=14; // nozzle center x, ออกจากก้นถัง
  const PX=120,PY=PIPY;
  const FMX=195,FMY=PIPY-30,FMW=100,FMH=58;
  const FZX=345,FZY=10,FZW=80,FZH=85,FZCX=FZX+FZW/2;
  const LOX=470,LOY=22,LOW=75,LOH=65;
  function pipe(x1,y1,x2,y2){
    return isRunning
      ?'<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+ac+'" stroke-width="7" stroke-linecap="round" opacity=".2"/>'
       +'<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+ac+'" stroke-width="3.5" stroke-dasharray="8,5" stroke-linecap="round">'+anim+'</line>'
      :'<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#b0bac8" stroke-width="5" stroke-linecap="round" opacity=".4"/>';
  }
  let s='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">';
  // nozzle ก้นถัง
  s+='<rect x="'+(NCX-5)+'" y="0" width="10" height="14" rx="3" fill="'+ac+'" opacity="'+(isRunning?'.8':'.3')+'"/>';
  s+='<circle cx="'+NCX+'" cy="16" r="7" fill="white" stroke="'+ac+'" stroke-width="2"/>';
  s+='<circle cx="'+NCX+'" cy="16" r="3" fill="'+ac+'" opacity="'+(isRunning?'.7':'.3')+'"/>';
  // pipe nozzle ลง → elbow
  s+=pipe(NCX,22,NCX,PIPY);
  s+='<circle cx="'+NCX+'" cy="'+PIPY+'" r="6" fill="'+ac+'" opacity="'+(isRunning?'.5':'.2')+'"/>';
  // pipe → Pump
  s+=pipe(NCX,PIPY,PX-22,PIPY);
  // Pump
  const pumpFill=isRunning?'#15803d':'white';
  const pumpStroke=isRunning?'#15803d':ac;
  const pumpIcon=isRunning?'⚙':'⚙';
  const spinAnim=isRunning?'<animateTransform attributeName="transform" type="rotate" from="0 '+PX+' '+PY+'" to="360 '+PX+' '+PY+'" dur="1s" repeatCount="indefinite"/>':'';
  s+='<circle cx="'+PX+'" cy="'+PY+'" r="21" fill="'+pumpFill+'" stroke="'+pumpStroke+'" stroke-width="2.5"/>';
  s+='<g>'+spinAnim;
  s+='<text x="'+PX+'" y="'+(PY+6)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="16" fill="'+ac+'" font-weight="900">⚙</text>';
  s+='</g>';
  s+='<text x="'+PX+'" y="'+(PY+34)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="'+ac+'">Pump</text>';
  // pipe → FlowMeter
  s+=pipe(PX+22,PIPY,FMX,PIPY);
  // FlowMeter
  s+='<rect x="'+FMX+'" y="'+FMY+'" width="'+FMW+'" height="'+FMH+'" rx="8" fill="'+bg+'" stroke="'+ac+'" stroke-width="2"/>';
  s+='<text x="'+(FMX+FMW/2)+'" y="'+(FMY+14)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="'+ac+'" font-weight="900">⚡ FLOW</text>';
  s+='<text x="'+(FMX+FMW/2)+'" y="'+(FMY+33)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="15" fill="'+ac+'" font-weight="900">'+fr.toLocaleString()+'</text>';
  s+='<text x="'+(FMX+FMW/2)+'" y="'+(FMY+49)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="'+ac+'" opacity=".8">L/hr</text>';
  // pipe → Freezer
  s+=pipe(FMX+FMW,PIPY,FZCX,PIPY);
  s+='<circle cx="'+FZCX+'" cy="'+PIPY+'" r="6" fill="'+ac+'" opacity="'+(isRunning?'.5':'.2')+'"/>';
  s+=pipe(FZCX,PIPY,FZCX,FZY);
  // Freezer
  s+='<rect x="'+FZX+'" y="'+FZY+'" width="'+FZW+'" height="'+FZH+'" rx="8" fill="'+bg+'" stroke="'+ac+'" stroke-width="2"/>';
  s+='<text x="'+FZCX+'" y="'+(FZY+22)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="17">🧊</text>';
  s+='<text x="'+FZCX+'" y="'+(FZY+40)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="9" fill="'+ac+'" font-weight="900">'+fz+'</text>';
  s+='<text x="'+FZCX+'" y="'+(FZY+56)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="8" fill="'+ac+'" opacity=".7">Freezer</text>';
  // pipe → Line
  s+=pipe(FZX+FZW,FZY+FZH/2,LOX,FZY+FZH/2);
  // Line
  s+='<rect x="'+LOX+'" y="'+LOY+'" width="'+LOW+'" height="'+LOH+'" rx="8" fill="'+bg+'" stroke="'+ac+'" stroke-width="2"/>';
  s+='<text x="'+(LOX+LOW/2)+'" y="'+(LOY+24)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="18">🏭</text>';
  s+='<text x="'+(LOX+LOW/2)+'" y="'+(LOY+42)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="9" fill="'+ac+'" font-weight="900">'+(lineObj.name||'Line')+'</text>';
  s+='</svg>';
  return s;
}

function renderQueuePage(){

  const ready=planRows.filter(r=>r.status==='ready'||r.status==='past_done').sort((a,b)=>(a.filling_line||'').localeCompare(b.filling_line||'')||(a.seq||0)-(b.seq||0));
  if(!ready.length){list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3);font-family:var(--mono)">ไม่มีถังที่รอส่ง Filling</div>`;return;}
  list.innerHTML=ready.map((row,i)=>{
    const p=productMap[row.mix_code];const col=p?.color||'#60a5fa';
    const ce=row.past_end_time?calcCuringEnd(row.past_end_time,+(p?.aging_time||4)):'—';
    return`<div class="queue-page-item">
      <div class="queue-page-row">
        <span style="font-family:var(--mono);font-size:11px;color:var(--t3)">${i+1}</span>
        <span style="font-family:var(--mono);font-weight:700;color:var(--cyan)">${row.filling_line||'—'}</span>
        <span style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--blue2)">${row.mix_code||'—'}</span>
        <span style="font-size:12px;color:var(--t2)">${row.mix_name||''}</span>
      </div>
      <div class="queue-page-row">
        <span style="font-family:var(--mono);font-size:11px;color:var(--t3)">Batch ${row.batch_no||'—'}</span>
        <span style="font-family:var(--mono);font-size:12px;color:var(--cyan)">${(+(row.volume_liter||0)).toLocaleString()} L</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--t3);margin-left:auto">บ่มเสร็จ ${ce}</span>
      </div>
      ${(()=>{const agSt2=agingStates&&row.aging_tank?agingStates[row.aging_tank]||{}:{};return expireBox(agSt2.expire_at||null);})()}
    </div>`;
  }).join('');
}

const _empName = sessionStorage.getItem('emp_name')||'';

window.startLine=async(lineId,sv,fr)=>{
  // if(!_empSig){toast('กรุณา login ด้วย PIN ก่อน','red');return;} // bypassed for testing
  await setDoc(doc(db,'cip_line_states',lineId),{running:true,start_ts:Date.now(),start_vol:sv,flow_rate:fr,started_by:_empName,start_sig:_empSig,started_at:nowHHMM(),started_by:ME.email},{merge:true});

};
window.stopLine=async(lineId)=>{
  const st=lineStates[lineId]||{};
  const elapsed=st.start_ts?(Date.now()-st.start_ts)/3600000:0;
  const rem=Math.max(0,(st.start_vol||0)-(elapsed*(st.flow_rate||300)));
  await setDoc(doc(db,'cip_line_states',lineId),{running:false,start_ts:null,start_vol:rem,stopped_at:nowHHMM(),stopped_by:_empName||ME.email,stop_sig:_empSig||''},{merge:true});
  toast('⏸ Stop แล้ว');
};
window.resetLine=async(lineId)=>{
  if(!confirm('Reset countdown ใหม่?'))return;
  await setDoc(doc(db,'cip_line_states',lineId),{running:false,start_ts:null,start_vol:0},{merge:true});
  toast('↺ Reset','yellow');
};

async function confirmEmpty(){
  if(!pendingEmpty)return;
  const{lineId,col,planId,lineName}=pendingEmpty;
  const st=lineStates[lineId]||{};
  await addDoc(collection(db,'cip_tank_history'),{
    date:today(),line_id:lineId,line_name:lineName,plan_id:planId,
    start_vol:st.start_vol||0,flow_rate:st.flow_rate||300,
    started_at:st.started_at||'—',emptied_at:nowHHMM(),emptied_by:_empName||ME.email,emptied_sig:_empSig,
    aging_tank:st.aging_tank||'—',freezer:st.fz_A||'—',pipe:st.pp_A||'—',
  });
  try{await updateDoc(doc(db,col,planId),{status:'sent_filling',sent_filling_at:nowHHMM()});}catch{}
  // Reset aging_tank_states current_vol เมื่อถังออกไป
  const agTank=st.aging_tank||'';

    try{await setDoc(doc(db,'aging_tank_states',agTank),{current_vol:0,updated_at:new Date().toISOString()},{merge:true});}catch{}
  }
  await setDoc(doc(db,'cip_line_states',lineId),{running:false,start_ts:null,start_vol:0,aging_tank:'',curing_done:false},{merge:true});
  toast('บันทึกแล้ว ✅','green');window.closeEmpty();
}

// TICK
function tickCountdowns(){
  // ตรวจ curing เสร็จ → re-render
  let needRender=false;
  lines.forEach(line=>{
    const tanks=getTanksForLine(line.name);
    const cur=tanks[0];
    if(cur&&cur.status==='past_done'&&cur.past_end_time){
      const p=productMap[cur.mix_code];
      const agHr=+(p?.aging_time||4);
      const endTs=calcCuringEndTs(cur.past_end_time,agHr,cur.date||null);
      if(endTs&&Date.now()>=endTs.getTime()) needRender=true;
    }
  });
  if(needRender) renderAll();
  lines.forEach(line=>{
    const st=lineStates[line.id];if(!st?.running||!st?.start_ts)return;
    const elapsed=(Date.now()-st.start_ts)/3600000;
    const sv=st.start_vol||0;
    const fr=st.flow_rate||line.flow_rate||300;
    const rem=Math.max(0,sv-(elapsed*fr));
    const cap=getTankCapacity(st.aging_tank||'');
    const pct=cap>0?(rem/cap)*100:0;const c=pctColor(pct);
    const key='S'+line.id;
    const vEl=document.getElementById('vol-'+key);
    const pEl=document.getElementById('pct-'+key);
    const bEl=document.getElementById('bar-'+key);
    const eEl=document.getElementById('eta-'+key);
    if(vEl){vEl.textContent=fmtL(rem)+' L';vEl.style.color=c;}
    if(pEl){pEl.textContent=pct.toFixed(2)+'%';pEl.style.color=c;}
    if(bEl){bEl.style.width=pct.toFixed(1)+'%';bEl.style.background=c;}
    if(eEl&&rem>0){const m=Math.round((rem/fr)*60);const d=new Date();d.setMinutes(d.getMinutes()+m);eEl.textContent='หมด ~'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
  });
}

      date:'',past_start_time:'',past_end_time:'',

    });
    toast('✅ Clear ถัง '+agTank+' แล้ว','green');
  }catch(e){toast('ไม่สำเร็จ','red');}
};
