<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIP Man — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--s1:#0b0e17;--s2:#10141f;--s3:#151a28;
  --b1:#1c2235;--b2:#242e48;
  --text:#e4eaf8;--t2:#5e6e90;--t3:#2a3450;
  --blue:#3b7ef6;--blue2:#7ab3ff;
  --green:#1fd17a;--yellow:#f5c842;--red:#f04f5e;
  --cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}

/* RESET ป้องกัน reflow */
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,126,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,246,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:54px;background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 20px;gap:8px;overflow-x:auto;width:100%}
.nav-logo{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;margin-right:12px;flex-shrink:0}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.ntab{font-size:12px;font-weight:600;padding:5px 12px;border-radius:7px;border:none;background:none;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.ntab.on{color:var(--cyan);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.2)}
.nav-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
#clock{font-family:var(--mono);font-size:13px;color:var(--blue2);width:80px;display:inline-block;text-align:center}
.role-pill{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:4px;background:rgba(0,212,255,.12);color:var(--cyan);border:1px solid rgba(0,212,255,.2);white-space:nowrap}
.manage-btn{font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:7px;border:1px solid rgba(168,85,247,.35);background:rgba(168,85,247,.1);color:var(--purple);cursor:pointer;white-space:nowrap}

/* MAIN */
main{position:relative;z-index:1;padding:14px 20px;width:100%}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.kpi.c1::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.kpi.c2::after{background:linear-gradient(90deg,var(--green),#6efcb4)}
.kpi.c3::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.c4::after{background:var(--b2)}
.kpi-lbl{font-size:10px;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.kpi-val{font-size:24px;font-weight:700;font-family:var(--mono)}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-ttl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);white-space:nowrap}
.sec-ln{flex:1;height:1px;background:linear-gradient(90deg,var(--b2),transparent)}

/* CARD */
.lcard{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:16px;
  overflow:hidden;
  width:100%;
  margin-bottom:14px;
  /* ป้องกัน reflow */
  transform:translateZ(0);
  will-change:auto;
}
.lcard.running{border-color:rgba(31,209,122,.2)}
.lcard.curing{border-color:rgba(245,200,66,.2)}
.lcard.stopped{border-color:rgba(59,126,246,.18)}
.lcard.empty{opacity:.5}

.accent{height:3px;width:100%}
.running .accent{background:linear-gradient(90deg,var(--green),var(--cyan));background-size:200%;animation:shimmer 3s linear infinite}
.curing .accent{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.stopped .accent{background:linear-gradient(90deg,var(--blue),var(--purple))}
.empty .accent{background:var(--b2)}

/* HEAD */
.chead{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);width:100%}
.lname{font-family:var(--mono);font-size:15px;font-weight:700}
.lsub{font-size:11px;color:var(--t2);margin-top:2px}
.spill{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.sp-run{background:rgba(31,209,122,.12);color:var(--green);border:1px solid rgba(31,209,122,.25)}
.sp-cur{background:rgba(245,200,66,.12);color:var(--yellow);border:1px solid rgba(245,200,66,.25);animation:blink .9s infinite}
.sp-stp{background:rgba(59,126,246,.1);color:var(--blue2);border:1px solid rgba(59,126,246,.2)}
.sp-emp{background:var(--s3);color:var(--t3)}

/* CARD BODY — STABLE GRID
   col1=tank(fixed) | col2=info(fixed) | col3=queue(fill)
   ใช้ table เพราะ stable กว่า grid เมื่อมี animation */
.cbody{
  display:table;
  width:100%;
  table-layout:fixed;
  border-collapse:collapse;
}
.cbody-row{display:table-row}
.c-tank{
  display:table-cell;
  width:230px;
  min-width:230px;
  max-width:230px;
  padding:16px 14px;
  border-right:1px solid var(--b1);
  background:rgba(0,0,0,.18);
  vertical-align:top;
  text-align:center;
}
.c-info{
  display:table-cell;
  width:300px;
  min-width:300px;
  max-width:300px;
  padding:16px 14px;
  border-right:1px solid var(--b1);
  vertical-align:top;
}
.c-queue{
  display:table-cell;
  padding:16px 14px;
  vertical-align:top;
  width:auto;
}

/* ══════════════════════════
   MOBILE — แนวตั้ง สบายตา
══════════════════════════ */
@media(max-width:768px){
  /* Card body เปลี่ยนเป็น block */
  .cbody,.cbody-row{display:block!important;width:100%!important}
  .c-tank{
    display:block!important;
    width:100%!important;min-width:unset!important;max-width:unset!important;
    border-right:none!important;border-bottom:1px solid var(--b1);
    padding:20px 16px!important;text-align:center;
  }
  .c-info{
    display:block!important;
    width:100%!important;min-width:unset!important;max-width:unset!important;
    border-right:none!important;border-bottom:1px solid var(--b1);
    padding:16px!important;
  }
  .c-queue{
    display:block!important;
    width:100%!important;
    padding:16px!important;
  }
  /* ถัง SVG — กว้างเต็ม แต่ไม่เกิน 200px */
  .tvol{font-size:22px!important;width:100%!important;font-weight:700}
  .tpct{font-size:15px!important;width:100%!important}
  .teta{font-size:12px!important;width:100%!important}
  .tcur{max-width:260px!important;margin:10px auto 0!important}
  /* FP Panel แนวนอน */
  .fp-panel{flex-direction:row!important;gap:8px!important;justify-content:center!important;flex-wrap:wrap!important;margin-top:12px!important}
  .fp-panel .fp-item{flex:1!important;min-width:140px!important;max-width:200px!important}
  /* Dual tank — stack แนวตั้ง */
  .dual-tank-row{flex-direction:column!important;align-items:center!important;gap:20px!important}
  .dual-sep{width:80%!important;height:1px!important;margin:4px auto!important}
  /* Dual queue — stack แนวตั้ง */
  .dual-q{grid-template-columns:1fr!important}
  /* KPI 2 คอลัมน์ */
  .kpi-row{grid-template-columns:repeat(2,1fr)!important}
  .kpi-val{font-size:28px!important}
  /* ปุ่มใหญ่ขึ้นสำหรับนิ้ว */
  .cbtn{padding:13px 8px!important;font-size:15px!important}
  .cbtn.sm{padding:11px 6px!important;font-size:13px!important}
  .empty-btn{padding:13px!important;font-size:13px!important;margin-top:8px!important}
  .dual-empty{gap:8px!important;margin-top:8px!important}
  .ctrl-box{padding:12px!important}
  /* ชื่อ LINE ใหญ่ขึ้น */
  .lname{font-size:18px!important}
  /* Queue item อ่านง่ายขึ้น */
  .qitem{padding:10px 12px!important}
  .qcode{font-size:13px!important}
  .qstat{font-size:11px!important;padding:3px 10px!important}
  /* Nav scroll แนวนอนได้ */
  nav{overflow-x:auto!important;-webkit-overflow-scrolling:touch}
}

/* TANK DISPLAY — ล็อคขนาดด้วย ch */
.tank-num{
  font-family:var(--mono);font-size:13px;font-weight:700;
  padding:3px 12px;border-radius:6px;
  display:inline-block;margin-bottom:8px;
  white-space:nowrap;
}
.tvol{
  font-family:var(--mono);font-size:15px;font-weight:700;
  display:block;text-align:center;
  width:200px;margin:0 auto;
  /* tabular nums ป้องกัน layout shift */
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
  white-space:nowrap;overflow:hidden;
}
.tpct{
  font-family:var(--mono);font-size:12px;
  display:block;text-align:center;
  width:200px;margin:0 auto;
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum";
  white-space:nowrap;
}
.teta{
  font-size:10px;color:var(--t2);
  display:block;text-align:center;
  width:200px;margin:0 auto;
  min-height:15px;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}

/* CURING UNDER TANK */
.tcur{margin:8px auto 0;padding:6px 10px;border-radius:8px;max-width:200px;text-align:center}
.tcur.done{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.18)}
.tcur.pend{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.15)}
.tcur-icon{font-size:13px}
.tcur-txt{font-family:var(--mono);font-size:10px;font-weight:700;margin-top:2px}
.tcur-time{font-family:var(--mono);font-size:9px;color:var(--t2);margin-top:1px}

/* FP PANEL */
.fp-panel{display:flex;flex-direction:column;gap:5px;margin-top:10px;width:100%}
.fp-item{background:var(--s2);border:1px solid var(--b1);border-radius:7px;padding:6px 8px}
.fp-lbl{font-family:var(--mono);font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.fp-sel{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:5px;color:var(--text);font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 6px;outline:none;cursor:pointer}
.fp-sel:focus{border-color:var(--cyan)}

/* DUAL TANK ROW */
.dual-tank-row{display:flex;gap:12px;align-items:flex-start;justify-content:center}
.dual-tank-col{display:flex;flex-direction:column;align-items:center;flex:1}
.dual-sep{width:1px;background:var(--b1);align-self:stretch;margin:4px 0;flex-shrink:0}

/* PRODUCT INFO */
.pcode{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue2);margin-bottom:2px}
.pname{font-size:12px;color:var(--t2);margin-bottom:10px}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.ptag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;background:var(--s3);color:var(--t2);border:1px solid var(--b1);display:flex;align-items:center;gap:4px;white-space:nowrap}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* CURING STRIP */
.cur-strip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:12px}
.cur-strip.done{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.15)}
.cur-strip.pend{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.15)}
.cur-txt{font-family:var(--mono);font-size:11px;font-weight:600}
.cur-sub{font-size:10px;color:var(--t2);margin-top:1px}

/* CONTROLS */
.ctrl-box{background:var(--s2);border-radius:9px;border:1px solid var(--b1);padding:10px 12px;margin-bottom:10px}
.ctrl-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.ctrl-row{display:flex;gap:5px;margin-bottom:0}
.cbtn{flex:1;padding:8px 5px;border-radius:8px;border:none;font-size:12px;font-family:var(--mono);font-weight:600;cursor:pointer}
.cbtn:disabled{opacity:.3;cursor:not-allowed}
.cbtn.start{background:rgba(31,209,122,.12);color:var(--green);border:1px solid rgba(31,209,122,.3)}
.cbtn.stop{background:rgba(240,79,94,.1);color:var(--red);border:1px solid rgba(240,79,94,.25)}
.cbtn.reset{background:rgba(245,200,66,.08);color:var(--yellow);border:1px solid rgba(245,200,66,.2)}
.cbtn.sm{padding:6px 3px;font-size:11px}
.dual-ctrl{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:0}
.dcol{background:var(--s3);border-radius:7px;padding:6px;border:1px solid var(--b1)}
.dcol-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;text-align:center;margin-bottom:4px}
.dcol-btns{display:flex;gap:3px}
.empty-btn{width:100%;padding:8px;border-radius:8px;border:1px dashed rgba(240,79,94,.3);background:rgba(240,79,94,.05);color:var(--red);font-size:11px;font-family:var(--mono);cursor:pointer;margin-top:6px}
.empty-btn:hover{background:rgba(240,79,94,.12)}
.dual-empty{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}

/* QUEUE */
.qlbl{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.qlist{display:flex;flex-direction:column;gap:5px}
.qitem{display:block;padding:8px 10px;border-radius:8px;border:1px solid var(--b1);background:var(--s2)}
.qitem.current{background:rgba(59,126,246,.08);border-color:rgba(59,126,246,.25)}
.qitem.ready{background:rgba(31,209,122,.06);border-color:rgba(31,209,122,.18)}
.qitem.curing{background:rgba(245,200,66,.05);border-color:rgba(245,200,66,.15)}
.qitem.pasting{background:rgba(249,115,22,.05);border-color:rgba(249,115,22,.15)}
.qrow1{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.qrow2{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.qnum{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:14px}
.qdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.qtank{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(0,212,255,.08);color:var(--cyan);border:1px solid rgba(0,212,255,.15)}
.qcode{font-family:var(--mono);font-size:11px;font-weight:700}
.qbatch{font-family:var(--mono);font-size:10px;color:var(--t2)}
.qstat{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.qtime{font-family:var(--mono);font-size:10px}
.dual-q{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dual-q-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}

/* HOT WATER */
.hw-row{display:flex;align-items:center;gap:6px;margin-top:6px;padding:5px 8px;border-radius:6px;cursor:pointer;user-select:none}
.hw-row.on{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.2)}
.hw-row.off{background:rgba(240,79,94,.06);border:1px dashed rgba(240,79,94,.25)}
.hw-cb{width:14px;height:14px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.hw-txt{font-family:var(--mono);font-size:10px;font-weight:600}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;align-items:center;justify-content:center}
.mbg.show{display:flex}
.mbox{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:22px;width:360px;max-width:92vw}
.mbox.lg{width:480px;max-height:80vh;overflow-y:auto}
.micon{font-size:28px;text-align:center;margin-bottom:8px}
.mtitle{font-family:var(--mono);font-size:13px;font-weight:700;margin-bottom:6px}
.msub{font-size:12px;color:var(--t2);margin-bottom:18px}
.mbtns{display:flex;gap:8px}
.mconfirm{flex:1;padding:10px;border-radius:8px;border:none;background:var(--red);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--mono)}
.mcancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--b2);background:var(--s3);color:var(--t2);font-size:13px;cursor:pointer;font-family:var(--mono)}
.msec-lbl{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;padding-bottom:6px;border-bottom:1px solid var(--b1);margin-top:14px}
.mlist{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.mlist-item{display:flex;align-items:center;gap:8px;background:var(--s2);border-radius:7px;padding:7px 10px;border:1px solid var(--b1)}
.mlist-name{font-family:var(--mono);font-size:12px;flex:1}
.mdel{background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px 6px;border-radius:4px}
.mdel:hover{color:var(--red)}
.madd-row{display:flex;gap:6px}
.minput{background:var(--s2);border:1px solid var(--b1);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;outline:none;flex:1}
.minput:focus{border-color:var(--purple)}
.madd-btn{padding:7px 14px;border-radius:7px;border:none;background:var(--purple);color:#fff;font-family:var(--mono);font-size:12px;cursor:pointer}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);padding:9px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.spin-hg{display:inline-block;animation:hgspin 2s ease-in-out infinite}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-50px);opacity:0}}
@keyframes hgspin{0%{transform:rotate(0deg)}45%{transform:rotate(0deg)}55%{transform:rotate(180deg)}100%{transform:rotate(180deg)}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ CIP MAN</span></div>
  <button class="ntab on" onclick="showPage('bangchan',this)">🏭 Bangchan</button>
  <button class="ntab" onclick="showPage('twin',this)">🏭 Twin</button>
  <button class="ntab" onclick="showPage('queue',this)">📋 คิวถัง</button>
  <div class="nav-r">
    <button id="btn-manage" class="manage-btn" onclick="openManage()">⚙️ จัดการ</button>
    <span class="nav-user" id="nav-user"></span>
    <span class="role-pill">CIP MAN</span>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</nav>

<main>
  <!-- PAGE: BANGCHAN -->
  <div class="page on" id="page-bangchan">
    <div class="kpi-row">
      <div class="kpi c1"><div class="kpi-lbl">LINE ทั้งหมด</div><div class="kpi-val" id="bc-total" style="color:var(--blue2)">0</div></div>
      <div class="kpi c2"><div class="kpi-lbl">กำลังเดิน</div><div class="kpi-val" id="bc-run" style="color:var(--green)">0</div></div>
      <div class="kpi c3"><div class="kpi-lbl">กำลังบ่ม</div><div class="kpi-val" id="bc-cur" style="color:var(--yellow)">0</div></div>
      <div class="kpi c4"><div class="kpi-lbl">หยุด/ว่าง</div><div class="kpi-val" id="bc-idle" style="color:var(--t2)">0</div></div>
    </div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

         updateDoc, addDoc, getDocs, doc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

let ME=null,ROLE=null;
let lines=[],lineStates={},productMap={},planRows=[];
let freezers=[],pipes=[],hwState={};
let tickTimer=null;
let unsubLines=null,unsubStates=null,unsubP1=null,unsubP2=null;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const nowHHMM=()=>{const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");};

function toast(msg,t="blue"){
  const el=$("toast");el.textContent=msg;
  el.style.background=t==="green"?"#0d7a3e":t==="red"?"#8b1a24":t==="yellow"?"#7a5f0a":"#1a3d8b";
  el.classList.add("show");setTimeout(()=>el.classList.remove("show"),3000);
}

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-Math.round(a*255)),g=Math.max(0,parseInt(h.slice(3,5),16)-Math.round(a*255)),b=Math.max(0,parseInt(h.slice(5,7),16)-Math.round(a*255));return`#${r.toString(16).padStart(2,"0")}${g.toString(16).padStart(2,"0")}${b.toString(16).padStart(2,"0")}`;}
function pctColor(p){return p>50?"var(--green)":p>20?"var(--yellow)":"var(--red)";}

onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href="index.html";return;}
  ME=user;
  try{
    const snap=await getDocs(query(collection(db,"users"),where("uid","==",user.uid)));
    ROLE=snap.empty?"cipman":(snap.docs[0].data().role||"cipman");
    if(ROLE!=="cipman"&&ROLE!=="admin"){window.location.href="index.html";return;}
  }catch{ROLE="cipman";}
  const nu=$("nav-user");if(nu)nu.textContent=user.email.replace("@filling.local","");
  const mb=$("btn-manage");if(mb&&ROLE==="admin")mb.classList.add("show");
  await init();
});

window.doLogout=async()=>{
  clearInterval(tickTimer);
  [unsubLines,unsubStates,unsubP1,unsubP2].forEach(u=>u&&u());
  await signOut(auth);
  window.location.href="index.html";
};

async function init(){
  try{const ps=await getDocs(collection(db,"products"));ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});}catch{}
  try{const hw=await getDoc(doc(db,"cip_settings","hot_water"));if(hw.exists())hwState=hw.data()||{};}catch{}

  onSnapshot(doc(db,"cip_settings","freezers"),snap=>{
    freezers=snap.exists()?(snap.data().list||[]):["F-01","F-02","F-03","F-04","F-05","F-06","F-07","F-08","F-09","F-10"];
    renderManageList();
  });
  onSnapshot(doc(db,"cip_settings","pipes"),snap=>{
    pipes=snap.exists()?(snap.data().list||[]):["ท่อ-01","ท่อ-02","ท่อ-03","ท่อ-04","ท่อ-05","ท่อ-06","ท่อ-07","ท่อ-08","ท่อ-09","ท่อ-10"];
    renderManageList();
  });

  unsubLines=onSnapshot(collection(db,"lines"),snap=>{
    lines=snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.type==="Filling").sort((a,b)=>(a.seq||0)-(b.seq||0));
    renderAll();
  });
  unsubStates=onSnapshot(collection(db,"cip_line_states"),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={...d.data()};});
    renderAll();
  });

  const d=today();
  unsubP1=onSnapshot(query(collection(db,"production_plans"),where("date","==",d),orderBy("seq","asc")),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:"production_plans",...d.data()}));
    planRows=planRows.filter(x=>x._col!=="production_plans").concat(r);
    renderAll();
  });
  unsubP2=onSnapshot(query(collection(db,"production_plans_m2"),where("date","==",d),orderBy("seq","asc")),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:"production_plans_m2",...d.data()}));
    planRows=planRows.filter(x=>x._col!=="production_plans_m2").concat(r);
    renderAll();
  });

  tickTimer=setInterval(tickCountdowns,1000);
}

function getTanksForLine(lineName){
  return planRows.filter(r=>r.filling_line===lineName&&(r.status==="ready"||r.status==="past_done"||r.status==="pasteurising")).sort((a,b)=>(a.seq||0)-(b.seq||0));
}
function isDualLine(lineName){
  const t=getTanksForLine(lineName);
  return t.length>=2&&(t[0].mix_name===t[1].mix_name||t[0].batch_no===t[1].batch_no);
}
function calcCuringEnd(pastEnd,agingHr){
  if(!pastEnd||!agingHr)return"—";
  const[h,m]=pastEnd.split(":").map(Number);const tot=h*60+m+(+agingHr)*60;
  return String(Math.floor(tot/60)%24).padStart(2,"0")+":"+String(tot%60).padStart(2,"0");
}
function getCuringInfo(row,lineId){
  if(!row||!row.past_end_time)return{done:false,endTime:"—"};
  const p=productMap[row.mix_code];
  const agingHr=+(p?.aging_time||4);
  const endTime=calcCuringEnd(row.past_end_time,agingHr);
  const[eh,em]=endTime.split(":").map(Number);
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  return{done:(eh*60+em)<=nowMin||(lineStates[lineId]||{}).curing_done||false,endTime,agingHr};
}
function getEtaStr(rem,flow,run){
  if(!run||rem<=0)return"";
  const m=Math.round((rem/flow)*60);const d=new Date();d.setMinutes(d.getMinutes()+m);
  return"หมด ~"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
}
function getFP(lineId,tank){const st=lineStates[lineId]||{};return{fz:st[`fz_${tank}`]||"",pp:st[`pp_${tank}`]||""};}

window.setFP=async(lineId,tank,field,val)=>{
  await setDoc(doc(db,"cip_line_states",lineId),{[`${field}_${tank}`]:val},{merge:true});
  toast("บันทึกแล้ว","green");
};

function fpPanel(lineId,tank){
  const fp=getFP(lineId,tank);
  const fzO=freezers.map(f=>`<option value="${f}"${fp.fz===f?" selected":""}>${f}</option>`).join("");
  const ppO=pipes.map(p=>`<option value="${p}"${fp.pp===p?" selected":""}>${p}</option>`).join("");
  return`<div class="fp-panel">
    <div class="fp-item"><div class="fp-lbl">🧊 Freezer</div><select class="fp-sel" onchange="setFP('${lineId}','${tank}','fz',this.value)"><option value="">— เลือก —</option>${fzO}</select></div>
    <div class="fp-item"><div class="fp-lbl">🔧 ท่อ</div><select class="fp-sel" onchange="setFP('${lineId}','${tank}','pp',this.value)"><option value="">— เลือก —</option>${ppO}</select></div>
  </div>`;
}

window.toggleHW=async(key)=>{
  hwState[key]=!hwState[key];
  try{await setDoc(doc(db,"cip_settings","hot_water"),hwState,{merge:true});}catch{}
  toast(hwState[key]?"✅ น้ำร้อน Complete":"ยกเลิกน้ำร้อน",hwState[key]?"green":"red");
  renderAll();
};

function queueList(q,accent,lineId){
  if(!q||!q.length)return`<div style="color:var(--t3);font-family:var(--mono);font-size:11px">ไม่มีคิว</div>`;
  const SM={current:{bg:"rgba(59,126,246,.1)",bc:"rgba(59,126,246,.3)",tc:"var(--blue2)",icon:"▶",lbl:"กำลังผลิต"},ready:{bg:"rgba(31,209,122,.08)",bc:"rgba(31,209,122,.2)",tc:"var(--green)",icon:"✅",lbl:"บ่มผ่านแล้ว"},curing:{bg:"rgba(245,200,66,.06)",bc:"rgba(245,200,66,.18)",tc:"var(--yellow)",icon:"",lbl:"กำลังบ่ม"},pasting:{bg:"rgba(249,115,22,.06)",bc:"rgba(249,115,22,.18)",tc:"var(--orange)",icon:"♨️",lbl:"กำลัง Past."}};
  return q.map((item,i)=>{
    let stat="pasting";
    if(item.status==="ready"||item.status==="past_done")stat=i===0&&(lineStates[lineId]||{}).running?"current":"ready";
    else if(item.status==="pasteurising")stat="pasting";
    if(i===0&&(lineStates[lineId]||{}).running)stat="current";
    const s=SM[stat]||SM.curing;
    const anim=stat==="pasting"?"animation:blink .9s infinite":"";
    const hg=stat==="curing"?`<span class="spin-hg">⏳</span>`:s.icon;
    const p=productMap[item.mix_code];
    const ce=(stat==="curing"||stat==="ready")&&item.past_end_time?calcCuringEnd(item.past_end_time,+(p?.aging_time||4)):"";
    const hwKey=`hw_${item.id}`;const hwDone=!!hwState[hwKey];
    const showHW=stat==="curing"||stat==="ready";
    const hwHTML=showHW?`<label class="hw-row ${hwDone?"on":"off"}" onclick="toggleHW('${hwKey}')">
      <input type="checkbox" class="hw-cb"${hwDone?" checked":""} onclick="event.stopPropagation()">
      <span class="hw-txt" style="color:${hwDone?"var(--green)":"var(--red)"}">🌡️ ${hwDone?"น้ำร้อน Complete":"ยังไม่ได้เดินน้ำร้อน"}</span></label>`:"";
    const col=p?.color||"#60a5fa";const tank=item.aging_tank||"";
    return`<div class="qitem ${stat}">
      <div class="qrow1">
        <span class="qnum">${i+1}</span><span class="qdot" style="background:${col}"></span>
        ${tank?`<span class="qtank">${tank}</span>`:`<span style="font-family:var(--mono);font-size:10px;color:var(--t3);padding:1px 7px;border-radius:4px;border:1px dashed var(--b2)">—</span>`}
        <span class="qcode" style="color:${accent||"var(--blue2)"}">${item.mix_code||"—"}</span>
        <span class="qbatch">${item.batch_no||"—"}</span>
      </div>
      <div class="qrow2">
        <span class="qstat" style="background:${s.bg};border:1px solid ${s.bc};color:${s.tc};${anim}">${hg} ${s.lbl}</span>
        ${ce?`<span class="qtime" style="color:${stat==="ready"?"var(--green)":"var(--yellow)"}">บ่มเสร็จ <b>${ce}</b></span>`:""}
      </div>${hwHTML}</div>`;
  }).join("");
}

function tankSVG(uid,pct,col,run,sw,sh){
  sw=sw||130;sh=sh||170;
  const bX=8,bY=20,bW=sw-16,bH=sh-46,nW=36,nH=12,cW=46,cH=7;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const fillH=Math.max(0,(pct/100)*(bH-8));const fillY=bY+bH-4-fillH;
  const gid="g"+uid,cid="cl"+uid,lid="l"+uid;
  const barC=pct>50?"#1fd17a":pct>20?"#f5c842":"#f04f5e";
  return`<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="display:block;flex-shrink:0">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".95"/><stop offset="100%" stop-color="${darken(col,.3)}" stop-opacity="1"/></linearGradient>
    <radialGradient id="${lid}" cx="40%" cy="20%" r="70%"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></radialGradient>
    <clipPath id="${cid}"><rect x="${bX+2}" y="${bY+2}" width="${bW-4}" height="${bH-4}" rx="7"/></clipPath>
  </defs>
  ${run&&pct>0?`<ellipse cx="${bX+bW/2}" cy="${bY+bH*.65}" rx="${bW*.42}" ry="${bH*.28}" fill="url(#${lid})"/>`:""}
  <rect x="${bX+2}" y="${bY+3}" width="${bW}" height="${bH+2}" rx="9" fill="rgba(0,0,0,.4)"/>
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="#090d18" stroke="#1a2540" stroke-width="1.5"/>
  ${pct>0?`<g clip-path="url(#${cid})">
    <rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="${fillH+6}" fill="url(#${gid})"/>
    ${run?`<g style="animation:wave 2.2s linear infinite"><path d="M${bX-8},${fillY+1} q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 v16 h-${bW*4} z" fill="${rgba(col,.5)}"/></g>
    <circle cx="${bX+20}" cy="${fillY+fillH*.5}" r="2.5" fill="${rgba(col,.5)}" style="animation:rise 2.8s ease-in infinite;animation-delay:.2s"/>
    <circle cx="${bX+bW*.6}" cy="${fillY+fillH*.65}" r="1.8" fill="${rgba(col,.45)}" style="animation:rise 2.2s ease-in infinite;animation-delay:.8s"/>`
    :`<rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="5" rx="2" fill="${rgba(col,.6)}"/>`}
    <rect x="${bX+3}" y="${fillY+3}" width="10" height="${Math.max(0,fillH*.4)}" rx="4" fill="rgba(255,255,255,.12)"/>
  </g>`:""}
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="none" stroke="${pct>0?rgba(col,.3):"#1a2540"}" stroke-width="1.5"/>
  ${pct>0?`<line x1="${bX+bW+3}" y1="${fillY}" x2="${bX+bW+10}" y2="${fillY}" stroke="${barC}" stroke-width="2" stroke-linecap="round"/><rect x="${bX+bW+7}" y="${fillY}" width="2.5" height="${bY+bH-fillY}" fill="${barC}" opacity=".2" rx="1"/>`:""}
  <rect x="${nX}" y="${bY-nH}" width="${nW}" height="${nH+4}" rx="4" fill="#090d18" stroke="#1a2540" stroke-width="1.5"/>
  <rect x="${cX}" y="${bY-nH-cH}" width="${cW}" height="${cH+2}" rx="4" fill="#0d1220" stroke="#202e4a" stroke-width="1.5"/>
  <circle cx="${cX+7}" cy="${bY-nH-cH/2-1}" r="1.8" fill="#1a2540"/>
  <circle cx="${cX+cW-7}" cy="${bY-nH-cH/2-1}" r="1.8" fill="#1a2540"/>
  <rect x="${bX+10}" y="${bY+bH}" width="8" height="12" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+bW-18}" y="${bY+bH}" width="8" height="12" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+5}" y="${bY+bH+10}" width="${bW-10}" height="4" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+2}" y="${bY+2}" width="11" height="${bH-4}" rx="5" fill="rgba(255,255,255,.025)"/>
</svg>`;
}

function buildCard(line){
  const tanks=getTanksForLine(line.name);
  const current=tanks[0]||null;
  const dual=isDualLine(line.name)&&tanks.length>=2;
  const st=lineStates[line.id]||{};
  const isRunning=st.running&&!!st.start_ts;
  const curing1=getCuringInfo(current,line.id);
  const curing2=dual?getCuringInfo(tanks[1],line.id):{done:false,endTime:"—"};
  const cardStatus=isRunning?"running":current&&!curing1.done?"curing":current?"stopped":"empty";
  const pm={running:"sp-run",curing:"sp-cur",stopped:"sp-stp",empty:"sp-emp"};
  const pt={running:"● กำลังเดิน",curing:"⏳ กำลังบ่ม",stopped:"⏸ หยุด",empty:"○ ว่าง"};
  const pill=`<span class="spill ${pm[cardStatus]}">${pt[cardStatus]}</span>`;

  if(!current)return`<div class="lcard empty" id="card-${line.id}">
    <div class="accent"></div>
    <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||"—"} · ${line.flow_rate||300} L/hr</div></div>${pill}</div>
    <div style="text-align:center;padding:36px"><div style="font-size:36px;opacity:.15;margin-bottom:8px">🏭</div><div style="font-family:var(--mono);font-size:12px;color:var(--t3)">ไม่มีถังที่พร้อม</div></div>
  </div>`;

  const col=productMap[current.mix_code]?.color||"#60a5fa";
  const fp=getFP(line.id,"A");

  if(!dual){
    const sv=st.start_vol||+(current.volume_liter||0);
    const elapsed=isRunning&&st.start_ts?(Date.now()-st.start_ts)/3600000:0;
    const fr=st.flow_rate||line.flow_rate||300;
    const rem=Math.max(0,sv-(elapsed*fr));
    const pct=sv>0?(rem/sv)*100:0;const pctC=pctColor(pct);
    return`<div class="lcard ${cardStatus}" id="card-${line.id}">
      <div class="accent"></div>
      <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||"—"} · ${fr} L/hr</div></div>${pill}</div>
      <div class="cbody"><div class="cbody-row">
        <div class="c-tank">
          <span class="tank-num" style="background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)">${st.aging_tank||current.aging_tank||"—"}</span>
          ${tankSVG("S"+line.id,pct,col,isRunning,170,220)}
          <span class="tvol" id="vol-S${line.id}" style="color:${pctC}">${rem.toFixed(2)} L</span>
          <span class="tpct" id="pct-S${line.id}" style="color:${pctC}">${pct.toFixed(2)}%</span>
          <span class="teta" id="eta-S${line.id}">${getEtaStr(rem,fr,isRunning)}</span>
          <div class="tcur ${curing1.done?"done":"pend"}">
            <div class="tcur-icon">${curing1.done?"✅":"⏳"}</div>
            <div class="tcur-txt" style="color:${curing1.done?"var(--green)":"var(--yellow)"}">${curing1.done?"บ่มเสร็จ":"กำลังบ่ม"}</div>
            <div class="tcur-time">${curing1.endTime}</div>
          </div>
          ${fpPanel(line.id,"A")}
        </div>
        <div class="c-info">
          <div style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="cdot" style="background:${col};width:10px;height:10px"></span>
              <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue2)">${current.mix_code||"—"}</span>
            </div>
            <div style="font-size:12px;color:var(--t2);margin-bottom:10px">${current.mix_name||"—"} · Batch ${current.batch_no||"—"}</div>
            <div class="ptags">
              <span class="ptag">📦 ${(+(current.volume_liter||0)).toLocaleString()} L</span>
              <span class="ptag">💧 ${fr} L/hr</span>
              ${fp.fz?`<span class="ptag">🧊 ${fp.fz}</span>`:""}
              ${fp.pp?`<span class="ptag">🔧 ${fp.pp}</span>`:""}
            </div>
          </div>
          <div class="ctrl-box">
            <div class="ctrl-lbl">ควบคุมถัง</div>
            <div class="ctrl-row">
              <button class="cbtn start" ${isRunning||!curing1.done?"disabled":""} onclick="startLine('${line.id}',${sv},${fr},'A')">▶ Start</button>
              <button class="cbtn stop" ${!isRunning?"disabled":""} onclick="stopLine('${line.id}','A')">⏸ Stop</button>
              <button class="cbtn reset" onclick="resetLine('${line.id}','A')">↺ Reset</button>
            </div>
            <button class="empty-btn" onclick="askEmpty('${line.id}','${current._col}','${current.id}','${line.name}','A')">🪣 หมดถัง — บันทึกและโหลดถัดไป</button>
          </div>
        </div>
        <div class="c-queue">
          <div class="qlbl">📋 คิวทั้งหมด</div>
          <div class="qlist">${queueList(tanks,"var(--blue2)",line.id)}</div>
        </div>
      </div></div>
    </div>`;
  }

  // DUAL
  const tA=current,tB=tanks[1];
  const colA=productMap[tA?.mix_code]?.color||"#f5efd0";
  const colB=productMap[tB?.mix_code]?.color||"#f9b8c4";
  const svA=st.start_vol_A||+(tA?.volume_liter||0);
  const svB=st.start_vol_B||+(tB?.volume_liter||0);
  const elapsed=isRunning&&st.start_ts?(Date.now()-st.start_ts)/3600000:0;
  const frA=st.flow_rate_A||line.flow_rate||300,frB=st.flow_rate_B||120;
  const remA=Math.max(0,svA-(elapsed*frA)),remB=Math.max(0,svB-(elapsed*frB));
  const pctA=svA>0?(remA/svA)*100:0,pctB=svB>0?(remB/svB)*100:0;
  const cA=pctColor(pctA),cB=pctColor(pctB);
  const fpA=getFP(line.id,"A"),fpB=getFP(line.id,"B");

  return`<div class="lcard ${cardStatus}" id="card-${line.id}">
    <div class="accent"></div>
    <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||"—"} · Dual Tank</div></div>${pill}</div>
    <div class="cbody"><div class="cbody-row">
      <div class="c-tank" style="width:auto;min-width:auto;max-width:none">
        <div class="dual-tank-row">
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <span class="tank-num" style="background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)">${st.aging_tank_A||tA?.aging_tank||"—"}</span>
            ${tankSVG("A"+line.id,pctA,colA,isRunning,140,185)}
            <span class="tvol" id="vol-A${line.id}" style="color:${cA}">${remA.toFixed(2)} L</span>
            <span class="tpct" id="pct-A${line.id}" style="color:${cA}">${pctA.toFixed(2)}%</span>
            <span class="teta" id="eta-A${line.id}">${getEtaStr(remA,frA,isRunning)}</span>
            <div class="tcur ${curing1.done?"done":"pend"}" style="width:140px">
              <div class="tcur-icon">${curing1.done?"✅":"⏳"}</div>
              <div class="tcur-txt" style="color:${curing1.done?"var(--green)":"var(--yellow)"}">${curing1.done?"บ่มเสร็จ":"กำลังบ่ม"}</div>
              <div class="tcur-time">${curing1.endTime}</div>
            </div>
            ${fpPanel(line.id,"A")}
          </div>
          <div class="dual-sep"></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <span class="tank-num" style="background:rgba(155,109,255,.1);color:var(--purple);border:1px solid rgba(155,109,255,.25)">${st.aging_tank_B||tB?.aging_tank||"—"}</span>
            ${tankSVG("B"+line.id,pctB,colB,isRunning,140,185)}
            <span class="tvol" id="vol-B${line.id}" style="color:${cB}">${remB.toFixed(2)} L</span>
            <span class="tpct" id="pct-B${line.id}" style="color:${cB}">${pctB.toFixed(2)}%</span>
            <span class="teta" id="eta-B${line.id}">${getEtaStr(remB,frB,isRunning)}</span>
            <div class="tcur ${curing2.done?"done":"pend"}" style="width:140px">
              <div class="tcur-icon">${curing2.done?"✅":"⏳"}</div>
              <div class="tcur-txt" style="color:${curing2.done?"var(--green)":"var(--yellow)"}">${curing2.done?"บ่มเสร็จ":"กำลังบ่ม"}</div>
              <div class="tcur-time">${curing2.endTime}</div>
            </div>
            ${fpPanel(line.id,"B")}
          </div>
        </div>
      </div>
      <div class="c-info">
        <div style="margin-bottom:12px">
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue2);margin-bottom:2px">${tA?.mix_code||"—"}</div>
          <div style="font-size:12px;color:var(--t2);margin-bottom:10px">${tA?.mix_name||"—"} · Batch ${tA?.batch_no||"—"}</div>
          <div class="ptags">
            <span class="ptag"><span class="cdot" style="background:${colA}"></span>A · ${(+(tA?.volume_liter||0)).toLocaleString()} L · ${frA} L/hr</span>
            <span class="ptag"><span class="cdot" style="background:${colB}"></span>B · ${(+(tB?.volume_liter||0)).toLocaleString()} L · ${frB} L/hr</span>
            ${fpA.fz?`<span class="ptag">🧊A ${fpA.fz}</span>`:""}
            ${fpB.fz?`<span class="ptag">🧊B ${fpB.fz}</span>`:""}
          </div>
        </div>
        <div class="ctrl-box">
          <div class="ctrl-lbl">ควบคุมแยกถัง</div>
          <div class="dual-ctrl">
            <div class="dcol">
              <div class="dcol-lbl" style="color:${rgba(colA,.9)}">ถัง A</div>
              <div class="dcol-btns">
                <button class="cbtn start sm" ${isRunning||!curing1.done?"disabled":""} onclick="startLine('${line.id}',${svA},${frA},'A')">▶</button>
                <button class="cbtn stop sm" ${!isRunning?"disabled":""} onclick="stopLine('${line.id}','A')">⏸</button>
                <button class="cbtn reset sm" onclick="resetLine('${line.id}','A')">↺</button>
              </div>
            </div>
            <div class="dcol">
              <div class="dcol-lbl" style="color:${rgba(colB,.9)}">ถัง B</div>
              <div class="dcol-btns">
                <button class="cbtn start sm" ${isRunning||!curing2.done?"disabled":""} onclick="startLine('${line.id}',${svB},${frB},'B')">▶</button>
                <button class="cbtn stop sm" ${!isRunning?"disabled":""} onclick="stopLine('${line.id}','B')">⏸</button>
                <button class="cbtn reset sm" onclick="resetLine('${line.id}','B')">↺</button>
              </div>
            </div>
          </div>
          <div class="dual-empty">
            <button class="empty-btn" onclick="askEmpty('${line.id}','${tA?._col}','${tA?.id}','${line.name}','A')">🪣 หมด ถัง A</button>
            <button class="empty-btn" onclick="askEmpty('${line.id}','${tB?._col}','${tB?.id}','${line.name}','B')">🪣 หมด ถัง B</button>
          </div>
        </div>
      </div>
      <div class="c-queue">
        <div class="qlbl">📋 คิวทั้งหมด</div>
        <div class="dual-q">
          <div><div class="dual-q-lbl" style="color:${rgba(colA,.8)}">● ถัง A</div><div class="qlist">${queueList([tA],"var(--blue2)",line.id)}</div></div>
          <div><div class="dual-q-lbl" style="color:${rgba(colB,.8)}">● ถัง B</div><div class="qlist">${queueList([tB],"var(--purple)",line.id)}</div></div>
        </div>
        ${tanks.length>2?`<div style="margin-top:10px"><div class="dual-q-lbl" style="color:var(--t3)">รอคิว</div><div class="qlist">${queueList(tanks.slice(2),"var(--t2)",line.id)}</div></div>`:""}
      </div>
    </div></div>
  </div>`;
}

function renderAll(){
  const bangchan=lines.filter(l=>(l.group||"bangchan")==="bangchan");
  const twin=lines.filter(l=>l.group==="twin");
  const render=(group,gridId,pfx)=>{
    const g=$(gridId);if(!g)return;
    g.innerHTML=group.length?group.map(l=>buildCard(l)).join(""):`<div style="color:var(--t3);font-family:var(--mono);padding:30px;text-align:center">ยังไม่มี LINE</div>`;
    const running=group.filter(l=>{const s=lineStates[l.id];return s?.running&&s?.start_ts;}).length;
    const cur=group.filter(l=>{const t=getTanksForLine(l.name);return !lineStates[l.id]?.running&&t[0]&&!getCuringInfo(t[0],l.id).done;}).length;
    $(`${pfx}-total`).textContent=group.length;
    $(`${pfx}-run`).textContent=running;
    $(`${pfx}-cur`).textContent=cur;
    $(`${pfx}-idle`).textContent=Math.max(0,group.length-running-cur);
  };
  render(bangchan,"grid-bangchan","bc");
  render(twin,"grid-twin","tw");
  renderQueuePage();
}

function renderQueuePage(){
  const list=$("queue-list");if(!list)return;
  const ready=planRows.filter(r=>r.status==="ready"||r.status==="past_done").sort((a,b)=>(a.filling_line||"").localeCompare(b.filling_line||"")||(a.seq||0)-(b.seq||0));
  if(!ready.length){list.innerHTML=`<div style="text-align:center;padding:40px;color:var(--t3);font-family:var(--mono)">ไม่มีถังที่รอส่ง Filling</div>`;return;}
  list.innerHTML=ready.map((row,i)=>{
    const p=productMap[row.mix_code];const agingHr=+(p?.aging_time||4);
    const ce=row.past_end_time?calcCuringEnd(row.past_end_time,agingHr):"—";
    const col=p?.color||"#60a5fa";
    return`<div class="queue-page-item">
      <span style="font-family:var(--mono);font-size:11px;color:var(--t3)">${i+1}</span>
      <span style="font-family:var(--mono);font-weight:700;color:var(--cyan)">${row.filling_line||"—"}</span>
      <span class="cdot" style="background:${col}"></span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--blue2)">${row.mix_code||"—"}</span>
      <span style="font-size:12px;color:var(--t2)">${row.mix_name||""}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--t3)">Batch ${row.batch_no||"—"}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--cyan)">${(+(row.volume_liter||0)).toLocaleString()} L</span>
      <span style="font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;background:${row.status==="ready"?"rgba(31,209,122,.1)":"rgba(234,179,8,.1)"};color:${row.status==="ready"?"var(--green)":"var(--yellow)"}">
        ${row.status==="ready"?"✅ พร้อม":"⏳ รอ Past."}
      </span>
      <span style="font-size:11px;color:var(--t3);margin-left:auto">บ่มเสร็จ ${ce}</span>
    </div>`;
  }).join("");
}

window.startLine=async(lineId,sv,fr,tank="A")=>{
  const upd={running:true,start_ts:Date.now(),[`start_vol_${tank}`]:sv,[`flow_rate_${tank}`]:fr,started_at:nowHHMM(),started_by:ME.email};
  if(tank==="A"){upd.start_vol=sv;upd.flow_rate=fr;}
  await setDoc(doc(db,"cip_line_states",lineId),upd,{merge:true});
  toast("▶ Start แล้ว","green");
};
window.stopLine=async(lineId,tank="A")=>{
  const st=lineStates[lineId]||{};
  const elapsed=st.start_ts?(Date.now()-st.start_ts)/3600000:0;
  const fr=st[`flow_rate_${tank}`]||st.flow_rate||300;
  const sv=st[`start_vol_${tank}`]||st.start_vol||0;
  const rem=Math.max(0,sv-(elapsed*fr));
  await setDoc(doc(db,"cip_line_states",lineId),{running:false,start_ts:null,[`start_vol_${tank}`]:rem,stopped_at:nowHHMM()},{merge:true});
  toast("⏸ Stop แล้ว");
};
window.resetLine=async(lineId,tank="A")=>{
  if(!confirm("Reset countdown ใหม่?"))return;
  await setDoc(doc(db,"cip_line_states",lineId),{running:false,start_ts:null,[`start_vol_${tank}`]:0},{merge:true});
  toast("↺ Reset แล้ว","yellow");
};

let pendingEmpty=null;
window.askEmpty=(lineId,col,planId,lineName,tank)=>{
  pendingEmpty={lineId,col,planId,lineName,tank};
  $("m-empty-sub").textContent=`ถัง ${tank} (${lineName}) จะถูกบันทึกและถังถัดไปโหลดขึ้นมา`;
  $("m-empty").classList.add("show");
  $("m-empty-confirm").onclick=confirmEmpty;
};
window.closeEmpty=()=>{$("m-empty").classList.remove("show");pendingEmpty=null;};
async function confirmEmpty(){
  if(!pendingEmpty)return;
  const{lineId,col,planId,lineName,tank}=pendingEmpty;
  const st=lineStates[lineId]||{};
  await addDoc(collection(db,"cip_tank_history"),{
    date:today(),line_id:lineId,line_name:lineName,plan_id:planId,tank,
    start_vol:st[`start_vol_${tank}`]||st.start_vol||0,
    flow_rate:st[`flow_rate_${tank}`]||st.flow_rate||300,
    started_at:st.started_at||"—",emptied_at:nowHHMM(),emptied_by:ME.email,
    aging_tank:st[`aging_tank_${tank}`]||st.aging_tank||"—",
    freezer:st[`fz_${tank}`]||"—",pipe:st[`pp_${tank}`]||"—",
  });
  try{await updateDoc(doc(db,col,planId),{status:"sent_filling",sent_filling_at:nowHHMM()});}catch{}
  await setDoc(doc(db,"cip_line_states",lineId),{running:false,start_ts:null,[`start_vol_${tank}`]:0,[`aging_tank_${tank}`]:"",curing_done:false,started_at:null},{merge:true});
  toast("บันทึกแล้ว ✅","green");
  window.closeEmpty();
}
$("m-empty").addEventListener("click",e=>{if(e.target===$("m-empty"))window.closeEmpty();});

function renderManageList(){
  const fl=$("fz-list");if(fl)fl.innerHTML=freezers.map((f,i)=>`<div class="mlist-item"><span>🧊</span><span class="mlist-name">${f}</span><button class="mdel" onclick="delFreezer(${i})">✕</button></div>`).join("");
  const pl=$("pp-list");if(pl)pl.innerHTML=pipes.map((p,i)=>`<div class="mlist-item"><span>🔧</span><span class="mlist-name">${p}</span><button class="mdel" onclick="delPipe(${i})">✕</button></div>`).join("");
}
window.openManage=()=>{renderManageList();$("m-manage").classList.add("show");};
window.closeManage=()=>$("m-manage").classList.remove("show");
window.addFreezer=async()=>{const v=$("fz-input").value.trim();if(!v||freezers.includes(v)){toast("มีอยู่แล้ว","red");return;}await setDoc(doc(db,"cip_settings","freezers"),{list:[...freezers,v]});$("fz-input").value="";toast("เพิ่ม "+v,"green");};
window.delFreezer=async(i)=>{if(!confirm("ลบ "+freezers[i]+"?"))return;await setDoc(doc(db,"cip_settings","freezers"),{list:freezers.filter((_,j)=>j!==i)});toast("ลบแล้ว","green");};
window.addPipe=async()=>{const v=$("pp-input").value.trim();if(!v||pipes.includes(v)){toast("มีอยู่แล้ว","red");return;}await setDoc(doc(db,"cip_settings","pipes"),{list:[...pipes,v]});$("pp-input").value="";toast("เพิ่ม "+v,"green");};
window.delPipe=async(i)=>{if(!confirm("ลบ "+pipes[i]+"?"))return;await setDoc(doc(db,"cip_settings","pipes"),{list:pipes.filter((_,j)=>j!==i)});toast("ลบแล้ว","green");};
$("m-manage").addEventListener("click",e=>{if(e.target===$("m-manage"))window.closeManage();});

function tickCountdowns(){
  lines.forEach(line=>{
    const st=lineStates[line.id];if(!st?.running||!st?.start_ts)return;
    const elapsed=(Date.now()-st.start_ts)/3600000;
    const dual=isDualLine(line.name)&&getTanksForLine(line.name).length>=2;
    function upd(key,sv,fr){
      const rem=Math.max(0,(sv||0)-(elapsed*fr));const pct=sv>0?(rem/sv)*100:0;const c=pctColor(pct);
      const vEl=document.getElementById("vol-"+key);const pEl=document.getElementById("pct-"+key);const eEl=document.getElementById("eta-"+key);
      if(vEl){vEl.textContent=rem.toFixed(2)+" L";vEl.style.color=c;}
      if(pEl){pEl.textContent=pct.toFixed(2)+"%";pEl.style.color=c;}
      if(eEl&&rem>0){const m=Math.round((rem/fr)*60);const d=new Date();d.setMinutes(d.getMinutes()+m);eEl.textContent="หมด ~"+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
    }
    if(dual){upd("A"+line.id,st.start_vol_A||st.start_vol||0,st.flow_rate_A||line.flow_rate||300);upd("B"+line.id,st.start_vol_B||0,st.flow_rate_B||120);}
    else upd("S"+line.id,st.start_vol||0,st.flow_rate||line.flow_rate||300);
  });
}

window.showPage=(p,btn)=>{
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("on"));
  document.querySelectorAll(".ntab").forEach(el=>el.classList.remove("on"));
  $(`page-${p}`).classList.add("on");btn.classList.add("on");
};
</script>
