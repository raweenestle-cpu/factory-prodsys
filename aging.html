<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROD.SYS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aging Tank — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0e1118;--s2:#141820;--s3:#1a2030;--b1:#1e2535;--b2:#2a3348;
  --text:#dde3f0;--t2:#7a8499;--t3:#3d4560;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--yellow:#eab308;
  --red:#ef4444;--cyan:#06b6d4;--orange:#f97316;--purple:#a855f7;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

nav{display:flex;align-items:center;height:52px;background:var(--s1);border-bottom:1px solid var(--b1);
  position:sticky;top:0;z-index:200;padding:0 14px;gap:8px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.ntab{font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;border:none;
  background:none;color:var(--t2);cursor:pointer;white-space:nowrap}
.ntab.on{color:var(--cyan);background:rgba(6,182,212,.12)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.nbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);
  background:none;color:var(--t2);cursor:pointer;text-decoration:none;font-family:var(--mono)}

.page{display:none;padding:14px}
.page.on{display:block}

/* LINE GROUP */
.line-group{margin-bottom:18px}
.line-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--orange);
  letter-spacing:.06em;padding:6px 10px;background:rgba(255,140,66,.06);
  border:1px solid rgba(255,140,66,.2);border-radius:8px;margin-bottom:10px;
  display:flex;align-items:center;gap:6px}

/* TANK GRID */
.tank-grid{display:flex;flex-wrap:wrap;gap:8px}

/* TANK CARD */
.tc{width:88px;border-radius:10px;overflow:hidden;border:1.5px solid var(--b1);
  background:var(--s1);cursor:pointer;transition:all .15s;flex-shrink:0}
.tc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4)}

/* TANK NUMBER */
.tn{font-family:var(--mono);font-size:11px;font-weight:700;text-align:center;
  padding:4px 2px;border-bottom:1px solid var(--b1);letter-spacing:.05em}

/* SVG WRAP */
.tsw{position:relative;padding:4px 6px 2px;display:flex;justify-content:center}
.tsw svg{display:block}
.tov{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;width:85%}
.tv{font-family:var(--mono);font-size:9px;font-weight:700;color:#fff;
  text-shadow:0 1px 6px rgba(0,0,0,1);line-height:1.3}
.tp{font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.9);
  text-shadow:0 1px 4px rgba(0,0,0,1);line-height:1.3}

/* STATUS BAR */
.tsb{font-family:var(--mono);font-size:8px;font-weight:700;text-align:center;
  padding:3px 2px;letter-spacing:.04em}

/* STATUS COLORS */
.st-filling{border-color:rgba(34,197,94,.5)!important;background:rgba(34,197,94,.05)!important}
.st-pasteurising{border-color:rgba(59,130,246,.5)!important;background:rgba(59,130,246,.05)!important}
.st-curing{border-color:rgba(249,115,22,.5)!important;background:rgba(249,115,22,.05)!important}
.st-cleaned{border-color:rgba(34,197,94,.5)!important;background:rgba(34,197,94,.05)!important}
.st-empty{border-color:rgba(234,179,8,.5)!important;background:rgba(234,179,8,.05)!important}
.st-cleaned{border-color:rgba(240,240,240,.4)!important;background:rgba(240,240,240,.03)!important}

/* LEGEND */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;padding:8px 12px;
  background:var(--s1);border-radius:8px;border:1px solid var(--b1)}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--t2)}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;
  align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:16px;
  padding:22px 20px;width:100%;max-width:340px}
.modal-title{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--t2);margin-bottom:16px}
.stat-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.stat-btn{padding:11px 16px;border-radius:10px;border:1.5px solid var(--b2);
  background:var(--s2);color:var(--t2);font-family:var(--mono);font-size:12px;
  font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px}
.stat-btn:hover{border-color:var(--cyan);color:var(--text)}
.stat-btn.active-past{border-color:rgba(59,130,246,.5);color:var(--blue);background:rgba(59,130,246,.08)}
.stat-btn.active-fill{border-color:rgba(34,197,94,.5);color:var(--green);background:rgba(34,197,94,.08)}
.stat-btn.active-cure{border-color:rgba(249,115,22,.5);color:var(--orange);background:rgba(249,115,22,.08)}
.stat-btn.active-clean{border-color:rgba(34,197,94,.5);color:var(--green);background:rgba(34,197,94,.08)}
.stat-btn.active-empty{border-color:var(--b2);color:var(--t2)}
.modal-close{width:100%;padding:10px;border-radius:8px;border:1px solid var(--b2);
  background:none;color:var(--t2);font-family:var(--mono);cursor:pointer;font-size:12px}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 22px;border-radius:10px;font-size:12px;opacity:0;transition:all .3s;
  z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
  .tc{width:72px}
  .tn{font-size:10px}
  .tv{font-size:8px}.tp{font-size:7px}.tsb{font-size:7px}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ AGING TANK</span></div>
  <button class="ntab on" onclick="showTab('bangchan',this)">🏭 Bangchan (34)</button>
  <button class="ntab" onclick="showTab('twin',this)">🏭 Twin (16)</button>
  <div class="nav-r">
    <a href="index.html" class="nbtn">🏠</a>
    <button class="nbtn" onclick="doLogout()">ออก</button>
  </div>
</nav>

<!-- BANGCHAN PAGE -->
<div class="page on" id="page-bangchan">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div>🔵 กำลัง Pasteurize</div>
    <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>🟢 กำลัง Filling</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f97316"></div>🟠 กำลังบ่ม</div>
    <div class="leg-item"><div class="leg-dot" style="background:#eab308"></div>🟡 รอล้าง</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e0e0e0"></div>⚪ ล้างแล้ว พร้อมใช้</div>
  </div>
  <div id="bangchan-grid"></div>
</div>

<!-- TWIN PAGE -->
<div class="page" id="page-twin">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div>🔵 กำลัง Pasteurize</div>
    <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>🟢 กำลัง Filling</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f97316"></div>🟠 กำลังบ่ม</div>
    <div class="leg-item"><div class="leg-dot" style="background:#eab308"></div>🟡 รอล้าง</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e0e0e0"></div>⚪ ล้างแล้ว พร้อมใช้</div>
  </div>
  <div id="twin-grid"></div>
</div>

<!-- TANK MODAL -->
<div class="modal-bg" id="tank-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modal-tank-num">ถัง T01</div>
    <div class="modal-sub" id="modal-tank-info">กำลัง Filling — Milo 3,000 L</div>
    <div class="stat-btns">
      <button class="stat-btn" onclick="setTankStatus('pasteurising')">🔵 กำลัง Pasteurize</button>
      <button class="stat-btn" onclick="setTankStatus('filling')">🟢 กำลัง Filling</button>
      <button class="stat-btn" onclick="setTankStatus('curing')">🟠 กำลังบ่ม (Curing)</button>
      <button class="stat-btn" onclick="setTankStatus('cleaned')">⚪ ล้างแล้ว พร้อมใช้</button>
      <button class="stat-btn" onclick="setTankStatus('empty')">🟡 รอล้าง</button>
    </div>
    <button class="modal-close" onclick="closeModal()">✕ ปิด</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,onSnapshot,setDoc,getDocs,query,where}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const auth=getAuth(app),db=getFirestore(app);

let tankStates={},lines=[],planRows=[],selectedTank=null;
const $=id=>document.getElementById(id);
function toast(msg,t='blue'){const el=$('toast');el.textContent=msg;el.style.background=t==='green'?'#15803d':t==='red'?'#991b1b':'#1d4ed8';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

// TWIN TANKS — ดึงจาก LINE master เหมือน Bangchan
const TWIN_ALL=['T61','T62','T63','T64','T65','T66','T67','T68','T71','T72','T73','T74','T75','T76','T77','T78'];

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  await init();
});
window.doLogout=async()=>{await signOut(auth);location.href='index.html';};

async function init(){
  // โหลด lines
  const lSnap=await getDocs(collection(db,'lines'));
  lines=lSnap.docs.map(d=>({id:d.id,...d.data()}));

  // โหลด planRows ที่ active
  const today=new Date().toISOString().slice(0,10);
  const[s1,s2]=await Promise.all([
    getDocs(query(collection(db,'production_plans'),where('status','in',['pasteurising','past_done','ready']))),
    getDocs(query(collection(db,'production_plans_m2'),where('status','in',['pasteurising','past_done','ready']))),
  ]);
  planRows=[...s1.docs,...s2.docs].map(d=>d.data());

  // listen tank states
  onSnapshot(collection(db,'aging_tank_states'),snap=>{
    tankStates={};
    snap.docs.forEach(d=>{tankStates[d.id]={id:d.id,...d.data()};});
    renderAll();
  });

  // refresh ทุก 1 นาที เพื่ออัปเดต level pasteurising
  setInterval(()=>renderAll(),60000);
}

const BANGCHAN_TANKS=Array.from({length:34},(_,i)=>`T${String(i+1).padStart(2,'0')}`);

function getLineGroups(group,allTanks){
  // ดึง LINE ที่มี aging_tanks กำหนดไว้
  const grpLines=lines.filter(l=>(l.group||'bangchan')===group&&(l.aging_tanks||[]).length>0)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  const assigned=grpLines.flatMap(l=>l.aging_tanks||[]);
  const unassigned=allTanks.filter(t=>!assigned.includes(t));
  const groups=grpLines.map(l=>({name:l.name,tanks:l.aging_tanks||[]}));
  if(unassigned.length)groups.push({name:'ยังไม่ได้กำหนด LINE',tanks:unassigned});
  if(!groups.length)return[{name:`${group==='bangchan'?'Bangchan':'Twin'} (ทั้งหมด)`,tanks:allTanks}];
  return groups;
}

function renderAll(){
  // BANGCHAN
  const bc=$('bangchan-grid');bc.innerHTML='';
  getLineGroups('bangchan',BANGCHAN_TANKS).forEach(g=>{
    const div=document.createElement('div');div.className='line-group';
    div.innerHTML=`<div class="line-title">🏭 ${g.name}</div>`;
    const grid=document.createElement('div');grid.className='tank-grid';
    g.tanks.forEach(t=>grid.appendChild(tankCard(t)));
    div.appendChild(grid);bc.appendChild(div);
  });

  // TWIN
  const tw=$('twin-grid');tw.innerHTML='';
  getLineGroups('twin',TWIN_ALL).forEach(g=>{
    const div=document.createElement('div');div.className='line-group';
    div.innerHTML=`<div class="line-title">🏭 ${g.name}</div>`;
    const grid=document.createElement('div');grid.className='tank-grid';
    g.tanks.forEach(t=>grid.appendChild(tankCard(t)));
    div.appendChild(grid);tw.appendChild(div);
  });
}

// CAPACITY ของแต่ละถัง
function getTankCapacity(tankId){
  const num=parseInt(tankId.replace('T',''));
  if(num>=1&&num<=34)return 3000;   // Bangchan
  if(num>=61&&num<=64)return 10000; // Twin Laser/Scoopy
  if(num>=65&&num<=68)return 8000;  // Twin Hoyal/Laser
  if(num>=71&&num<=74)return 10000; // Twin Laser/Scoopy
  if(num>=75&&num<=78)return 8000;  // Twin Hoyal/Laser
  return 3000;
}

function getTankInfo(tankId){
  // หา batch ที่ใช้ถังนี้อยู่
  const row=planRows.find(r=>r.aging_tank===tankId);
  // ดึง status จาก planRow ก่อน ถ้าไม่มีค่อยดึงจาก tankStates
  let status='empty';
  if(row){
    if(row.status==='pasteurising')status='pasteurising';
    else if(row.status==='past_done')status='curing';
    else if(row.status==='ready')status='filling';
    else status='pasteurising';
  } else {
    status=tankStates[tankId]?.status||'empty';
  }
  return{status,row};
}

function statusColor(s){
  return s==='pasteurising'?'#3b82f6':s==='filling'?'#22c55e':s==='curing'?'#f97316':s==='empty'?'#eab308':s==='cleaned'?'#f0f0f0':'#3d4560';
}
function statusLabel(s){
  return s==='pasteurising'?'PASTEURISE':s==='filling'?'FILLING':s==='curing'?'CURING':s==='empty'?'รอล้าง':s==='cleaned'?'CLEANED':'EMPTY';
}

function calcVolume(row){
  // ถ้าเสร็จแล้ว ใช้ volume จริง
  if(!row)return 0;
  if(row.status==='past_done'||row.status==='ready')return+(row.volume_liter||0);
  if(!row.past_start_time)return 0;
  // กำลัง pasteurising — คำนวณตาม elapsed time
  try{
    const dateStr=row.date||new Date().toISOString().slice(0,10);
    const[h,m]=row.past_start_time.split(':').map(Number);
    const start=new Date(`${dateStr}T${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:00`);
    const now=new Date();
    const elapsedHr=Math.max(0,(now-start)/3600000);
    // ดึง flow_rate จาก LINE master
    const lineName=row.filling_line||'';
    const lineData=lines.find(l=>l.name===lineName);
    const flowRate=+(lineData?.flow_rate||row.flow_rate||300);
    return Math.min(+(row.volume_liter||0), elapsedHr*flowRate);
  }catch{return+(row.volume_liter||0);}
}

function statusPct(status,row,tankId){
  if(status==='cleaned'||status==='empty')return 0;
  const capacity=getTankCapacity(tankId);
  if(status==='curing')return Math.min(100,Math.round((+(row?.volume_liter||0)/capacity)*100));
  if(status==='pasteurising'){
    const vol=calcVolume(row);
    return Math.min(100,Math.round((vol/capacity)*100));
  }
  if(status==='filling')return Math.min(100,Math.round((+(row?.volume_liter||0)/capacity)*100));
  return 0;
}

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function dk(h){return'#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-55).toString(16).padStart(2,'0')).join('');}

function tankSVG(tid,pct,col){
  const W=70,H=110;
  const bX=8,bY=14,bW=W-16,bH=H-34;
  const fillH=Math.max(0,(pct/100)*(bH-4));
  const fillY=bY+bH-2-fillH;
  const uid='ag'+tid.replace(/\D/g,'');
  const gid='g'+uid,cid='c'+uid,wid='w'+uid,w2id='w2'+uid,amid='am'+uid,am2id='am2'+uid;

  if(pct<=0)return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${bX+1}" y="${bY+3}" width="${bW}" height="${bH}" rx="6" fill="rgba(0,0,0,.5)"/>
    <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="6" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
    <rect x="${bX+(bW-20)/2}" y="${bY-6}" width="20" height="8" rx="2" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
    <rect x="${bX+(bW-26)/2}" y="${bY-10}" width="26" height="5" rx="2" fill="#08101a" stroke="#1e2d4a" stroke-width="1.2"/>
    <rect x="${bX+6}" y="${bY+bH}" width="5" height="7" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
    <rect x="${bX+bW-11}" y="${bY+bH}" width="5" height="7" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
    <rect x="${bX+2}" y="${bY+bH+6}" width="${bW-4}" height="3" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
  </svg>`;

  const waveAmp=2.5;
  const waveW=bW*2;

  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".85"/>
      <stop offset="100%" stop-color="${dk(col)}" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="${gid}2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".4"/>
      <stop offset="100%" stop-color="${col}" stop-opacity=".15"/>
    </linearGradient>
    <clipPath id="${cid}"><rect x="${bX+1}" y="${bY+1}" width="${bW-2}" height="${bH-2}" rx="5"/></clipPath>
    <!-- wave path 1 -->
    <path id="${wid}" d="M0,${waveAmp} C${bW*.3},${-waveAmp} ${bW*.7},${-waveAmp} ${bW},${waveAmp} C${bW*1.3},${waveAmp*3} ${bW*1.7},${waveAmp*3} ${waveW},${waveAmp} L${waveW},20 L0,20 Z"/>
    <!-- wave path 2 -->
    <path id="${w2id}" d="M0,${waveAmp*1.5} C${bW*.4},${-waveAmp*1.5} ${bW*.6},${-waveAmp*1.5} ${bW},${waveAmp} C${bW*1.4},${waveAmp*2.5} ${bW*1.6},${waveAmp*2.5} ${waveW},${waveAmp*1.5} L${waveW},20 L0,20 Z"/>
  </defs>

  <!-- shadow -->
  <rect x="${bX+1}" y="${bY+3}" width="${bW}" height="${bH}" rx="6" fill="rgba(0,0,0,.5)"/>
  <!-- body -->
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="6" fill="#060a14" stroke="${rgba(col,.3)}" stroke-width="1.5"/>

  <!-- liquid fill with wave -->
  <g clip-path="url(#${cid})">
    <!-- base fill -->
    <rect x="${bX+1}" y="${fillY+waveAmp+1}" width="${bW-2}" height="${fillH}" fill="url(#${gid})"/>
    <!-- wave 1 — main -->
    <g transform="translate(${bX+1},${fillY})">
      <use href="#${wid}" fill="url(#${gid})">
        <animateTransform attributeName="transform" type="translate"
          from="0,0" to="${-bW},0"
          dur="2.8s" repeatCount="indefinite"/>
      </use>
      <use href="#${wid}" fill="url(#${gid})" transform="translate(${bW},0)">
        <animateTransform attributeName="transform" type="translate"
          from="${bW},0" to="0,0"
          dur="2.8s" repeatCount="indefinite"/>
      </use>
    </g>
    <!-- wave 2 — overlay lighter -->
    <g transform="translate(${bX+1},${fillY-1.5})">
      <use href="#${w2id}" fill="url(#${gid}2)">
        <animateTransform attributeName="transform" type="translate"
          from="${-bW*0.5},0" to="${bW*0.5},0"
          dur="3.5s" repeatCount="indefinite"/>
      </use>
      <use href="#${w2id}" fill="url(#${gid}2)" transform="translate(${-bW},0)">
        <animateTransform attributeName="transform" type="translate"
          from="${bW*0.5},0" to="${bW*1.5},0"
          dur="3.5s" repeatCount="indefinite"/>
      </use>
    </g>
    <!-- highlight streak -->
    <rect x="${bX+3}" y="${fillY+waveAmp+4}" width="4" height="${Math.max(0,fillH-8)}" rx="2" fill="rgba(255,255,255,.07)"/>
  </g>

  <!-- level line -->
  <line x1="${bX+bW+2}" y1="${fillY+waveAmp}" x2="${bX+bW+7}" y2="${fillY+waveAmp}" stroke="${col}" stroke-width="1.5" stroke-linecap="round"/>

  <!-- border overlay -->
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="6" fill="none" stroke="${rgba(col,.45)}" stroke-width="1.5"/>

  <!-- top pipe -->
  <rect x="${bX+(bW-20)/2}" y="${bY-6}" width="20" height="8" rx="2" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+(bW-26)/2}" y="${bY-10}" width="26" height="5" rx="2" fill="#08101a" stroke="#1e2d4a" stroke-width="1.2"/>
  <!-- legs -->
  <rect x="${bX+6}" y="${bY+bH}" width="5" height="7" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+bW-11}" y="${bY+bH}" width="5" height="7" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+2}" y="${bY+bH+6}" width="${bW-4}" height="3" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.2"/>
</svg>`;
}

function tankCard(tankId){
  const{status,row}=getTankInfo(tankId);
  const col=statusColor(status);
  const capacity=getTankCapacity(tankId);
  const pct=statusPct(status,row,tankId);
  const stClass=`st-${status==='empty'?'empty':status==='filling'?'filling':status==='pasteurising'?'pasteurising':status==='curing'?'curing':'cleaned'}`;
  const mixName=row?.mix_name||'';
  const vol=status!=='empty'&&status!=='cleaned'?calcVolume(row):0;
  const volTxt=vol>0?`${Math.round(vol).toLocaleString()}L`:'';
  const capTxt=`${(capacity/1000).toFixed(0)}kL`;
  const div=document.createElement('div');
  div.className=`tc ${stClass}`;
  div.onclick=()=>openModal(tankId);
  div.innerHTML=`
    <div class="tn" style="color:${col};border-color:${rgba(col,.2)};background:${rgba(col,.08)}">${tankId}</div>
    <div class="tsw">
      ${tankSVG(tankId,pct,col)}
      <div class="tov">
        ${mixName?`<div class="tv" style="color:${col};font-size:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px">${mixName.slice(0,8)}</div>`:''}
        ${volTxt?`<div class="tp" style="color:${col}">${volTxt}</div>`:''}
        ${pct>0?`<div class="tp" style="color:rgba(255,255,255,.7)">${pct}%</div>`:''}
      </div>
    </div>
    <div class="tsb" style="color:${col};background:${rgba(col,.1)}">${statusLabel(status)}</div>`;
  return div;
}

// MODAL
window.openModal=(tankId)=>{
  selectedTank=tankId;
  const{status,row}=getTankInfo(tankId);
  const capacity=getTankCapacity(tankId);
  const vol=calcVolume(row);
  const pct=statusPct(status,row,tankId);
  $('modal-tank-num').textContent=`ถัง ${tankId} — capacity ${capacity.toLocaleString()} L`;
  const info=row
    ?`${statusLabel(status)} — ${row.mix_name||''} ${vol>0?Math.round(vol).toLocaleString()+'L':''} ${pct>0?'('+pct+'%)':''}`
    :`${statusLabel(status)}`;
  $('modal-tank-info').textContent=info;
  // highlight active
  document.querySelectorAll('.stat-btn').forEach(b=>{
    b.className='stat-btn';
    if(b.textContent.includes('Pasteurize')&&status==='pasteurising')b.classList.add('active-past');
    if(b.textContent.includes('Filling')&&status==='filling')b.classList.add('active-fill');
    if(b.textContent.includes('Curing')&&status==='curing')b.classList.add('active-cure');
    if(b.textContent.includes('ล้างแล้ว')&&status==='cleaned')b.classList.add('active-clean');
    if(b.textContent.includes('ว่าง')&&status==='empty')b.classList.add('active-empty');
  });
  $('tank-modal').classList.add('show');
};

window.closeModal=()=>{$('tank-modal').classList.remove('show');selectedTank=null;};

window.setTankStatus=async(status)=>{
  if(!selectedTank)return;
  try{
    await setDoc(doc(db,'aging_tank_states',selectedTank),{
      status,updated_at:new Date().toISOString()
    },{merge:true});
    const labels={filling:'🔴 Filling',curing:'🟡 Curing',cleaned:'🟢 ล้างแล้ว',empty:'⚪ ว่าง'};
    toast(`${selectedTank} → ${labels[status]}`,'green');
    closeModal();
  }catch(e){toast('บันทึกไม่สำเร็จ','red');}
};

window.showTab=(tab,btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('on'));
  $(`page-${tab}`).classList.add('on');btn.classList.add('on');
};
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js')
      .then(r=>console.log('SW registered'))
      .catch(e=>console.warn('SW failed:',e));
  });
}
