<script type="module">



import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"; import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; import{getFirestore,collection,doc,onSnapshot,setDoc,getDocs,query,where,deleteDoc,updateDoc,addDoc} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {resolveStatus,statusLabel,statusColor,statusBlink,statusBadge} from "./shared.js";
const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const auth=getAuth(app),db=getFirestore(app);

let tankStates={},lines=[],planRows=[],selectedTank=null,productMap={};
const $=id=>document.getElementById(id);
function toast(msg,t='blue'){const el=$('toast');el.textContent=msg;el.style.background=t==='green'?'#15803d':t==='red'?'#991b1b':'#1d4ed8';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}

// TWIN TANKS — ดึงจาก LINE master เหมือน Bangchan
const TWIN_ALL=['T61','T62','T63','T64','T65','T66','T67','T68','T71','T72','T73','T74','T75','T76','T77','T78'];

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  await init();
});
window.doLogout=async()=>{await signOut(auth);location.href='index.html';};

async function init(){
  // โหลด lines
  const lSnap=await getDocs(collection(db,'lines'));
  lines=lSnap.docs.map(d=>({id:d.id,...d.data()}));

  // โหลด products เพื่อดึงสี
  const pSnap=await getDocs(collection(db,'products'));
  pSnap.docs.forEach(d=>{
    const p=d.data();
    if(p.mix_code) productMap[p.mix_code]={color:p.color||'#3b82f6',...p};
  });

  // listen planRows real-time ทั้งสอง collection พร้อมกัน
  let rows1=[],rows2=[];
  onSnapshot(
    query(collection(db,'production_plans'),where('status','in',['pasteurising','past_done','ready'])),
    snap=>{
      rows1=snap.docs.map(d=>({...d.data(),id:d.id,_col:'production_plans'}));
      planRows=[...rows1,...rows2];
      renderAll();
    }
  );
  onSnapshot(
    query(collection(db,'production_plans_m2'),where('status','in',['pasteurising','past_done','ready'])),
    snap=>{
      rows2=snap.docs.map(d=>({...d.data(),id:d.id,_col:'production_plans_m2'}));
      planRows=[...rows1,...rows2];
      renderAll();
    }
  );

  // listen tank states
  onSnapshot(collection(db,'aging_tank_states'),snap=>{
    tankStates={};
    snap.docs.forEach(d=>{tankStates[d.id]={id:d.id,...d.data()};});
    renderAll();
  });
}

const BANGCHAN_TANKS=Array.from({length:34},(_,i)=>`T${String(i+1).padStart(2,'0')}`);

function getLineGroups(group,allTanks){
  // ดึง LINE ที่มี aging_tanks กำหนดไว้
  const grpLines=lines.filter(l=>(l.group||'bangchan')===group&&(l.aging_tanks||[]).length>0)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  const assigned=grpLines.flatMap(l=>l.aging_tanks||[]);
  const unassigned=allTanks.filter(t=>!assigned.includes(t));
  const groups=grpLines.map(l=>({name:l.name,tanks:l.aging_tanks||[]}));
  if(unassigned.length)groups.push({name:'ยังไม่ได้กำหนด LINE',tanks:unassigned});
  if(!groups.length)return[{name:`${group==='bangchan'?'Bangchan':'Twin'} (ทั้งหมด)`,tanks:allTanks}];
  return groups;
}

function renderAll(){
  // BANGCHAN
  const bc=$('bangchan-grid');bc.innerHTML='';
  getLineGroups('bangchan',BANGCHAN_TANKS).forEach(g=>{
    const div=document.createElement('div');div.className='line-group';
    div.innerHTML=`<div class="line-title">🏭 ${g.name}</div>`;
    const grid=document.createElement('div');grid.className='tank-grid';
    g.tanks.forEach(t=>grid.appendChild(tankCard(t)));
    div.appendChild(grid);bc.appendChild(div);
  });

  // TWIN — hardcode layout 2×2 ตามตำแหน่งจริง
  const tw=$('twin-grid');tw.innerHTML='';

  const TWIN_LINES=[
    {name:'Hoyer',   tanks:['T65','T75','T66','T76'], color:'#f97316', icon:'🍦'},
    {name:'Extru 3', tanks:['T67','T77','T68','T78'], color:'#a855f7', icon:'🍧'},
    {name:'Glacé',   tanks:['T63','T73','T64','T74'], color:'#06b6d4', icon:'🧊'},
    {name:'Scooping',tanks:['T61','T71','T62','T72'], color:'#22c55e', icon:'🍨'},
  ];

  // แถวบน: Hoyer + Extru 3
  // แถวล่าง: Glacé + Scooping
  const rows2=[[TWIN_LINES[0],TWIN_LINES[1]],[TWIN_LINES[2],TWIN_LINES[3]]];
  rows2.forEach(rowLines=>{
    const rowDiv=document.createElement('div');
    rowDiv.style.cssText='display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap';
    rowLines.forEach(line=>{
      const lineDiv=document.createElement('div');
      lineDiv.style.cssText=`flex:1;min-width:0;border:2px solid ${line.color}44;border-radius:12px;padding:8px 10px;background:${line.color}08`;
      lineDiv.innerHTML=`<div style="font-family:'DM Mono',monospace;font-size:12px;font-weight:800;color:${line.color};letter-spacing:.06em;padding:0 0 8px 0;display:flex;align-items:center;gap:6px;border-bottom:1px solid ${line.color}30;margin-bottom:8px">
        <span>${line.icon}</span><span>${line.name}</span>
      </div>`;
      const grid=document.createElement('div');
      grid.style.cssText='display:flex;gap:8px;flex-wrap:wrap';
      line.tanks.forEach(t=>grid.appendChild(tankCard(t)));
      lineDiv.appendChild(grid);
      rowDiv.appendChild(lineDiv);
    });
    tw.appendChild(rowDiv);
  });
}

// CAPACITY ของแต่ละถัง
function getTankCapacity(tankId){
  const num=parseInt(tankId.replace('T',''));
  if(num>=1&&num<=34)return 3000;   // Bangchan
  if(num>=61&&num<=64)return 10000; // Twin Laser/Scoopy
  if(num>=65&&num<=68)return 8000;  // Twin Hoyal/Laser
  if(num>=71&&num<=74)return 10000; // Twin Laser/Scoopy
  if(num>=75&&num<=78)return 8000;  // Twin Hoyal/Laser
  return 3000;
}

function getTankInfo(tankId){
  const allRows=planRows.filter(r=>r.aging_tank===tankId);
  const row=allRows[0]||null;

  let status='empty';
  if(row){
    if(row.status==='pasteurising')status='pasteurising';
    else if(row.status==='past_done')status='curing';
    else if(row.status==='ready')status='filling';
    else status='pasteurising';
  } else {
    status=tankStates[tankId]?.status||'empty';
  }

  // กรอง rows ที่เป็น process_order + mix_code + date + filling_line เดียวกัน
  const sameGroup=row
    ? allRows.filter(r=>
        r.mix_code===row.mix_code &&
        r.date===row.date &&
        r.filling_line===row.filling_line &&
        (!row.process_order || r.process_order===row.process_order)
      )
    : [];

  // เช็คว่า batch_no ต่อเนื่องกัน เช่น 4/1, 4/2, 4/3
  // รูปแบบ batch: "4/1", "4/2" หรือ "4-1", "4-2" หรือ "1","2","3"
  function parseBatch(b){
    if(!b) return null;
    const m=String(b).match(/^(\d+)[\/\-](\d+)$/);
    if(m) return{prefix:+m[1],sub:+m[2]};
    const n=String(b).match(/^(\d+)$/);
    if(n) return{prefix:0,sub:+n[1]};
    return null;
  }

  function isSequential(rows){
    if(rows.length<=1) return true;
    const parsed=rows.map(r=>parseBatch(r.batch_no)).filter(Boolean);
    if(parsed.length!==rows.length) return false;
    // ต้อง prefix เดียวกัน
    const prefix=parsed[0].prefix;
    if(!parsed.every(p=>p.prefix===prefix)) return false;
    // เรียง sub ascending
    const subs=parsed.map(p=>p.sub).sort((a,b)=>a-b);
    // เช็คว่าต่อเนื่อง ไม่มีช่องว่าง
    for(let i=1;i<subs.length;i++){
      if(subs[i]-subs[i-1]!==1) return false;
    }
    return true;
  }

  const rows=isSequential(sameGroup)?sameGroup:(row?[row]:[]);

  const totalVolume=rows.reduce((sum,r)=>sum+(+(r.volume_liter||0)),0);

  // current_vol — ใช้ค่า cumulative จาก active batch (Pasteurize เขียนค่า cumulative ไว้แล้ว)
  // หา batch ที่กำลัง pasteurising อยู่ก่อน ถ้าไม่มีให้ใช้ batch ล่าสุดที่มี current_vol
  const activeRow=rows.find(r=>r.status==='pasteurising'&&r.current_vol!=null)
    || rows.slice().reverse().find(r=>r.current_vol!=null);
  const totalCurrentVol=activeRow?.current_vol!=null ? +activeRow.current_vol : totalVolume;

  return{status,row,rows,totalVolume,totalCurrentVol};
}




function calcVolume(row,totalCurrentVol,totalVolume){
  if(!row)return 0;
  const vol=totalVolume||+(row.volume_liter||0);
  if(row.status==='past_done'||row.status==='ready')return vol;
  if(!row.past_start_time)return 0;
  if(totalCurrentVol!=null)return Math.min(vol,totalCurrentVol);
  return 0;
}

function statusPct(status,row,tankId,totalVolume,totalCurrentVol){
  if(status==='cleaned'||status==='empty')return 0;
  const capacity=getTankCapacity(tankId);
  const vol=totalVolume||+(row?.volume_liter||0);
  if(status==='curing')return Math.min(100,Math.round((vol/capacity)*100));
  if(status==='pasteurising'){
    const cv=calcVolume(row,totalCurrentVol,totalVolume);
    return Math.min(100,Math.round((cv/capacity)*100));
  }
  if(status==='filling')return Math.min(100,Math.round((vol/capacity)*100));
  return 0;
}

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function dk(h){return'#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-55).toString(16).padStart(2,'0')).join('');}

function tankSVG(tid,pct,col,wave=false,hasLiq=false){
  const W=80,H=165;
  const bX=8,bY=22,bW=W-16,bH=H-52;
  const _pct=Math.min(pct,100);
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(_pct/100)*maxFillH);
  const fillY=bY+bH-3-fillH;
  const uid='ag'+tid.replace(/\D/g,'');
  const gid='g'+uid,cid='c'+uid,wid='w'+uid,w2id='w2'+uid;

  const legCol=hasLiq?col:'#4a5568';
  const legFill=hasLiq?rgba(col,.35):'#1e2535';
  const motorFill=hasLiq?'#16a34a':'#060a14';
  const motorStroke=hasLiq?'#22c55e':'#1e2d4a';

  if(_pct<=0)return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <rect x="${bX+1}" y="${bY+4}" width="${bW}" height="${bH}" rx="8" fill="rgba(0,0,0,.5)"/>
    <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="8" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
    <rect x="${bX+(bW-18)/2}" y="${bY-9}" width="18" height="11" rx="3" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
    <rect x="${bX+(bW-24)/2}" y="${bY-14}" width="24" height="6" rx="3" fill="#08101a" stroke="#1e2d4a" stroke-width="1.5"/>
    <rect x="${bX+5}" y="${bY+bH}" width="8" height="12" rx="2.5" fill="#1e2535" stroke="#4a5568" stroke-width="1.5"/>
    <rect x="${bX+bW-13}" y="${bY+bH}" width="8" height="12" rx="2.5" fill="#1e2535" stroke="#4a5568" stroke-width="1.5"/>
    <rect x="${bX+2}" y="${bY+bH+11}" width="${bW-4}" height="4" rx="2" fill="#1e2535" stroke="#4a5568" stroke-width="1.5"/>
  </svg>`;

  const waveAmp=wave?6:1.5;
  const waveDur=wave?'1.8s':'3.5s';
  const waveW=bW*2;

  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".95"/>
      <stop offset="100%" stop-color="${dk(col)}" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="${gid}2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity=".4"/>
      <stop offset="100%" stop-color="${col}" stop-opacity=".15"/>
    </linearGradient>
    <clipPath id="${cid}"><rect x="${bX+2}" y="${bY+2}" width="${bW-4}" height="${bH-4}" rx="6"/></clipPath>
    <path id="${wid}" d="M0,${waveAmp} C${bW*.3},${-waveAmp} ${bW*.7},${-waveAmp} ${bW},${waveAmp} C${bW*1.3},${waveAmp*3} ${bW*1.7},${waveAmp*3} ${waveW},${waveAmp} L${waveW},${fillH+10} L0,${fillH+10} Z"/>
    <path id="${w2id}" d="M0,${waveAmp*1.5} C${bW*.4},${-waveAmp*1.5} ${bW*.6},${-waveAmp*1.5} ${bW},${waveAmp} C${bW*1.4},${waveAmp*2.5} ${bW*1.6},${waveAmp*2.5} ${waveW},${waveAmp*1.5} L${waveW},${fillH+10} L0,${fillH+10} Z"/>
  </defs>

  <!-- shadow -->
  <rect x="${bX+2}" y="${bY+4}" width="${bW}" height="${bH}" rx="8" fill="rgba(0,0,0,.7)"/>
  <!-- body -->
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="8" fill="#060a14" stroke="${rgba(col,.5)}" stroke-width="2"/>

  <!-- liquid fill -->
  <g clip-path="url(#${cid})">
    <rect x="${bX+2}" y="${fillY+waveAmp+2}" width="${bW-4}" height="${fillH+4}" fill="url(#${gid})"/>
    <!-- wave 1 -->
    <g transform="translate(${bX+2},${fillY})">
      <use href="#${wid}" fill="url(#${gid})">
        <animateTransform attributeName="transform" type="translate" from="0,0" to="${-bW},0" dur="${waveDur}" repeatCount="indefinite"/>
      </use>
      <use href="#${wid}" fill="url(#${gid})" transform="translate(${bW},0)">
        <animateTransform attributeName="transform" type="translate" from="${bW},0" to="0,0" dur="${waveDur}" repeatCount="indefinite"/>
      </use>
    </g>
    <!-- wave 2 overlay -->
    <g transform="translate(${bX+2},${fillY-1})">
      <use href="#${w2id}" fill="url(#${gid}2)">
        <animateTransform attributeName="transform" type="translate" from="${-bW*.5},0" to="${bW*.5},0" dur="${wave?'2.5s':'5s'}" repeatCount="indefinite"/>
      </use>
    </g>
    ${wave?`<g transform="translate(${bX+2},${fillY+2})">
      <path d="M0,${waveAmp*.8} C${bW*.35},${-waveAmp*.8} ${bW*.65},${-waveAmp*.8} ${bW},${waveAmp*.8} L${waveW},${fillH+10} L0,${fillH+10} Z" fill="rgba(255,255,255,.1)">
        <animateTransform attributeName="transform" type="translate" from="${-bW*.3},0" to="${bW*.7},0" dur="3.2s" repeatCount="indefinite"/>
      </path>
    </g>`:''}
    <!-- shine -->
    <rect x="${bX+4}" y="${fillY+waveAmp+5}" width="4" height="${Math.max(0,fillH*.35)}" rx="2" fill="rgba(255,255,255,.07)"/>
  </g>

  <!-- level line -->
  <line x1="${bX+bW+2}" y1="${fillY+waveAmp}" x2="${bX+bW+7}" y2="${fillY+waveAmp}" stroke="${col}" stroke-width="1.5" stroke-linecap="round"/>
  <!-- border overlay -->
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="8" fill="none" stroke="${rgba(col,.5)}" stroke-width="2"/>
  <!-- neck/motor สีเขียวเมื่อมีของ -->
  <rect x="${bX+(bW-18)/2}" y="${bY-9}" width="18" height="11" rx="3" fill="${motorFill}" stroke="${motorStroke}" stroke-width="2"/>
  <rect x="${bX+(bW-24)/2}" y="${bY-14}" width="24" height="6" rx="3" fill="${motorFill}" stroke="${motorStroke}" stroke-width="2"/>
  ${hasLiq?`<circle cx="${bX+bW/2}" cy="${bY-9}" r="3.5" fill="#22c55e"/>
  <circle cx="${bX+bW/2}" cy="${bY-9}" r="3.5" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0">
    <animate attributeName="r" from="3.5" to="9" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.7" to="0" dur="1.5s" repeatCount="indefinite"/>
  </circle>`:''}
  <!-- legs สีชัดเจน -->
  <rect x="${bX+5}" y="${bY+bH}" width="8" height="12" rx="2.5" fill="${legFill}" stroke="${legCol}" stroke-width="1.8"/>
  <rect x="${bX+bW-13}" y="${bY+bH}" width="8" height="12" rx="2.5" fill="${legFill}" stroke="${legCol}" stroke-width="1.8"/>
  <!-- ฐาน -->
  <rect x="${bX+2}" y="${bY+bH+11}" width="${bW-4}" height="4" rx="2" fill="${legFill}" stroke="${legCol}" stroke-width="1.8"/>
</svg>`;

}

function tankCard(tankId){
  const{status,row,rows,totalVolume,totalCurrentVol}=getTankInfo(tankId);
  const capacity=getTankCapacity(tankId);
  const pct=statusPct(status,row,tankId,totalVolume,totalCurrentVol);
  const stClass=`st-${status==='empty'?'empty':status==='filling'?'filling':status==='pasteurising'?'pasteurising':status==='curing'?'curing':'cleaned'}`;

  const prodCol=row?.mix_code?productMap[row.mix_code]?.color:null;
  const col=prodCol||statusColor(status);

  const mixCode=row?.mix_code||'';
  const mixName=row?.mix_name||'';
  const batchNo=row?.batch_no||'';
  const prodSuffix=row?.prod_suffix||'';
  const volTxt=totalVolume>0?`${Math.round(totalVolume).toLocaleString()} L`:'';
  const isWave=status==='pasteurising'||status==='filling';
  const hasLiq=pct>0;

  // รหัสผลิต 10 ตัว
  const yr=new Date().getFullYear().toString().slice(-1);
  const unit=row?._col==='production_plans_m2'?'2':'1';
  const prefix=yr+'0522'+unit;
  const prodCode=prodSuffix?(prefix+prodSuffix):'—';

  // batch วงกลม — เลขหลังสุดจาก batch_no
  const batchNum=batchNo?batchNo.replace(/.*?(\d+)$/,'$1'):'';

  const div=document.createElement('div');
  div.className=`tc ${stClass}`;
  div.onclick=()=>openModal(tankId);
  div.innerHTML=`
    <div class="tn" style="color:${col};border-color:${rgba(col,.2)};background:${rgba(col,.08)}">${tankId}</div>
    <div style="display:flex;align-items:center;padding:6px 8px 4px 4px;gap:6px">

      <!-- ถัง SVG -->
      <div class="tsw" style="padding:2px 2px;flex-shrink:0;position:relative">
        ${tankSVG(tankId,pct,col,isWave,hasLiq)}
        <div class="tov">
          ${volTxt?`<div class="tp" style="color:${col};font-size:9px;font-weight:800">${volTxt}</div>`:''}
          ${pct>0?`<div class="tp" style="color:rgba(255,255,255,.8);font-size:8px">${pct}%</div>`:''}
        </div>
      </div>

      <!-- ข้อมูลขวา -->
      <div style="flex:1;display:flex;flex-direction:column;gap:4px;min-width:0">

        <!-- Mix Code -->
        ${mixCode
          ?`<div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:800;color:${col};letter-spacing:.04em">${mixCode}</div>`
          :`<div style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.2)">— ว่าง —</div>`}

        <!-- Mix Name + batch วงกลม แถวเดียวกัน -->
        ${mixName||batchNum?`<div style="display:flex;align-items:center;gap:5px;flex-wrap:nowrap">
          ${mixName?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:white;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${mixName}</div>`:''}
          ${batchNum?`<div style="width:20px;height:20px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:900;color:black;flex-shrink:0">${batchNum}</div>`:''}
        </div>`:''}

        <!-- รหัสผลิต 10 ตัว -->
        ${prodSuffix?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.08em;white-space:nowrap">${prodCode}</div>`:''}

      </div>
    </div>
    <div class="tsb" style="color:${col};background:${rgba(col,.1)}">${statusBadge(resolveStatus(row)||status)}</div>`;
  return div;
}

// MODAL
window.openModal=(tankId)=>{
  selectedTank=tankId;
  const{status,row,rows,totalVolume,totalCurrentVol}=getTankInfo(tankId);
  const capacity=getTankCapacity(tankId);
  const vol=calcVolume(row,totalCurrentVol,totalVolume);
  const pct=statusPct(status,row,tankId,totalVolume,totalCurrentVol);
  $('modal-tank-num').textContent=`ถัง ${tankId} — capacity ${capacity.toLocaleString()} L`;
  const batchInfo=rows.length>1?` (${rows.length} batches รวม ${Math.round(totalVolume).toLocaleString()} L)`:'';
  const info=row
    ?`${statusLabel(status)} — ${row.mix_name||''}${batchInfo} ${pct>0?'('+pct+'%)':''}`
    :`${statusLabel(status)}`;
  $('modal-tank-info').textContent=info;

  // แสดง current_vol ปัจจุบันใน input
  const volInput=$('modal-vol-input');
  const volHint=$('modal-vol-hint');
  if(volInput){
    volInput.value=totalCurrentVol!=null?Math.round(totalCurrentVol):'';
    volInput.max=capacity;
    if(totalVolume>0){
      volHint.textContent=`ระบบแสดง: ${Math.round(totalCurrentVol||0).toLocaleString()} L จาก ${Math.round(totalVolume).toLocaleString()} L (capacity ${capacity.toLocaleString()} L)`;
    } else {
      volHint.textContent=`capacity ถัง: ${capacity.toLocaleString()} L`;
    }
  }

  // highlight active
  document.querySelectorAll('.stat-btn').forEach(b=>{
    b.className='stat-btn';
    if(b.textContent.includes('Pasteurize')&&status==='pasteurising')b.classList.add('active-past');
    if(b.textContent.includes('Filling')&&status==='filling')b.classList.add('active-fill');
    if(b.textContent.includes('Curing')&&status==='curing')b.classList.add('active-cure');
    if(b.textContent.includes('ล้างแล้ว')&&status==='cleaned')b.classList.add('active-clean');
    if(b.textContent.includes('ว่าง')&&status==='empty')b.classList.add('active-empty');
  });
  $('tank-modal').classList.add('show');
};

window.saveCurrentVol=async()=>{
  if(!selectedTank)return;
  const volInput=$('modal-vol-input');
  const newVol=+(volInput?.value||0);
  if(isNaN(newVol)||newVol<0){toast('กรุณากรอกตัวเลขที่ถูกต้อง','red');return;}
  const capacity=getTankCapacity(selectedTank);
  if(newVol>capacity){toast(`เกิน capacity ถัง (${capacity.toLocaleString()} L)`,'red');return;}

  // อัปเดต current_vol ใน row ล่าสุดของถังนั้น
  const tankRows=planRows.filter(r=>r.aging_tank===selectedTank);
  if(!tankRows.length){toast('ไม่พบข้อมูลในถังนี้','red');return;}

  try{
    // อัปเดตทุก row ที่ผูกกับถังนี้ให้ current_vol รวมเท่ากับ newVol
    const updates=tankRows.map(r=>
      updateDoc(doc(db,r._col,r.id),{current_vol:newVol})
    );
    await Promise.all(updates);
    toast(`✅ อัปเดต volume ถัง ${selectedTank} → ${newVol.toLocaleString()} L`,'green');
    const hint=$('modal-vol-hint');
    if(hint) hint.textContent=`บันทึกแล้ว: ${newVol.toLocaleString()} L`;
  }catch(e){toast('บันทึกไม่สำเร็จ: '+e.message,'red');}
};

window.clearTank=async()=>{
  if(!selectedTank)return;
  const confirm1=window.confirm(`⚠️ เคลียร์ถัง ${selectedTank}\n\nข้อมูลจะถูก archive ไปใน past_history ก่อน แล้วค่อยลบออกจากระบบ\nสามารถดูย้อนหลังได้จากแท็บ 📋 ประวัติ ใน pasteurize\n\nยืนยันหรือไม่?`);
  if(!confirm1)return;
  try{
    const tankRows=planRows.filter(r=>r.aging_tank===selectedTank);
    const now=new Date();
    const archiveDate=now.toISOString().slice(0,10);
    const archiveTime=now.toTimeString().slice(0,5);

    // archive ทุก row ไปใน past_history ก่อน
    const archives=tankRows.map(r=>
      addDoc(collection(db,'past_history'),{
        ...r,
        archived_at:archiveTime,
        archived_date:archiveDate,
        archived_by:'clear_tank',
        mixing_unit:r._col==='production_plans_m2'?'p2':'p1',
      })
    );
    await Promise.all(archives);

    // แล้วค่อยลบออกจาก production_plans
    const deletes=tankRows.map(r=>deleteDoc(doc(db,r._col,r.id)));
    await Promise.all(deletes);

    // reset aging_tank_states
    await setDoc(doc(db,'aging_tank_states',selectedTank),{
      status:'empty',updated_at:now.toISOString()
    },{merge:true});

    toast(`🗑️ เคลียร์ถัง ${selectedTank} แล้ว — archive ${tankRows.length} รายการ`,'green');
    closeModal();
  }catch(e){toast('เคลียร์ไม่สำเร็จ: '+e.message,'red');}
};

window.closeModal=()=>{$('tank-modal').classList.remove('show');selectedTank=null;};

window.setTankStatus=async(status)=>{
  if(!selectedTank)return;
  try{
    await setDoc(doc(db,'aging_tank_states',selectedTank),{
      status,updated_at:new Date().toISOString()
    },{merge:true});
    const labels={filling:'🔴 Filling',curing:'🟡 Curing',cleaned:'🟢 ล้างแล้ว',empty:'⚪ ว่าง'};
    toast(`${selectedTank} → ${labels[status]}`,'green');
    closeModal();
  }catch(e){toast('บันทึกไม่สำเร็จ','red');}
};

window.showTab=(tab,btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('on'));
  $(`page-${tab}`).classList.add('on');btn.classList.add('on');
};
