function getMaxTemp(ts){
  if(!ts) return null;
  var vals=[];
  if(ts.max_temp!=null) vals.push(+ts.max_temp);
  if(ts.temps&&typeof ts.temps==='object') Object.values(ts.temps).forEach(function(v){if(v!=null&&!isNaN(+v))vals.push(+v);});
  return vals.length?Math.max.apply(null,vals):null;
}
function tempBox(ts){
  var t=getMaxTemp(ts);
  if(t==null) return '';
  var ok=t<=6,warn=t>6&&t<=8;
  var bc=ok?'#15803d':warn?'#c2410c':'#b91c1c';
  var bg=ok?'rgba(21,128,61,.1)':warn?'rgba(194,65,12,.08)':'rgba(185,28,28,.1)';
  var ic=ok?'­¤īĪ’ĖÅ':warn?'ŌÜĀ’ĖÅ':'­¤ö┤';
  return '<div style="display:inline-flex;align-items:center;gap:4px;background:'+bg+';border:1.5px solid '+bc+';border-radius:7px;padding:3px 9px;margin:4px 12px 0;font-family:DM Mono,monospace;font-size:12px;font-weight:900;color:'+bc+'">'+ic+' '+t+'┬░C</div>';
}
function displayVol(row){
  var v=row&&row.current_vol!=null?+row.current_vol:+(row&&row.volume_liter||0);
  return Math.round(v).toLocaleString()+' L';
}

// ŌöĆŌöĆ Auto-check curing done + ÓĖäÓĖ│ÓĖÖÓĖ¦ÓĖō expire_at ÓĖŚÓĖĖÓĖü 1 ÓĖÖÓĖ▓ÓĖŚÓĖĄ ŌöĆŌöĆ
async function _checkCuringDone(){
  const now = Date.now();
  for(const ts of Object.values(tankStates)){
    try{
      const _dbg = window._debugTank && ts.id===window._debugTank;
      // Ó╣ĆÓĖŖÓ╣ćÓĖäÓĖŚÓĖĖÓĖüÓĖ¢ÓĖ▒ÓĖćÓĖŚÓĖĄÓ╣łÓĖĪÓĖĄ past_end_time Ó╣äÓĖĪÓ╣łÓĖ¦Ó╣łÓĖ▓ current_vol ÓĖłÓĖ░Ó╣ĆÓĖøÓ╣ćÓĖÖÓ╣ĆÓĖŚÓ╣łÓĖ▓Ó╣äÓĖ½ÓĖŻÓ╣ł
      if(!ts.past_end_time||!ts.date){
        if(_dbg) console.warn('[_checkCuringDone]',ts.id,'ÓĖéÓ╣ēÓĖ▓ÓĖĪ ŌĆö Ó╣äÓĖĪÓ╣łÓĖĪÓĖĄ past_end_time ÓĖ½ÓĖŻÓĖĘÓĖŁ date',{past_end_time:ts.past_end_time,date:ts.date});
        continue;
      }
      if(ts.status==='empty'||ts.status==='cip'||ts.status==='san'){
        if(_dbg) console.warn('[_checkCuringDone]',ts.id,'ÓĖéÓ╣ēÓĖ▓ÓĖĪ ŌĆö status Ó╣ĆÓĖøÓ╣ćÓĖÖ',ts.status);
        continue;
      }
      const prod = productMap[ts.mix_code||'']||{};
      const agingHr = +(prod.aging_time||4);
      const[h,m]=(ts.past_end_time).split(':').map(Number);
      const base = new Date(ts.date);
      if(isNaN(base.getTime())){
        console.warn('[_checkCuringDone] ÓĖ¢ÓĖ▒ÓĖć',ts.id,'ŌĆö ts.date ÓĖ£ÓĖ┤ÓĖöÓĖŻÓĖ╣ÓĖøÓ╣üÓĖÜÓĖÜ:',JSON.stringify(ts.date),'ÓĖéÓ╣ēÓĖ▓ÓĖĪÓĖ¢ÓĖ▒ÓĖćÓĖÖÓĖĄÓ╣ēÓ╣äÓĖøÓĖüÓ╣łÓĖŁÓĖÖ');
        continue;
      }
      base.setHours(h||0,m||0,0,0);
      const readyAt = base.getTime() + agingHr*3600000;

      // ÓĖäÓĖ│ÓĖÖÓĖ¦ÓĖō expire_at ÓĖłÓĖ▓ÓĖü SHELF_TABLE
      const maxT = getMaxTemp(ts)??5;
      const pt = (prod.product_type||'').toLowerCase();
      const ptype = pt.includes('water ice')?'Water Ice':pt.includes('jelly')?'Jelly':'Ice Cream';
      const tempIdx = Math.min(Math.max(Math.round(maxT),0),10);
      const shelfHr = (SHELF_TABLE[ptype]||[])[tempIdx]||96;
      const expireAt = new Date(base.getTime()+shelfHr*3600000).toISOString();

      const upd = {expire_at:expireAt, updated_at:new Date().toISOString()};

      if(ts.status==='aging' && now >= readyAt){
        upd.status = 'ready';
      }

      if(_dbg) console.warn('[_checkCuringDone]',ts.id,'ÓĖäÓĖ│ÓĖÖÓĖ¦ÓĖōÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł ŌåÆ expire_at:',expireAt,'(Ó╣ĆÓĖéÓĖĄÓĖóÓĖÖÓĖźÓĖć Firestore Ó╣üÓĖźÓ╣ēÓĖ¦)');

      // update ÓĖŚÓĖĖÓĖüÓĖ¢ÓĖ▒ÓĖćÓĖŚÓĖĄÓ╣łÓĖĪÓĖĄ past_end_time (ÓĖŻÓĖ¦ÓĖĪ Twin ÓĖŚÓĖĄÓ╣ł current_vol=0)
      if(ts.past_end_time){
        await setDoc(doc(db,'aging_tank_states',ts.id),upd,{merge:true});
      }
    }catch(e){
      console.warn('[_checkCuringDone] ÓĖ¢ÓĖ▒ÓĖć',ts.id,'ÓĖäÓĖ│ÓĖÖÓĖ¦ÓĖōÓĖ×ÓĖ▒ÓĖć:',e.message,'ŌĆö ÓĖéÓ╣ēÓĖ▓ÓĖĪÓ╣äÓĖøÓĖ¢ÓĖ▒ÓĖćÓĖĢÓ╣łÓĖŁÓ╣äÓĖø Ó╣äÓĖĪÓ╣łÓĖüÓĖŻÓĖ░ÓĖŚÓĖÜÓĖ¢ÓĖ▒ÓĖćÓĖŁÓĖĘÓ╣łÓĖÖ');
    }
  }
}

function renderBangchan(){
  const el=$('bangchan-grid');el.innerHTML='';

  // Twin tanks ŌĆö ÓĖüÓĖŻÓĖŁÓĖć Twin ÓĖŁÓĖŁÓĖüÓĖłÓĖ▓ÓĖü BC ÓĖŚÓĖĖÓĖüÓĖłÓĖĖÓĖö
  const twinTanks=TWIN_LINES.flatMap(l=>l.tanks||[]);
  const grpLines=lines.filter(l=>(l.aging_tanks||[]).filter(t=>!twinTanks.includes(t)).length>0)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  // Ó╣üÓĖĢÓ╣łÓĖźÓĖ░ group Ó╣āÓĖ½Ó╣ēÓ╣üÓĖ¬ÓĖöÓĖćÓ╣ĆÓĖēÓĖ×ÓĖ▓ÓĖ░ BC tanks (Ó╣äÓĖĪÓ╣łÓ╣āÓĖŖÓ╣ł Twin)
  const grpLinesCleaned=grpLines.map(l=>({...l,aging_tanks:(l.aging_tanks||[]).filter(t=>!twinTanks.includes(t))}));
  const assigned=grpLinesCleaned.flatMap(l=>l.aging_tanks||[]);
  const unassigned=BC_TANKS.filter(t=>!assigned.includes(t));
  let groups=[];
  if(!grpLines.length){
    // Ó╣äÓĖĪÓ╣łÓĖĪÓĖĄ line Ó╣äÓĖ½ÓĖÖÓĖüÓĖ│ÓĖ½ÓĖÖÓĖö aging_tanks Ó╣ĆÓĖźÓĖó ŌåÆ Ó╣üÓĖ¬ÓĖöÓĖć BC ÓĖŚÓĖ▒Ó╣ēÓĖćÓĖ½ÓĖĪÓĖö
    groups=[{name:'Bangchan (ÓĖŚÓĖ▒Ó╣ēÓĖćÓĖ½ÓĖĪÓĖö)',tanks:BC_TANKS}];
  } else {

    groups=grpLinesCleaned.map(l=>({name:l.name||l.id,tanks:l.aging_tanks||[]}));
    // ÓĖ¢ÓĖ▒ÓĖćÓĖŚÓĖĄÓ╣łÓ╣äÓĖĪÓ╣łÓ╣äÓĖöÓ╣ēÓĖüÓĖ│ÓĖ½ÓĖÖÓĖöÓ╣āÓĖÖ line Ó╣äÓĖ½ÓĖÖÓ╣ĆÓĖźÓĖó ŌåÆ Ó╣üÓĖ¬ÓĖöÓĖćÓĖŻÓĖ¦ÓĖĪÓ╣ĆÓĖøÓ╣ćÓĖÖÓĖüÓĖźÓĖĖÓ╣łÓĖĪ Bangchan
    if(unassigned.length>0) groups.push({name:'Bangchan (ÓĖŚÓĖĄÓ╣łÓ╣ĆÓĖ½ÓĖźÓĖĘÓĖŁ)',tanks:unassigned});
  }

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-Math.round(a*255)),g=Math.max(0,parseInt(h.slice(3,5),16)-Math.round(a*255)),b=Math.max(0,parseInt(h.slice(5,7),16)-Math.round(a*255));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}

function autoTextColor(hex){
  if(!hex||hex[0]!=='#') return '#111827';
  var r=parseInt(hex.slice(1,3),16)||0;
  var g=parseInt(hex.slice(3,5),16)||0;
  var b=parseInt(hex.slice(5,7),16)||0;
  return (0.299*r+0.587*g+0.114*b)>160?'#111827':'#ffffff';
}

function tankSVG(uid,pct,col,run,statusTxt,statusCol,sw,sh){
  statusCol=statusCol||col;
  sw=sw||160; sh=sh||280;
  const bX=14,bY=18,bW=sw-28,bH=sh-45;
  const nW=24,nH=10,cW=34,cH=6;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(pct/100)*maxFillH);
  const wy=bY+bH-fillH;
  const A=6,midY=bY+bH/2;
  const hasLiq=pct>0;
  const bodyFill=hasLiq?'rgba(255,255,255,.12)':'rgba(176,186,200,.25)';
  const bodyStroke=hasLiq?col:'#94a3b8';
  const gid='g'+uid,cid='cl'+uid;
  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  function waveD(yBase,amp,nc){
    const W=bW*2,segW=W/(nc*2);
    let d='M'+bX+','+yBase;
    for(let i=0;i<nc*2;i++){
      const x1=bX+i*segW,x2=bX+(i+1)*segW;
      const cy=i%2===0?yBase-amp:yBase+amp;
      d+=' C'+(x1+segW*.4)+','+cy+' '+(x2-segW*.4)+','+cy+' '+x2+','+yBase;
    }
    return d+' L'+(bX+W)+','+(bY+bH)+' L'+bX+','+(bY+bH)+' Z';
  }
  let s='';
  s+='<svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs>';
  s+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">';
  s+='<stop offset="0%" stop-color="'+col+'" stop-opacity=".5"/>';
  s+='<stop offset="100%" stop-color="'+col+'" stop-opacity=".85"/>';
  s+='</linearGradient>';
  s+='<clipPath id="'+cid+'"><rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12"/></clipPath>';
  s+='</defs>';
  // motor/neck
  s+='<rect x="'+nX+'" y="'+(bY-nH)+'" width="'+nW+'" height="'+(nH+5)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".6"/>';
  s+='<rect x="'+cX+'" y="'+(bY-nH-cH)+'" width="'+cW+'" height="'+(cH+3)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".5"/>';
  if(hasLiq) s+='<circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="#22c55e" opacity=".9"/><circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0"><animate attributeName="r" from="4" to="10" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/></circle>';
  // body
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity="'+(hasLiq?'.4':'.6')+'"/>';
  // fill + wave
  if(hasLiq){
    s+='<g clip-path="url(#'+cid+')">';
    s+='<rect x="'+bX+'" y="'+(wy+A)+'" width="'+(bW*2)+'" height="'+(bY+bH-(wy+A))+'" fill="url(#'+gid+')"/>';
    s+='<path d="'+waveD(wy,A,3)+'" fill="'+col+'" fill-opacity=".55" style="animation:wv1 2.8s linear infinite"/>';
    s+='<path d="'+waveD(wy,A*.6,4)+'" fill="'+col+'" fill-opacity=".3" style="animation:wv2 4s linear infinite"/>';
    s+='<ellipse cx="'+(bX+bW*.35)+'" cy="'+(wy-2)+'" rx="'+(bW*.12)+'" ry="2.5" fill="white" fill-opacity=".3"/>';
    s+='</g>';
  }
  // border overlay
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="none" stroke="'+bodyStroke+'" stroke-width="2.5" stroke-opacity="'+(hasLiq?'.8':'.6')+'"/>';
  // ÓĖéÓĖ▓ÓĖ¢ÓĖ▒ÓĖć
  s+='<rect x="'+(bX+8)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+bW-16)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+3)+'" y="'+(bY+bH+13)+'" width="'+(bW-6)+'" height="5" rx="2" fill="rgba(255,255,255,.12)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".5"/>';
  // text
  const tc=hasLiq?autoTextColor(col):'#6b7280';
  s+='<text x="'+(sw/2)+'" y="'+(midY-4)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="16" fill="'+tc+'" font-weight="900">'+(hasLiq?Math.round(pct)+'%':'ÓĖ¦Ó╣łÓĖ▓ÓĖć')+'</text>';
  if(hasLiq){
    s+='<rect x="'+(bX+8)+'" y="'+(midY+8)+'" width="'+(bW-16)+'" height="18" rx="9" fill="'+col+'" fill-opacity=".15" stroke="'+col+'" stroke-width="1.5" stroke-opacity=".4"/>';
    s+='<text x="'+(sw/2)+'" y="'+(midY+21)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="11" fill="'+col+'" font-weight="900">'+statusTxt+'</text>';
  }
  s+='</svg>';
  return s;
}

    html+='<div class="sd '+(isDone?'done':'')+(isActive?' active':'')+'" title="'+s+'"></div>';

  });

// EXPIRY
function calcExpiry(row,tankId){
  if(!row?.past_end_time||!row?.date) return null;
  const temp=getMaxTemp(tankStates[tankId])??5;
  const prod=productMap[row.mix_code||'']||{};
  const pt=(prod.product_type||'').toLowerCase();
  const type=pt.includes('water ice')?'Water Ice':pt.includes('jelly')?'Jelly':'Ice Cream';
  const hours=SHELF_TABLE[type]?.[temp]||null;
  if(!hours) return null;
  const[h,m]=row.past_end_time.split(':').map(Number);
  const base=new Date(row.date);base.setHours(h||0,m||0,0,0);
  const expire=new Date(base.getTime()+hours*3600000);
  const now=new Date();const rem=(expire-now)/3600000;
  return{
    date:expire.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'}),
    time:expire.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
    hours,isExpired:rem<=0,isCritical:rem>0&&rem<=6,isWarning:rem>6&&rem<=12
  };
}

function getAlertClass(exp){
  if(!exp) return'';
  if(exp.isExpired) return'warn-exp';
  if(exp.isCritical) return'warn-crit';
  if(exp.isWarning) return'warn-soon';
  return'';
}

              await setDoc(doc(db,_col,_d.id),{status:'sent_filling',updated_at:new Date().toISOString()},{merge:true});
            }
          }
        }catch(e){console.warn('setTankStatus: ÓĖøÓĖ┤ÓĖö',_col,'Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł:',e);}
      }
    }
    toast(statusLabel(status),'green');
    closeModal();
  }catch(e){toast('Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł','red');}
};
window.saveCurrentVol=async()=>{
  if(!selectedTank)return;
  const vol=+($('modal-vol').value||0);
  try{
    await _stopFillingForTank(selectedTank);
    await setDoc(doc(db,'aging_tank_states',selectedTank),{current_vol:vol,updated_at:new Date().toISOString()},{merge:true});
    toast('ÓĖÜÓĖ▒ÓĖÖÓĖŚÓĖČÓĖü Vol '+vol+' L','green');closeModal();
  }catch(e){toast('Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł','red');}
};
window.clearTank=async()=>{
  if(!selectedTank||!confirm('Ó╣ĆÓĖäÓĖźÓĖĄÓĖóÓĖŻÓ╣īÓĖ¢ÓĖ▒ÓĖć '+selectedTank+'?'))return;
  try{
    await _stopFillingForTank(selectedTank);
    await setDoc(doc(db,'aging_tank_states',selectedTank),{
      status:'empty',current_vol:0,
      mix_code:'',mix_name:'',batch_no:'',product_code:'',prod_suffix:'',
      date:'',past_start_time:'',past_end_time:'',
      volume_liter:0,process_order:'',temps:{},max_temp:null,expire_at:'',shelf_hr:'',
      last_mix_code:'',last_mix_name:'',
      next_mix_code:'',next_mix_name:'',next_vol:0,
      sig_start_cip:'',sig_start_cip_name:'',
      sig_stop_cip:'',sig_stop_cip_name:'',
      sig_start_san:'',sig_start_san_name:'',
      sig_stop_san:'',sig_stop_san_name:'',
      pending_acid:false,
      updated_at:new Date().toISOString()
    },{merge:true}); // merge:true Ó╣ĆÓĖüÓ╣ćÓĖÜ cip_group Ó╣äÓĖ¦Ó╣ē (Ó╣ĆÓĖøÓ╣ćÓĖÖÓĖüÓĖ▓ÓĖŻÓĖĢÓĖ▒Ó╣ēÓĖćÓĖäÓ╣łÓĖ▓Ó╣éÓĖäÓĖŻÓĖćÓĖ¬ÓĖŻÓ╣ēÓĖ▓ÓĖćÓĖ¢ÓĖ▒ÓĖć Ó╣äÓĖĪÓ╣łÓ╣āÓĖŖÓ╣łÓĖéÓ╣ēÓĖŁÓĖĪÓĖ╣ÓĖź batch)
    // ŌöĆŌöĆ ÓĖøÓĖ┤ÓĖö production_plans/production_plans_m2 ÓĖéÓĖŁÓĖćÓĖ¢ÓĖ▒ÓĖćÓĖÖÓĖĄÓ╣ēÓ╣äÓĖøÓĖöÓ╣ēÓĖ¦ÓĖóÓ╣āÓĖÖÓĖäÓĖźÓĖ┤ÓĖüÓ╣ĆÓĖöÓĖĄÓĖóÓĖ¦ ŌöĆŌöĆ
    // Ó╣ĆÓĖöÓĖ┤ÓĖĪÓ╣ĆÓĖäÓĖźÓĖĄÓĖóÓĖŻÓ╣īÓ╣üÓĖäÓ╣ł aging_tank_states Ó╣üÓĖĢÓ╣łÓ╣äÓĖĪÓ╣łÓ╣üÓĖĢÓĖ░ production_plans Ó╣ĆÓĖźÓĖó ÓĖ¢Ó╣ēÓĖ▓ row ÓĖóÓĖ▒ÓĖćÓĖĪÓĖĄ
    // status='pasteurising' ÓĖäÓ╣ēÓĖ▓ÓĖćÓĖŁÓĖóÓĖ╣Ó╣ł ÓĖ½ÓĖÖÓ╣ēÓĖ▓ pasteurize.html (ÓĖ¢Ó╣ēÓĖ▓Ó╣ĆÓĖøÓĖ┤ÓĖöÓĖŁÓĖóÓĖ╣Ó╣łÓĖŚÓĖĄÓ╣łÓ╣äÓĖ½ÓĖÖÓĖüÓ╣ćÓĖĢÓĖ▓ÓĖĪ) ÓĖłÓĖ░ÓĖĪÓĖĄ
    // auto-stamp loop Ó╣ĆÓĖéÓĖĄÓĖóÓĖÖ current_vol ÓĖüÓĖźÓĖ▒ÓĖÜÓ╣ĆÓĖéÓ╣ēÓĖ▓ aging_tank_states Ó╣āÓĖ½ÓĖĪÓ╣łÓĖŚÓĖĖÓĖü 15 ÓĖ¦ÓĖ┤ÓĖÖÓĖ▓ÓĖŚÓĖĄ
    // ÓĖŚÓĖ│Ó╣āÓĖ½Ó╣ēÓ╣ĆÓĖäÓĖźÓĖĄÓĖóÓĖŻÓ╣īÓ╣äÓĖøÓ╣üÓĖźÓ╣ēÓĖ¦ "Ó╣ĆÓĖöÓ╣ēÓĖćÓĖüÓĖźÓĖ▒ÓĖÜÓĖĪÓĖ▓" Ó╣ĆÓĖ½ÓĖĪÓĖĘÓĖŁÓĖÖÓ╣äÓĖĪÓ╣łÓĖ½ÓĖ▓ÓĖó ŌĆö Ó╣üÓĖüÓ╣ēÓ╣éÓĖöÓĖóÓĖøÓĖ┤ÓĖö row ÓĖŚÓĖĄÓ╣łÓĖäÓ╣ēÓĖ▓ÓĖćÓ╣äÓĖøÓĖöÓ╣ēÓĖ¦ÓĖóÓ╣ĆÓĖźÓĖó
    let _closedCount=0;
    for(const _col of['production_plans','production_plans_m2']){
      try{
        const _snap=await getDocs(query(collection(db,_col),where('aging_tank','==',selectedTank)));
        console.log('[clearTank]',_col,'matched docs:',_snap.docs.length,_snap.docs.map(d=>({id:d.id,status:d.data().status,aging_tank:d.data().aging_tank})));
        for(const _d of _snap.docs){
          const _data=_d.data();
          if(_data.status&&_data.status!=='sent_filling'){
            await setDoc(doc(db,_col,_d.id),{status:'sent_filling',updated_at:new Date().toISOString()},{merge:true});
            _closedCount++;
          }
        }
      }catch(e){console.warn('clearTank: ÓĖøÓĖ┤ÓĖö',_col,'Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł:',e);}
    }
    toast('Ó╣ĆÓĖäÓĖźÓĖĄÓĖóÓĖŻÓ╣īÓĖ¢ÓĖ▒ÓĖć '+selectedTank+' Ó╣üÓĖźÓ╣ēÓĖ¦'+(_closedCount?' (ÓĖøÓĖ┤ÓĖöÓĖćÓĖ▓ÓĖÖÓĖäÓ╣ēÓĖ▓ÓĖć '+_closedCount+' ÓĖŻÓĖ▓ÓĖóÓĖüÓĖ▓ÓĖŻÓĖöÓ╣ēÓĖ¦ÓĖó)':''),'green');
    closeModal();
  }catch(e){toast('Ó╣äÓĖĪÓ╣łÓĖ¬ÓĖ│Ó╣ĆÓĖŻÓ╣ćÓĖł','red');}
};
