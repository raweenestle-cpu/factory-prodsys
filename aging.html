// ── Inline fallback functions (จาก shared.js) ──────────────
function expireBox(expireAt){
  if(!expireAt) return '';
  var ed=new Date(expireAt);
  var now=new Date();
  var rh=(ed-now)/3600000;
  var isExp=rh<0;
  var isCrit=!isExp&&rh<24;
  var isWarn=!isExp&&rh<48;
  var bc=isExp?'#f87171':isCrit?'#f87171':isWarn?'#fb923c':'#34d399';
  var bg=isExp?'#3a1212':isCrit?'#3a1212':isWarn?'#3a2410':'#0d2818';
  var ic=isExp?'❌':isCrit?'⚠️':isWarn?'🟡':'✅';
  var dateStr=ed.toLocaleDateString('th-TH',{weekday:'short',day:'2-digit',month:'short'});
  var timeStr=ed.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var rh2=Math.abs(rh);
  var remStr=isExp?'หมดอายุแล้ว':rh2<1?Math.round(rh2*60)+' นาที':rh2<24?rh2.toFixed(1)+' ชม.':Math.floor(rh2/24)+' วัน '+Math.round(rh2%24)+' ชม.';
  return '<div style="background:'+bg+';border:2px solid '+bc+';border-radius:8px;padding:7px 11px;margin:6px 12px 0;font-family:DM Mono,monospace;box-shadow:0 2px 8px rgba(0,0,0,.3)">'
    +'<div style="font-size:11px;font-weight:900;color:'+bc+'">'+ic+' วันหมดอายุ</div>'
    +'<div style="font-size:15px;font-weight:900;color:#fff;margin-top:3px">'+dateStr+' '+timeStr+'</div>'
    +'<div style="font-size:11px;font-weight:800;color:'+bc+';margin-top:2px">เหลือ '+remStr+'</div>'
    +'</div>';
}
function getMaxTemp(ts){
  if(!ts) return null;
  var vals=[];
  if(ts.max_temp!=null) vals.push(+ts.max_temp);
  if(ts.temps&&typeof ts.temps==='object') Object.values(ts.temps).forEach(function(v){if(v!=null&&!isNaN(+v))vals.push(+v);});
  return vals.length?Math.max.apply(null,vals):null;
}
function tempBox(ts){
  var t=getMaxTemp(ts);
  if(t==null) return '';
  var ok=t<=6,warn=t>6&&t<=8;
  var bc=ok?'#15803d':warn?'#c2410c':'#b91c1c';
  var bg=ok?'rgba(21,128,61,.1)':warn?'rgba(194,65,12,.08)':'rgba(185,28,28,.1)';
  var ic=ok?'🌡️':warn?'⚠️':'🔴';
  return '<div style="display:inline-flex;align-items:center;gap:4px;background:'+bg+';border:1.5px solid '+bc+';border-radius:7px;padding:3px 9px;margin:4px 12px 0;font-family:DM Mono,monospace;font-size:12px;font-weight:900;color:'+bc+'">'+ic+' '+t+'°C</div>';
}
function displayVol(row){
  var v=row&&row.current_vol!=null?+row.current_vol:+(row&&row.volume_liter||0);
  return Math.round(v).toLocaleString()+' L';
}

  'Water Ice':[96,96,96,96,96,96,96,93,81,71,63],
  'Jelly':    [24,24,24,24,24,24,24,24,24,24,24]
};

// expireBox — ใช้จาก shared.js


function getTankCapacity(tid){
  const n=parseInt(tid.replace('T',''));
  if(n>=1&&n<=34) return 3000;
  if(n>=61&&n<=64||n>=71&&n<=74) return 10000;
  if(n>=65&&n<=68||n>=75&&n<=78) return 8000;
  return 5000;
}

// Auth
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='index.html';return;}
  const [ps,ls]=await Promise.all([
    getDocs(collection(db,'products')),
    getDocs(collection(db,'lines'))
  ]);
  ps.docs.forEach(d=>{const p={id:d.id,...d.data()};if(p.mix_code)productMap[p.mix_code]=p;});
  lines=ls.docs.map(d=>({id:d.id,...d.data()}));
  renderAll(); // render ถังทันทีหลัง lines โหลดเสร็จ

  // aging_tank_states — อัปเดต realtime
  let _renderDebounceTimer=null;
  onSnapshot(collection(db,'aging_tank_states'),snap=>{
    tankStates={};
    window.tankStates=tankStates; // เปิดให้เช็คจาก Console ได้ตรงๆ เช่น window.tankStates['T25']
    snap.docs.forEach(d=>{
      const dat={id:d.id,...d.data()};
      if(dat.batch_no)dat.batch_no=String(dat.batch_no).split('/')[0];
      // ── DEBUG: ตามรอย current_vol ที่เปลี่ยนของถังที่กำลัง debug อยู่ ──
      if(window._debugTank&&d.id===window._debugTank){
        const _prev=window._debugLastVol;
        if(_prev!==undefined&&_prev!==dat.current_vol){
          console.warn('[DEBUG '+d.id+'] current_vol เปลี่ยน',_prev,'→',dat.current_vol,'เวลา',new Date().toLocaleTimeString());
        }
        window._debugLastVol=dat.current_vol;
      }
      // ── Event-driven: อุณหภูมิเปลี่ยน, Pasteurize เพิ่งเสร็จ, หรือมีของเข้าถังใหม่ → คำนวณทันที ──
      // ไม่ต้องรอเวลาหรือรออุณหภูมิจริงเลย ใช้ 4°C เป็นค่าตั้งต้นได้ทันที และมีของในถังก็ต้องมีวันหมดอายุเสมอ
      const _oldTemp=tankStates[d.id]?getMaxTemp(tankStates[d.id]):undefined;
      const _oldPastEnd=tankStates[d.id]?tankStates[d.id].past_end_time:undefined;
      const _oldVol=tankStates[d.id]?+(tankStates[d.id].current_vol||0):0;
      const _newTemp=getMaxTemp(dat);
      const _newVol=+(dat.current_vol||0);
      tankStates[d.id]=dat;
      const _tempChanged=_oldTemp!==undefined&&_oldTemp!==_newTemp;
      const _pastEndJustSet=_oldPastEnd!==dat.past_end_time&&!!dat.past_end_time;
      const _volJustAppeared=_oldVol<=0&&_newVol>0;
      if(_tempChanged||_pastEndJustSet||_volJustAppeared){
        _checkCuringForTank(dat);
      }
    });
    // ── debounce การ re-render กริดทั้งหมด — ข้อมูล (tankStates) อัปเดตทันทีเสมอข้างบนนี้
    // แต่การวาด DOM ใหม่ (หนัก เพราะมีหลายสิบถัง) จะรวบทำแค่ครั้งเดียวทุก 800ms
    // แม้จะมี snapshot event เข้ามาถี่ๆ พร้อมกันหลายไลน์ก็ตาม — กันหน้าค้าง/คลิกช้า
    clearTimeout(_renderDebounceTimer);
    _renderDebounceTimer=setTimeout(()=>{
      renderAll();
    },800);
  });
});

// ── คำนวณ curing/expire_at ของถังเดียว — เรียกได้ทั้งแบบ event-driven (ทันทีที่อุณหภูมิเปลี่ยน) และแบบ sweep ทั้งหมด ──
async function _checkCuringForTank(ts){
  const now = Date.now();
  try{
    const _dbg = window._debugTank && ts.id===window._debugTank;
    const _hasMix = +(ts.current_vol||0) > 0 || !!ts.mix_code;

    if(ts.status==='empty'||ts.status==='cip'||ts.status==='san'){
      if(_dbg) console.warn('[_checkCuringForTank]',ts.id,'ข้าม — status เป็น',ts.status);
      return;
    }
    if(!_hasMix){
      if(_dbg) console.warn('[_checkCuringForTank]',ts.id,'ข้าม — ไม่มีของในถังเลย (current_vol=0, ไม่มี mix_code)');
      return;
    }

    // ── หาเวลาเริ่มนับ: ต้องใช้ past_end_time+date จริงเท่านั้น (เวลา Pasteurize เสร็จจริง) ──
    // ห้ามเดา/fallback เป็นอย่างอื่น เพราะวันหมดอายุผิดได้ ผิดไม่ได้เรื่องความปลอดภัยอาหาร
    // ถ้ายังไม่มีค่านี้ (ข้อมูลยังไม่ sync มาจาก pasteurize.html) ก็ต้องรอ ไม่คำนวณมั่วๆ
    if(!ts.past_end_time||!ts.date){
      if(_dbg) console.warn('[_checkCuringForTank]',ts.id,'ข้าม — ยังไม่มี past_end_time/date จริง (รอ sync จาก pasteurize.html)',{past_end_time:ts.past_end_time,date:ts.date});
      return;
    }
    const[h,m]=(ts.past_end_time).split(':').map(Number);
    const base = new Date(ts.date);
    if(isNaN(base.getTime())){
      console.warn('[_checkCuringForTank] ถัง',ts.id,'— ts.date ผิดรูปแบบ:',JSON.stringify(ts.date),'ข้ามถังนี้ไปก่อน');
      return;
    }
    base.setHours(h||0,m||0,0,0);

    const prod = productMap[ts.mix_code||'']||{};
    const agingHr = +(prod.aging_time||4);
    const readyAt = base.getTime() + agingHr*3600000;

    // คำนวณ expire_at จาก SHELF_TABLE
    const maxT = getMaxTemp(ts)??4;
    const pt = (prod.product_type||'').toLowerCase();
    const ptype = pt.includes('water ice')?'Water Ice':pt.includes('jelly')?'Jelly':'Ice Cream';
    const tempIdx = Math.min(Math.max(Math.round(maxT),0),10);
    const shelfHr = (SHELF_TABLE[ptype]||[])[tempIdx]||96;
    const expireAt = new Date(base.getTime()+shelfHr*3600000).toISOString();

    const upd = {expire_at:expireAt, updated_at:new Date().toISOString()};

    let statusChanging=false;
    if(ts.status==='aging' && now >= readyAt){
      upd.status = 'ready';
      statusChanging=true;
    }

    // ── เขียนลง Firestore แค่ตอนค่าจริงเปลี่ยนเท่านั้น (กันเปลืองโควต้า) ──
    const _expireUnchanged = ts.expire_at===expireAt;
    if(_expireUnchanged && !statusChanging){
      if(_dbg) console.warn('[_checkCuringForTank]',ts.id,'ค่าไม่เปลี่ยน — ข้ามการเขียน Firestore รอบนี้');
      return;
    }

    if(_dbg) console.warn('[_checkCuringForTank]',ts.id,'คำนวณสำเร็จ → expire_at:',expireAt,'(เขียนลง Firestore แล้ว)');

    if(ts.past_end_time){
      await setDoc(doc(db,'aging_tank_states',ts.id),upd,{merge:true});
      ts.expire_at=expireAt; // อัปเดต cache ในเครื่องด้วย กันเขียนซ้ำถ้า snapshot ยังไม่ตอบกลับมาทันรอบหน้า
    }
  }catch(e){
    console.warn('[_checkCuringForTank] ถัง',ts.id,'คำนวณพัง:',e.message);
  }
}

// ── sweep ทั้งหมด — เก็บไว้เป็น safety-net เผื่อกรณีครบเวลาบ่มแล้วแต่ไม่มีอะไรมา trigger (ไม่มีการเปลี่ยนอุณหภูมิเลย) ──
// ลดความถี่ลงเพราะตอนนี้ตัวหลักคือ event-driven ตอนอุณหภูมิเปลี่ยนแล้ว (ดู onSnapshot ด้านล่าง)
async function _checkCuringDone(){
  for(const ts of Object.values(tankStates)){
    await _checkCuringForTank(ts);
  }
}

const _LC={'hoyer':{h:'#ea580c',r:'234,88,12'},'glace':{h:'#2563eb',r:'37,99,235'},
  'glacé':{h:'#2563eb',r:'37,99,235'},'scoop':{h:'#16a34a',r:'22,163,74'},
  'extru':{h:'#7c3aed',r:'124,58,237'},'polo 12a':{h:'#0891b2',r:'8,145,178'},
  'polo 12b':{h:'#0e7490',r:'14,116,144'},'comet':{h:'#b45309',r:'180,83,9'},
  'mach':{h:'#be185d',r:'190,24,93'},'sandwich':{h:'#4f46e5',r:'79,70,229'}};
function _glc(name){
  if(!name)return{h:'#6b7280',r:'107,114,128'};
  const k=Object.keys(_LC).find(k=>name.toLowerCase().includes(k));
  return k?_LC[k]:{h:'#0891b2',r:'8,145,178'};
}
function _makeSection(name){
  const lc=_glc(name);
  const d=document.createElement('div');
  d.className='line-group';
  d.style.setProperty('--lc',lc.h);
  d.style.setProperty('--lr',lc.r);
  d.innerHTML='<div class="line-title">🏭 '+name+'<span class="line-badge">LINE</span></div>';
  return d;
}

function renderAll(){renderBangchan();renderTwin();}

function renderBangchan(){
  const el=$('bangchan-grid');el.innerHTML='';
  // group by line — รองรับทั้ง lines ที่มีและไม่มี group field
  // Twin tanks — กรอง Twin ออกจาก BC ทุกจุด
  const twinTanks=TWIN_LINES.flatMap(l=>l.tanks||[]);
  const grpLines=lines.filter(l=>(l.aging_tanks||[]).filter(t=>!twinTanks.includes(t)).length>0)
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
  // แต่ละ group ให้แสดงเฉพาะ BC tanks (ไม่ใช่ Twin)
  const grpLinesCleaned=grpLines.map(l=>({...l,aging_tanks:(l.aging_tanks||[]).filter(t=>!twinTanks.includes(t))}));
  const assigned=grpLinesCleaned.flatMap(l=>l.aging_tanks||[]);
  const unassigned=BC_TANKS.filter(t=>!assigned.includes(t));
  let groups=[];
  if(!grpLines.length){
    // ไม่มี line ไหนกำหนด aging_tanks เลย → แสดง BC ทั้งหมด
    groups=[{name:'Bangchan (ทั้งหมด)',tanks:BC_TANKS}];
  } else {
    // มีบาง line กำหนด aging_tanks → แสดงตาม line + ถังที่เหลือ
    groups=grpLinesCleaned.map(l=>({name:l.name||l.id,tanks:l.aging_tanks||[]}));
    // ถังที่ไม่ได้กำหนดใน line ไหนเลย → แสดงรวมเป็นกลุ่ม Bangchan
    if(unassigned.length>0) groups.push({name:'Bangchan (ที่เหลือ)',tanks:unassigned});
  }

  groups.forEach(g=>{
    const div=_makeSection(g.name);
    const grid=document.createElement('div');grid.className='tank-grid';
    g.tanks.forEach(t=>grid.appendChild(makeTankCard(t)));
    div.appendChild(grid);el.appendChild(div);
  });
}

  const rows2=[[TWIN_LINES[0],TWIN_LINES[1]],[TWIN_LINES[2],TWIN_LINES[3]]];
  rows2.forEach(rowLines=>{
    const rowDiv=document.createElement('div');
    rowDiv.style.cssText='display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap';
    rowLines.forEach(line=>{
      const ld=document.createElement('div');
      const _tlc=_glc(line.name);
      ld.className='line-group';
      ld.style.cssText='flex:1;min-width:300px';
      ld.style.setProperty('--lc',_tlc.h);
      ld.style.setProperty('--lr',_tlc.r);
      ld.innerHTML='<div class="line-title">🏭 '+line.name+'<span class="line-badge">LINE</span></div>';
      const grid=document.createElement('div');grid.style.cssText='display:flex;flex-wrap:wrap;gap:12px';
      line.tanks.forEach(t=>grid.appendChild(makeTankCard(t)));
      ld.appendChild(grid);rowDiv.appendChild(ld);
    });
    el.appendChild(rowDiv);
  });
}

function makeTankCard(tankId){
  const ts=tankStates[tankId]||{};
  const status=ts.status||'empty';
  const isEmpty=status==='empty'||status==='pending';
  const p=productMap[ts.mix_code||'']||{};
  const col=ts.color||p.color||'#3b82f6';
  const totalVol=+(ts.volume_liter||ts.total_vol||0);
  const currentVol=ts.current_vol!=null?+ts.current_vol:0;
  const cap=getTankCapacity(tankId);
  const pct=cap>0?Math.min(100,(currentVol/cap)*100):0;
  const pctC=pct>50?'#15803d':pct>20?'#b45309':'#b91c1c';
  const stMap={empty:'○ ว่าง',pending:'⏳ รอ',cip:'🧹 กำลัง CIP',cip_done:'🧼 CIP เสร็จ',san_done:'✨ พร้อม Past',pasteurising:'⏳ รอ Pasteurize',past_done:'✅ Past Done',aging:'🌡️ กำลังบ่ม',filling:'🔵 Filling',ready:'✅ พร้อม'};
  const stColor=status==='empty'?'#6b7280':status==='pending'?'#94a3b8':status==='cip'?'#7c3aed':status==='cip_done'?'#0891b2':status==='san_done'?'#059669':status==='pasteurising'?'#2563eb':status==='aging'?'#0e7490':status==='past_done'?'#15803d':status==='filling'?'#ea580c':status==='ready'?'#22c55e':'#374151';
  const stLabel=stMap[status]||status;
  const yr=new Date().getFullYear().toString().slice(-2);
  const _prodPrefix=yr+'0522'+(ts._col==='production_plans_m2'?'2':'1');
  const prodCode=ts.prod_code||(_prodPrefix+(ts.prod_suffix||'····'));
  const expHtml=expireBox(ts.expire_at||null);
  const maxTempVal=getMaxTemp(ts);
  const uid='ag'+tankId.replace(/[^a-z0-9]/gi,'');
  const svgHtml=typeof tankSVG==='function'?tankSVG(uid,pct,col,!isEmpty,stLabel,stColor,null,null,currentVol,null,ts.qc_status):'';

  // ── นับถอยหลังเวลาบ่ม (ถ้าสถานะ aging) ──
  let countdownMs=null;
  if(status==='aging'&&ts.past_end_time&&ts.date){
    const agingHr=+(p.aging_time||4);
    const[ch,cm]=ts.past_end_time.split(':').map(Number);
    const base=new Date(ts.date);
    if(!isNaN(base.getTime())){
      base.setHours(ch||0,cm||0,0,0);
      countdownMs=(base.getTime()+agingHr*3600000)-Date.now();
    }
  }
  const countdownId='cd-'+uid;

  const div=document.createElement('div');
  div.className='tc'+(status==='filling'||status==='past_done'?' active':status==='aging'?' curing':status==='empty'?' empty':'');
  div.style.position='relative';
  div.style.overflow='hidden';

  const header=
    '<div style="padding:12px 14px 10px;border-bottom:1.5px solid #3d4d75">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">'
    +'<span style="font-family:var(--mono);font-size:19px;font-weight:900;color:#f0b429;text-shadow:0 0 10px rgba(240,180,41,.25)">'+tankId+'</span>'
    +'<span style="font-family:var(--mono);font-size:11px;color:#9fb0d1">'+cap.toLocaleString()+' L</span>'
    +'</div>'
    +'<div style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;margin-bottom:6px;background:'+stColor+';color:#000;border:1.5px solid '+stColor+'">'
      +stLabel
      +(countdownMs!=null?(' <span id="'+countdownId+'" data-ready-ts="'+(Date.now()+Math.max(0,countdownMs))+'" style="font-family:var(--mono)">'+fmtCountdown(countdownMs)+'</span>'):'')
    +'</div>'
    +(ts.mix_code||ts.mix_name||ts.batch_no?(
      '<div style="font-family:var(--mono);font-size:13px;font-weight:900;color:#f8fafc;line-height:1.4">'
      +(ts.mix_code?ts.mix_code+' ':'')
      +(ts.mix_name||p.name||'')
      +(ts.batch_no?' <span style="color:#9fb0d1;font-weight:700">(Batch '+ts.batch_no+')</span>':'')
      +'</div>'
    ):'')
    +((ts.mix_code||ts.prod_code)?('<div style="font-family:var(--mono);font-size:11px;color:#9fb0d1;margin-top:4px;font-weight:700">รหัสผลิต : <span style="color:#f8fafc">'+prodCode+'</span></div>'):'')
    +'</div>';


  const footer=expHtml;

  div.innerHTML=header+footer;
  if(svgHtml){
    const _bodyDiv=document.createElement('div');
    _bodyDiv.style.cssText='display:flex;justify-content:flex-start;align-items:center;padding:8px 60px 8px 8px;position:relative';
    _bodyDiv.innerHTML=svgHtml;
    // ── โพรบวัดอุณหภูมิ — เส้นชี้ออกจากถังด้านขวากลาง แบบ SCADA ──
    if(maxTempVal!=null){
      const tOk=maxTempVal<=6,tWarn=maxTempVal>6&&maxTempVal<=8;
      const tBorder=tOk?'#34d399':tWarn?'#f0b429':'#f87171';
      const tBg=tOk?'#0d2818':tWarn?'#3a2f0a':'#3a1212';
      const tIcon=tOk?'🌡️':tWarn?'⚠️':'🔴';
      const probe=document.createElement('div');
      probe.style.cssText='position:absolute;left:154px;top:50%;display:flex;align-items:center;pointer-events:none';
      probe.innerHTML=
        '<div style="width:12px;height:2px;background:'+tBorder+'"></div>'
        +'<div style="background:'+tBg+';border:1.5px solid '+tBorder+';border-radius:6px;padding:3px 7px;font-family:var(--mono);font-size:12px;font-weight:900;color:'+tBorder+';white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4)">'+tIcon+' '+maxTempVal+'°C</div>';
      _bodyDiv.appendChild(probe);
    }
    const _footerEl=div.children[1]||null;
    if(_footerEl) div.insertBefore(_bodyDiv,_footerEl);
    else div.appendChild(_bodyDiv);
  }
  div.onclick=()=>openModal(tankId);
  return div;
}

// ── format ms → "HH:MM:SS" หรือ "MM:SS" สำหรับนับถอยหลังเวลาบ่ม ──
function fmtCountdown(ms){
  if(ms==null) return '--:--';
  const m=Math.max(0,ms);
  const totalSec=Math.floor(m/1000);
  const hh=Math.floor(totalSec/3600);
  const mm=Math.floor((totalSec%3600)/60);
  const ss=totalSec%60;
  return hh>0
    ?String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')
    :String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}
// ── tick นับถอยหลังทุก 1 วิ โดยไม่ re-render กริดทั้งหมด (เบา ไม่กระทบ performance) ──
setInterval(()=>{
  document.querySelectorAll('[id^="cd-"][data-ready-ts]').forEach(el=>{
    const readyTs=+el.dataset.readyTs;
    const remain=readyTs-Date.now();
    el.textContent=remain<=0?'00:00':fmtCountdown(remain);
  });
},1000);

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-Math.round(a*255)),g=Math.max(0,parseInt(h.slice(3,5),16)-Math.round(a*255)),b=Math.max(0,parseInt(h.slice(5,7),16)-Math.round(a*255));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}

function autoTextColor(hex){
  if(!hex||hex[0]!=='#') return '#111827';
  var r=parseInt(hex.slice(1,3),16)||0;
  var g=parseInt(hex.slice(3,5),16)||0;
  var b=parseInt(hex.slice(5,7),16)||0;
  return (0.299*r+0.587*g+0.114*b)>160?'#111827':'#ffffff';
}

function tankSVG(uid,pct,col,run,statusTxt,statusCol,sw,sh,vol,temp,qcStatus){
  statusCol=statusCol||col;
  sw=sw||160; sh=sh||280;
  const bX=14,bY=18,bW=sw-28,bH=sh-45;
  const nW=24,nH=10,cW=34,cH=6;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(pct/100)*maxFillH);
  const wy=bY+bH-fillH;
  const A=6,midY=bY+bH/2;
  const hasLiq=pct>0;
  const bodyFill=hasLiq?'rgba(255,255,255,.12)':'rgba(176,186,200,.25)';
  const bodyStroke=hasLiq?col:'#94a3b8';
  const gid='g'+uid,cid='cl'+uid;
  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);
  function waveD(yBase,amp,nc){
    const W=bW*2,segW=W/(nc*2);
    let d='M'+bX+','+yBase;
    for(let i=0;i<nc*2;i++){
      const x1=bX+i*segW,x2=bX+(i+1)*segW;
      const cy=i%2===0?yBase-amp:yBase+amp;
      d+=' C'+(x1+segW*.4)+','+cy+' '+(x2-segW*.4)+','+cy+' '+x2+','+yBase;
    }
    return d+' L'+(bX+W)+','+(bY+bH)+' L'+bX+','+(bY+bH)+' Z';
  }
  let s='';
  s+='<svg width="'+sw+'" height="'+sh+'" viewBox="0 0 '+sw+' '+sh+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<defs>';
  s+='<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">';
  s+='<stop offset="0%" stop-color="'+col+'" stop-opacity=".5"/>';
  s+='<stop offset="100%" stop-color="'+col+'" stop-opacity=".85"/>';
  s+='</linearGradient>';
  s+='<clipPath id="'+cid+'"><rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12"/></clipPath>';
  s+='</defs>';
  // motor/neck
  s+='<rect x="'+nX+'" y="'+(bY-nH)+'" width="'+nW+'" height="'+(nH+5)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".6"/>';
  s+='<rect x="'+cX+'" y="'+(bY-nH-cH)+'" width="'+cW+'" height="'+(cH+3)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".5"/>';
  if(hasLiq) s+='<circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="#22c55e" opacity=".9"/><circle cx="'+(sw/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0"><animate attributeName="r" from="4" to="10" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/></circle>';
  // body
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity="'+(hasLiq?'.4':'.6')+'"/>';
  // fill + wave
  if(hasLiq){
    s+='<g clip-path="url(#'+cid+')">';
    s+='<rect x="'+bX+'" y="'+(wy+A)+'" width="'+(bW*2)+'" height="'+(bY+bH-(wy+A))+'" fill="url(#'+gid+')"/>';
    s+='<path d="'+waveD(wy,A,3)+'" fill="'+col+'" fill-opacity=".55" style="animation:wv1 2.8s linear infinite"/>';
    s+='<path d="'+waveD(wy,A*.6,4)+'" fill="'+col+'" fill-opacity=".3" style="animation:wv2 4s linear infinite"/>';
    s+='<ellipse cx="'+(bX+bW*.35)+'" cy="'+(wy-2)+'" rx="'+(bW*.12)+'" ry="2.5" fill="white" fill-opacity=".3"/>';
    s+='</g>';
  }
  // border overlay
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="none" stroke="'+bodyStroke+'" stroke-width="2.5" stroke-opacity="'+(hasLiq?'.8':'.6')+'"/>';
  // ขาถัง
  s+='<rect x="'+(bX+8)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+bW-16)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+3)+'" y="'+(bY+bH+13)+'" width="'+(bW-6)+'" height="5" rx="2" fill="rgba(255,255,255,.12)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".5"/>';
  // text — โชว์ปริมาตรจริง (ลิตร) ตัวใหญ่ชัดเจน แทนเปอร์เซ็นต์
  const tc=hasLiq?'#ffffff':'#9fb0d1';
  const volText=hasLiq?(vol!=null?Math.round(vol).toLocaleString()+' L':Math.round(pct)+'%'):'ว่าง';
  s+='<text x="'+(sw/2)+'" y="'+midY+'" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="'+tc+'" font-weight="900" style="text-shadow:0 1px 4px rgba(0,0,0,.5)">'+volText+'</text>';
  // ── ป้ายผลตรวจ QC — กรอบสีตามสถานะ อยู่บนของเหลวในถัง ใต้เลขปริมาตร ──
  if(hasLiq && qcStatus && (qcStatus==='passed'||qcStatus==='release'||qcStatus==='hold'||qcStatus==='failed')){
    const _qcTxt=qcStatus==='passed'?'PASSED':qcStatus==='release'?'RELEASE':qcStatus==='hold'?'HOLD':'FAILED';
    const _qcColor=qcStatus==='hold'?'#f59e0b':qcStatus==='failed'?'#ef4444':'#22c55e';
    const _qcW=_qcTxt.length*9+22;
    const _qcX=(sw-_qcW)/2,_qcY=midY+14;
    s+='<rect x="'+_qcX+'" y="'+_qcY+'" width="'+_qcW+'" height="22" rx="5" fill="none" stroke="'+_qcColor+'" stroke-width="2"/>';
    s+='<text x="'+(sw/2)+'" y="'+(_qcY+15)+'" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="900" letter-spacing="2" fill="'+_qcColor+'">'+_qcTxt+'</text>';
  }
  s+='</svg>';
  return s;
}

function hexAlpha(hex,a){
  if(!hex||hex.startsWith('var(')) return'rgba(100,116,139,'+a+')';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+a+')';
}

function statusLabel(s){
  return{pasteurising:'🔵 Pasteurizing',filling:'🟢 Filling',ready:'✅ Ready',
    curing:'🟠 Curing',aging:'⏳ Aging',cip_done:'🧹 CIP Done',
    san_done:'✨ พร้อม Past',empty:'⚪ Empty',past_done:'✅ Done'}[s]||s||'—';
}

function renderStageRing(status,isEmpty){
  const cur=STATUS_STAGE[status]??-1;
  let html='<div class="stage-ring">';
  STAGES.forEach((s,i)=>{
    const isDone=!isEmpty&&cur>=0&&i<cur;
    const isActive=!isEmpty&&i===cur;
    html+='<div class="sd '+(isDone?'done':'')+(isActive?' active':'')+'" title="'+s+'"></div>';
    if(i<STAGES.length-1) html+='<div class="sl '+(isDone||isActive?'done':'')+'"></div>';
  });
  return html+'</div>';
}

// EXPIRY
function calcExpiry(row,tankId){
  if(!row?.past_end_time||!row?.date) return null;
  const temp=getMaxTemp(tankStates[tankId])??4;
  const prod=productMap[row.mix_code||'']||{};
  const pt=(prod.product_type||'').toLowerCase();
  const type=pt.includes('water ice')?'Water Ice':pt.includes('jelly')?'Jelly':'Ice Cream';
  const hours=SHELF_TABLE[type]?.[temp]||null;
  if(!hours) return null;
  const[h,m]=row.past_end_time.split(':').map(Number);
  const base=new Date(row.date);base.setHours(h||0,m||0,0,0);
  const expire=new Date(base.getTime()+hours*3600000);
  const now=new Date();const rem=(expire-now)/3600000;
  return{
    date:expire.toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'}),
    time:expire.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
    hours,isExpired:rem<=0,isCritical:rem>0&&rem<=6,isWarning:rem>6&&rem<=12
  };
}

function getAlertClass(exp){
  if(!exp) return'';
  if(exp.isExpired) return'warn-exp';
  if(exp.isCritical) return'warn-crit';
  if(exp.isWarning) return'warn-soon';
  return'';
}

// ── MODAL ─────────────────────────────────────────────────────────────
window.openModal=(tankId)=>{
  selectedTank=tankId;
  $('modal-title').textContent='ถัง '+tankId;
  const ts=tankStates[tankId]||{};
  const curStatus=ts.status||'empty';
  $('modal-info').textContent='Status: '+statusLabel(curStatus);
  $('modal-vol').value=ts.current_vol||'';
  document.querySelectorAll('.stat-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.status===curStatus);
  });
  $('tank-modal').classList.add('show');
};
window.closeModal=()=>{$('tank-modal').classList.remove('show');selectedTank=null;};

// ── หยุด Filling loop ของ cipman.html ที่ชี้มาที่ถังนี้ ──
// ป้องกันปัญหา: แก้ vol/status จาก aging.html แล้วถูก cipman.html เขียนทับกลับภายใน 15 วิ
// เพราะ loop ยังคิดว่า filling กำลังทำงานอยู่ (running:true) ชี้มาที่ถังนี้
async function _stopFillingForTank(tankId){
  if(!tankId)return;
  try{
    const _snap=await getDocs(query(collection(db,'cip_line_states'),where('aging_tank','==',tankId)));
    console.log('[_stopFillingForTank]',tankId,'matched docs:',_snap.docs.length,_snap.docs.map(d=>({id:d.id,...d.data()})));
    let _stoppedAny=false;
    for(const _d of _snap.docs){
      const _data=_d.data();
      if(_data.running){
        await setDoc(doc(db,'cip_line_states',_d.id),{
          running:false,start_ts:null,start_vol:0,current_vol:0,aging_tank:'',
          updated_at:new Date().toISOString()
        },{merge:true});
        _stoppedAny=true;
      }
    }
    if(_snap.docs.length===0){
      console.warn('[_stopFillingForTank] ไม่เจอ cip_line_states ที่ aging_tank===',tankId,'— เช็ค field/casing');
    } else if(!_stoppedAny){
      console.log('[_stopFillingForTank] เจอ doc แต่ไม่มีอันไหน running:true อยู่แล้ว');
    } else {
      console.log('[_stopFillingForTank] หยุด filling สำเร็จสำหรับ',tankId);
    }
  }catch(e){console.warn('_stopFillingForTank error:',e);}
}
window.setTankStatus=async(status)=>{
  if(!selectedTank)return;
  const isReset=status==='empty';
  const upd=isReset?{
      status:'empty',current_vol:0,
      mix_code:'',mix_name:'',batch_no:'',product_code:'',prod_suffix:'',
      date:'',past_start_time:'',past_end_time:'',
      volume_liter:0,process_order:'',temps:{},max_temp:null,expire_at:'',shelf_hr:'',qc_status:'',qc_passed:false,
      last_mix_code:'',last_mix_name:'',
      next_mix_code:'',next_mix_name:'',next_vol:0,
      sig_start_cip:'',sig_start_cip_name:'',
      sig_stop_cip:'',sig_stop_cip_name:'',
      sig_start_san:'',sig_start_san_name:'',
      sig_stop_san:'',sig_stop_san_name:'',
      pending_acid:false,
      updated_at:new Date().toISOString()
    }
    :{status,updated_at:new Date().toISOString()};
  try{
    await _stopFillingForTank(selectedTank);
    await setDoc(doc(db,'aging_tank_states',selectedTank),upd,{merge:true}); // merge:true ทุกกรณี — เก็บ cip_group ไว้เสมอ
    if(isReset){
      // ปิด production_plans ของถังนี้ไปด้วย กันถูกเขียนทับกลับจาก auto-stamp loop (เหตุผลเดียวกับ clearTank)
      for(const _col of['production_plans','production_plans_m2']){
        try{
          const _snap=await getDocs(query(collection(db,_col),where('aging_tank','==',selectedTank)));
          for(const _d of _snap.docs){
            if(_d.data().status&&_d.data().status!=='sent_filling'){
              await setDoc(doc(db,_col,_d.id),{status:'sent_filling',updated_at:new Date().toISOString()},{merge:true});
            }
          }
        }catch(e){console.warn('setTankStatus: ปิด',_col,'ไม่สำเร็จ:',e);}
      }
    }
    toast(statusLabel(status),'green');
    closeModal();
  }catch(e){toast('ไม่สำเร็จ','red');}
};
window.saveCurrentVol=async()=>{
  if(!selectedTank)return;
  const vol=+($('modal-vol').value||0);
  try{
    await _stopFillingForTank(selectedTank);
    await setDoc(doc(db,'aging_tank_states',selectedTank),{current_vol:vol,updated_at:new Date().toISOString()},{merge:true});
    toast('บันทึก Vol '+vol+' L','green');closeModal();
  }catch(e){toast('ไม่สำเร็จ','red');}
};
window.clearTank=async()=>{
  if(!selectedTank||!confirm('เคลียร์ถัง '+selectedTank+'?'))return;
  try{
    await _stopFillingForTank(selectedTank);
    await setDoc(doc(db,'aging_tank_states',selectedTank),{
      status:'empty',current_vol:0,
      mix_code:'',mix_name:'',batch_no:'',product_code:'',prod_suffix:'',
      date:'',past_start_time:'',past_end_time:'',
      volume_liter:0,process_order:'',temps:{},max_temp:null,expire_at:'',shelf_hr:'',qc_status:'',qc_passed:false,
      last_mix_code:'',last_mix_name:'',
      next_mix_code:'',next_mix_name:'',next_vol:0,
      sig_start_cip:'',sig_start_cip_name:'',
      sig_stop_cip:'',sig_stop_cip_name:'',
      sig_start_san:'',sig_start_san_name:'',
      sig_stop_san:'',sig_stop_san_name:'',
      pending_acid:false,
      updated_at:new Date().toISOString()
    },{merge:true}); // merge:true เก็บ cip_group ไว้ (เป็นการตั้งค่าโครงสร้างถัง ไม่ใช่ข้อมูล batch)
    // ── ปิด production_plans/production_plans_m2 ของถังนี้ไปด้วยในคลิกเดียว ──
    // เดิมเคลียร์แค่ aging_tank_states แต่ไม่แตะ production_plans เลย ถ้า row ยังมี
    // status='pasteurising' ค้างอยู่ หน้า pasteurize.html (ถ้าเปิดอยู่ที่ไหนก็ตาม) จะมี
    // auto-stamp loop เขียน current_vol กลับเข้า aging_tank_states ใหม่ทุก 15 วินาที
    // ทำให้เคลียร์ไปแล้ว "เด้งกลับมา" เหมือนไม่หาย — แก้โดยปิด row ที่ค้างไปด้วยเลย
    let _closedCount=0;
    for(const _col of['production_plans','production_plans_m2']){
      try{
        const _snap=await getDocs(query(collection(db,_col),where('aging_tank','==',selectedTank)));
        console.log('[clearTank]',_col,'matched docs:',_snap.docs.length,_snap.docs.map(d=>({id:d.id,status:d.data().status,aging_tank:d.data().aging_tank})));
        for(const _d of _snap.docs){
          const _data=_d.data();
          if(_data.status&&_data.status!=='sent_filling'){
            await setDoc(doc(db,_col,_d.id),{status:'sent_filling',updated_at:new Date().toISOString()},{merge:true});
            _closedCount++;
          }
        }
      }catch(e){console.warn('clearTank: ปิด',_col,'ไม่สำเร็จ:',e);}
    }
    toast('เคลียร์ถัง '+selectedTank+' แล้ว'+(_closedCount?' (ปิดงานค้าง '+_closedCount+' รายการด้วย)':''),'green');
    closeModal();
  }catch(e){toast('ไม่สำเร็จ','red');}
};

window.showTab=(tab,btn)=>{
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  $('page-'+tab).classList.add('on');
};

window.setTankTemp=(tid,t)=>{tankTemps[tid]=+t;renderAll();};
