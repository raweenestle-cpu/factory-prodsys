<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Filling — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--s1:#0b0e17;--s2:#10141f;--s3:#151a28;--b1:#1c2235;--b2:#242e48;
  --text:#e4eaf8;--t2:#5e6e90;--t3:#2a3450;
  --blue:#3b7ef6;--blue2:#7ab3ff;--green:#1fd17a;--yellow:#f5c842;
  --red:#f04f5e;--cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;
  background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 16px;gap:10px}
.nav-logo{font-family:var(--mono);font-size:15px;font-weight:700}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.nav-r{display:flex;gap:8px;margin-left:auto}
.nbtn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);
  background:none;color:var(--t2);cursor:pointer;text-decoration:none;font-family:var(--mono)}

main{padding:16px;display:flex;flex-direction:column;gap:16px}

/* LINE SECTION */
.ls{border:2px solid rgba(255,140,66,.4);border-radius:16px;background:rgba(255,140,66,.03);overflow:hidden}
.ls-title{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--orange);
  letter-spacing:.05em;padding:14px 18px 10px;border-bottom:1px solid rgba(255,140,66,.15)}

/* PROD ROW */
.pr{display:flex;gap:0;align-items:flex-start;overflow-x:auto}

/* LEFT SECTION — กำลังผลิต */
.cur-wrap{flex-shrink:0;border-right:1px solid rgba(255,140,66,.2);background:rgba(255,140,66,.05);padding:12px 14px}
.cur-header{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--orange);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cur-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.2s infinite}

/* RIGHT SECTION — คิวถัดไป */
.que-wrap{flex:1;padding:12px 14px;background:rgba(0,0,0,.1)}
.que-header{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--t2);
  text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.que-dot{width:8px;height:8px;border-radius:50%;background:var(--t3)}
.que-inner{display:flex;gap:10px;flex-wrap:wrap;align-content:flex-start}

/* CARDS */
.tc{border-radius:12px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column}
.tc.cur{width:185px;background:var(--s1);border:1.5px solid rgba(255,140,66,.5);box-shadow:0 0 16px rgba(255,140,66,.1)}
.tc.que{width:185px;background:var(--s2);border:1px solid var(--b1)}

/* CARD HEAD */
.ch{padding:10px 12px 6px}
.ch-topline{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ch-linename{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--cyan)}
.ch-prodname{font-size:12px;font-weight:700;color:var(--text)}
.ch-sep{color:var(--t3);font-size:11px}
.ch-code{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--orange)}
.ch-name{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-batch{font-family:var(--mono);font-size:11px;color:var(--t3)}
.ch-prod{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.08em;margin-top:3px}

/* AGING BADGE */
.ab{font-family:var(--mono);font-size:13px;font-weight:700;background:rgba(0,212,255,.1);color:var(--cyan);
  border:1px solid rgba(0,212,255,.3);border-radius:8px;text-align:center;margin:0 10px 6px;padding:4px}

/* SVG WRAP */
.sw{position:relative;margin:0 8px 4px}
.sw svg{display:block;width:100%;height:auto}
.so{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:90%}
.sv{font-family:var(--mono);font-size:13px;font-weight:700;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.95);line-height:1.3}
.sp{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.9);text-shadow:0 1px 6px rgba(0,0,0,.9);line-height:1.3}

/* STATUS */
.stat-in{text-align:center;padding:0 8px 8px}
.sbadge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;display:inline-block}

.no-queue{font-family:var(--mono);font-size:12px;color:var(--t3);padding:30px;text-align:center}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 22px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;
  z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.6}100%{transform:translateY(-35px);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ FILLING</span></div>
  <div class="nav-r">
    <a href="index.html" class="nbtn">🏠 Home</a>
    <button class="nbtn" onclick="doLogout()">ออก</button>
  </div>
</nav>
<main id="mg"><div style="text-align:center;padding:80px;color:var(--t3);font-family:var(--mono)">⏳ กำลังโหลด...</div></main>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,onSnapshot,getDocs,doc,getDoc}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const auth=getAuth(app),db=getFirestore(app);
let lineNames=[],lineMap={},lineStates={},planRows=[],productMap={};
let tickTimer,u1,u2,u3,u4;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const fmtL=n=>Math.round(n).toLocaleString()+' L';
const fmtPct=n=>n.toFixed(1)+'%';

function toast(msg,t='blue'){const el=$('toast');el.textContent=msg;el.style.background=t==='green'?'#0d7a3e':t==='red'?'#8b1a24':'#1a3d8b';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,f){return'#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-Math.round(f*180)).toString(16).padStart(2,'0')).join('');}

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  try{const ps=await getDocs(collection(db,'products'));ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});}catch{}
  await init();
});
window.doLogout=async()=>{clearInterval(tickTimer);[u1,u2,u3,u4].forEach(u=>u&&u());await signOut(auth);location.href='index.html';};

async function init(){
  u1=onSnapshot(collection(db,'lines'),snap=>{
    // Deduplicate lines by name
    const seen=new Set();
    lineNames=[];lineMap={};
    snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(l=>l.type==='Filling')
      .sort((a,b)=>(a.seq||0)-(b.seq||0))
      .forEach(l=>{
        if(!seen.has(l.name)){seen.add(l.name);lineNames.push(l.name);lineMap[l.name]=l;}
      });
    renderAll();
  });
  u2=onSnapshot(collection(db,'cip_line_states'),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={id:d.id,...d.data()};});renderAll();
  });
  const d=today();
  u3=onSnapshot(query(collection(db,'production_plans'),where('date','==',d)),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans').concat(r);renderAll();
  });
  u4=onSnapshot(query(collection(db,'production_plans_m2'),where('date','==',d)),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans_m2',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans_m2').concat(r);renderAll();
  });
  tickTimer=setInterval(tick,1000);
}

function getTanks(lineName){
  return planRows
    .filter(r=>r.filling_line===lineName&&(r.status==='ready'||r.status==='past_done'||r.status==='pasteurising'))
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
}

function getLineState(lineName){
  const l=lineMap[lineName];if(!l)return{};
  return lineStates[l.id]||{};
}

function calcVol(row,st){
  const sv=st.start_vol||+(row.volume_liter||0);
  const isRun=st.running&&!!st.start_ts;
  const elapsed=isRun?(Date.now()-st.start_ts)/3600000:0;
  const fr=st.flow_rate||300;
  const rem=isRun?Math.max(0,sv-(elapsed*fr)):+(row.volume_liter||0);
  const pct=sv>0?(rem/sv)*100:100;
  return{rem,pct,isRun,sv,fr};
}

function tankSVG(uid,pct,col,run,w,h){
  const bX=10,bY=18,bW=w-20,bH=h-40,nW=32,nH=8,cW=40,cH=5;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const fillH=Math.max(0,(pct/100)*(bH-6));
  const fillY=bY+bH-3-fillH;
  const gid='g'+uid,cid='c'+uid;
  const bc=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity=".95"/>
    <stop offset="100%" stop-color="${darken(col,.3)}" stop-opacity="1"/>
  </linearGradient>
  <clipPath id="${cid}"><rect x="${bX+1}" y="${bY+1}" width="${bW-2}" height="${bH-2}" rx="7"/></clipPath>
</defs>
<rect x="${bX+1}" y="${bY+3}" width="${bW}" height="${bH}" rx="9" fill="rgba(0,0,0,.6)"/>
<rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="#070b15" stroke="#1e2d4a" stroke-width="1.5"/>
${pct>0?`<g clip-path="url(#${cid})">
  <rect x="${bX+1}" y="${fillY}" width="${bW-2}" height="${fillH+5}" fill="url(#${gid})"/>
  ${run?`<g style="animation:wave 2.2s linear infinite">
    <path d="M${bX-6},${fillY+1} q7,-4 14,0 q7,4 14,0 q7,-4 14,0 q7,4 14,0 q7,-4 14,0 q7,4 14,0 q7,-4 14,0 q7,4 14,0 v12 h-${bW*5} z" fill="${rgba(col,.45)}"/>
  </g>
  <circle cx="${bX+18}" cy="${fillY+fillH*.35}" r="2.2" fill="${rgba(col,.5)}" style="animation:rise 2.5s ease-in infinite"/>
  <circle cx="${bX+bW*.65}" cy="${fillY+fillH*.55}" r="1.8" fill="${rgba(col,.4)}" style="animation:rise 2s ease-in infinite;animation-delay:.7s"/>
  `:`<rect x="${bX+1}" y="${fillY}" width="${bW-2}" height="3" rx="1.5" fill="${rgba(col,.5)}"/>`}
  <rect x="${bX+2}" y="${fillY+3}" width="8" height="${Math.max(0,fillH*.35)}" rx="4" fill="rgba(255,255,255,.07)"/>
</g>
<line x1="${bX+bW+2}" y1="${fillY}" x2="${bX+bW+9}" y2="${fillY}" stroke="${bc}" stroke-width="2" stroke-linecap="round"/>`:''}
<rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="none" stroke="${pct>0?rgba(col,.35):'#1e2d4a'}" stroke-width="1.5"/>
<rect x="${bX+1}" y="${bY+1}" width="8" height="${bH-2}" rx="4" fill="rgba(255,255,255,.025)"/>
<rect x="${nX}" y="${bY-nH}" width="${nW}" height="${nH+3}" rx="3" fill="#070b15" stroke="#1e2d4a" stroke-width="1.2"/>
<rect x="${cX}" y="${bY-nH-cH}" width="${cW}" height="${cH+2}" rx="3" fill="#0a0e1a" stroke="#1e2d4a" stroke-width="1.2"/>
<rect x="${bX+8}" y="${bY+bH}" width="7" height="9" rx="2" fill="#070b15" stroke="#1e2d4a" stroke-width="1.2"/>
<rect x="${bX+bW-15}" y="${bY+bH}" width="7" height="9" rx="2" fill="#070b15" stroke="#1e2d4a" stroke-width="1.2"/>
<rect x="${bX+3}" y="${bY+bH+8}" width="${bW-6}" height="3" rx="1.5" fill="#070b15" stroke="#1e2d4a" stroke-width="1.2"/>
</svg>`;
}

function card(row,isCur,qNo){
  const p=productMap[row.mix_code]||{};
  const col=p.color||'#60a5fa';
  const st=getLineState(row.filling_line);
  const{rem,pct,isRun}=calcVol(row,st);
  const pctC=pct>50?'var(--green)':pct>20?'var(--yellow)':'var(--red)';

  let statTxt='—',statC='var(--t2)';
  if(row.status==='pasteurising'){statTxt='♨️ กำลัง Past.';statC='var(--orange)';}
  else if(row.status==='past_done'){statTxt='⏳ กำลังบ่ม';statC='var(--yellow)';}
  else if(row.status==='ready'){statTxt=isRun?'▶ กำลังผลิต':'✅ พร้อมส่ง';statC=isRun?'var(--green)':'var(--cyan)';}

  const agingTank=st.aging_tank||row.aging_tank||'—';
  const fz=st.fz_A||'—';
  const pp=st.pp_A||'—';
  const prodCode=row.prod_suffix&&row.prod_prefix?(row.prod_prefix+row.prod_suffix):row.prod_suffix?row.prod_suffix:row.prod_prefix?row.prod_prefix:'—';
  const prodName=row.product_name||'—';
  const uid=(isCur?'C':'Q')+row.id.slice(-8);
  const sw=160,sh=150;

  return`<div class="tc ${isCur?'cur':'que'}">
  <div class="ch">
    <div class="ch-topline">
      <span class="ch-linename">${row.filling_line||'—'}</span>
      <span class="ch-sep">·</span>
      <span class="ch-prodname">${prodName}</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:3px">
      <span class="ch-code">${row.mix_code||'—'}</span>
      <span style="color:var(--t3);font-size:10px">|</span>
      <span class="ch-name">${row.mix_name||'—'}</span>
    </div>
    <div class="ch-batch">Batch ${row.batch_no||'—'}</div>
    <div class="ch-prod">${prodCode}</div>

  </div>
  <div class="ab">${agingTank}</div>
  <div class="sw" id="sw-${uid}">
    ${tankSVG(uid,pct,col,isRun,sw,sh)}
    <div class="so">
      <div class="sv" id="vol-${uid}" style="color:${pctC}">${fmtL(rem)}</div>
      <div class="sp" id="pct-${uid}" style="color:${pctC}">${fmtPct(pct)}</div>
    </div>
  </div>
  <div class="stat-in">
    <span class="sbadge" style="color:${statC};background:${statC}22;border:1px solid ${statC}44">${statTxt}</span>
  </div>
</div>`;
}

function renderAll(){
  if(!lineNames.length)return;
  let html='';
  lineNames.forEach(name=>{
    const tanks=getTanks(name);
    html+=`<div class="ls"><div class="ls-title">${name.toUpperCase()}</div>`;
    if(!tanks.length){
      html+=`<div class="no-queue">ไม่มี batch ที่พร้อมผลิต</div>`;
    } else {
      const current=tanks[0];
      const queue=tanks.slice(1);
      html+=`<div class="pr">
        <div class="cur-wrap">
          <div class="cur-header"><span class="cur-dot"></span>กำลังผลิตอยู่</div>
          ${card(current,true,0)}
        </div>
        <div class="que-wrap">
          <div class="que-header"><span class="que-dot"></span>คิวรอผลิตถัดไป</div>
          <div class="que-inner">`;
      if(queue.length){
        queue.forEach((t,i)=>html+=card(t,false,i+2));
      } else {
        html+=`<div class="no-queue">ไม่มีคิวถัดไป</div>`;
      }
      html+=`</div></div></div>`;
    }
    html+=`</div>`;
  });
  $('mg').innerHTML=html||'<div style="padding:60px;text-align:center;color:var(--t3);font-family:var(--mono)">ยังไม่มี LINE</div>';
}

function tick(){
  lineNames.forEach(name=>{
    const tanks=getTanks(name);
    if(!tanks.length)return;
    const row=tanks[0];
    const st=getLineState(name);
    const{rem,pct,isRun}=calcVol(row,st);
    if(!isRun)return;
    const pctC=pct>50?'var(--green)':pct>20?'var(--yellow)':'var(--red)';
    const uid='C'+row.id.slice(-8);
    const vEl=$('vol-'+uid),pEl=$('pct-'+uid);
    if(vEl){vEl.textContent=fmtL(rem);vEl.style.color=pctC;}
    if(pEl){pEl.textContent=fmtPct(pct);pEl.style.color=pctC;}
  });
}
</script>
</body>
</html>
