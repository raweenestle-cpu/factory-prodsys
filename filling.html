<script type="module">



import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"; import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; import{getFirestore,collection,query,where,onSnapshot,getDocs,doc} from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {resolveStatus,statusLabel,statusColor,statusBlink,statusBadge} from "./shared.js";
const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const auth=getAuth(app),db=getFirestore(app);
let lineNames=[],lineMap={},lineStates={},planRows=[],productMap={},selectedLine='all',agingStates={};
let tickTimer,u1,u2,u3,u4;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const fmtL=n=>Math.round(n).toLocaleString()+' L';
const fmtP=n=>n.toFixed(1)+'%';


function toast(msg,t='blue'){const el=$('toast');el.textContent=msg;el.style.background=t==='green'?'#0d7a3e':t==='red'?'#8b1a24':'#1a3d8b';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function dk(h){return'#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-55).toString(16).padStart(2,'0')).join('');}


// ── IDLE TIMEOUT ──────────────────────────────────────────────────────
async function initIdleTimeout(){
  try{
    const snap=await getDoc(doc(db,'settings','idle_timeout'));
    const minutes=snap.exists()?(snap.data().minutes||0):0;
    if(!minutes||minutes<=0)return;
    let t;
    const reset=()=>{
      clearTimeout(t);
      t=setTimeout(async()=>{
        alert('ระบบ logout อัตโนมัติ เนื่องจากไม่มีการใช้งาน '+minutes+' นาที');
        await signOut(auth);
        window.location.href='index.html';
      },minutes*60*1000);
    };
    ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(e=>{
      document.addEventListener(e,reset,{passive:true});
    });
    reset();
  }catch(e){console.warn('idleTimeout:',e);}
}

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  try{const ps=await getDocs(collection(db,'products'));ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});}catch{}
  await init();
  initIdleTimeout();
});
window.doLogout=async()=>{clearInterval(tickTimer);[u1,u2,u3,u4].forEach(u=>u&&u());await signOut(auth);location.href='index.html';};

async function init(){
  u1=onSnapshot(collection(db,'lines'),snap=>{
    const seen=new Set();lineNames=[];lineMap={};
    snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.type==='Filling').sort((a,b)=>(a.seq||0)-(b.seq||0))
      .forEach(l=>{if(!seen.has(l.name)){seen.add(l.name);lineNames.push(l.name);lineMap[l.name]=l;}});
    renderAll();
  });
  u2=onSnapshot(collection(db,'cip_line_states'),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={id:d.id,...d.data()};});renderAll();
  });
  onSnapshot(collection(db,'cip_line_states'),snap=>{
    cipLineStates={};
    snap.docs.forEach(d=>{cipLineStates[d.id]={id:d.id,...d.data()};});
  });

  onSnapshot(collection(db,'aging_tank_states'),snap=>{
    agingStates={};snap.docs.forEach(d=>{agingStates[d.id]={id:d.id,...d.data()};});renderAll();
  });
  u3=onSnapshot(query(collection(db,'production_plans'),where('status','in',['pasteurising','past_done','ready','sent_filling'])),snap=>{
    planRows=planRows.filter(x=>x._col!=='production_plans').concat(snap.docs.map(x=>({id:x.id,_col:'production_plans',...x.data()})));renderAll();
  });
  u4=onSnapshot(query(collection(db,'production_plans_m2'),where('status','in',['pasteurising','past_done','ready','sent_filling'])),snap=>{
    planRows=planRows.filter(x=>x._col!=='production_plans_m2').concat(snap.docs.map(x=>({id:x.id,_col:'production_plans_m2',...x.data()})));renderAll();
  });
  tickTimer=setInterval(tick,1000);
}

function parseDateHHMM(dateStr, timeStr){
  // dateStr = 'YYYY-MM-DD', timeStr = 'HH:MM'
  if(!dateStr||!timeStr)return null;
  const[h,m]=timeStr.split(':').map(Number);
  const d=new Date(dateStr+'T00:00:00');
  d.setHours(h,m,0,0);
  return d;
}

function getLastPastEndTime(row){
  // ถ้ามี _group ให้ใช้ past_end_time ของ batch สุดท้าย
  if(row._group&&row._group.length>1){
    const lastDone=row._group
      .filter(r=>r.past_end_time)
      .sort((a,b)=>{
        const [ah,am]=a.past_end_time.split(':').map(Number);
        const [bh,bm]=b.past_end_time.split(':').map(Number);
        return (bh*60+bm)-(ah*60+am);
      });
    return lastDone[0]?.past_end_time||row.past_end_time;
  }
  return row.past_end_time;
}

function isCuringDone(row){
  const pastEndTime=getLastPastEndTime(row);
  if(!pastEndTime)return false;
  const p=productMap[row.mix_code]||{};
  const agingHr=+(p.aging_time||4);
  const dateStr=row.date||new Date().toISOString().slice(0,10);
  const pastEnd=parseDateHHMM(dateStr,pastEndTime);
  if(!pastEnd)return false;
  const curingEnd=new Date(pastEnd.getTime()+agingHr*3600*1000);
  return Date.now()>=curingEnd.getTime();
}

function getCuringRemain(row){
  const pastEndTime=getLastPastEndTime(row);
  if(!pastEndTime)return null;
  const p=productMap[row.mix_code]||{};
  const agingHr=+(p.aging_time||4);
  const dateStr=row.date||new Date().toISOString().slice(0,10);
  const pastEnd=parseDateHHMM(dateStr,pastEndTime);
  if(!pastEnd)return null;
  const curingEnd=new Date(pastEnd.getTime()+agingHr*3600*1000);
  const rem=curingEnd.getTime()-Date.now();
  if(rem<=0)return null;
  const rh=Math.floor(rem/3600000);
  const rm=Math.floor((rem%3600000)/60000);
  return rh>0?`${rh}ชม.${rm}น.`:`${rm}น.`;
}


function _curingLabel(row,productMap){
  const p=productMap[row.mix_code]||{};
  const agHr=+(p.aging_time||0);
  if(!row.past_end_time)return null;
  // คำนวณ endTs
  let endTs=null;
  if(row.past_end_at){
    endTs=new Date(new Date(row.past_end_at).getTime()+agHr*3600000);
  } else {
    const d=row.date||new Date().toISOString().slice(0,10);
    const[h,m]=row.past_end_time.split(':').map(Number);
    const base=new Date(d+'T00:00:00');
    base.setHours(h,m,0,0);
    endTs=new Date(base.getTime()+agHr*3600000);
  }
  if(!endTs)return null;
  const rem=endTs.getTime()-Date.now();
  if(rem<=0)return'✅ บ่มเสร็จ';
  const rh=Math.floor(rem/3600000);
  const rm=Math.floor((rem%3600000)/60000);
  const rs=Math.floor((rem%60000)/1000);
  return'🌡️ '+(rh>0?rh+'h ':'')+String(rm).padStart(2,'0')+'m '+String(rs).padStart(2,'0')+'s';
}

function getTanks(name){
  const raw=planRows
    .filter(r=>{
      if(r.filling_line!==name)return false;
      if(!['pasteurising','past_done','ready'].includes(r.status))return false;
      if(r.status==='sent_filling')return false;
      if(+(r.volume_liter||0)<=0)return false;
      if(r.status==='pasteurising'&&!r.past_start_time)return false;
      return true;
    })
    .sort((a,b)=>(a.seq||0)-(b.seq||0));

  // Group rows ที่ process_order + aging_tank เดียวกัน → รวมเป็น row เดียว
  const grouped=[];
  const seen=new Set();
  raw.forEach(row=>{
    const key=row.process_order&&row.aging_tank?`${row.process_order}__${row.aging_tank}`:'';
    if(key&&seen.has(key))return;
    if(key){
      seen.add(key);
      const group=raw.filter(r=>r.process_order===row.process_order&&r.aging_tank===row.aging_tank);
      if(group.length>1){
        const totalVol=group.reduce((s,r)=>s+(+(r.volume_liter||0)),0);
        const batchBase=String(row.batch_no||'').replace(/[\/\-]\d+$/,'');
        // ใช้ batch ที่มี current_vol สูงสุด (cumulative ล่าสุด)
        const activeRow=group.reduce((best,r)=>{
          const cv=r.current_vol!=null?+r.current_vol:-1;
          const bcv=best.current_vol!=null?+best.current_vol:-1;
          return cv>bcv?r:best;
        }, group.find(r=>r.status==='pasteurising')||group[0]);
        grouped.push({...activeRow, volume_liter:totalVol, batch_no:batchBase, _group:group});
        return;
      }
    }
    grouped.push(row);
  });
  return grouped;
}
// หา product ที่ตรงกับ mix_code จาก LINE Master
function getProductForMix(lineName, mixCode){
  const l=lineMap[lineName];
  if(!l||!l.products)return null;
  return l.products.find(p=>(p.mix_codes||[]).find(m=>m.code===mixCode))||null;
}

// group rows ที่เป็น product เดียวกัน (multi-mix) โดยดูจาก LINE Master
function groupByProduct(rows){
  const groups=[];const seen=new Set();
  rows.forEach(row=>{
    if(seen.has(row.id))return;
    const prod=getProductForMix(row.filling_line,row.mix_code);
    if(prod&&(prod.mix_codes||[]).length>1){
      // multi-mix: หา rows ที่ filling_line เดียวกัน และ mix_code อยู่ใน product เดียวกัน
      const mixCodes=(prod.mix_codes||[]).map(m=>m.code);
      const grp=rows.filter(r=>r.filling_line===row.filling_line&&mixCodes.includes(r.mix_code));
      grp.forEach(r=>seen.add(r.id));
      groups.push(grp);
    } else {
      // single-mix: แสดงเดี่ยว
      seen.add(row.id);
      groups.push([row]);
    }
  });
  return groups;
}

function isGroupReady(grp){
  // ต้องครบทุก row ใน group และทุกตัวต้อง past_done/ready แล้ว
  if(!grp.length) return false;
  return grp.every(r=>(r.status==='past_done'||r.status==='ready')&&!!r.past_end_time);
}

function getCurrentTank(tanks){
  // กำลังผลิต = past_done + บ่มครบแล้ว หรือ ready
  return tanks.find(r=>(r.status==='past_done'||r.status==='ready')&&isCuringDone(r)&&r.status!=='sent_filling')||null;
}
function getQueueTanks(tanks,current){
  return tanks.filter(r=>r!==current);
}
function getSt(name){const l=lineMap[name];return l?(lineStates[l.id]||{}):{}}

// คำนวณ Volume ที่ไหลเข้าถัง จาก past_start_time + speed
function getTankCapacity(tankId){
  const raw=parseInt((tankId||'').replace(/\D/g,''));
  const num=raw>100?Math.floor(raw/10):raw;
  if(num>=61&&num<=64) return 10000;
  if(num>=71&&num<=74) return 10000;
  if(num>=65&&num<=68) return 8000;
  if(num>=75&&num<=78) return 8000;
  if(num>=1&&num<=34)  return 3000;
  return 3000;
}

function calcVol(row){
  const totalVol=+(row.volume_liter||0);
  if(totalVol<=0) return{filled:0,pct:0,totalVol};

  const group=row._group||[row];
  const capacity=getTankCapacity(row.aging_tank||'');

  // ดึง current_vol จาก aging_tank_states ก่อน (single source of truth)
  const atsCv=row.aging_tank&&agingStates[row.aging_tank]&&agingStates[row.aging_tank].current_vol!=null
    ?+agingStates[row.aging_tank].current_vol:-1;
  if(atsCv>=0){
    const filled=Math.min(totalVol,atsCv);
    const pct=capacity>0?(filled/capacity)*100:0;
    return{filled,pct,totalVol};
  }
  // fallback: ใช้จาก production_plans
  const maxCv=group.reduce((max,r)=>{
    const cv=r.current_vol!=null?+r.current_vol:-1;
    return cv>max?cv:max;
  },-1);
  if(maxCv>=0){
    const filled=Math.min(totalVol,maxCv);
    const pct=capacity>0?(filled/capacity)*100:0;
    return{filled,pct,totalVol};
  }

  // ไม่มี current_vol → แสดงตาม totalVol จริง (เหมือน aging.html)
  const pct=capacity>0?(totalVol/capacity)*100:0;
  return{filled:totalVol,pct,totalVol};
}

// SVG — ถังผอม สูง
function svg(uid,pct,col,run){
  const W=140,H=220;
  const bX=18,bY=40,bW=W-36,bH=H-55;
  const nW=24,nH=10,cW=34,cH=6;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const _pct=Math.min(pct,100);
  const hasLiq=_pct>0;
  const maxFillH=(bH-6)*0.92;
  const fillH=Math.max(0,(_pct/100)*maxFillH);
  const wy=bY+bH-fillH;
  const A=5;
  const gid='g'+uid,cid='c'+uid;
  const bodyFill=hasLiq?'rgba(255,255,255,.12)':'rgba(176,186,200,.25)';
  const bodyStroke=hasLiq?col:'#94a3b8';
  function waveD(yBase,amp,nc){
    const Ww=bW*2,segW=Ww/(nc*2);
    let d='M'+bX+','+yBase;
    for(let i=0;i<nc*2;i++){
      const x1=bX+i*segW,x2=bX+(i+1)*segW;
      const cy=i%2===0?yBase-amp:yBase+amp;
      d+=' C'+(x1+segW*.4)+','+cy+' '+(x2-segW*.4)+','+cy+' '+x2+','+yBase;
    }
    return d+' L'+(bX+Ww)+','+(bY+bH)+' L'+bX+','+(bY+bH)+' Z';
  }
  let s='';
  s+='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="display:block">';
  s+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+col+'" stop-opacity=".5"/><stop offset="100%" stop-color="'+col+'" stop-opacity=".85"/></linearGradient>';
  s+='<clipPath id="'+cid+'"><rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12"/></clipPath></defs>';
  s+='<rect x="'+nX+'" y="'+(bY-nH)+'" width="'+nW+'" height="'+(nH+5)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".6"/>';
  s+='<rect x="'+cX+'" y="'+(bY-nH-cH)+'" width="'+cW+'" height="'+(cH+3)+'" rx="4" fill="'+(hasLiq?'#16a34a':'rgba(255,255,255,.12)')+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity=".5"/>';
  if(hasLiq) s+='<circle cx="'+(W/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="#22c55e" opacity=".9"/><circle cx="'+(W/2)+'" cy="'+(bY-nH-2)+'" r="4" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0"><animate attributeName="r" from="4" to="10" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.6" to="0" dur="1.5s" repeatCount="indefinite"/></circle>';
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="'+bodyFill+'" stroke="'+bodyStroke+'" stroke-width="1.5" stroke-opacity="'+(hasLiq?'.4':'.6')+'"/>';
  if(hasLiq){
    s+='<g clip-path="url(#'+cid+')">';
    s+='<rect x="'+bX+'" y="'+(wy+A)+'" width="'+(bW*2)+'" height="'+(bY+bH-(wy+A))+'" fill="url(#'+gid+')"/>';
    s+='<path d="'+waveD(wy,A,3)+'" fill="'+col+'" fill-opacity=".55"><animateTransform attributeName="transform" type="translate" from="0,0" to="'+(-bW)+',0" dur="2.8s" repeatCount="indefinite"/></path>';
    s+='<path d="'+waveD(wy,A*.6,4)+'" fill="'+col+'" fill-opacity=".3"><animateTransform attributeName="transform" type="translate" from="'+(bW*.5)+',0" to="'+(-bW*.5)+',0" dur="4s" repeatCount="indefinite"/></path>';
    s+='<ellipse cx="'+(bX+bW*.35)+'" cy="'+(wy-2)+'" rx="'+(bW*.12)+'" ry="2.5" fill="white" fill-opacity=".3"/>';
    s+='</g>';
  }
  s+='<rect x="'+bX+'" y="'+bY+'" width="'+bW+'" height="'+bH+'" rx="12" fill="none" stroke="'+bodyStroke+'" stroke-width="2.5" stroke-opacity="'+(hasLiq?'.8':'.6')+'"/>';
  s+='<rect x="'+(bX+8)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+bW-16)+'" y="'+(bY+bH)+'" width="8" height="14" rx="2" fill="rgba(255,255,255,.15)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".6"/>';
  s+='<rect x="'+(bX+3)+'" y="'+(bY+bH+13)+'" width="'+(bW-6)+'" height="5" rx="2" fill="rgba(255,255,255,.12)" stroke="'+bodyStroke+'" stroke-width="1" stroke-opacity=".5"/>';
  s+='</svg>';
  return s;
}


function expireBox(expireAt){
  if(!expireAt) return '';
  var ed=new Date(expireAt);
  var now=new Date();
  var rh=(ed-now)/3600000;
  var isExp=rh<0;
  var isCrit=!isExp&&rh<24;
  var isWarn=!isExp&&rh<48;
  var bg=isExp?'rgba(185,28,28,.12)':isCrit?'rgba(185,28,28,.08)':isWarn?'rgba(194,65,12,.08)':'rgba(21,128,61,.08)';
  var bc=isExp?'#b91c1c':isCrit?'#b91c1c':isWarn?'#c2410c':'#15803d';
  var ic=isExp?'❌':isCrit?'⚠️':isWarn?'🟡':'✅';
  var dateStr=ed.toLocaleDateString('th-TH',{weekday:'short',day:'2-digit',month:'short'});
  var timeStr=ed.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
  var remStr=isExp?'หมดอายุแล้ว':rh<1?Math.round(rh*60)+' นาที':rh<24?rh.toFixed(1)+' ชม.':Math.floor(rh/24)+' วัน '+Math.round(rh%24)+' ชม.';
  return '<div style="background:'+bg+';border:2px solid '+bc+';border-radius:8px;padding:6px 10px;margin-top:6px;font-family:DM Mono,monospace">'
    +'<div style="font-size:10px;font-weight:800;color:'+bc+';letter-spacing:.06em">'+ic+' วันหมดอายุ</div>'
    +'<div style="font-size:13px;font-weight:900;color:'+bc+';margin-top:2px">'+dateStr+' '+timeStr+'</div>'
    +'<div style="font-size:10px;font-weight:700;color:'+bc+';opacity:.8;margin-top:1px">เหลือ '+remStr+'</div>'
    +'</div>';
}

function card(row,isCur,isSingle=false){
  const p=productMap[row.mix_code]||{};
  const col=p.color||'#60a5fa';
  const{filled,pct,totalVol}=calcVol(row);
  const pctC=pct>50?'#15803d':pct>20?'#b45309':'#b91c1c';
  const isActive=!!row.past_start_time;
  const at=row.aging_tank||'\u2014';
  const agSt=agingStates&&row.aging_tank?agingStates[row.aging_tank]||{}:{};
  const expHtml=expireBox(agSt.expire_at||null);
  const yr=new Date().getFullYear().toString().slice(-1);
  const unit=row._col==='production_plans_m2'?'2':'1';
  const rp=row.prod_suffix?(yr+'0522'+unit+row.prod_suffix):'\u2014';
  const uid=(isCur?'C':'Q')+row.id.slice(-8);
  const statusRaw=resolveStatus(row);
  const stMap={pending:'\u23f3 \u0e23\u0e2d\u0e1c\u0e2a\u0e21',mixing:'\ud83d\udd35 Mixing',pasteurising:'\ud83c\udf21\ufe0f Pasteurise',past_done:'\u2705 Past Done',filling:'\ud83d\udd35 Filling',ready:'\u2705 \u0e1e\u0e23\u0e49\u0e2d\u0e21',cip:'\ud83d\udfe3 CIP',waiting:'\u23f3 \u0e23\u0e2d'};
  const stLabel=statusRaw==='past_done'?(_curingLabel(row,productMap)||'🌡️ บ่มอยู่'):(stMap[statusRaw]||statusRaw);
  return '<div class="tc '+(isCur?'cur':'que')+'">'
    +'<div class="ch">'
      +'<div class="ch-top" style="margin-bottom:4px">'
        +'<span class="ch-line">'+(row.filling_line||'\u2014')+'</span>'
        +'<span style="font-family:var(--mono);font-size:10px;font-weight:800;padding:2px 8px;border-radius:5px;background:'+(isCur?'#ea580c':'#6b7280')+';color:#fff;margin-left:6px">'+(isCur?'\u25cf \u0e40\u0e14\u0e34\u0e19':'\u25cb \u0e04\u0e34\u0e27')+'</span>'
      +'</div>'
      +'<div class="ch-prod">'+(row.product_name||'\u2014')+'</div>'
      +'<div style="display:flex;align-items:baseline;gap:5px;margin-top:3px;flex-wrap:wrap">'
        +'<span class="ch-code">'+(row.mix_code||'\u2014')+'</span>'
        +'<span class="ch-code" style="opacity:.5">|</span>'
        +'<span class="ch-code">'+(row.mix_name||'\u2014')+'</span>'
      +'</div>'
    +'</div>'
    +'<div class="ab">'+at+' <span style="font-size:10px;color:#374151;font-weight:700">('+getTankCapacity(at).toLocaleString()+' L)</span></div>'
    +'<div style="position:relative;display:flex;justify-content:center;margin:10px 0 0">'
      +svg(uid,pct,col,isActive)
      +'<div id="st-'+uid+'" style="position:absolute;bottom:22px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;font-family:var(--mono);font-size:12px;font-weight:800;padding:5px 14px;border-radius:999px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);letter-spacing:.04em;pointer-events:none">'+stLabel+'</div>'
    +'</div>'
    +'<div style="text-align:center;padding:8px 12px 4px">'
      +'<div id="vol-'+uid+'" style="font-family:var(--mono);font-size:26px;font-weight:900;color:'+pctC+';line-height:1">'+filled.toFixed(1)+' <span style="font-size:14px;font-weight:700;color:#6b7280">L</span></div>'
      +'<div id="pct-'+uid+'" style="font-family:var(--mono);font-size:16px;font-weight:800;color:'+pctC+';margin-top:2px">'+pct.toFixed(1)+'%</div>'
    +'</div>'
    +'<div style="padding:6px 12px 10px;border-top:1px solid var(--s2);margin-top:6px">'
      +'<div class="ch-batch" style="margin-bottom:3px">Batch '+(row.batch_no||'\u2014')+'</div>'
      +'<div class="ch-rp"><span style="font-size:10px;color:#6b7280;font-weight:600">\u0e23\u0e2b\u0e31\u0e2a\u0e1c\u0e25\u0e34\u0e15: </span>'+rp+'</div>'
    +'</div>'
    +expHtml
    +'</div>';
}

window.selectLine=(name,btn)=>{
  selectedLine=name;
  document.querySelectorAll('.lsel-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderAll();
};

function buildLineSelectorButtons(){
  const bar=$('line-sel-bar');
  if(!bar||!lineNames.length)return;
  // ลบ button เก่า (ยกเว้น label และ all button)
  const existing=bar.querySelectorAll('.lsel-btn:not(.all)');
  existing.forEach(b=>b.remove());
  lineNames.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='lsel-btn'+(selectedLine===name?' on':'');
    btn.textContent=name;
    btn.onclick=()=>selectLine(name,btn);
    bar.appendChild(btn);
  });
}

function renderAll(){
  if(!lineNames.length)return;
  let html='';
  buildLineSelectorButtons();
  const visibleLines=selectedLine==='all'?lineNames:[selectedLine];
  const isSingle=selectedLine!=='all';

  visibleLines.forEach(name=>{
    const tanks=getTanks(name);
    if(!tanks.length)return;
    const groups=groupByProduct(tanks);
    const readyGroups=groups.filter(g=>isGroupReady(g));
    const notReadyGroups=groups.filter(g=>!isGroupReady(g));
    // แสดงกำลังผลิตแค่กลุ่มแรก ส่วนที่เหลือรอคิว
    const curGroups=readyGroups.slice(0,1);
    const queGroups=[...readyGroups.slice(1),...notReadyGroups];
    const lnLow=name.toLowerCase();
    html+='<div class="ls" data-line="'+lnLow+'"><div class="ls-title">🏭 '+name.toUpperCase()+'<span class="ls-title-badge">LINE</span></div><div class="pr">';
    if(curGroups.length){html+=curGroups.map(g=>g.map(r=>card(r,true,isSingle)).join('')).join('');}
    else{html+='<div style="font-family:var(--mono);font-size:12px;color:var(--t3);padding:20px;text-align:center;grid-column:1/-1">ยังไม่มีการผลิต</div>';}
    if(queGroups.length){html+=queGroups.map(g=>g.map(r=>card(r,false,isSingle)).join('')).join('');}
    html+='</div></div>';
  });
  $('mg').innerHTML=html||'<div style="padding:80px;text-align:center;color:var(--t3);font-family:var(--mono)">📋 ไม่มีข้อมูลการผลิต</div>';
}

function tick(){
  lineNames.forEach(name=>{
    const tanks=getTanks(name);
    if(!tanks.length)return;
    const _grps=groupByProduct(tanks);
    const _curGrps=_grps.filter(g=>isGroupReady(g));
    const _queGrps=_grps.filter(g=>!isGroupReady(g));
    const cur=_curGrps[0]?_curGrps[0][0]:null;
    const queue=_queGrps.flatMap(g=>g);
    // อัปเดต curing countdown สำหรับ past_done
    tanks.forEach(row=>{
      if(row.status!=='past_done'||!row.past_end_time)return;
      const isCurR=cur&&cur.id===row.id;
      const isInQueueR=queue.find(q=>q.id===row.id);
      const uidR=(isCurR?'C':isInQueueR?'Q':'Q')+row.id.slice(-8);
      const stEl=document.getElementById('st-'+uidR);
      if(stEl){stEl.textContent=_curingLabel(row,productMap)||'✅ บ่มเสร็จ';}
    });
    // อัปเดตทุก tank ที่กำลัง pasteurising
    // อัปเดต volume จาก cip_line_states
    tanks.forEach(row=>{
      const _ls=Object.values(cipLineStates).find(s=>s.aging_tank===row.aging_tank&&s.running&&s.start_ts);
      if(_ls){
        const _el=(Date.now()-_ls.start_ts)/3600000;
        const _rem=Math.max(0,(_ls.start_vol||0)-(_el*(_ls.flow_rate||300)));
        const _isCur=cur&&cur.id===row.id;
        const _isQ=queue.find(q=>q.id===row.id);
        const _uid=(_isCur?'C':_isQ?'Q':'Q')+row.id.slice(-8);
        const _cap=+(row.volume_liter||0)||1;
        const _pct=Math.min(100,(_rem/_cap)*100);
        const _pc=_pct>50?'#15803d':_pct>20?'#b45309':'#b91c1c';
        const ve=document.getElementById('vol-'+_uid);
        const pe=document.getElementById('pct-'+_uid);
        if(ve){ve.textContent=_rem.toFixed(1)+' L';ve.style.color=_pc;}
        if(pe){pe.textContent=_pct.toFixed(1)+'%';pe.style.color=_pc;}
      }
    });
    tanks.forEach(row=>{
      if(row.status!=='pasteurising'||!row.past_start_time)return;
      const{filled,pct}=calcVol(row);
      const pctC=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
      // isCur ตาม DOM จริง — cur = 'C', queue = 'Q'
      const isCur=cur&&cur.id===row.id;
      const isInQueue=queue.find(q=>q.id===row.id);
      const uid=(isCur?'C':isInQueue?'Q':'Q')+row.id.slice(-8);
      const v=$('vol-'+uid),p=$('pct-'+uid);
      if(v){v.textContent=filled.toFixed(1)+' L';v.style.color=pctC;}
      if(p){p.textContent=pct.toFixed(1)+'%';p.style.color=pctC;}
    });
  });
}
