<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PROD.SYS">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Filling — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--s1:#0b0e17;--s2:#10141f;--s3:#151a28;--b1:#1c2235;--b2:#242e48;
  --text:#e4eaf8;--t2:#8899bb;--t3:#2a3450;
  --blue:#3b7ef6;--blue2:#7ab3ff;--green:#1fd17a;--yellow:#f5c842;
  --red:#f04f5e;--cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
  --fs:12px; /* ขนาด font เดียวทั้งหมด */
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:50px;
  background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 16px;gap:10px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.nav-r{display:flex;gap:8px;margin-left:auto;align-items:center}
.nbtn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);
  background:none;color:var(--t2);cursor:pointer;text-decoration:none;font-family:var(--mono)}
.nbtn:hover{border-color:var(--orange);color:var(--orange)}
.date-bar{display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid var(--b1);background:var(--s1)}
.date-bar input{background:var(--s2);border:1px solid var(--b2);border-radius:6px;color:var(--text);
  font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none}
.date-bar input:focus{border-color:var(--orange)}
.dbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);
  background:none;color:var(--t2);cursor:pointer;font-family:var(--mono)}
.dbtn:hover{border-color:var(--orange);color:var(--orange)}
.today-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;
  background:rgba(255,140,66,.1);color:var(--orange);border:1px solid rgba(255,140,66,.3)}

main{padding:14px;display:flex;flex-direction:column;gap:14px}

/* LINE SECTION — ซ่อนถ้าไม่มีข้อมูล */
.ls{border:2px solid rgba(255,140,66,.5);border-radius:14px;background:rgba(255,140,66,.04);overflow:hidden}
.ls-title{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--orange);
  letter-spacing:.06em;padding:12px 16px 8px;border-bottom:1px solid rgba(255,140,66,.2)}

/* LAYOUT */
.pr{display:flex;align-items:stretch;min-height:320px}

/* LEFT — กำลังผลิต */
.cur-wrap{flex-shrink:0;width:220px;border-right:2px solid rgba(255,140,66,.25);
  background:rgba(255,140,66,.06);padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.sec-hd{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.12em}
.dot-g{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;animation:blink 1.2s infinite}
.dot-q{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0}

/* RIGHT — คิว */
.que-wrap{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.que-inner{display:flex;gap:10px;flex-wrap:wrap;align-content:flex-start;flex:1}

/* CARD — ขนาดเดียวกันทุกใบ */
.tc{width:175px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;
  border:1.5px solid var(--b2);background:var(--s1)}
.tc.cur{border-color:rgba(255,140,66,.6);box-shadow:0 0 14px rgba(255,140,66,.12)}
.tc.que{border-color:var(--b1);background:var(--s2)}

/* CARD HEAD — font เดียวกันทุกอย่าง */
.ch{padding:9px 10px 6px;border-bottom:1px solid var(--b1)}
.ch-top{display:flex;align-items:baseline;gap:5px;margin-bottom:3px;flex-wrap:wrap}
.ch-line{font-family:var(--mono);font-size:var(--fs);font-weight:800;color:var(--cyan)}
.ch-dot{color:var(--t3);font-size:10px}
.ch-prod{font-size:var(--fs);font-weight:700;color:var(--text)}
.ch-code{font-family:var(--mono);font-size:var(--fs);font-weight:700;color:var(--orange)}
.ch-name{font-size:var(--fs);color:#c8d8f0;font-weight:600}
.ch-batch{font-family:var(--mono);font-size:var(--fs);color:#8899bb;margin-top:2px;font-weight:600}
.ch-rp{font-family:var(--mono);font-size:var(--fs);font-weight:700;color:#c084fc;letter-spacing:.08em;margin-top:3px}

/* AGING */
.ab{font-family:var(--mono);font-size:var(--fs);font-weight:700;color:var(--cyan);
  background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.35);
  border-radius:6px;text-align:center;margin:7px 10px 0;padding:3px 0;letter-spacing:.1em}

/* TANK SVG WRAP */
.sw{position:relative;margin:8px 10px 4px}
.so{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;width:90%}
/* font เดียวกัน */
.sv{font-family:var(--mono);font-size:var(--fs);font-weight:700;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,1);line-height:1.4}
.sp{font-family:var(--mono);font-size:var(--fs);color:rgba(255,255,255,.95);
  text-shadow:0 1px 8px rgba(0,0,0,1);line-height:1.4}

/* STATUS */
.st{text-align:center;padding:5px 8px 9px}
.stb{font-family:var(--mono);font-size:var(--fs);font-weight:700;
  padding:3px 12px;border-radius:99px;display:inline-block}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 22px;border-radius:10px;font-size:12px;opacity:0;transition:all .3s;
  z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* LINE SELECTOR */
.line-sel-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--b1);background:var(--s1);flex-wrap:wrap}
.lsel-lbl{font-family:var(--mono);font-size:10px;color:var(--t2);flex-shrink:0}
.lsel-btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .2s}
.lsel-btn:hover,.lsel-btn.on{border-color:var(--orange);color:var(--orange);background:rgba(255,140,66,.1)}
.lsel-btn.all.on{border-color:var(--cyan);color:var(--cyan);background:rgba(0,212,255,.08)}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes wave2{0%{transform:translateX(-30%)}100%{transform:translateX(20%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.6}100%{transform:translateY(-30px);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── MOBILE RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:768px){
  nav{padding:0 10px}
  .nav-logo{font-size:12px}
  .nbtn{font-size:10px;padding:4px 8px}
  main{padding:8px}

  /* LINE SELECTOR */
  .line-sel-bar{padding:6px 10px;gap:5px;overflow-x:auto;flex-wrap:nowrap}
  .lsel-btn{font-size:10px;padding:4px 10px;flex-shrink:0}

  /* LINE SECTION */
  .ls{border-radius:10px;margin-bottom:12px}
  .ls-title{font-size:16px;padding:10px 12px 6px}

  /* PR — stack vertically */
  .pr{flex-direction:column}

  /* LEFT — current full width */
  .cur-wrap{width:100%!important;border-right:none!important;border-bottom:1px solid rgba(255,140,66,.2);}

  /* RIGHT — queue full width, horizontal scroll */
  .que-wrap{width:100%}
  .que-inner{flex-wrap:nowrap;overflow-x:auto;padding-bottom:8px}

  /* CARD — คงขนาดเท่าเดิมในคิว */
  .tc.que{flex-shrink:0}
  .tc.cur{width:100%!important}

  /* FONT ใหญ่ขึ้น */
  .ch-line{font-size:13px}
  .ch-prod{font-size:13px}
  .ch-code{font-size:13px}
  .ch-name{font-size:13px}
  .ch-batch{font-size:12px}
  .ch-rp{font-size:13px}
  .ab{font-size:14px}
  .sv{font-size:16px!important}
  .sp{font-size:13px!important}
  .sbadge{font-size:12px}

  /* SEC HEADER */
  .sec-hd{font-size:11px}
}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ FILLING</span></div>
  <div class="nav-r">
    <a href="index.html" class="nbtn">🏠</a>
    <button class="nbtn" onclick="doLogout()">ออก</button>
  </div>
</nav>

<div class="line-sel-bar" id="line-sel-bar"><span class="lsel-lbl">แสดง LINE:</span><button class="lsel-btn all on" onclick="selectLine('all',this)">ทั้งหมด</button></div>
<main id="mg"><div style="text-align:center;padding:80px;color:var(--t3);font-family:var(--mono)">⏳ กำลังโหลด...</div></main>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,onSnapshot,getDocs,doc}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const auth=getAuth(app),db=getFirestore(app);
let lineNames=[],lineMap={},lineStates={},planRows=[],productMap={},selectedLine='all';
let tickTimer,u1,u2,u3,u4;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const fmtL=n=>Math.round(n).toLocaleString()+' L';
const fmtP=n=>n.toFixed(1)+'%';


function toast(msg,t='blue'){const el=$('toast');el.textContent=msg;el.style.background=t==='green'?'#0d7a3e':t==='red'?'#8b1a24':'#1a3d8b';el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function dk(h){return'#'+[1,3,5].map(i=>Math.max(0,parseInt(h.slice(i,i+2),16)-55).toString(16).padStart(2,'0')).join('');}


// ── IDLE TIMEOUT ──────────────────────────────────────────────────────
async function initIdleTimeout(){
  try{
    const snap=await getDoc(doc(db,'settings','idle_timeout'));
    const minutes=snap.exists()?(snap.data().minutes||0):0;
    if(!minutes||minutes<=0)return;
    let t;
    const reset=()=>{
      clearTimeout(t);
      t=setTimeout(async()=>{
        alert('ระบบ logout อัตโนมัติ เนื่องจากไม่มีการใช้งาน '+minutes+' นาที');
        await signOut(auth);
        window.location.href='index.html';
      },minutes*60*1000);
    };
    ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(e=>{
      document.addEventListener(e,reset,{passive:true});
    });
    reset();
  }catch(e){console.warn('idleTimeout:',e);}
}

onAuthStateChanged(auth,async user=>{
  if(!user){location.href='index.html';return;}
  try{const ps=await getDocs(collection(db,'products'));ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});}catch{}
  await init();
  initIdleTimeout();
});
window.doLogout=async()=>{clearInterval(tickTimer);[u1,u2,u3,u4].forEach(u=>u&&u());await signOut(auth);location.href='index.html';};

async function init(){
  u1=onSnapshot(collection(db,'lines'),snap=>{
    const seen=new Set();lineNames=[];lineMap={};
    snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.type==='Filling').sort((a,b)=>(a.seq||0)-(b.seq||0))
      .forEach(l=>{if(!seen.has(l.name)){seen.add(l.name);lineNames.push(l.name);lineMap[l.name]=l;}});
    renderAll();
  });
  u2=onSnapshot(collection(db,'cip_line_states'),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={id:d.id,...d.data()};});renderAll();
  });
  u3=onSnapshot(query(collection(db,'production_plans'),where('status','in',['pasteurising','past_done','ready'])),snap=>{
    planRows=planRows.filter(x=>x._col!=='production_plans').concat(snap.docs.map(x=>({id:x.id,_col:'production_plans',...x.data()})));renderAll();
  });
  u4=onSnapshot(query(collection(db,'production_plans_m2'),where('status','in',['pasteurising','past_done','ready'])),snap=>{
    planRows=planRows.filter(x=>x._col!=='production_plans_m2').concat(snap.docs.map(x=>({id:x.id,_col:'production_plans_m2',...x.data()})));renderAll();
  });
  tickTimer=setInterval(tick,1000);
}

function parseDateHHMM(dateStr, timeStr){
  // dateStr = 'YYYY-MM-DD', timeStr = 'HH:MM'
  if(!dateStr||!timeStr)return null;
  const[h,m]=timeStr.split(':').map(Number);
  const d=new Date(dateStr+'T00:00:00');
  d.setHours(h,m,0,0);
  return d;
}

function isCuringDone(row){
  if(!row.past_end_time)return false;
  const p=productMap[row.mix_code]||{};
  const agingHr=+(p.aging_time||4);
  // ใช้วันที่ของ batch ถ้าไม่มีใช้วันนี้
  const dateStr=row.date||new Date().toISOString().slice(0,10);
  const pastEnd=parseDateHHMM(dateStr,row.past_end_time);
  if(!pastEnd)return false;
  const curingEnd=new Date(pastEnd.getTime()+agingHr*3600*1000);
  return Date.now()>=curingEnd.getTime();
}

function getCuringRemain(row){
  if(!row.past_end_time)return null;
  const p=productMap[row.mix_code]||{};
  const agingHr=+(p.aging_time||4);
  const dateStr=row.date||new Date().toISOString().slice(0,10);
  const pastEnd=parseDateHHMM(dateStr,row.past_end_time);
  if(!pastEnd)return null;
  const curingEnd=new Date(pastEnd.getTime()+agingHr*3600*1000);
  const rem=curingEnd.getTime()-Date.now();
  if(rem<=0)return null;
  const rh=Math.floor(rem/3600000);
  const rm=Math.floor((rem%3600000)/60000);
  return rh>0?`${rh}ชม.${rm}น.`:`${rm}น.`;
}

function getTanks(name){
  return planRows
    .filter(r=>{
      if(r.filling_line!==name)return false;
      if(!['pasteurising','past_done','ready'].includes(r.status))return false;
      // ต้องมี volume จริงๆ
      if(+(r.volume_liter||0)<=0)return false;
      // pasteurising ต้องมี past_start_time ด้วย
      if(r.status==='pasteurising'&&!r.past_start_time)return false;
      return true;
    })
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
}
function getCurrentTank(tanks){
  // กำลังผลิต = past_done + บ่มครบแล้ว หรือ ready
  return tanks.find(r=>(r.status==='past_done'||r.status==='ready')&&isCuringDone(r))||null;
}
function getQueueTanks(tanks,current){
  return tanks.filter(r=>r!==current);
}
function getSt(name){const l=lineMap[name];return l?(lineStates[l.id]||{}):{}}

// คำนวณ Volume ที่ไหลเข้าถัง จาก past_start_time + speed
function calcVol(row){
  const totalVol=+(row.volume_liter||0);

  if(!row.past_start_time||totalVol<=0){
    return{filled:0,pct:0,totalVol};
  }

  // ดึง flow_rate (L/hr) จาก LINE master
  const lineName=row.filling_line||'';
  const lineObj=lineMap[lineName]||{};
  const flowRate=+(lineObj.flow_rate||300); // L/hr

  const now=new Date();
  const[h,m]=row.past_start_time.split(':').map(Number);
  const startMin=h*60+m;
  const nowMin=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  let elapsedMin=nowMin-startMin;
  if(elapsedMin<0)elapsedMin+=1440;
  const elapsedHr=elapsedMin/60;

  // ใช้ current_vol ที่ Pasteurize เขียนไว้ ถ้ามี
  if(row.current_vol!==undefined&&row.current_vol!==null){
    const filled=+row.current_vol;
    const pct=totalVol>0?(filled/totalVol)*100:0;
    return{filled,pct,totalVol};
  }
  const filled=Math.min(totalVol,elapsedHr*flowRate);
  const pct=totalVol>0?(filled/totalVol)*100:0;
  return{filled,pct,totalVol};
}

// SVG — ถังผอม สูง
function svg(uid,pct,col,run){
  const W=140,H=195;
  const bX=18,bY=22,bW=W-36,bH=H-50;
  const _pct=Math.min(pct,100);
  const maxFillH=(bH-6)*0.92; // 100% = 92% ของถัง
  const fillH=Math.max(0,(_pct/100)*maxFillH);
  const fillY=bY+bH-3-fillH;
  const gid='g'+uid,cid='c'+uid,wid='wc'+uid;
  const bc=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
  return`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
<defs>
  <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity=".95"/>
    <stop offset="100%" stop-color="${dk(col)}" stop-opacity="1"/>
  </linearGradient>
  <clipPath id="${cid}"><rect x="${bX+2}" y="${bY+2}" width="${bW-4}" height="${bH-4}" rx="6"/></clipPath>
</defs>
<!-- shadow -->
<rect x="${bX+2}" y="${bY+4}" width="${bW}" height="${bH}" rx="8" fill="rgba(0,0,0,.7)"/>
<!-- body -->
<rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="8" fill="#060a14" stroke="${rgba(col,.5)}" stroke-width="2"/>
${_pct>0?`
<g clip-path="url(#${cid})">
  <!-- base fill -->
  <rect x="${bX+2}" y="${fillY+4}" width="${bW-4}" height="${fillH+4}" fill="url(#${gid})"/>
  ${run?`
  <!-- wave 1 -->
  <g style="animation:wave 2.5s linear infinite">
    <path d="M${bX+2},${fillY+3} q${bW*.2},-6 ${bW*.4},0 q${bW*.2},6 ${bW*.4},0 q${bW*.2},-6 ${bW*.4},0 q${bW*.2},6 ${bW*.4},0 v${fillH+6} h-${bW*3} z" fill="${rgba(col,.55)}"/>
  </g>
  <!-- wave 2 -->
  <g style="animation:wave2 3.5s linear infinite">
    <path d="M${bX+2},${fillY+2} q${bW*.25},-4 ${bW*.5},0 q${bW*.25},4 ${bW*.5},0 q${bW*.25},-4 ${bW*.5},0 v${fillH+5} h-${bW*3} z" fill="${rgba(col,.25)}"/>
  </g>
  <!-- bubbles -->
  <circle cx="${bX+14}" cy="${fillY+fillH*.4}" r="2" fill="${rgba(col,.5)}" style="animation:rise 2.5s ease-in infinite"/>
  <circle cx="${bX+bW*.65}" cy="${fillY+fillH*.55}" r="1.7" fill="${rgba(col,.4)}" style="animation:rise 2s ease-in infinite;animation-delay:.8s"/>
  `:`<rect x="${bX+2}" y="${fillY+2}" width="${bW-4}" height="4" rx="2" fill="${rgba(col,.5)}"/>`}
  <!-- shine -->
  <rect x="${bX+4}" y="${fillY+6}" width="6" height="${Math.max(0,fillH*.35)}" rx="3" fill="rgba(255,255,255,.07)"/>
</g>
<!-- level line -->
<line x1="${bX+bW+2}" y1="${fillY+3}" x2="${bX+bW+9}" y2="${fillY+3}" stroke="${bc}" stroke-width="2.5" stroke-linecap="round"/>`:''}
<!-- border overlay -->
<rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="8" fill="none" stroke="${_pct>0?rgba(col,.6):'#1e2d4a'}" stroke-width="2"/>
<!-- neck -->
<rect x="${bX+(bW-28)/2}" y="${bY-8}" width="28" height="10" rx="3" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
<!-- cap -->
<rect x="${bX+(bW-36)/2}" y="${bY-13}" width="36" height="6" rx="3" fill="#08101a" stroke="#1e2d4a" stroke-width="1.5"/>
<!-- legs -->
<rect x="${bX+8}" y="${bY+bH}" width="7" height="10" rx="2" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
<rect x="${bX+bW-15}" y="${bY+bH}" width="7" height="10" rx="2" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
<rect x="${bX+3}" y="${bY+bH+9}" width="${bW-6}" height="3" rx="1.5" fill="#060a14" stroke="#1e2d4a" stroke-width="1.5"/>
</svg>`;
}

function card(row,isCur,isSingle=false){
  const p=productMap[row.mix_code]||{};
  const col=p.color||'#60a5fa';
  const{filled,pct,totalVol}=calcVol(row);
  const pctC=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
  const isActive=!!row.past_start_time; // wave ทุก status ที่มีของอยู่

  const curingRem=getCuringRemain(row);
  const hasVol=+(row.volume_liter||0)>0;
  let stTxt='—',stC='var(--t2)';
  if(!hasVol){stTxt='📭 Empty';stC='var(--t3)';}
  else if(row.status==='pasteurising'&&!row.past_start_time){stTxt='⏳ รอ Past.';stC='var(--yellow)';}
  else if(row.status==='pasteurising'&&row.past_start_time){stTxt='♨️ กำลัง Past.';stC='var(--orange)';}
  else if((row.status==='past_done'||row.status==='ready')&&!isCuringDone(row)){
    stTxt=curingRem?`🌡️ บ่มอยู่ ${curingRem}`:'🌡️ กำลังบ่ม';stC='var(--cyan)';}
  else if((row.status==='past_done'||row.status==='ready')&&isCuringDone(row)){stTxt='✅ บ่มเสร็จ พร้อมส่ง';stC='var(--green)';}

  const at=row.aging_tank||'—';
  // รหัสผลิต 10 ตัว — คำนวณ prefix จากปี+0522+unit แล้วต่อ suffix 4 ตัว
  const yr=new Date().getFullYear().toString().slice(-1);
  const unit=row._col==='production_plans_m2'?'2':'1';
  const prefix=yr+'0522'+unit; // เช่น 605221
  const rp=row.prod_suffix?(prefix+row.prod_suffix):'—';

  const uid=(isCur?'C':'Q')+row.id.slice(-8);
  const cardW=isSingle&&isCur?'260px':'175px';

  return`<div class="tc ${isCur?'cur':'que'}" style="width:${cardW}">
  <div class="ch">
    <div class="ch-top">
      <span class="ch-line">${row.filling_line||'—'}</span>
      <span class="ch-dot">·</span>
      <span class="ch-prod">${row.product_name||'—'}</span>
    </div>
    <div style="display:flex;align-items:baseline;gap:5px;margin-top:3px;flex-wrap:wrap">
      <span class="ch-code">${row.mix_code||'—'}</span>
      <span class="ch-code" style="opacity:.6">|</span>
      <span class="ch-code">${row.mix_name||'—'}</span>
    </div>
    <div class="ch-batch">Batch ${row.batch_no||'—'}</div>
    <div class="ch-rp">${rp}</div>
  </div>
  <div class="ab">${at}</div>
  <div class="sw">
    ${svg(uid,pct,col,isActive)}
    <div class="so">
      <div class="sv" id="vol-${uid}" style="color:${pctC}">${filled.toFixed(1)} L</div>
      <div class="sp" id="pct-${uid}" style="color:${pctC}">${pct.toFixed(1)}%</div>
    </div>
  </div>
  <div class="st">
    <span class="stb" style="color:${stC};background:${stC}22;border:1px solid ${stC}55">${stTxt}</span>
  </div>
</div>`;
}

window.selectLine=(name,btn)=>{
  selectedLine=name;
  document.querySelectorAll('.lsel-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderAll();
};

function buildLineSelectorButtons(){
  const bar=$('line-sel-bar');
  if(!bar||!lineNames.length)return;
  // ลบ button เก่า (ยกเว้น label และ all button)
  const existing=bar.querySelectorAll('.lsel-btn:not(.all)');
  existing.forEach(b=>b.remove());
  lineNames.forEach(name=>{
    const btn=document.createElement('button');
    btn.className='lsel-btn'+(selectedLine===name?' on':'');
    btn.textContent=name;
    btn.onclick=()=>selectLine(name,btn);
    bar.appendChild(btn);
  });
}

function renderAll(){
  if(!lineNames.length)return;
  let html='';
  buildLineSelectorButtons();
  const visibleLines=selectedLine==='all'?lineNames:[selectedLine];
  const isSingle=selectedLine!=='all';

  visibleLines.forEach(name=>{
    const tanks=getTanks(name);
    if(!tanks.length)return;
    const cur=getCurrentTank(tanks);
    const queue=getQueueTanks(tanks,cur);
    const curW=isSingle?'width:280px':'';
    html+='<div class="ls"><div class="ls-title">'+name.toUpperCase()+'</div>';
    html+='<div class="pr"><div class="cur-wrap" style="'+curW+'">';
    html+='<div class="sec-hd"><span class="dot-g"></span><span style="color:var(--green)">กำลังผลิตอยู่</span></div>';
    html+=cur?card(cur,true,isSingle):'<div style="font-family:var(--mono);font-size:12px;color:var(--t3);padding:30px;text-align:center">⏳ รอบ่มเสร็จก่อน</div>';
    html+='</div><div class="que-wrap"><div class="sec-hd"><span class="dot-q"></span><span style="color:var(--t2)">คิวรอผลิตถัดไป</span></div><div class="que-inner">';
    html+=queue.length?queue.map(t=>card(t,false,isSingle)).join(''):'<div style="font-family:var(--mono);font-size:12px;color:var(--t3);padding:20px">ไม่มีคิว</div>';
    html+='</div></div></div></div>';
  });
  $('mg').innerHTML=html||'<div style="padding:80px;text-align:center;color:var(--t3);font-family:var(--mono)">📋 ไม่มีข้อมูลการผลิต</div>';
}

function tick(){
  lineNames.forEach(name=>{
    const tanks=getTanks(name);
    if(!tanks.length)return;
    const cur=getCurrentTank(tanks);
    const queue=getQueueTanks(tanks,cur);
    // อัปเดตทุก tank ที่กำลัง pasteurising
    tanks.forEach(row=>{
      if(row.status!=='pasteurising'||!row.past_start_time)return;
      const{filled,pct}=calcVol(row);
      const pctC=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
      // isCur ตาม DOM จริง — cur = 'C', queue = 'Q'
      const isCur=cur&&cur.id===row.id;
      const isInQueue=queue.find(q=>q.id===row.id);
      const uid=(isCur?'C':isInQueue?'Q':'Q')+row.id.slice(-8);
      const v=$('vol-'+uid),p=$('pct-'+uid);
      if(v){v.textContent=filled.toFixed(1)+' L';v.style.color=pctC;}
      if(p){p.textContent=pct.toFixed(1)+'%';p.style.color=pctC;}
    });
  });
}
</script>
