<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Filling — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--s1:#0b0e17;--s2:#10141f;--s3:#151a28;
  --b1:#1c2235;--b2:#242e48;
  --text:#e4eaf8;--t2:#5e6e90;--t3:#2a3450;
  --blue:#3b7ef6;--blue2:#7ab3ff;
  --green:#1fd17a;--yellow:#f5c842;--red:#f04f5e;
  --cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans)}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,126,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,246,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 14px;gap:8px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700;flex-shrink:0}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.nav-r{display:flex;align-items:center;gap:8px;margin-left:auto}
a.hbtn,button.hbtn{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;text-decoration:none;white-space:nowrap}

main{position:relative;z-index:1;padding:14px}

/* LINE SECTION */
.line-section{margin-bottom:20px;border-radius:16px;border:2px solid rgba(255,140,66,.35);background:rgba(255,140,66,.04);overflow:hidden}
.line-title{font-family:var(--mono);font-size:20px;font-weight:800;color:var(--orange);letter-spacing:.04em;padding:12px 16px 8px;border-bottom:1px solid rgba(255,140,66,.15)}

/* PRODUCT ROW */
.prod-row{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--b1);flex-wrap:nowrap;overflow-x:auto}
.prod-row:last-child{border-bottom:none}

/* CURRENT TANK (left, large) */
.tank-current{flex-shrink:0;width:220px;background:var(--s1);border-radius:12px;border:1px solid rgba(255,140,66,.3);overflow:hidden;position:relative}
.tank-current::before{content:"กำลังผลิต";position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--orange);background:rgba(255,140,66,.15);padding:2px 10px;border-radius:99px;border:1px solid rgba(255,140,66,.3);white-space:nowrap;z-index:5}
.tank-current.curing::before{content:"กำลังบ่ม";color:var(--yellow);background:rgba(245,200,66,.1);border-color:rgba(245,200,66,.3)}
.tank-current.ready::before{content:"✅ พร้อมส่ง";color:var(--green);background:rgba(31,209,122,.1);border-color:rgba(31,209,122,.3)}
.tank-current.empty::before{content:"ว่าง";color:var(--t2);background:var(--s3);border-color:var(--b1)}

/* QUEUE TANKS (right, small) */
.queue-wrap{display:flex;gap:8px;flex:1;flex-wrap:wrap;align-content:flex-start}
.tank-queue{flex-shrink:0;width:160px;background:var(--s2);border-radius:10px;border:1px solid var(--b1);overflow:hidden;opacity:.9}
.queue-label{font-family:var(--mono);font-size:8px;color:var(--t3);text-align:center;padding:4px;background:var(--s3);border-bottom:1px solid var(--b1);font-weight:700;text-transform:uppercase;letter-spacing:.1em}

/* TANK CARD INNER */
.tcard-head{padding:8px 10px 6px}
.tcard-line{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--cyan);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcard-info{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tcard-code{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--orange)}
.tcard-name{font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tcard-batch{font-family:var(--mono);font-size:10px;color:var(--t3)}
.tcard-prod{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--purple);letter-spacing:.08em}
.tcard-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.tcard-icon{font-size:11px;width:16px;text-align:center;flex-shrink:0}
.tcard-val{font-family:var(--mono);font-size:11px;color:var(--t2)}

/* small card variants */
.tank-queue .tcard-line{font-size:10px}
.tank-queue .tcard-code{font-size:11px}
.tank-queue .tcard-name{font-size:10px}
.tank-queue .tcard-batch{font-size:9px}
.tank-queue .tcard-prod{font-size:9px}
.tank-queue .tcard-icon{font-size:10px}
.tank-queue .tcard-val{font-size:10px}

/* TANK SVG WRAP */
.tank-svg-wrap{position:relative;display:flex;justify-content:center;align-items:center;padding:4px 8px 24px}
.tank-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:4;pointer-events:none}
.tank-vol-txt{font-family:var(--mono);font-weight:700;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.tank-pct-txt{font-family:var(--mono);color:rgba(255,255,255,.85);text-shadow:0 1px 4px rgba(0,0,0,.7)}

/* AGING NUM */
.aging-badge{font-family:var(--mono);font-weight:700;background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.3);border-radius:6px;text-align:center;padding:3px 0;margin:6px 10px 0;letter-spacing:.1em}

/* STATUS BAR */
.stat-bar{height:4px;width:100%;margin-top:2px}

/* EMPTY STATE */
.no-queue{font-family:var(--mono);font-size:11px;color:var(--t3);padding:20px;text-align:center}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);padding:9px 20px;border-radius:9px;font-size:12px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.6}100%{transform:translateY(-40px);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ FILLING</span></div>
  <div class="nav-r">
    <a href="index.html" class="hbtn">🏠</a>
    <button class="hbtn" onclick="doLogout()">ออก</button>
  </div>
</nav>

<main id="main-grid">
  <div style="text-align:center;padding:60px;color:var(--t3);font-family:var(--mono)">⏳ กำลังโหลด...</div>
</main>

<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,onSnapshot,getDocs,doc,getDoc}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

let lines=[],lineStates={},planRows=[],productMap={},freezers=[],pipes=[];
let tickTimer=null;
let unsubLines,unsubStates,unsubP1,unsubP2;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);
const fmtL=n=>n>=1000?(n/1000).toFixed(1)+'k':Math.round(n)+'';
const fmtKg=n=>Math.round(n).toLocaleString();

function toast(msg,t='blue'){
  const el=$('toast');el.textContent=msg;
  el.style.background=t==='green'?'#0d7a3e':t==='red'?'#8b1a24':'#1a3d8b';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);
}

function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-Math.round(a*200)),g=Math.max(0,parseInt(h.slice(3,5),16)-Math.round(a*200)),b=Math.max(0,parseInt(h.slice(5,7),16)-Math.round(a*200));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}

// AUTH
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  try{
    const fs=await getDoc(doc(db,'cip_settings','freezers'));
    if(fs.exists())freezers=fs.data().list||[];
    const ps=await getDoc(doc(db,'cip_settings','pipes'));
    if(ps.exists())pipes=ps.data().list||[];
  }catch{}
  await init();
});

window.doLogout=async()=>{
  clearInterval(tickTimer);
  [unsubLines,unsubStates,unsubP1,unsubP2].forEach(u=>u&&u());
  await signOut(auth);window.location.href='index.html';
};

async function init(){
  try{const ps=await getDocs(collection(db,'products'));ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});}catch{}

  unsubLines=onSnapshot(collection(db,'lines'),snap=>{
    lines=snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.type==='Filling').sort((a,b)=>(a.seq||0)-(b.seq||0));
    renderAll();
  });
  unsubStates=onSnapshot(collection(db,'cip_line_states'),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={...d.data()};});
    renderAll();
  });

  const d=today();
  unsubP1=onSnapshot(query(collection(db,'production_plans'),where('date','==',d)),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans').concat(r);renderAll();
  });
  unsubP2=onSnapshot(query(collection(db,'production_plans_m2'),where('date','==',d)),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans_m2',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans_m2').concat(r);renderAll();
  });

  tickTimer=setInterval(tickUpdate,1000);
}

// Get ready tanks for a LINE sorted by seq
function getReadyTanks(lineName){
  return planRows
    .filter(r=>r.filling_line===lineName&&(r.status==='ready'||r.status==='past_done'||r.status==='pasteurising'))
    .sort((a,b)=>(a.seq||0)-(b.seq||0));
}

// Group tanks by product_name so 2 mix = side by side
function groupByProduct(tanks){
  const groups=[];
  const seen=new Set();
  tanks.forEach(t=>{
    const key=t.product_name||t.mix_code||t.id;
    if(!seen.has(key)){
      seen.add(key);
      const group=tanks.filter(x=>(x.product_name||x.mix_code||x.id)===key);
      groups.push(group);
    }
  });
  return groups;
}

// SVG TANK
function tankSVG(uid,pct,col,run,size=180){
  const sw=size,sh=Math.round(size*1.2);
  const bX=12,bY=20,bW=sw-24,bH=sh-44,nW=36,nH=10,cW=44,cH=6;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const fillH=Math.max(0,(pct/100)*(bH-8));const fillY=bY+bH-4-fillH;
  const gid='g'+uid,cid='cl'+uid;
  const barC=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
  return`<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:0 auto">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".95"/><stop offset="100%" stop-color="${darken(col,.3)}" stop-opacity="1"/></linearGradient>
    <clipPath id="${cid}"><rect x="${bX+2}" y="${bY+2}" width="${bW-4}" height="${bH-4}" rx="8"/></clipPath>
  </defs>
  <rect x="${bX+1}" y="${bY+3}" width="${bW+1}" height="${bH+2}" rx="10" fill="rgba(0,0,0,.5)"/>
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="10" fill="#080c18" stroke="#1e2d4a" stroke-width="1.5"/>
  ${pct>0?`<g clip-path="url(#${cid})">
    <rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="${fillH+6}" fill="url(#${gid})"/>
    ${run?`<g style="animation:wave 2s linear infinite">
      <path d="M${bX-8},${fillY+2} q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 v16 h-${bW*6} z" fill="${rgba(col,.5)}"/>
    </g>
    <circle cx="${bX+20}" cy="${fillY+fillH*.4}" r="2.5" fill="${rgba(col,.5)}" style="animation:rise 2.5s ease-in infinite"/>
    <circle cx="${bX+bW*.6}" cy="${fillY+fillH*.6}" r="2" fill="${rgba(col,.4)}" style="animation:rise 2s ease-in infinite;animation-delay:.8s"/>`:
    `<rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="4" rx="2" fill="${rgba(col,.5)}"/>`}
    <rect x="${bX+3}" y="${fillY+4}" width="10" height="${Math.max(0,fillH*.4)}" rx="5" fill="rgba(255,255,255,.08)"/>
  </g>
  <line x1="${bX+bW+3}" y1="${fillY}" x2="${bX+bW+10}" y2="${fillY}" stroke="${barC}" stroke-width="2" stroke-linecap="round"/>`:''}
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="10" fill="none" stroke="${pct>0?rgba(col,.3):'#1e2d4a'}" stroke-width="1.5"/>
  <rect x="${nX}" y="${bY-nH}" width="${nW}" height="${nH+4}" rx="4" fill="#080c18" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${cX}" y="${bY-nH-cH}" width="${cW}" height="${cH+2}" rx="4" fill="#0c1020" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+10}" y="${bY+bH}" width="8" height="10" rx="2" fill="#080c18" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+bW-18}" y="${bY+bH}" width="8" height="10" rx="2" fill="#080c18" stroke="#1e2d4a" stroke-width="1.2"/>
  <rect x="${bX+4}" y="${bY+bH+9}" width="${bW-8}" height="4" rx="2" fill="#080c18" stroke="#1e2d4a" stroke-width="1.2"/>
</svg>`;
}

// TANK CARD — full info
function tankCard(row,isCurrent,queueNo){
  const p=productMap[row.mix_code]||{};
  const col=p.color||'#60a5fa';
  const st=lineStates[row.filling_line]||{};
  const isRunning=st.running&&!!st.start_ts&&(st.aging_tank===row.aging_tank||!st.aging_tank);
  const sv=st.start_vol||+(row.volume_liter||0);
  const elapsed=isRunning?(Date.now()-st.start_ts)/3600000:0;
  const fr=st.flow_rate||300;
  const rem=isRunning?Math.max(0,sv-(elapsed*fr)):+(row.volume_liter||0);
  const pct=sv>0?(rem/sv)*100:100;
  const pctC=pct>50?'var(--green)':pct>20?'var(--yellow)':'var(--red)';

  // status
  let cardStat='',statCol='var(--t2)';
  if(row.status==='pasteurising'){cardStat='♨️ กำลัง Past.';statCol='var(--orange)';}
  else if(row.status==='past_done'){cardStat='⏳ กำลังบ่ม';statCol='var(--yellow)';}
  else if(row.status==='ready'){cardStat=isRunning?'▶ กำลังผลิต':'✅ พร้อมส่ง';statCol=isRunning?'var(--green)':'var(--cyan)';}

  // prod code
  const prodCode=row.prod_suffix?(row.prod_prefix||'')+row.prod_suffix:'—';

  // freezer/pipe from cip state
  const fz=st.fz_A||'—';
  const pp=st.pp_A||'—';
  const agingTank=st.aging_tank||row.aging_tank||'—';

  const size=isCurrent?180:130;
  const uid=(isCurrent?'C':'Q')+row.id.slice(-6);

  return`<div class="${isCurrent?'tank-current':'tank-queue'}${row.status==='past_done'?' curing':row.status==='ready'?' ready':''}">
    ${!isCurrent?`<div class="queue-label">รอผลิต ลำดับที่ ${queueNo}</div>`:''}
    <div class="tcard-head">
      <div class="tcard-line">${row.filling_line||'—'}</div>
      <div class="tcard-info">
        <span class="tcard-code">${row.mix_code||'—'}</span>
        <span style="color:var(--t3);font-size:10px">|</span>
        <span class="tcard-name">${row.mix_name||'—'}</span>
      </div>
      <div class="tcard-row">
        <span class="tcard-batch" style="font-family:var(--mono)">Batch ${row.batch_no||'—'}</span>
      </div>
      <div class="tcard-row" style="margin-top:2px">
        <span class="tcard-prod">${prodCode}</span>
      </div>
      ${isCurrent?`
      <div class="tcard-row" style="margin-top:4px">
        <span class="tcard-icon">🧊</span><span class="tcard-val">${fz}</span>
      </div>
      <div class="tcard-row">
        <span class="tcard-icon">🔧</span><span class="tcard-val">${pp}</span>
      </div>`:''}
    </div>
    <div class="aging-badge" style="font-size:${isCurrent?14:11}px">${agingTank}</div>
    <div class="tank-svg-wrap" id="svgwrap-${uid}">
      ${tankSVG(uid,pct,col,isRunning,size)}
      <div class="tank-overlay">
        <div class="tank-vol-txt" style="font-size:${isCurrent?15:11}px" id="vol-${uid}">${fmtL(rem)} L</div>
        <div class="tank-pct-txt" style="font-size:${isCurrent?13:10}px" id="pct-${uid}">${pct.toFixed(1)}%</div>
      </div>
    </div>
    <div style="text-align:center;padding:2px 8px 8px">
      <span style="font-family:var(--mono);font-size:${isCurrent?11:9}px;font-weight:700;color:${statCol};background:${statCol}22;padding:3px 10px;border-radius:99px;border:1px solid ${statCol}44">${cardStat||'—'}</span>
    </div>
    <div class="stat-bar" style="background:${rgba(col,.5)}"></div>
  </div>`;
}

// RENDER ALL
function renderAll(){
  const main=$('main-grid');
  if(!lines.length){main.innerHTML=`<div style="text-align:center;padding:60px;color:var(--t3);font-family:var(--mono)">ยังไม่มี LINE ในระบบ</div>`;return;}

  let html='';
  lines.forEach(line=>{
    const tanks=getReadyTanks(line.name);
    html+=`<div class="line-section">
      <div class="line-title">${line.name.toUpperCase()}</div>`;

    if(!tanks.length){
      html+=`<div class="no-queue">ไม่มี batch ที่พร้อมผลิต</div>`;
    } else {
      // แถวแรก = กำลังผลิต (ซ้าย) + คิวถัดไป (ขวา)
      const current=tanks[0];
      const queue=tanks.slice(1);
      html+=`<div class="prod-row">`;
      html+=tankCard(current,true,0);
      html+=`<div class="queue-wrap">`;
      if(queue.length){
        queue.forEach((qt,i)=>{
          html+=tankCard(qt,false,i+2);
        });
      } else {
        html+=`<div class="no-queue">ไม่มีคิวถัดไป</div>`;
      }
      html+=`</div></div>`;
    }
    html+=`</div>`;
  });
  main.innerHTML=html;
}

// TICK — update volume countdown
function tickUpdate(){
  lines.forEach(line=>{
    const st=lineStates[line.id];
    if(!st?.running||!st?.start_ts)return;
    const elapsed=(Date.now()-st.start_ts)/3600000;
    const sv=st.start_vol||0,fr=st.flow_rate||300;
    const rem=Math.max(0,sv-(elapsed*fr));
    const pct=sv>0?(rem/sv)*100:0;

    const tanks=getReadyTanks(line.name);
    const current=tanks[0];
    if(!current)return;
    const p=productMap[current.mix_code]||{};
    const uid='C'+current.id.slice(-6);
    const vEl=document.getElementById('vol-'+uid);
    const pEl=document.getElementById('pct-'+uid);
    if(vEl)vEl.textContent=fmtL(rem)+' L';
    if(pEl)pEl.textContent=pct.toFixed(1)+'%';
  });
}
</script>
</body>
</html>
