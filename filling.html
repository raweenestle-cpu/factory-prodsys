<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filling Dashboard — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Sarabun:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080e;--s1:#0b0e17;--s2:#10141f;--s3:#151a28;
  --b1:#1c2235;--b2:#242e48;
  --text:#e4eaf8;--t2:#5e6e90;--t3:#2a3450;
  --blue:#3b7ef6;--blue2:#7ab3ff;
  --green:#1fd17a;--yellow:#f5c842;--red:#f04f5e;
  --cyan:#00d4ff;--orange:#ff8c42;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(59,126,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,246,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:56px;background:rgba(6,8,14,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:0 20px;gap:8px;overflow-x:auto}
.nav-logo{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.08em;margin-right:12px;flex-shrink:0}
.nav-logo b{color:var(--blue)}.nav-logo span{color:var(--t2)}
.ntab{font-size:12px;font-weight:600;padding:5px 12px;border-radius:7px;border:none;background:none;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.ntab.on{color:var(--blue2);background:rgba(59,126,246,.1);border:1px solid rgba(59,126,246,.2)}
.nav-r{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}
.live-wrap{display:flex;align-items:center;gap:6px;background:rgba(31,209,122,.08);border:1px solid rgba(31,209,122,.2);border-radius:20px;padding:4px 12px;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 1.5s infinite}
.live-text{font-family:var(--mono);font-size:10px;color:var(--green);letter-spacing:.08em}
#clock{font-family:var(--mono);font-size:13px;color:var(--blue2);width:80px;display:inline-block;text-align:center}
.role-pill{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:4px;background:rgba(59,126,246,.15);color:var(--blue2);border:1px solid rgba(59,126,246,.25)}
.nav-user{font-family:var(--mono);font-size:11px;color:var(--t2)}
.btn-logout{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer}
.btn-logout:hover{color:var(--red);border-color:var(--red)}

/* MAIN */
main{position:relative;z-index:1;padding:14px 20px}
.page{display:none}
.page.on{display:block}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;top:0;left:0;right:0;height:2px}
.kpi.c1::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.kpi.c2::after{background:linear-gradient(90deg,var(--green),#6efcb4)}
.kpi.c3::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.c4::after{background:var(--b2)}
.kpi-lbl{font-size:10px;color:var(--t2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.kpi-val{font-size:26px;font-weight:700;font-family:var(--mono)}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sec-ttl{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--t3);white-space:nowrap}
.sec-ln{flex:1;height:1px;background:linear-gradient(90deg,var(--b2),transparent)}

/* CARD */
.lcard{background:var(--s1);border:1px solid var(--b1);border-radius:16px;overflow:hidden;width:100%;margin-bottom:14px;transform:translateZ(0)}
.lcard.running{border-color:rgba(31,209,122,.2);box-shadow:0 0 0 1px rgba(31,209,122,.08)}
.lcard.curing{border-color:rgba(245,200,66,.2)}
.lcard.stopped{border-color:rgba(59,126,246,.18)}
.lcard.empty{opacity:.5}
.accent{height:3px}
.running .accent{background:linear-gradient(90deg,var(--green),var(--cyan),var(--blue));background-size:200%;animation:shimmer 3s linear infinite}
.curing .accent{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.stopped .accent{background:linear-gradient(90deg,var(--blue),var(--purple))}
.empty .accent{background:var(--b2)}

/* HEAD */
.chead{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1)}
.lname{font-family:var(--mono);font-size:15px;font-weight:700}
.lsub{font-size:11px;color:var(--t2);margin-top:2px}
.spill{font-family:var(--mono);font-size:10px;font-weight:600;padding:4px 12px;border-radius:99px;white-space:nowrap;flex-shrink:0}
.sp-run{background:rgba(31,209,122,.12);color:var(--green);border:1px solid rgba(31,209,122,.25)}
.sp-cur{background:rgba(245,200,66,.12);color:var(--yellow);border:1px solid rgba(245,200,66,.25);animation:blink .9s infinite}
.sp-stp{background:rgba(59,126,246,.1);color:var(--blue2);border:1px solid rgba(59,126,246,.2)}
.sp-emp{background:var(--s3);color:var(--t3)}

/* CARD BODY — TABLE (stable layout) */
.cbody{display:table;width:100%;table-layout:fixed;border-collapse:collapse}
.cbody-row{display:table-row}
.c-tank{display:table-cell;width:230px;min-width:230px;max-width:230px;padding:16px 14px;border-right:1px solid var(--b1);background:rgba(0,0,0,.15);vertical-align:top;text-align:center}
.c-info{display:table-cell;width:280px;min-width:280px;max-width:280px;padding:16px 14px;border-right:1px solid var(--b1);vertical-align:top}
.c-queue{display:table-cell;padding:16px 14px;vertical-align:top}

/* TANK */
.tank-num{font-family:var(--mono);font-size:13px;font-weight:700;padding:3px 12px;border-radius:6px;display:inline-block;margin-bottom:8px;white-space:nowrap}
.tvol{font-family:var(--mono);font-size:16px;font-weight:700;display:block;text-align:center;width:200px;margin:0 auto;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";white-space:nowrap}
.tpct{font-family:var(--mono);font-size:13px;display:block;text-align:center;width:200px;margin:0 auto;font-variant-numeric:tabular-nums;font-feature-settings:"tnum";white-space:nowrap}
.teta{font-size:11px;color:var(--t2);display:block;text-align:center;width:200px;margin:0 auto;min-height:16px;white-space:nowrap}

/* PROGRESS BAR (ใต้ถัง) */
.prog-wrap{width:200px;margin:6px auto 0}
.prog-bg{height:6px;background:var(--s3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* CURING STRIP */
.cur-strip{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:12px}
.cur-strip.done{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.15)}
.cur-strip.pend{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.15)}
.cur-txt{font-family:var(--mono);font-size:11px;font-weight:600}
.cur-sub{font-size:10px;color:var(--t2);margin-top:1px}

/* CURING UNDER TANK (dual) */
.tcur{margin:8px auto 0;padding:6px 10px;border-radius:8px;max-width:200px;text-align:center}
.tcur.done{background:rgba(31,209,122,.07);border:1px solid rgba(31,209,122,.18)}
.tcur.pend{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.15)}
.tcur-icon{font-size:12px}
.tcur-txt{font-family:var(--mono);font-size:10px;font-weight:700;margin-top:2px}
.tcur-time{font-family:var(--mono);font-size:9px;color:var(--t2);margin-top:1px}

/* DUAL */
.dual-tank-row{display:flex;gap:12px;align-items:flex-start;justify-content:center}
.dual-sep{width:1px;background:var(--b1);align-self:stretch;margin:4px 0;flex-shrink:0}

/* INFO */
.pcode{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue2);margin-bottom:2px}
.pname{font-size:12px;color:var(--t2);margin-bottom:10px}
.ptags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.ptag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:5px;background:var(--s3);color:var(--t2);border:1px solid var(--b1);display:flex;align-items:center;gap:4px;white-space:nowrap}
.cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* FP display (read only) */
.fp-display{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.fp-tag{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:5px;background:var(--s2);border:1px solid var(--b1);color:var(--t2);display:flex;align-items:center;gap:4px}

/* QUEUE */
.qlbl{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.qlist{display:flex;flex-direction:column;gap:5px}
.qitem{display:block;padding:8px 10px;border-radius:8px;border:1px solid var(--b1);background:var(--s2)}
.qitem.current{background:rgba(59,126,246,.08);border-color:rgba(59,126,246,.25)}
.qitem.ready{background:rgba(31,209,122,.06);border-color:rgba(31,209,122,.18)}
.qitem.curing{background:rgba(245,200,66,.05);border-color:rgba(245,200,66,.15)}
.qitem.pasting{background:rgba(249,115,22,.05);border-color:rgba(249,115,22,.15)}
.qrow1{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.qrow2{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.qnum{font-family:var(--mono);font-size:10px;color:var(--t3);min-width:14px}
.qdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.qtank{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 7px;border-radius:4px;background:rgba(0,212,255,.08);color:var(--cyan);border:1px solid rgba(0,212,255,.15)}
.qcode{font-family:var(--mono);font-size:11px;font-weight:700}
.qbatch{font-family:var(--mono);font-size:10px;color:var(--t2)}
.qstat{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.qtime{font-family:var(--mono);font-size:10px}
.dual-q{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.dual-q-lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.spin-hg{display:inline-block;animation:hgspin 2s ease-in-out infinite}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);padding:9px 20px;border-radius:10px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RESPONSIVE MOBILE */
@media(max-width:768px){
  .cbody,.cbody-row{display:block!important;width:100%!important}
  .c-tank{display:block!important;width:100%!important;min-width:unset!important;max-width:unset!important;border-right:none!important;border-bottom:1px solid var(--b1);padding:18px!important;text-align:center}
  .c-info{display:block!important;width:100%!important;min-width:unset!important;max-width:unset!important;border-right:none!important;border-bottom:1px solid var(--b1);padding:16px!important}
  .c-queue{display:block!important;width:100%!important;padding:16px!important}
  .tvol{font-size:22px!important;width:100%!important}
  .tpct{font-size:15px!important;width:100%!important}
  .teta{font-size:12px!important;width:100%!important}
  .prog-wrap{width:100%!important}
  .tcur{max-width:260px!important;margin:10px auto 0!important}
  .dual-tank-row{flex-direction:column!important;align-items:center!important;gap:20px!important}
  .dual-sep{width:80%!important;height:1px!important;margin:4px auto!important}
  .dual-q{grid-template-columns:1fr!important}
  .kpi-row{grid-template-columns:repeat(2,1fr)!important}
  .lname{font-size:18px!important}
}

@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
@keyframes wave{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes rise{0%{transform:translateY(0);opacity:.7}100%{transform:translateY(-50px);opacity:0}}
@keyframes hgspin{0%{transform:rotate(0deg)}45%{transform:rotate(0deg)}55%{transform:rotate(180deg)}100%{transform:rotate(180deg)}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">PROD<b>.</b>SYS <span>/ FILLING</span></div>
  <button class="ntab on" onclick="showPage('bangchan',this)">🏭 Bangchan</button>
  <button class="ntab" onclick="showPage('twin',this)">🏭 Twin</button>
  <button class="ntab" onclick="showPage('overview',this)">📊 ภาพรวม</button>
  <div class="nav-r">
    <div class="live-wrap"><div class="live-dot"></div><span class="live-text">LIVE</span></div>
    <span id="clock">00:00:00</span>
    <span class="nav-user" id="nav-user"></span>
    <span class="role-pill">FILLING</span>
    <a href="index.html" style="font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0">🏠 Home</a>
    <button class="btn-logout" onclick="doLogout()">Logout</button>
  </div>
</nav>

<main>
  <!-- BANGCHAN -->
  <div class="page on" id="page-bangchan">
    <div class="kpi-row">
      <div class="kpi c1"><div class="kpi-lbl">LINE ทั้งหมด</div><div class="kpi-val" id="bc-total" style="color:var(--blue2)">0</div></div>
      <div class="kpi c2"><div class="kpi-lbl">กำลังเดิน</div><div class="kpi-val" id="bc-run" style="color:var(--green)">0</div></div>
      <div class="kpi c3"><div class="kpi-lbl">กำลังบ่ม</div><div class="kpi-val" id="bc-cur" style="color:var(--yellow)">0</div></div>
      <div class="kpi c4"><div class="kpi-lbl">ว่าง</div><div class="kpi-val" id="bc-idle" style="color:var(--t2)">0</div></div>
    </div>
    <div class="sec-hdr"><span class="sec-ttl">🏭 Bangchan Lines</span><div class="sec-ln"></div></div>
    <div id="grid-bangchan"></div>
  </div>

  <!-- TWIN -->
  <div class="page" id="page-twin">
    <div class="kpi-row">
      <div class="kpi c1"><div class="kpi-lbl">LINE ทั้งหมด</div><div class="kpi-val" id="tw-total" style="color:var(--blue2)">0</div></div>
      <div class="kpi c2"><div class="kpi-lbl">กำลังเดิน</div><div class="kpi-val" id="tw-run" style="color:var(--green)">0</div></div>
      <div class="kpi c3"><div class="kpi-lbl">กำลังบ่ม</div><div class="kpi-val" id="tw-cur" style="color:var(--yellow)">0</div></div>
      <div class="kpi c4"><div class="kpi-lbl">ว่าง</div><div class="kpi-val" id="tw-idle" style="color:var(--t2)">0</div></div>
    </div>
    <div class="sec-hdr"><span class="sec-ttl">🏭 Twin Lines</span><div class="sec-ln"></div></div>
    <div id="grid-twin"></div>
  </div>

  <!-- OVERVIEW -->
  <div class="page" id="page-overview">
    <div class="kpi-row">
      <div class="kpi c1"><div class="kpi-lbl">LINE ทั้งหมด</div><div class="kpi-val" id="ov-total" style="color:var(--blue2)">0</div></div>
      <div class="kpi c2"><div class="kpi-lbl">กำลังเดิน</div><div class="kpi-val" id="ov-run" style="color:var(--green)">0</div></div>
      <div class="kpi c3"><div class="kpi-lbl">กำลังบ่ม</div><div class="kpi-val" id="ov-cur" style="color:var(--yellow)">0</div></div>
      <div class="kpi c4"><div class="kpi-lbl">ว่าง</div><div class="kpi-val" id="ov-idle" style="color:var(--t2)">0</div></div>
    </div>
    <div class="sec-hdr"><span class="sec-ttl">🏭 Bangchan</span><div class="sec-ln"></div></div>
    <div id="grid-ov-bangchan"></div>
    <div class="sec-hdr" style="margin-top:8px"><span class="sec-ttl">🏭 Twin</span><div class="sec-ln"></div></div>
    <div id="grid-ov-twin"></div>
  </div>
</main>

<div id="toast"></div>

<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

let ME=null;
let lines=[],lineStates={},planRows=[],productMap={};
let tickTimer=null;
let unsubLines=null,unsubStates=null,unsubP1=null,unsubP2=null;

const today=()=>new Date().toISOString().slice(0,10);
const $=id=>document.getElementById(id);

// CLOCK
const clockEl=$('clock');
function tick(){const d=new Date();clockEl.textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');}
setInterval(tick,1000);tick();

function toast(msg,t='blue'){
  const el=$('toast');el.textContent=msg;
  el.style.background=t==='green'?'#0d7a3e':t==='red'?'#8b1a24':'#1a3d8b';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);
}

// COLOR UTILS
function rgba(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function darken(h,a){const r=Math.max(0,parseInt(h.slice(1,3),16)-Math.round(a*255)),g=Math.max(0,parseInt(h.slice(3,5),16)-Math.round(a*255)),b=Math.max(0,parseInt(h.slice(5,7),16)-Math.round(a*255));return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;}
function pctColor(p){return p>50?'var(--green)':p>20?'var(--yellow)':'var(--red)';}

// AUTH
onAuthStateChanged(auth,async user=>{
  if(!user){window.location.href='index.html';return;}
  ME=user;
  try{
    const snap=await getDocs(query(collection(db,'users'),where('uid','==',user.uid)));
    const role=snap.empty?'filling':(snap.docs[0].data().role||'filling');
    if(role!=='filling'&&role!=='admin'&&role!=='leadman'&&role!=='operator'){window.location.href='index.html';return;}
  }catch{}
  $('nav-user').textContent=user.email.replace('@filling.local','');
  await init();
});

window.doLogout=async()=>{
  clearInterval(tickTimer);
  [unsubLines,unsubStates,unsubP1,unsubP2].forEach(u=>u&&u());
  await signOut(auth);window.location.href='index.html';
};

async function init(){
  try{
    const ps=await getDocs(collection(db,'products'));
    ps.docs.forEach(d=>{const p={id:d.id,...d.data()};productMap[p.mix_code]=p;});
  }catch{}

  unsubLines=onSnapshot(collection(db,'lines'),snap=>{
    lines=snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.type==='Filling').sort((a,b)=>(a.seq||0)-(b.seq||0));
    renderAll();
  });
  unsubStates=onSnapshot(collection(db,'cip_line_states'),snap=>{
    lineStates={};snap.docs.forEach(d=>{lineStates[d.id]={...d.data()};});
    renderAll();
  });

  const d=today();
  unsubP1=onSnapshot(query(collection(db,'production_plans'),where('date','==',d),orderBy('seq','asc')),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans').concat(r);renderAll();
  });
  unsubP2=onSnapshot(query(collection(db,'production_plans_m2'),where('date','==',d),orderBy('seq','asc')),snap=>{
    const r=snap.docs.map(d=>({id:d.id,_col:'production_plans_m2',...d.data()}));
    planRows=planRows.filter(x=>x._col!=='production_plans_m2').concat(r);renderAll();
  });

  tickTimer=setInterval(tickCountdowns,1000);
}

// HELPERS
function getTanksForLine(lineName){
  return planRows.filter(r=>r.filling_line===lineName&&(r.status==='ready'||r.status==='past_done'||r.status==='pasteurising')).sort((a,b)=>(a.seq||0)-(b.seq||0));
}
function isDualLine(lineName){
  const t=getTanksForLine(lineName);
  return t.length>=2&&(t[0].mix_name===t[1].mix_name||t[0].batch_no===t[1].batch_no);
}
function calcCuringEnd(pastEnd,agingHr){
  if(!pastEnd||!agingHr)return'—';
  const[h,m]=pastEnd.split(':').map(Number);const tot=h*60+m+(+agingHr)*60;
  return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function getCuringInfo(row,lineId){
  if(!row||!row.past_end_time)return{done:false,endTime:'—'};
  const p=productMap[row.mix_code];const agingHr=+(p?.aging_time||4);
  const endTime=calcCuringEnd(row.past_end_time,agingHr);
  const[eh,em]=endTime.split(':').map(Number);
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  return{done:(eh*60+em)<=nowMin||(lineStates[lineId]||{}).curing_done||false,endTime};
}
function getEtaStr(rem,flow,run){
  if(!run||rem<=0)return'';
  const m=Math.round((rem/flow)*60);const d=new Date();d.setMinutes(d.getMinutes()+m);
  return'หมด ~'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function getFP(lineId,tank){const st=lineStates[lineId]||{};return{fz:st[`fz_${tank}`]||'',pp:st[`pp_${tank}`]||''};}

// SVG TANK
function tankSVG(uid,pct,col,run,sw,sh){
  sw=sw||130;sh=sh||170;
  const bX=8,bY=20,bW=sw-16,bH=sh-46,nW=36,nH=12,cW=46,cH=7;
  const nX=bX+(bW-nW)/2,cX=bX+(bW-cW)/2;
  const fillH=Math.max(0,(pct/100)*(bH-8));const fillY=bY+bH-4-fillH;
  const gid='g'+uid,cid='cl'+uid,lid='l'+uid;
  const barC=pct>50?'#1fd17a':pct>20?'#f5c842':'#f04f5e';
  return`<svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg" style="display:block;flex-shrink:0">
  <defs>
    <linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity=".95"/><stop offset="100%" stop-color="${darken(col,.3)}" stop-opacity="1"/></linearGradient>
    <radialGradient id="${lid}" cx="40%" cy="20%" r="70%"><stop offset="0%" stop-color="${col}" stop-opacity=".2"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></radialGradient>
    <clipPath id="${cid}"><rect x="${bX+2}" y="${bY+2}" width="${bW-4}" height="${bH-4}" rx="7"/></clipPath>
  </defs>
  ${run&&pct>0?`<ellipse cx="${bX+bW/2}" cy="${bY+bH*.65}" rx="${bW*.42}" ry="${bH*.28}" fill="url(#${lid})"/>`:''}
  <rect x="${bX+2}" y="${bY+3}" width="${bW}" height="${bH+2}" rx="9" fill="rgba(0,0,0,.4)"/>
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="#090d18" stroke="#1a2540" stroke-width="1.5"/>
  ${pct>0?`<g clip-path="url(#${cid})">
    <rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="${fillH+6}" fill="url(#${gid})"/>
    ${run?`<g style="animation:wave 2.2s linear infinite"><path d="M${bX-8},${fillY+1} q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 q8,-5 16,0 q8,5 16,0 v16 h-${bW*4} z" fill="${rgba(col,.5)}"/></g>
    <circle cx="${bX+20}" cy="${fillY+fillH*.5}" r="2.5" fill="${rgba(col,.5)}" style="animation:rise 2.8s ease-in infinite;animation-delay:.2s"/>
    <circle cx="${bX+bW*.6}" cy="${fillY+fillH*.65}" r="1.8" fill="${rgba(col,.45)}" style="animation:rise 2.2s ease-in infinite;animation-delay:.8s"/>`
    :`<rect x="${bX+2}" y="${fillY}" width="${bW-4}" height="5" rx="2" fill="${rgba(col,.6)}"/>`}
    <rect x="${bX+3}" y="${fillY+3}" width="10" height="${Math.max(0,fillH*.4)}" rx="4" fill="rgba(255,255,255,.12)"/>
  </g>`:''}
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="9" fill="none" stroke="${pct>0?rgba(col,.3):'#1a2540'}" stroke-width="1.5"/>
  ${pct>0?`<line x1="${bX+bW+3}" y1="${fillY}" x2="${bX+bW+10}" y2="${fillY}" stroke="${barC}" stroke-width="2" stroke-linecap="round"/><rect x="${bX+bW+7}" y="${fillY}" width="2.5" height="${bY+bH-fillY}" fill="${barC}" opacity=".2" rx="1"/>`:''}
  <rect x="${nX}" y="${bY-nH}" width="${nW}" height="${nH+4}" rx="4" fill="#090d18" stroke="#1a2540" stroke-width="1.5"/>
  <rect x="${cX}" y="${bY-nH-cH}" width="${cW}" height="${cH+2}" rx="4" fill="#0d1220" stroke="#202e4a" stroke-width="1.5"/>
  <circle cx="${cX+7}" cy="${bY-nH-cH/2-1}" r="1.8" fill="#1a2540"/>
  <circle cx="${cX+cW-7}" cy="${bY-nH-cH/2-1}" r="1.8" fill="#1a2540"/>
  <rect x="${bX+10}" y="${bY+bH}" width="8" height="12" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+bW-18}" y="${bY+bH}" width="8" height="12" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+5}" y="${bY+bH+10}" width="${bW-10}" height="4" rx="2" fill="#090d18" stroke="#1a2540" stroke-width="1"/>
  <rect x="${bX+2}" y="${bY+2}" width="11" height="${bH-4}" rx="5" fill="rgba(255,255,255,.025)"/>
</svg>`;
}

// QUEUE LIST (read-only)
function queueList(q,accent,lineId){
  if(!q||!q.length)return`<div style="color:var(--t3);font-family:var(--mono);font-size:11px">ไม่มีคิว</div>`;
  const SM={
    current:{bg:'rgba(59,126,246,.1)',bc:'rgba(59,126,246,.3)',tc:'var(--blue2)',icon:'▶',lbl:'กำลังผลิต'},
    ready:{bg:'rgba(31,209,122,.08)',bc:'rgba(31,209,122,.2)',tc:'var(--green)',icon:'✅',lbl:'บ่มผ่านแล้ว'},
    curing:{bg:'rgba(245,200,66,.06)',bc:'rgba(245,200,66,.18)',tc:'var(--yellow)',icon:'',lbl:'กำลังบ่ม'},
    pasting:{bg:'rgba(249,115,22,.06)',bc:'rgba(249,115,22,.18)',tc:'var(--orange)',icon:'♨️',lbl:'กำลัง Past.'},
  };
  return q.map((item,i)=>{
    let stat='pasting';
    if(item.status==='ready'||item.status==='past_done')stat=i===0&&(lineStates[lineId]||{}).running?'current':'ready';
    if(i===0&&(lineStates[lineId]||{}).running)stat='current';
    const s=SM[stat]||SM.curing;
    const anim=stat==='pasting'?'animation:blink .9s infinite':'';
    const hg=stat==='curing'?`<span class="spin-hg">⏳</span>`:s.icon;
    const p=productMap[item.mix_code];
    const ce=(stat==='curing'||stat==='ready')&&item.past_end_time?calcCuringEnd(item.past_end_time,+(p?.aging_time||4)):'';
    const col=p?.color||'#60a5fa';
    return`<div class="qitem ${stat}">
      <div class="qrow1">
        <span class="qnum">${i+1}</span>
        <span class="qdot" style="background:${col}"></span>
        ${item.aging_tank?`<span class="qtank">${item.aging_tank}</span>`:`<span style="font-family:var(--mono);font-size:10px;color:var(--t3);padding:1px 7px;border-radius:4px;border:1px dashed var(--b2)">—</span>`}
        <span class="qcode" style="color:${accent||'var(--blue2)'}">${item.mix_code||'—'}</span>
        <span class="qbatch">${item.batch_no||'—'}</span>
      </div>
      <div class="qrow2">
        <span class="qstat" style="background:${s.bg};border:1px solid ${s.bc};color:${s.tc};${anim}">${hg} ${s.lbl}</span>
        ${ce?`<span class="qtime" style="color:${stat==='ready'?'var(--green)':'var(--yellow)'}">บ่มเสร็จ <b>${ce}</b></span>`:''}
      </div>
    </div>`;
  }).join('');
}

// BUILD CARD (read-only — no controls)
function buildCard(line,prefix='card'){
  const tanks=getTanksForLine(line.name);
  const current=tanks[0]||null;
  const dual=isDualLine(line.name)&&tanks.length>=2;
  const st=lineStates[line.id]||{};
  const isRunning=st.running&&!!st.start_ts;
  const curing1=getCuringInfo(current,line.id);
  const curing2=dual?getCuringInfo(tanks[1],line.id):{done:false,endTime:'—'};
  const cardStatus=isRunning?'running':current&&!curing1.done?'curing':current?'stopped':'empty';
  const pm={running:'sp-run',curing:'sp-cur',stopped:'sp-stp',empty:'sp-emp'};
  const pt={running:'● กำลังเดิน',curing:'⏳ กำลังบ่ม',stopped:'⏸ หยุด',empty:'○ ว่าง'};
  const pill=`<span class="spill ${pm[cardStatus]}">${pt[cardStatus]}</span>`;

  // EMPTY
  if(!current)return`<div class="lcard empty" id="${prefix}-${line.id}">
    <div class="accent"></div>
    <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||'—'} · ${line.flow_rate||300} L/hr</div></div>${pill}</div>
    <div style="text-align:center;padding:36px"><div style="font-size:36px;opacity:.15;margin-bottom:8px">🏭</div><div style="font-family:var(--mono);font-size:12px;color:var(--t3)">ไม่มีถังที่พร้อม</div></div>
  </div>`;

  const col=productMap[current.mix_code]?.color||'#60a5fa';
  const fp=getFP(line.id,'A');

  // SINGLE
  if(!dual){
    const sv=st.start_vol||+(current.volume_liter||0);
    const elapsed=isRunning&&st.start_ts?(Date.now()-st.start_ts)/3600000:0;
    const fr=st.flow_rate||line.flow_rate||300;
    const rem=Math.max(0,sv-(elapsed*fr));
    const pct=sv>0?(rem/sv)*100:0;const pctC=pctColor(pct);
    return`<div class="lcard ${cardStatus}" id="${prefix}-${line.id}">
      <div class="accent"></div>
      <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||'—'} · ${fr} L/hr</div></div>${pill}</div>
      <div class="cbody"><div class="cbody-row">
        <!-- COL1: TANK -->
        <div class="c-tank">
          <span class="tank-num" style="background:rgba(0,212,255,.1);color:var(--cyan);border:1px solid rgba(0,212,255,.25)">${st.aging_tank||current.aging_tank||'—'}</span>
          ${tankSVG('S'+prefix+line.id,pct,col,isRunning,170,220)}
          <span class="tvol" id="vol-S${prefix}${line.id}" style="color:${pctC}">${rem.toFixed(2)} L</span>
          <div class="prog-wrap"><div class="prog-bg"><div class="prog-fill" id="bar-S${prefix}${line.id}" style="width:${pct.toFixed(1)}%;background:${pctC}"></div></div></div>
          <span class="tpct" id="pct-S${prefix}${line.id}" style="color:${pctC}">${pct.toFixed(1)}%</span>
          <span class="teta" id="eta-S${prefix}${line.id}">${getEtaStr(rem,fr,isRunning)}</span>
        </div>
        <!-- COL2: INFO -->
        <div class="c-info">
          <div style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="cdot" style="background:${col};width:10px;height:10px"></span>
              <span style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue2)">${current.mix_code||'—'}</span>

            </div>
          </div>
          ${fp.fz||fp.pp?`<div class="fp-display">
            ${fp.fz?`<span class="fp-tag">🧊 ${fp.fz}</span>`:''}
            ${fp.pp?`<span class="fp-tag">🔧 ${fp.pp}</span>`:''}
          </div>`:''}
          <div class="cur-strip ${curing1.done?'done':'pend'}" style="margin-top:12px">
            <div style="font-size:16px">${curing1.done?'✅':'⏳'}</div>
            <div><div class="cur-txt" style="color:${curing1.done?'var(--green)':'var(--yellow)'}">${curing1.done?'บ่มเสร็จแล้ว':'กำลังบ่ม'}</div>
            <div class="cur-sub">Past. ${current.past_end_time||'—'} → บ่มเสร็จ ${curing1.endTime}</div></div>
          </div>
        </div>

          <div class="qlbl">📋 คิวทั้งหมด</div>

  const frA=st.flow_rate_A||line.flow_rate||300,frB=st.flow_rate_B||120;
  const remA=Math.max(0,svA-(elapsed*frA)),remB=Math.max(0,svB-(elapsed*frB));
  const pctA=svA>0?(remA/svA)*100:0,pctB=svB>0?(remB/svB)*100:0;
  const cA=pctColor(pctA),cB=pctColor(pctB);
  const fpA=getFP(line.id,'A'),fpB=getFP(line.id,'B');

  return`<div class="lcard ${cardStatus}" id="${prefix}-${line.id}">

    <div class="chead"><div><div class="lname">${line.name}</div><div class="lsub">${line.product||'—'} · Dual Tank</div></div>${pill}</div>
    <div class="cbody"><div class="cbody-row">
      <!-- COL1: 2 TANKS -->
      <div class="c-tank" style="width:auto;min-width:auto;max-width:none">

            ${tankSVG('A'+prefix+line.id,pctA,colA,isRunning,140,185)}

            <div class="prog-wrap" style="width:140px"><div class="prog-bg"><div class="prog-fill" id="bar-A${prefix}${line.id}" style="width:${pctA.toFixed(1)}%;background:${cA}"></div></div></div>
            <span class="tpct" id="pct-A${prefix}${line.id}" style="color:${cA}">${pctA.toFixed(1)}%</span>
            <span class="teta" id="eta-A${prefix}${line.id}">${getEtaStr(remA,frA,isRunning)}</span>
            <div class="tcur ${curing1.done?'done':'pend'}" style="width:140px">
              <div class="tcur-icon">${curing1.done?'✅':'⏳'}</div>
              <div class="tcur-txt" style="color:${curing1.done?'var(--green)':'var(--yellow)'}">${curing1.done?'บ่มเสร็จ':'กำลังบ่ม'}</div>
              <div class="tcur-time">${curing1.endTime}</div>
            </div>
          </div>
          <div class="dual-sep"></div>
          <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
            <span class="tank-num" style="background:rgba(155,109,255,.1);color:var(--purple);border:1px solid rgba(155,109,255,.25)">${st.aging_tank_B||tB?.aging_tank||'—'}</span>
            ${tankSVG('B'+prefix+line.id,pctB,colB,isRunning,140,185)}
            <span class="tvol" id="vol-B${prefix}${line.id}" style="color:${cB}">${remB.toFixed(2)} L</span>
            <div class="prog-wrap" style="width:140px"><div class="prog-bg"><div class="prog-fill" id="bar-B${prefix}${line.id}" style="width:${pctB.toFixed(1)}%;background:${cB}"></div></div></div>
            <span class="tpct" id="pct-B${prefix}${line.id}" style="color:${cB}">${pctB.toFixed(1)}%</span>
            <span class="teta" id="eta-B${prefix}${line.id}">${getEtaStr(remB,frB,isRunning)}</span>
            <div class="tcur ${curing2.done?'done':'pend'}" style="width:140px">
              <div class="tcur-icon">${curing2.done?'✅':'⏳'}</div>
              <div class="tcur-txt" style="color:${curing2.done?'var(--green)':'var(--yellow)'}">${curing2.done?'บ่มเสร็จ':'กำลังบ่ม'}</div>
              <div class="tcur-time">${curing2.endTime}</div>
            </div>
          </div>
        </div>
      </div>
      <!-- COL2: INFO -->
      <div class="c-info">
        <div style="margin-bottom:12px">
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--blue2);margin-bottom:2px">${tA?.mix_code||'—'}</div>
          <div style="font-size:12px;color:var(--t2);margin-bottom:10px">${tA?.mix_name||'—'} · Batch ${tA?.batch_no||'—'}</div>
          <div class="ptags">
            <span class="ptag"><span class="cdot" style="background:${colA}"></span>A · ${(+(tA?.volume_liter||0)).toLocaleString()} L</span>
            <span class="ptag"><span class="cdot" style="background:${colB}"></span>B · ${(+(tB?.volume_liter||0)).toLocaleString()} L</span>
          </div>
        </div>
        <div class="fp-display">
          ${fpA.fz?`<span class="fp-tag">🧊A ${fpA.fz}</span>`:''}

// RENDER ALL
function renderAll(){
  const bangchan=lines.filter(l=>(l.group||'bangchan')==='bangchan');
  const twin=lines.filter(l=>l.group==='twin');
  const all=[...bangchan,...twin];

  const render=(group,gridId,prefix,pfx)=>{
    const g=$(gridId);if(!g)return;
    g.innerHTML=group.length
      ?group.map(l=>buildCard(l,prefix)).join('')
      :`<div style="color:var(--t3);font-family:var(--mono);padding:30px;text-align:center">ยังไม่มี LINE</div>`;
    if(pfx){
      const running=group.filter(l=>{const s=lineStates[l.id];return s?.running&&s?.start_ts;}).length;
      const cur=group.filter(l=>{const t=getTanksForLine(l.name);return !lineStates[l.id]?.running&&t[0]&&!getCuringInfo(t[0],l.id).done;}).length;
      $(`${pfx}-total`).textContent=group.length;
      $(`${pfx}-run`).textContent=running;
      $(`${pfx}-cur`).textContent=cur;
      $(`${pfx}-idle`).textContent=Math.max(0,group.length-running-cur);
    }
  };

  render(bangchan,'grid-bangchan','card','bc');
  render(twin,'grid-twin','card','tw');
  render(bangchan,'grid-ov-bangchan','ov');
  render(twin,'grid-ov-twin','ov');

  // Overview KPI
  const all2=[...bangchan,...twin];
  const allRun=all2.filter(l=>{const s=lineStates[l.id];return s?.running&&s?.start_ts;}).length;
  const allCur=all2.filter(l=>{const t=getTanksForLine(l.name);return !lineStates[l.id]?.running&&t[0]&&!getCuringInfo(t[0],l.id).done;}).length;
  $('ov-total').textContent=all2.length;
  $('ov-run').textContent=allRun;
  $('ov-cur').textContent=allCur;
  $('ov-idle').textContent=Math.max(0,all2.length-allRun-allCur);
}

// TICK — อัปเดต textContent เท่านั้น ไม่แตะ DOM structure
function tickCountdowns(){
  lines.forEach(line=>{
    const st=lineStates[line.id];if(!st?.running||!st?.start_ts)return;
    const elapsed=(Date.now()-st.start_ts)/3600000;
    const dual=isDualLine(line.name)&&getTanksForLine(line.name).length>=2;

    function upd(keyPfx,sv,fr){
      ['card','ov'].forEach(pfx=>{
        const key=keyPfx+pfx+line.id;
        const rem=Math.max(0,(sv||0)-(elapsed*fr));
        const pct=sv>0?(rem/sv)*100:0;const c=pctColor(pct);
        const vEl=document.getElementById('vol-'+key);
        const pEl=document.getElementById('pct-'+key);
        const bEl=document.getElementById('bar-'+key);
        const eEl=document.getElementById('eta-'+key);
        if(vEl){vEl.textContent=rem.toFixed(2)+' L';vEl.style.color=c;}
        if(pEl){pEl.textContent=pct.toFixed(1)+'%';pEl.style.color=c;}
        if(bEl){bEl.style.width=pct.toFixed(1)+'%';bEl.style.background=c;}
        if(eEl&&rem>0){const m=Math.round((rem/fr)*60);const d=new Date();d.setMinutes(d.getMinutes()+m);eEl.textContent='หมด ~'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
      });
    }

    if(dual){
      upd('A',st.start_vol_A||st.start_vol||0,st.flow_rate_A||line.flow_rate||300);
      upd('B',st.start_vol_B||0,st.flow_rate_B||120);
    } else {
      upd('S',st.start_vol||0,st.flow_rate||line.flow_rate||300);
    }
  });
}

// PAGE SWITCH
window.showPage=(p,btn)=>{
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(el=>el.classList.remove('on'));
  $(`page-${p}`).classList.add('on');btn.classList.add('on');
};
</script>
