<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Admin — Prodsys</title>
<style>
  body{background:#07090f;color:#dde3f0;font-family:'Sarabun',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
  .box{background:#0e1118;border:1px solid #1e2535;border-radius:16px;padding:36px 32px;width:320px}
  h2{font-size:16px;margin-bottom:4px;color:#60a5fa;font-weight:700}
  p{color:#7a8499;font-size:12px;margin-bottom:20px;line-height:1.6}
  label{display:block;font-size:10px;color:#3d4560;margin-bottom:4px;text-transform:uppercase;letter-spacing:.1em}
  input{width:100%;background:#141820;border:1px solid #1e2535;border-radius:8px;color:#dde3f0;font-size:13px;padding:9px 12px;outline:none;box-sizing:border-box;margin-bottom:14px}
  input:focus{border-color:#3b82f6}
  button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
  button:disabled{opacity:.5;cursor:not-allowed}
  #msg{margin-top:14px;font-size:13px;min-height:18px;text-align:center;line-height:1.8;white-space:pre-line}
  .ok{color:#22c55e} .err{color:#ef4444}
  .warn{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);border-radius:8px;padding:10px 12px;color:#eab308;font-size:12px;margin-bottom:20px;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <h2>🔑 Reset Admin — Prodsys</h2>
  <p>สร้าง admin ใหม่เข้า Firebase โดยตรง ไม่ต้อง login</p>

  <div class="warn">⚠️ ต้องลบ <b>admin@filling.local</b> ออกจาก Firebase Authentication ก่อนครับ ไม่งั้นจะขึ้น error</div>

  <label>Username</label>
  <input id="uname" type="text" value="admin">

  <label>Password ใหม่ (อย่างน้อย 6 ตัว)</label>
  <input id="newpass" type="password" placeholder="กรอก password ใหม่">

  <label>ยืนยัน Password</label>
  <input id="confpass" type="password" placeholder="กรอกซ้ำอีกครั้ง">

  <button id="btn" onclick="doCreate()">สร้าง Admin ใหม่</button>
  <div id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain: "production-filling.firebaseapp.com",
  projectId: "production-filling",
  storageBucket: "production-filling.firebasestorage.app",
  messagingSenderId: "89098393458",
  appId: "1:89098393458:web:b723f2886e8a341935afeb"
});
const auth = getAuth(app);
const db   = getFirestore(app);

window.doCreate = async () => {
  const msg     = document.getElementById('msg');
  const btn     = document.getElementById('btn');
  const uname   = document.getElementById('uname').value.trim().toLowerCase();
  const newpass = document.getElementById('newpass').value;
  const confpass= document.getElementById('confpass').value;

  msg.textContent = '';
  if (!uname)              { msg.className='err'; msg.textContent='กรุณากรอก Username'; return; }
  if (newpass.length < 6)  { msg.className='err'; msg.textContent='Password ต้องมีอย่างน้อย 6 ตัว'; return; }
  if (newpass !== confpass) { msg.className='err'; msg.textContent='Password ไม่ตรงกัน'; return; }

  const email = `${uname}@filling.local`;
  btn.disabled = true;
  msg.className=''; msg.textContent='⏳ กำลังสร้าง...';

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, newpass);
    await setDoc(doc(db, "users", cred.user.uid), {
      uid: cred.user.uid,
      username: uname,
      email,
      role: "admin",
      createdAt: new Date().toISOString()
    });
    msg.className='ok';
    msg.textContent='✅ สร้าง admin สำเร็จ!\nกลับไปเปิด prodsys.html\nแล้ว login ได้เลยครับ';
  } catch(e) {
    btn.disabled = false;
    if (e.code === 'auth/email-already-in-use') {
      msg.className='err';
      msg.textContent='❌ Username นี้มีอยู่แล้ว\nกรุณาลบออกจาก Firebase Authentication ก่อน';
    } else {
      msg.className='err';
      msg.textContent='❌ ' + e.message;
    }
  }
};
</script>
</body>
</html>
