<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Sarabun:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#0f172a;--s2:#1e293b;
  --b1:#1e3a5f;--b2:#2d5a9e;
  --text:#e4eaf8;--t2:#5e6e90;--t3:#2a3450;
  --blue:#3b82f6;--blue2:#7ab3ff;
  --green:#1fd17a;--yellow:#f5c842;
  --cyan:#06b6d4;--purple:#9b6dff;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{height:100%;margin:0}
body{
  background:var(--bg);
  font-family:var(--sans);
  color:var(--text);
  min-height:100vh;
  padding:20px;
  position:relative;
  overflow-y:auto;
}

/* BG EFFECTS */
body::before{
  content:"";position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,126,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,126,246,.04) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;
}
.glow-1{position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(59,126,246,.12),transparent 70%);top:-100px;left:-100px;pointer-events:none}
.glow-2{position:fixed;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(155,109,255,.1),transparent 70%);bottom:-80px;right:-80px;pointer-events:none}

/* CARD */
.card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:24px;
  padding:36px 28px;
  width:100%;
  max-width:400px;
  margin:0 auto;
  position:relative;
  z-index:1;
  box-shadow:0 24px 64px rgba(0,0,0,.6);
}

/* LOGO */
.logo{text-align:center;margin-bottom:28px}
.logo-text{font-family:var(--mono);font-size:32px;font-weight:600;letter-spacing:.06em}
.logo-text b{color:var(--blue)}
.logo-text span{color:var(--t2)}
.logo-sub{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--t3);margin-top:4px;text-transform:uppercase}

/* STEP 1 — เลือก Role */
.step{display:none}
.step.on{display:block}

.step-label{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px;text-align:center}

.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.role-btn{
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:14px;
  padding:18px 12px;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.role-btn:hover{border-color:var(--blue);background:rgba(59,126,246,.08);transform:translateY(-2px)}
.role-btn.selected{border-color:var(--blue);background:rgba(59,126,246,.12);box-shadow:0 0 0 1px rgba(59,126,246,.3)}
.role-btn::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;border-radius:14px 14px 0 0;opacity:0;transition:opacity .2s}
.role-btn.selected::after,.role-btn:hover::after{opacity:1}
.role-btn.leadman::after{background:linear-gradient(90deg,var(--yellow),#fbbf24)}
.role-btn.operator::after{background:linear-gradient(90deg,var(--blue),var(--cyan))}
.role-icon{font-size:28px;margin-bottom:8px}
.role-name{font-family:var(--mono);font-size:13px;font-weight:600}
.role-desc{font-size:10px;color:var(--t2);margin-top:3px;line-height:1.4}

/* STEP 2 — กรอก Password */
.back-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t2);cursor:pointer;margin-bottom:20px;width:fit-content}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:14px;height:14px}

.selected-role{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:12px 16px;margin-bottom:20px}
.selected-icon{font-size:24px}
.selected-info{}
.selected-name{font-family:var(--mono);font-size:14px;font-weight:700}
.selected-email{font-family:var(--mono);font-size:10px;color:var(--t2);margin-top:2px}

.pw-label{font-size:11px;color:var(--t2);margin-bottom:6px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}
.pw-wrap{position:relative}
.pw-input{
  width:100%;
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:10px;
  color:var(--text);
  font-family:var(--mono);
  font-size:16px;
  padding:12px 44px 12px 14px;
  outline:none;
  letter-spacing:.1em;
  transition:border-color .2s;
}
.pw-input:focus{border-color:var(--blue)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:4px}
.pw-toggle:hover{color:var(--text)}

.err-msg{font-size:12px;color:var(--red, #f04f5e);min-height:18px;margin-top:6px;font-family:var(--mono)}

.login-btn{
  width:100%;
  background:linear-gradient(135deg,var(--blue),#6366f1);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:var(--sans);
  margin-top:14px;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.login-btn.loading::after{
  content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);
  animation:loading 1s infinite;
}

/* STEP 3 — เลือกหน้าที่ต้องการ */
.welcome{text-align:center;margin-bottom:20px}
.welcome-icon{font-size:32px;margin-bottom:8px}
.welcome-name{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--blue2)}
.welcome-sub{font-size:12px;color:var(--t2);margin-top:4px}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.menu-btn{
  background:var(--s2);
  border:1px solid var(--b1);
  border-radius:16px;
  padding:32px 20px;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  text-decoration:none;
  display:block;
  color:var(--text);
  position:relative;
  overflow:hidden;
}
.menu-btn::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .2s}
.menu-btn:hover{transform:translateY(-2px);border-color:var(--b2)}
.menu-btn:hover::after{opacity:1}
.menu-btn.m-leadman::after{background:var(--yellow)}
.menu-btn.m-daily::after{background:#0891b2}
.menu-btn.m-mixing::after{background:var(--green)}
.menu-btn.m-past::after{background:var(--orange, #ff8c42)}
.menu-btn.m-flavor::after{background:var(--purple)}
.menu-btn.m-cip::after{background:var(--cyan)}
.menu-btn.m-filling::after{background:var(--blue)}
.menu-btn.m-admin::after{background:var(--red, #f04f5e)}
.menu-icon{font-size:52px;margin-bottom:10px}
.menu-name{font-family:var(--mono);font-size:14px;font-weight:700}
.menu-desc{font-size:11px;color:var(--t2);margin-top:4px}

.logout-btn{width:100%;background:none;border:1px solid var(--b2);border-radius:8px;color:var(--t2);padding:9px;font-size:12px;cursor:pointer;margin-top:12px;font-family:var(--sans)}
.logout-btn:hover{color:var(--red, #f04f5e);border-color:var(--red, #f04f5e)}

@keyframes loading{0%{left:-100%}100%{left:100%}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.step.on{animation:fadeIn .3s ease}
.pin-key{padding:16px;font-size:20px;font-weight:700;font-family:DM Mono,monospace;background:#0d1525;border:1px solid #1e2535;border-radius:12px;color:#e2e8f0;cursor:pointer;transition:background .1s}
.pin-key:active{background:#1e3a5f}
</style>
</head>
<body>

<div class="card">
  <div class="logo">

    <div class="logo-sub">Production Flow System</div>
  </div>

  <!-- STEP 1: เลือก Role -->
  <div class="step on" id="step1">
    <div class="step-label">เลือกตำแหน่งของคุณ</div>
    <div class="role-grid">
      <div class="role-btn leadman" onclick="selectRole('leadman')" id="btn-leadman">
        <div class="role-icon">👷</div>
        <div class="role-name">Leadman</div>
        <div class="role-desc">เข้าได้ทุกหน้า<br>จัดการทุกอย่าง</div>
        <div class="role-badge badge-lm">LEADMAN</div>
      </div>
      <div class="role-btn operator" onclick="selectRole('operator')" id="btn-operator">
        <div class="role-icon">🏭</div>
        <div class="role-name">Operation</div>
        <div class="role-desc">เข้าได้ทุกหน้า<br>ยกเว้น Admin</div>
        <div class="role-badge badge-op">OPERATOR</div>
      </div>
    </div>
  </div>

  <!-- STEP 2: กรอก Password -->
  <div class="step" id="step2">
    <div class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      เลือกตำแหน่งใหม่
    </div>
    <div class="selected-role" id="selected-display"></div>
    <div class="pw-label">รหัสผ่าน</div>
    <div class="pw-wrap">
      <input class="pw-input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-toggle">👁️</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>



<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);
window._db=db;
window._collection=collection;
window._query=query;
window._getDocs=getDocs;

let selectedRole=null;

// MENUS
const MENUS={
  leadman:[
    {icon:'📋',name:'Leadman',desc:'แผนการผลิต',file:'leadman.html',cls:'m-leadman'},
    {icon:'📅',name:'Daily Plan',desc:'อัปโหลดแผน',file:'dailyplan.html',cls:'m-leadman'},
    {icon:'🔐',name:'Employee Reg.',desc:'ลงทะเบียนพนักงาน',file:'pinregister.html',cls:'m-leadman'},
    {icon:'🔬',name:'Mixing',desc:'บันทึกผสม',file:'mixing.html',cls:'m-mixing'},
    {icon:'🧪',name:'Prepare Mix',desc:'เตรียมผสม',file:'preparemix.html',cls:'m-mixing'},
    {icon:'🌡️',name:'Pasteurize',desc:'บันทึก Past.',file:'pasteurize.html',cls:'m-past'},
    {icon:'🍦',name:'Flavor',desc:'เทสี/กลิ่น',file:'flavor.html',cls:'m-flavor'},
    {icon:'🪣',name:'CIP Man',desc:'ควบคุมถัง',file:'cipman.html',cls:'m-cip'},
    {icon:'🧹',name:'CIP Mixing',desc:'ล้าง+ฆ่าเชื้อถัง',file:'cipmixing.html',cls:'m-cip'},
    {icon:'🫙',name:'Aging Tank',desc:'สถานะถัง',file:'aging.html',cls:'m-cip'},
    {icon:'🏭',name:'Filling',desc:'ดู Dashboard',file:'filling.html',cls:'m-filling'},
    {icon:'💧',name:'Flowmeter',desc:'Verify Flow',file:'flowmeter.html',cls:'m-mixing'},
    {icon:'⏱️',name:'Shelf Life',desc:'คำนวณอายุ',file:'shelflife.html',cls:'m-past'},
    {icon:'⚙️',name:'Admin',desc:'จัดการระบบ',file:'admin.html',cls:'m-admin'},
  ],
  operator:[
    {icon:'📋',name:'Leadman',desc:'แผนการผลิต',file:'leadman.html',cls:'m-leadman'},
    {icon:'🔬',name:'Mixing',desc:'บันทึกผสม',file:'mixing.html',cls:'m-mixing'},
    {icon:'🧪',name:'Prepare Mix',desc:'เตรียมผสม',file:'preparemix.html',cls:'m-mixing'},
    {icon:'🌡️',name:'Pasteurize',desc:'บันทึก Past.',file:'pasteurize.html',cls:'m-past'},
    {icon:'🍦',name:'Flavor',desc:'เทสี/กลิ่น',file:'flavor.html',cls:'m-flavor'},
    {icon:'🪣',name:'CIP Man',desc:'ควบคุมถัง',file:'cipman.html',cls:'m-cip'},
    {icon:'🧹',name:'CIP Mixing',desc:'ล้าง+ฆ่าเชื้อถัง',file:'cipmixing.html',cls:'m-cip'},
    {icon:'🫙',name:'Aging Tank',desc:'สถานะถัง',file:'aging.html',cls:'m-cip'},
    {icon:'🏭',name:'Filling',desc:'ดู Dashboard',file:'filling.html',cls:'m-filling'},
    {icon:'💧',name:'Flowmeter',desc:'Verify Flow',file:'flowmeter.html',cls:'m-mixing'},
    {icon:'⏱️',name:'Shelf Life',desc:'คำนวณอายุ',file:'shelflife.html',cls:'m-past'},
  ],
};

const EMAIL={
  leadman:'leadman@filling.local',
  operator:'operation@filling.local',
};
const LABEL={
  leadman:{icon:'👷',name:'Leadman',badge:'LEADMAN'},
  operator:{icon:'🏭',name:'Operation',badge:'OPERATOR'},
};

// Check if already logged in
onAuthStateChanged(auth,async user=>{
  if(user){
    try{
      const snap=await getDocs(query(collection(db,'users'),where('uid','==',user.uid)));
      if(!snap.empty){
        const role=snap.docs[0].data().role||'operator';
        showMenu(role);
        return;
      }
    }catch{}
  }
  showStep('step1');
});

window.selectRole=(role)=>{
  selectedRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('btn-'+role).classList.add('selected');
  const l=LABEL[role];
  document.getElementById('selected-display').innerHTML=`
    <div class="selected-icon">${l.icon}</div>
    <div class="selected-info">
      <div class="selected-name">${l.name}</div>
      <div class="selected-email">${EMAIL[role]}</div>
    </div>`;
  setTimeout(()=>showStep('step2'),200);
};

window.goBack=()=>{
  document.getElementById('pw').value='';
  document.getElementById('err-msg').textContent='';
  showStep('step1');
};

window.togglePw=()=>{
  const inp=document.getElementById('pw');
  const btn=document.getElementById('pw-toggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
};

window.doLogin=async()=>{
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err-msg');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!pw){err.textContent='กรุณากรอกรหัสผ่าน';return;}
  btn.disabled=true;btn.classList.add('loading');btn.textContent='กำลังเข้าสู่ระบบ...';
  try{
    const email=EMAIL[selectedRole];
    await signInWithEmailAndPassword(auth,email,pw);
    showMenu(selectedRole);
  }catch(e){
    err.textContent=e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'
      ?'❌ รหัสผ่านไม่ถูกต้อง'
      :'❌ เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่';
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='เข้าสู่ระบบ';
  }
};

function showMenu(role){
  const l=LABEL[role]||LABEL.operator;
  const menus=MENUS[role]||MENUS.operator;
  document.getElementById('w-icon').textContent=l.icon;
  document.getElementById('w-name').textContent='สวัสดี '+l.name;
  document.getElementById('w-sub').textContent='เลือกหน้าที่ต้องการเข้าใช้งาน';
  document.getElementById('menu-grid').innerHTML=menus.map(m=>`
    <div class="menu-btn ${m.cls}" onclick="openPinModal('${m.file}','${m.name}')" style="cursor:pointer">
      <div class="menu-icon">${m.icon}</div>
      <div class="menu-name">${m.name}</div>
      <div class="menu-desc">${m.desc}</div>
    </div>`).join('');
  showStep('step3');
}

window.doLogout=async()=>{
  await signOut(auth);
  selectedRole=null;
  document.getElementById('pw').value='';
  showStep('step1');
};

function showStep(id){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
</script>

      <button onclick="pinKey('8')" class="pin-key">8</button>
      <button onclick="pinKey('9')" class="pin-key">9</button>
      <button class="pin-key" style="opacity:0;pointer-events:none"></button>
      <button onclick="pinKey('0')" class="pin-key">0</button>
      <button onclick="pinKey('⌫')" class="pin-key">⌫</button>
    </div>

    <button onclick="closePinModal()" style="width:100%;padding:10px;background:none;border:1px solid #1e2535;border-radius:10px;color:#64748b;font-size:13px;cursor:pointer">ยกเลิก</button>
    <div id="pin-error" style="color:#f04f5e;font-size:12px;margin-top:10px;min-height:16px"></div>
  </div>
</div>


<script>
// ══ PIN MODAL ══════════════════════════════════════════════
var pinTarget='', pinValue='', pinEmployees=[];

function openPinModal(file,name){
  var noPinPages=['admin.html','shelflife.html','aging.html','filling.html','pinregister.html'];
  if(noPinPages.indexOf(file)>=0){window.location.href=file;return;}
  pinTarget=file;pinValue='';
  document.getElementById('pin-modal-page').textContent=name;
  document.getElementById('pin-error').textContent='';
  updatePinDots();
  var m=document.getElementById('pin-modal');
  m.style.display='flex';
  loadPinEmployees();
}

function closePinModal(){
  document.getElementById('pin-modal').style.display='none';
  pinValue='';updatePinDots();
}

function pinKey(k){
  if(k===''){return;}
  if(k==='⌫'){pinValue=pinValue.slice(0,-1);updatePinDots();document.getElementById('pin-error').textContent='';return;}
  if(pinValue.length>=4)return;
  pinValue+=k;updatePinDots();
  if(pinValue.length===4)checkPin();
}

function updatePinDots(){
  for(var i=1;i<=4;i++){
    var el=document.getElementById('pin-d'+i);
    if(el)el.style.background=i<=pinValue.length?'#3b82f6':'#1e2535';
  }
}

function loadPinEmployees(){
  if(typeof firebase!=='undefined'||window._db){
    // โหลดจาก Firebase ถ้ามี
  }
  // ใช้ค่าที่โหลดไว้แล้ว
}

async function hashPin(pin){
  try{
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('PRODSYS:'+pin));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }catch(e){
    console.error('hashPin error:',e);
    return '';
  }
}
async function checkPin(){
  // โหลด employees จาก Firebase
  if(!window._db){
    document.getElementById('pin-error').textContent='⚠️ กำลังเชื่อมต่อ...';
    setTimeout(checkPin,800);
    return;
  }
  try{
    var snap=await window._getDocs(window._query(
      window._collection(window._db,'employees')
    ));
    pinEmployees=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
  }catch(e){
    // ถ้าโหลดไม่ได้ใช้ค่าเดิม
  }

  // verify ด้วย hash (SHA-256)
  var inputHash=await hashPin(pinValue);
  var emp=pinEmployees.find(function(e){
    // รองรับทั้ง pin_hash (ใหม่) และ pin (เก่า)
    return e.pin_hash===inputHash||(e.pin&&e.pin===pinValue);
  });
  if(!emp){
    document.getElementById('pin-error').textContent='❌ รหัส PIN ไม่ถูกต้อง';
    pinValue='';updatePinDots();return;
  }
  var page=pinTarget.replace('.html','');
  var perms=emp.permissions||[];
  if(perms.length>0&&perms.indexOf(page)<0&&perms.indexOf('all')<0){
    document.getElementById('pin-error').textContent='🚫 ไม่มีสิทธิ์เข้าหน้านี้';
    pinValue='';updatePinDots();return;
  }
  sessionStorage.setItem('emp_name',emp.name||'');
  sessionStorage.setItem('emp_id',emp.id||'');
  sessionStorage.setItem('emp_sig',emp.signature||'');
  window.location.href=pinTarget;
}

document.addEventListener('keydown',function(e){
  var m=document.getElementById('pin-modal');
  if(!m||m.style.display==='none')return;
  if(e.key>='0'&&e.key<='9')pinKey(e.key);
  if(e.key==='Backspace')pinKey('⌫');
  if(e.key==='Escape')closePinModal();
});
</script>

</body>
</html>
