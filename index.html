<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PROD.SYS">
<title>PROD.SYS — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#0f172a;--s2:#1e293b;
  --b1:#1e3a5f;--b2:#2d5a9e;
  --text:#e2e8f0;--t2:#94a3b8;--t3:#475569;
  --blue:#3b82f6;--blue2:#93c5fd;
  --green:#22c55e;--yellow:#f59e0b;
  --cyan:#06b6d4;--purple:#8b5cf6;
  --orange:#f97316;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
html,body{height:100%;margin:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}

/* BG */
.glow-1{position:fixed;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.15),transparent 70%);pointer-events:none;z-index:0}
.glow-2{position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.1),transparent 70%);pointer-events:none;z-index:0}

/* STEP */
.step{display:none}.step.on{display:block}

/* LOGIN WRAPPER — step1, step2 */
#step1.on, #step2.on{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;z-index:1;padding:20px;
}

/* LOGIN CARD */
.card{
  background:rgba(15,23,42,.95);
  border:1px solid rgba(59,130,246,.2);
  border-radius:20px;
  padding:36px 32px;
  width:100%;max-width:480px;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
  position:relative;
}
.logo{text-align:center;margin-bottom:24px}
.logo-text{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--blue2);letter-spacing:.1em}
.logo-text b{color:var(--cyan)}
.logo-sub{font-size:11px;color:var(--t3);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.step-label{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;text-align:center}

/* ROLE BUTTONS */
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.role-btn{
  background:rgba(30,58,95,.4);border:1px solid rgba(59,130,246,.2);
  border-radius:14px;padding:20px 14px;cursor:pointer;text-align:center;transition:all .2s;
}
.role-btn:hover,.role-btn.selected{background:rgba(59,130,246,.15);border-color:#3b82f6}
.role-icon{font-size:32px;margin-bottom:8px}
.role-name{font-family:var(--mono);font-size:14px;font-weight:900;color:var(--text);margin-bottom:4px}
.role-desc{font-size:11px;color:var(--t2);line-height:1.4}
.role-badge{font-family:var(--mono);font-size:9px;font-weight:900;padding:3px 10px;border-radius:20px;margin-top:8px;display:inline-block;letter-spacing:1px}
.badge-lm{background:rgba(59,130,246,.2);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.badge-op{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}

/* PASSWORD */
.back-btn{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--t2);cursor:pointer;margin-bottom:16px;transition:color .15s}
.back-btn:hover{color:var(--blue2)}
.back-btn svg{width:16px;height:16px}
.selected-role{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:12px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.pw-label{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.pw-wrap{position:relative;margin-bottom:8px}
.pw-input{width:100%;padding:13px 44px 13px 16px;font-family:var(--mono);font-size:16px;font-weight:700;letter-spacing:.2em;background:rgba(15,23,42,.8);border:1px solid rgba(59,130,246,.25);border-radius:12px;color:var(--text);outline:none;transition:all .15s}
.pw-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--t2)}
.err-msg{font-family:var(--mono);font-size:11px;color:#f87171;min-height:18px;margin-bottom:10px}
.login-btn{width:100%;padding:14px;font-family:var(--mono);font-size:14px;font-weight:900;background:linear-gradient(135deg,#1d4ed8,#3b82f6);color:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .15s;box-shadow:0 4px 20px rgba(59,130,246,.3)}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(59,130,246,.4)}
.login-btn.loading{opacity:.7;cursor:not-allowed}

/* STEP 3 — เมนูเต็มหน้าจอ */
#step3.on{
  display:flex;flex-direction:column;
  position:fixed;inset:0;z-index:100;
  background:var(--bg);overflow-y:auto;
}
.menu-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(15,23,42,.9);
  border-bottom:1px solid rgba(59,130,246,.15);
  backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:10;flex-shrink:0;
}
.menu-topbar-logo{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue2);letter-spacing:.08em}
.menu-topbar-logo b{color:var(--cyan)}
.menu-topbar-user{display:flex;align-items:center;gap:12px}
.menu-topbar-name{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t2)}
.logout-btn{font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 16px;border-radius:20px;border:1px solid rgba(239,68,68,.3);background:rgba(239,68,68,.08);color:#fca5a5;cursor:pointer}

/* MENU GRID */
.menu-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px;
  padding:24px;
  flex:1;
  align-content:start;
}
.menu-btn{
  background:rgba(15,23,42,.8);
  border:1px solid rgba(59,130,246,.15);
  border-radius:16px;padding:24px 16px;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;
  transition:all .2s;
}
.menu-btn:hover{transform:translateY(-4px);border-color:rgba(59,130,246,.5);box-shadow:0 12px 40px rgba(59,130,246,.15)}
.menu-icon{font-size:40px;line-height:1}
.menu-name{font-family:var(--mono);font-size:12px;font-weight:900;color:var(--text);text-align:center}
.menu-desc{font-size:10px;font-weight:600;color:var(--t2);text-align:center;line-height:1.4}
.m-leadman:hover{border-color:rgba(96,165,250,.5)}
.m-mixing:hover{border-color:rgba(6,182,212,.5)}
.m-past:hover{border-color:rgba(251,146,60,.5)}
.m-flavor:hover{border-color:rgba(250,204,21,.4)}
.m-cip:hover{border-color:rgba(52,211,153,.5)}
.m-filling:hover{border-color:rgba(167,139,250,.5)}
.m-admin:hover{border-color:rgba(248,113,113,.5)}

/* PIN MODAL */
.pin-modal{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px}
.pin-modal.on{display:flex}
.pin-card{background:rgba(15,23,42,.97);border:1px solid rgba(129,140,248,.3);border-radius:20px;padding:32px;max-width:320px;width:100%;box-shadow:0 32px 80px rgba(0,0,0,.6);text-align:center}
.pin-title{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.pin-sub{font-size:14px;font-weight:700;color:var(--text);margin-bottom:20px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--s2);background:transparent;transition:all .15s}
.pin-dot.filled{background:#818cf8;border-color:#818cf8;box-shadow:0 0 8px rgba(129,140,248,.5)}
.pin-input{width:100%;padding:12px;font-family:var(--mono);font-size:20px;font-weight:900;letter-spacing:.3em;text-align:center;background:rgba(15,23,42,.8);border:1px solid rgba(59,130,246,.25);border-radius:10px;color:var(--text);outline:none;margin-bottom:8px}
.pin-input:focus{border-color:#818cf8}
.pin-err{font-family:var(--mono);font-size:11px;color:#f87171;min-height:16px;margin-bottom:8px}
.pin-go{width:100%;padding:12px;font-family:var(--mono);font-size:14px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;cursor:pointer}
.pin-cancel{width:100%;padding:10px;font-family:var(--mono);font-size:12px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;color:var(--t2);margin-top:8px}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast-item{font-family:var(--mono);font-size:12px;font-weight:700;padding:10px 18px;border-radius:10px;color:#fff;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast-blue{background:#1d4ed8}.toast-green{background:#065f46}.toast-red{background:#991b1b}
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<!-- STEP 1 -->
<div class="step on" id="step1">
  <div class="card">
    <div class="logo">
      <div class="logo-text">PROD<b>.</b>SYS</div>
      <div class="logo-sub">Production Flow System</div>
    </div>
    <div class="step-label">เลือกตำแหน่งของคุณ</div>
    <div class="role-grid">
      <div class="role-btn leadman" onclick="selectRole('leadman')" id="btn-leadman">
        <div class="role-icon">👷</div>
        <div class="role-name">Leadman</div>
        <div class="role-desc">เข้าได้ทุกหน้า<br>จัดการทุกอย่าง</div>
        <div class="role-badge badge-lm">LEADMAN</div>
      </div>
      <div class="role-btn operator" onclick="selectRole('operator')" id="btn-operator">
        <div class="role-icon">🏭</div>
        <div class="role-name">Operation</div>
        <div class="role-desc">เข้าได้ทุกหน้า<br>ยกเว้น Admin</div>
        <div class="role-badge badge-op">OPERATOR</div>
      </div>
    </div>
  </div>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
  <div class="card">
    <div class="logo">
      <div class="logo-text">PROD<b>.</b>SYS</div>
    </div>
    <div class="back-btn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      เลือกตำแหน่งใหม่
    </div>
    <div class="selected-role" id="selected-display"></div>
    <div class="pw-label">รหัสผ่าน</div>
    <div class="pw-wrap">
      <input class="pw-input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="pw-toggle" onclick="togglePw()" id="pw-toggle">👁️</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
  </div>
</div>

<!-- STEP 3 — เมนูเต็มหน้าจอ -->
<div class="step" id="step3">
  <div class="menu-topbar">
    <div class="menu-topbar-logo">PROD<b>.</b>SYS</div>
    <div class="menu-topbar-user">
      <span id="w-icon" style="font-size:20px"></span>
      <div id="w-name" class="menu-topbar-name"></div>
      <button class="logout-btn" onclick="doLogout()">🚪 ออก</button>
    </div>
  </div>
  <div class="menu-grid" id="menu-grid"></div>
</div>

<!-- PIN MODAL -->
<div class="pin-modal" id="pin-modal">
  <div class="pin-card">
    <div class="pin-title">ยืนยันตัวตน</div>
    <div class="pin-sub" id="pin-target-name">—</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="dp0"></div>
      <div class="pin-dot" id="dp1"></div>
      <div class="pin-dot" id="dp2"></div>
      <div class="pin-dot" id="dp3"></div>
    </div>
    <input type="password" id="pin-input" class="pin-input" maxlength="6" placeholder="PIN" autocomplete="off"
      oninput="updateDots(this.value)" onkeydown="if(event.key==='Enter')submitPin()">
    <div class="pin-err" id="pin-err"></div>
    <button class="pin-go" onclick="submitPin()">✓ ยืนยัน</button>
    <button class="pin-cancel" onclick="closePinModal()">ยกเลิก</button>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

let selectedRole=null;

// MENUS
const MENUS={
  leadman:[
    {icon:'📋',name:'Leadman',desc:'แผนการผลิต',file:'leadman.html',cls:'m-leadman'},
    {icon:'📅',name:'Daily Plan',desc:'อัปโหลดแผน',file:'dailyplan.html',cls:'m-leadman'},
    {icon:'🔬',name:'Mixing',desc:'บันทึกผสม',file:'mixing.html',cls:'m-mixing'},
    {icon:'🧪',name:'Prepare Mix',desc:'เตรียมผสม',file:'preparemix.html',cls:'m-mixing'},
    {icon:'🌡️',name:'Pasteurize',desc:'บันทึก Past.',file:'pasteurize.html',cls:'m-past'},
    {icon:'🍦',name:'Flavor',desc:'เทสี/กลิ่น',file:'flavor.html',cls:'m-flavor'},
    {icon:'🪣',name:'CIP Man',desc:'ควบคุมถัง',file:'cipman.html',cls:'m-cip'},
    {icon:'🧹',name:'CIP Mixing',desc:'ล้างถังผสม',file:'cipmixing.html',cls:'m-cip'},
    {icon:'🫙',name:'Aging Tank',desc:'สถานะถัง',file:'aging.html',cls:'m-cip'},
    {icon:'🏭',name:'Filling',desc:'ดู Dashboard',file:'filling.html',cls:'m-filling'},
    {icon:'💧',name:'Flowmeter',desc:'Verify Flow',file:'flowmeter.html',cls:'m-mixing'},
    {icon:'📜',name:'History',desc:'ประวัติการผลิต',file:'history.html',cls:'m-leadman'},
    {icon:'⏱️',name:'Shelf Life',desc:'คำนวณอายุ',file:'shelflife.html',cls:'m-past'},
    {icon:'🔐',name:'Employee Reg.',desc:'ลงทะเบียน PIN',file:'pinregister.html',cls:'m-admin'},
    {icon:'⚙️',name:'Admin',desc:'จัดการระบบ',file:'admin.html',cls:'m-admin'},
  ],
  operator:[
    {icon:'📋',name:'Leadman',desc:'แผนการผลิต',file:'leadman.html',cls:'m-leadman'},
    {icon:'🔬',name:'Mixing',desc:'บันทึกผสม',file:'mixing.html',cls:'m-mixing'},
    {icon:'🧪',name:'Prepare Mix',desc:'เตรียมผสม',file:'preparemix.html',cls:'m-mixing'},
    {icon:'🌡️',name:'Pasteurize',desc:'บันทึก Past.',file:'pasteurize.html',cls:'m-past'},
    {icon:'🍦',name:'Flavor',desc:'เทสี/กลิ่น',file:'flavor.html',cls:'m-flavor'},
    {icon:'🪣',name:'CIP Man',desc:'ควบคุมถัง',file:'cipman.html',cls:'m-cip'},
    {icon:'🧹',name:'CIP Mixing',desc:'ล้างถังผสม',file:'cipmixing.html',cls:'m-cip'},
    {icon:'🫙',name:'Aging Tank',desc:'สถานะถัง',file:'aging.html',cls:'m-cip'},
    {icon:'🏭',name:'Filling',desc:'ดู Dashboard',file:'filling.html',cls:'m-filling'},
    {icon:'💧',name:'Flowmeter',desc:'Verify Flow',file:'flowmeter.html',cls:'m-mixing'},
    {icon:'📜',name:'History',desc:'ประวัติการผลิต',file:'history.html',cls:'m-leadman'},
    {icon:'⏱️',name:'Shelf Life',desc:'คำนวณอายุ',file:'shelflife.html',cls:'m-past'},
  ],
};

const EMAIL={
  leadman:'leadman@filling.local',
  operator:'operation@filling.local',
};
const LABEL={
  leadman:{icon:'👷',name:'Leadman',badge:'LEADMAN'},
  operator:{icon:'🏭',name:'Operation',badge:'OPERATOR'},
};

// Check if already logged in
onAuthStateChanged(auth,async user=>{
  if(user){
    try{
      const snap=await getDocs(query(collection(db,'users'),where('uid','==',user.uid)));
      if(!snap.empty){
        const role=snap.docs[0].data().role||'operator';
        window.showMenu(role);
        return;
      }
    }catch{}
  }
  window.showStep('step1');
});

window.selectRole=(role)=>{
  selectedRole=role;
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('btn-'+role).classList.add('selected');
  const l=LABEL[role];
  document.getElementById('selected-display').innerHTML=`
    <div class="selected-icon">${l.icon}</div>
    <div class="selected-info">
      <div class="selected-name">${l.name}</div>
      <div class="selected-email">${EMAIL[role]}</div>
    </div>`;
  setTimeout(()=>window.showStep('step2'),200);
};

window.goBack=()=>{
  document.getElementById('pw').value='';
  document.getElementById('err-msg').textContent='';
  window.showStep('step1');
};

window.togglePw=()=>{
  const inp=document.getElementById('pw');
  const btn=document.getElementById('pw-toggle');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁️';}
};

window.doLogin=async()=>{
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err-msg');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(!pw){err.textContent='กรุณากรอกรหัสผ่าน';return;}
  btn.disabled=true;btn.classList.add('loading');btn.textContent='กำลังเข้าสู่ระบบ...';
  try{
    const email=EMAIL[selectedRole];
    await signInWithEmailAndPassword(auth,email,pw);
    window.showMenu(selectedRole);
  }catch(e){
    err.textContent=e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'
      ?'❌ รหัสผ่านไม่ถูกต้อง'
      :'❌ เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่';
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='เข้าสู่ระบบ';
  }
};

window.showMenu=function showMenu(role){
  const l=LABEL[role]||LABEL.operator;
  const menus=MENUS[role]||MENUS.operator;
  document.getElementById('w-icon').textContent=l.icon;
  document.getElementById('w-name').textContent='สวัสดี '+l.name;
  document.getElementById('w-sub').textContent='เลือกหน้าที่ต้องการเข้าใช้งาน';
  document.getElementById('menu-grid').innerHTML=menus.map(m=>`
    <div class="menu-btn ${m.cls}" onclick="window.openPinModal('${m.file}','${m.name}')">
      <div class="menu-icon">${m.icon}</div>
      <div class="menu-name">${m.name}</div>
      <div class="menu-desc">${m.desc}</div>
    </div>`).join('');
  window.showStep('step3');
}

window.doLogout=async()=>{
  await signOut(auth);
  selectedRole=null;
  document.getElementById('pw').value='';
  window.showStep('step1');
};

window.showStep=function showStep(id){
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
</script>
</body>
</html>
