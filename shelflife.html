<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shelf Life Calculator — PROD.SYS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sarabun:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--s1:#ffffff;--s2:#f1f5f9;--b1:#cbd5e1;--b2:#94a3b8;
  --text:#0f172a;--t2:#334155;--t3:#64748b;
  --cyan:#00d4ff;--green:#00e87a;--yellow:#ffd040;--orange:#ff8c42;--red:#ff4560;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;--display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;height:56px;background:rgba(7,9,15,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--b1);padding:0 20px;gap:10px;}
.nav-logo{font-family:var(--display);font-size:16px;font-weight:800;color:var(--cyan)}
.nav-sub{font-family:var(--mono);font-size:11px;color:var(--t2)}
.nav-back{margin-left:auto;font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;text-decoration:none}
main{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:24px 16px 60px}
.page-title{font-family:var(--display);font-size:22px;font-weight:800;color:white;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--t2);margin-bottom:20px}

/* SEARCH BAR */
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;background:var(--s1);border:1.5px solid var(--b1);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:14px;padding:12px 16px;outline:none;transition:border-color .15s;}
.search-bar input:focus{border-color:var(--cyan)}
.btn-search{padding:12px 20px;border-radius:10px;border:none;background:var(--cyan);color:#060a14;font-family:var(--display);font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn-search:hover{opacity:.85}
.btn-search:disabled{opacity:.4;cursor:not-allowed}

/* CARD */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px 20px;margin-bottom:14px}
.card-hd{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--cyan);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-hd::before{content:'';width:3px;height:12px;background:var(--cyan);border-radius:2px}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.info-item{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px}
.info-label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.info-val{font-family:var(--mono);font-size:12px;color:var(--text);font-weight:500;word-break:break-all}
.info-val.accent{color:var(--cyan)}
.info-val.green{color:var(--green)}
.info-val.yellow{color:var(--yellow)}
.info-val.red{color:var(--red)}
.info-val.orange{color:var(--orange)}

/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:15px;top:32px;bottom:0;width:2px;background:var(--b2);z-index:0}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:2px solid;z-index:1;position:relative;margin-top:2px}
.tl-body{flex:1;padding-bottom:18px}
.tl-title{font-family:var(--display);font-size:13px;font-weight:700;margin-bottom:10px}

/* INGREDIENT TABLE */
.ing-table{width:100%;border-collapse:collapse;font-size:12px}
.ing-table th{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);padding:6px 10px;border-bottom:1px solid var(--b1);text-align:left}
.ing-table td{font-family:var(--mono);padding:6px 10px;border-bottom:1px solid rgba(30,45,64,.4)}
.ing-table td:last-child{font-weight:700}
.diff-ok{color:var(--green)}
.diff-warn{color:var(--yellow)}
.diff-bad{color:var(--red)}

/* SHELF LIFE */
.shelf-block{background:linear-gradient(135deg,rgba(0,212,255,.07),rgba(0,212,255,.02));border:1.5px solid rgba(0,212,255,.25);border-radius:12px;padding:18px 20px}
.temp-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.temp-num{font-family:var(--display);font-size:36px;font-weight:800;min-width:65px;text-align:center;line-height:1}
.temp-unit{font-family:var(--mono);font-size:11px;color:var(--t2);text-align:center}
input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--cyan) var(--pct,40%),var(--b2) var(--pct,40%));border:none;padding:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--cyan);border:3px solid var(--bg);cursor:pointer;box-shadow:0 0 10px rgba(0,212,255,.4)}

.expire-box{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:16px 18px;text-align:center;margin-bottom:14px}
.expire-label{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.expire-date{font-family:var(--display);font-size:22px;font-weight:800;line-height:1.2}
.expire-time{font-family:var(--mono);font-size:13px;margin-top:3px;color:var(--t2)}
.expire-remain{font-family:var(--mono);font-size:11px;margin-top:8px;padding:5px 14px;border-radius:20px;display:inline-block}

.status-bar{height:8px;border-radius:4px;background:var(--b2);overflow:hidden;margin:10px 0}
.status-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}

.shelf-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-box{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:12px 14px}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.stat-val{font-family:var(--display);font-size:20px;font-weight:800}

.shelf-table{width:100%;border-collapse:collapse;font-size:11px}
.shelf-table th{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);padding:7px 10px;border-bottom:1px solid var(--b1);text-align:center}
.shelf-table td{font-family:var(--mono);padding:7px 10px;text-align:center;border-bottom:1px solid rgba(30,45,64,.4)}
.shelf-table tr.active-row td{background:rgba(0,212,255,.1);color:var(--cyan);font-weight:700}
.shelf-table td:first-child{text-align:left;color:var(--t2)}

/* EMPTY / LOADING */
.state-box{text-align:center;padding:40px 20px;color:var(--t3);font-family:var(--mono);font-size:13px}
.state-box .ico{font-size:36px;margin-bottom:12px}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-family:var(--mono);font-size:12px;z-index:999;backdrop-filter:blur(8px);white-space:nowrap;transition:opacity .3s}

@media(max-width:600px){
  .info-grid{grid-template-columns:1fr 1fr}
  .shelf-stats{grid-template-columns:1fr 1fr}
  .expire-date{font-size:18px}
}

/* TANK HEADER */
.tank-header{background:linear-gradient(135deg,rgba(0,212,255,.08),rgba(0,212,255,.02));border:1.5px solid rgba(0,212,255,.3);border-radius:16px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;gap:20px}
.tank-number{font-family:'DM Mono',monospace;font-size:42px;font-weight:800;color:var(--cyan);line-height:1;letter-spacing:-.02em;text-shadow:0 0 30px rgba(0,212,255,.4)}
.tank-info{flex:1}
.tank-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--t2);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px}
.tank-product{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.tank-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--t2);margin-top:4px}
.tank-status-badge{padding:6px 14px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px;font-weight:700}
/* SIG */
.sig-img{height:32px;vertical-align:middle;opacity:.9;margin-left:6px}
.sig-by{font-family:'DM Mono',monospace;font-size:10px;color:var(--t2)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD<span style="color:var(--t3)">.</span>SYS</div>
  <div class="nav-sub">/ Shelf Life</div>
  <a href="index.html" class="nav-back">← Home</a>
</nav>
<main>
  <div class="page-title">🧊 Shelf Life Calculator</div>
  <div class="page-sub">ดึงข้อมูลทุก Stage ตาม Process Order และคำนวณวันหมดอายุ</div>

  <!-- SEARCH -->
  <div class="search-bar">
    <input id="inp-po" type="text" placeholder="กรอก Process Order เช่น PO-2506-001" onkeydown="if(event.key==='Enter')fetchAll()">
    <button class="btn-search" id="btn-fetch" onclick="fetchAll()">🔍 ดึงข้อมูล</button>
  </div>

  <div id="result-area">
    <div class="state-box">
      <div class="ico">📋</div>
      <div>กรอก Process Order แล้วกด ดึงข้อมูล</div>
    </div>
  </div>
</main>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,onAuthStateChanged,signInAnonymously}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,limit,orderBy}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",authDomain:"production-filling.firebaseapp.com",projectId:"production-filling",storageBucket:"production-filling.firebasestorage.app",messagingSenderId:"89098393458",appId:"1:89098393458:web:b723f2886e8a341935afeb"});
const db=getFirestore(app);
const auth=getAuth(app);

// ต้อง login ก่อนถึงจะดึงข้อมูล Firebase ได้
let _authReady=false;
onAuthStateChanged(auth,user=>{
  if(user){_authReady=true;}
  else{
    // login แบบ anonymous ถ้ายังไม่ login
    signInAnonymously(auth).catch(e=>{
      // ถ้า anonymous ไม่ได้ redirect ไป login
      window.location.href='index.html';
    });
  }
});

const SHELF={'Ice Cream':[96,96,96,96,92,76,62,51,43,37,32],'Water Ice':[96,96,96,96,96,96,96,93,81,71,63],'Jelly':[24,24,24,24,24,24,24,24,24,24,24]};
const $=id=>document.getElementById(id);
let currentRows=[],currentType='',currentProdDate='',currentStartTime='';

function toast(msg,col='#00e87a'){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'+col+'18;color:'+col+';border:1px solid '+col+'44;padding:10px 20px;border-radius:8px;font-family:var(--mono);font-size:12px;z-index:999;backdrop-filter:blur(8px)';
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

window.fetchAll=async()=>{
  if(!auth.currentUser){
    toast('กรุณา Login ก่อนใช้งาน','#ff4560');
    setTimeout(()=>window.location.href='index.html',2000);
    return;
  }
  const poRaw=$('inp-po').value.trim();
  if(!poRaw){toast('กรุณากรอก Process Order','#ff4560');return;}
  // ลอง query ทั้ง string และ number
  const poStr=poRaw;
  const poNum=isNaN(poRaw)?null:+poRaw;
  const btn=$('btn-fetch');
  btn.disabled=true;btn.textContent='⏳ กำลังดึง...';
  $('result-area').innerHTML='<div class="state-box"><div class="ico">⏳</div><div>กำลังดึงข้อมูล...</div></div>';

  try{
    // ดึงจากทุก collection — ลอง number และ string
    const queries=[];
    const cols=['production_plans','production_plans_m2','past_history'];
    for(const col of cols){
      queries.push(getDocs(query(collection(db,col),where('process_order','==',poStr))));
      if(poNum!==null) queries.push(getDocs(query(collection(db,col),where('process_order','==',poNum))));
    }
    const results=await Promise.all(queries);
    const s1=results[0],s2=results[2]||results[0],s3=results[4]||results[0];
    // รวม docs ทั้งหมด dedup by id
    const allDocs=new Map();
    results.forEach(snap=>{snap.docs.forEach(d=>allDocs.set(d.id,d));});
    const po=poStr;
    const fakeSnap={docs:[...allDocs.values()]};
    const[s1r,s2r,s3r]=[fakeSnap,fakeSnap,fakeSnap];

    const rows=[...allDocs.values()].map(d=>({...d.data(),id:d.id,_col:d.ref?.parent?.id||'production_plans'}));

    if(!rows.length){
      $('result-area').innerHTML='<div class="state-box"><div class="ico">🔍</div><div>ไม่พบข้อมูล Process Order: <b style="color:var(--text)">'+po+'</b></div></div>';
      btn.disabled=false;btn.textContent='🔍 ดึงข้อมูล';
      return;
    }

    currentRows=rows;
    const r=rows[0];

    // ดึง product type จาก products
    let productType='';
    if(r.mix_code){
      const ps=await getDocs(query(collection(db,'products'),where('mix_code','==',r.mix_code),limit(1)));
      if(!ps.empty) productType=ps.docs[0].data().product_type||'';
    }
    currentType=productType;

    // หาวันผลิตและเวลาเริ่ม
    currentProdDate=r.date||r.archived_date||'';
    currentStartTime=r.past_end_time||'';

    renderAll(rows,po,productType);
    toast('✅ พบข้อมูล '+rows.length+' รายการ');
  }catch(e){
    $('result-area').innerHTML='<div class="state-box"><div class="ico">❌</div><div>โหลดไม่สำเร็จ: '+e.message+'</div></div>';
    toast('โหลดไม่สำเร็จ','#ff4560');
  }
  btn.disabled=false;btn.textContent='🔍 ดึงข้อมูล';
};

function renderAll(rows,po,productType){
  const r=rows[0];
  const yr=new Date().getFullYear().toString().slice(-1);
  const unit=r._col==='production_plans_m2'?'2':'1';
  const prefix=yr+'0522'+unit;
  const prodCode=r.prod_suffix?(prefix+r.prod_suffix):'—';
  const totalVol=rows.reduce((s,x)=>s+(+(x.volume_liter||0)),0);

  // คำนวณ Eff%
  let effTxt='—',effCol='var(--t2)';
  if(r.past_start_time&&r.past_end_time){
    const[sh,sm]=r.past_start_time.split(':').map(Number);
    const[eh,em]=r.past_end_time.split(':').map(Number);
    const actualMin=(eh*60+em)-(sh*60+sm);
    if(actualMin>0&&r.mix_code){
      const spd=+(r.speed_m1||r.speed||1000);
      const den=+(r.density||1);
      const reqMin=totalVol>0?Math.round(totalVol*den*60/spd):0;
      const eff=reqMin/actualMin*100;
      effTxt=eff.toFixed(1)+'%';
      effCol=eff>=97&&eff<=100?'var(--green)':eff>100?'var(--orange)':'var(--red)';
    }
  } else if(r.eff){
    effTxt=r.eff+'%';
    effCol=r.eff>=97&&r.eff<=100?'var(--green)':r.eff>100?'var(--orange)':'var(--red)';
  }

  // status badge
  const statusMap={pending:'⚪ Pending',mixing:'🟡 Mixing',pasteurising:'🔵 Pasteurising',past_done:'🟢 Past.เสร็จ',ready:'✅ Ready',sent_filling:'📦 ส่ง Filling แล้ว'};
  const statusTxt=statusMap[r.status]||r.status||'—';

  let html='';

  // ── 0. TANK HEADER ─────────────────────────────────────────────────
  const agingTank = r.aging_tank || rows.find(x=>x.aging_tank)?.aging_tank || '—';
  const tankDisplay = agingTank !== '—' ? agingTank : 'N/A';
  const statusColor = {
    pending:'var(--t3)', mixing:'var(--yellow)', pasteurising:'var(--cyan)',
    past_done:'var(--green)', ready:'var(--green)', sent_filling:'var(--orange)'
  }[r.status] || 'var(--t2)';

  html+=`<div class="tank-header">
    <div class="tank-number">${tankDisplay}</div>
    <div class="tank-info">
      <div class="tank-label">Aging Tank — Process Order ${po}</div>
      <div class="tank-product">${r.mix_name||'—'}</div>
      <div class="tank-sub">${r.date?new Date(r.date).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'}):'—'} · Vol รวม ${totalVol.toLocaleString()} L · Batch ${r.batch_no||'—'}</div>
    </div>
    <div class="tank-status-badge" style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44">${statusTxt}</div>
  </div>\`;

  // ── 1. HEADER INFO ──────────────────────────────────────────────────
  html+=\`<div class="card">
    <div class="card-hd">📋 ข้อมูลทั่วไป — Process Order ${po}</div>
    <div class="info-grid">
      <div class="info-item"><div class="info-label">Process Order</div><div class="info-val accent">${po}</div></div>
      <div class="info-item"><div class="info-label">Mix Code</div><div class="info-val accent">${r.mix_code||'—'}</div></div>
      <div class="info-item"><div class="info-label">ชื่อสูตร (Mix Name)</div><div class="info-val">${r.mix_name||'—'}</div></div>
      <div class="info-item"><div class="info-label">Product Type</div><div class="info-val">${productType||'—'}</div></div>
      <div class="info-item"><div class="info-label">Batch No.</div><div class="info-val">${r.batch_no||'—'}</div></div>
      <div class="info-item"><div class="info-label">รหัสผลิต (10 หลัก)</div><div class="info-val accent">${prodCode}</div></div>
      <div class="info-item"><div class="info-label">Volume รวม</div><div class="info-val">${totalVol.toLocaleString()} L</div></div>
      <div class="info-item"><div class="info-label">วันที่ผลิต</div><div class="info-val">${r.date?new Date(r.date+'T12:00').toLocaleDateString('th-TH'):r.archived_date||'—'}</div></div>
      <div class="info-item"><div class="info-label">Filling Line</div><div class="info-val">${r.filling_line||'—'}</div></div>
      <div class="info-item"><div class="info-label">Aging Tank</div><div class="info-val">${r.aging_tank||'—'}</div></div>
      <div class="info-item"><div class="info-label">สถานะ</div><div class="info-val">${statusTxt}</div></div>
      <div class="info-item"><div class="info-label">Mixing Unit</div><div class="info-val">${r._col==='production_plans_m2'?'Mixing 2':'Mixing 1'}</div></div>
    </div>
  </div>`;

  // ── 2. TIMELINE ─────────────────────────────────────────────────────
  html+=`<div class="card"><div class="card-hd">⏱️ Timeline การผลิต</div><div class="timeline">`;

  // MIXING
  const mixDone=r.mix_start_time&&r.mix_end_time;
  html+=`<div class="tl-item">
    <div class="tl-dot" style="background:${mixDone?'rgba(255,208,64,.15)':'var(--s2)'};border-color:${mixDone?'var(--yellow)':'var(--b2)'}">🧪</div>
    <div class="tl-body">
      <div class="tl-title" style="color:var(--yellow)">Mixing</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Mixing Tank</div><div class="info-val">${r.mixing_tank||'—'}</div></div>
        <div class="info-item"><div class="info-label">กะเริ่ม (Leadman)</div><div class="info-val">${r.start_time||'—'}</div></div>
        <div class="info-item"><div class="info-label">เริ่ม Mix</div><div class="info-val ${r.mix_start_time?'green':''}">${r.mix_start_time||'— ยังไม่เริ่ม'}</div></div>
        <div class="info-item"><div class="info-label">Mix เสร็จ</div><div class="info-val ${r.mix_end_time?'green':''}">${r.mix_end_time||'— ยังไม่เสร็จ'}</div></div>
        ${r.mix_sig?`<div class="info-item" style="grid-column:1/-1"><div class="info-label">✍️ ลายเซ็น Mixing</div><div style="display:flex;align-items:center;gap:8px"><img src="${r.mix_sig}" class="sig-img"><span class="sig-by">${r.mix_by||''} ${r.mix_sig_time||''}</span></div></div>`:''}
        ${r.mix_start_time&&r.mix_end_time?`<div class="info-item"><div class="info-label">ระยะเวลา Mix</div><div class="info-val">${calcDuration(r.mix_start_time,r.mix_end_time)}</div></div>`:''}
      </div>
    </div>
  </div>`;

  // INGREDIENTS
  const hasIng=(+r.glc_set||0)+(+r.sgr_set||0)+(+r.plm_set||0)>0;
  if(hasIng){
    html+=`<div class="tl-item">
      <div class="tl-dot" style="background:rgba(192,132,252,.1);border-color:#c084fc">🧂</div>
      <div class="tl-body">
        <div class="tl-title" style="color:#c084fc">วัตถุดิบเพิ่มเติม</div>
        <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--b1)">
          <table class="ing-table">
            <thead><tr><th>วัตถุดิบ</th><th>ตั้งค่า (Set)</th><th>จริง (Actual)</th><th>ผลต่าง</th><th>ยืนยัน</th></tr></thead>
            <tbody>
              ${ingRow('Glucose',r.glc_set,r.glc_actual,r.glc_confirmed)}
              ${ingRow('Sugar',r.sgr_set,r.sgr_actual,r.sgr_confirmed)}
              ${ingRow('Palm Oil',r.plm_set,r.plm_actual,r.plm_confirmed)}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
  }

  // PASTEURISE
  const pastDone=r.past_start_time&&r.past_end_time;
  html+=`<div class="tl-item">
    <div class="tl-dot" style="background:${pastDone?'rgba(0,232,122,.15)':'var(--s2)'};border-color:${pastDone?'var(--green)':'var(--b2)'}">♨️</div>
    <div class="tl-body">
      <div class="tl-title" style="color:var(--green)">Pasteurise</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">เริ่ม Past.</div><div class="info-val ${r.past_start_time?'green':''}">${r.past_start_time||'— ยังไม่เริ่ม'}</div></div>
        <div class="info-item"><div class="info-label">Past. เสร็จ</div><div class="info-val ${r.past_end_time?'green':''}">${r.past_end_time||'— ยังไม่เสร็จ'}</div></div>
        ${r.past_start_time&&r.past_end_time?`<div class="info-item"><div class="info-label">ระยะเวลา Past.</div><div class="info-val">${calcDuration(r.past_start_time,r.past_end_time)}</div></div>`:''}
        <div class="info-item"><div class="info-label">Homo Stage 1</div><div class="info-val">${r.homo_stage1?r.homo_stage1+' psi':'—'}</div></div>
        <div class="info-item"><div class="info-label">Homo Stage 2</div><div class="info-val">${r.homo_stage2?r.homo_stage2+' psi':'—'}</div></div>
        <div class="info-item"><div class="info-label">Efficiency</div><div class="info-val" style="color:${effCol}">${effTxt}</div></div>
        ${r.past_sig?`<div class="info-item" style="grid-column:1/-1"><div class="info-label">✍️ ลายเซ็น Pasteurise</div><div style="display:flex;align-items:center;gap:8px"><img src="${r.past_sig}" class="sig-img"><span class="sig-by">${r.past_by||''}</span></div></div>`:''}
        <div class="info-item"><div class="info-label">Aging Tank</div><div class="info-val accent">${r.aging_tank||'—'}</div></div>
        <div class="info-item"><div class="info-label">Current Vol</div><div class="info-val">${r.current_vol!=null?Number(r.current_vol).toLocaleString()+' L':'—'}</div></div>
      </div>
    </div>
  </div>`;

  // FILLING / CIP
  html+=`<div class="tl-item">
    <div class="tl-dot" style="background:${r.status==='sent_filling'?'rgba(0,212,255,.15)':'var(--s2)'};border-color:${r.status==='sent_filling'?'var(--cyan)':'var(--b2)'}">🏭</div>
    <div class="tl-body">
      <div class="tl-title" style="color:var(--cyan)">Filling / CIP Man</div>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">Filling Line</div><div class="info-val">${r.filling_line||'—'}</div></div>
        <div class="info-item"><div class="info-label">รหัสผลิต</div><div class="info-val accent">${prodCode}</div></div>
        <div class="info-item"><div class="info-label">สถานะ</div><div class="info-val">${statusTxt}</div></div>
        <div class="info-item"><div class="info-label">Volume ส่ง</div><div class="info-val">${totalVol.toLocaleString()} L</div></div>
      </div>
    </div>
  </div>`;

  html+=`</div></div>`; // end timeline card

  // ── 3. SHELF LIFE ────────────────────────────────────────────────────
  const prodDate=r.date||r.archived_date||'';
  const startTime=r.past_end_time||r.mix_start_time||'';
  html+=`<div class="card shelf-block">
    <div class="card-hd" style="color:var(--cyan)">🧊 Shelf Life Calculator</div>
    <div class="temp-row">
      <div>
        <div id="temp-disp" style="font-family:var(--display);font-size:36px;font-weight:800;color:var(--cyan);min-width:65px;text-align:center;line-height:1">4</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--t2);text-align:center">°C</div>
      </div>
      <input type="range" id="inp-temp" min="0" max="10" value="4" step="1" oninput="updateShelf(this.value,'${productType}','${prodDate}','${startTime}')">
      <div style="font-family:var(--mono);font-size:10px;color:var(--t3);text-align:right;line-height:2">
        <div>0°C</div><div>10°C</div>
      </div>
    </div>
    <div id="shelf-result"></div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--t2);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px">ตารางอายุตามอุณหภูมิ</div>
    <div style="overflow-x:auto;border-radius:8px;border:1px solid var(--b1)">
      <table class="shelf-table" id="shelf-tbl">
        <thead><tr><th>Temp</th><th>🍦 Ice Cream</th><th>🧊 Water Ice</th><th>🍮 Jelly</th></tr></thead>
        <tbody id="shelf-tbody"></tbody>
      </table>
    </div>
  </div>`;

  $('result-area').innerHTML=html;

  // render shelf life ทันที
  updateShelf(4,productType,prodDate,startTime);
};

window.updateShelf=(temp,type,prodDate,startTime)=>{
  temp=+temp;
  const col=temp<=3?'#00d4ff':temp<=6?'#00e87a':temp<=8?'#ffd040':'#ff4560';
  const d=$('temp-disp');
  if(d){d.textContent=temp;d.style.color=col;}
  const pct=(temp/10)*100;
  const sl=$('inp-temp');
  if(sl) sl.style.setProperty('--pct',pct+'%');

  // shelf table
  const types=['Ice Cream','Water Ice','Jelly'];
  const tbody=$('shelf-tbody');
  if(tbody) tbody.innerHTML=Array.from({length:11},(_,i)=>{
    const isActive=i===temp;
    return'<tr class="'+(isActive?'active-row':'')+'"><td>'+i+'°C '+(isActive?'◀':'')+'</td>'+types.map(t=>'<td style="'+(isActive&&t===type?'color:var(--cyan);font-weight:800':'')+'">'+SHELF[t][i]+' hr</td>').join('')+'</tr>';
  }).join('');

  if(!type||!prodDate||!startTime){
    const sr=$('shelf-result');
    if(sr) sr.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--t2);margin-bottom:14px">⚠️ ไม่มีข้อมูลวันผลิตหรือ product type — ไม่สามารถคำนวณได้</div>';
    return;
  }
  const shelfHr=SHELF[type]?SHELF[type][temp]:null;
  if(!shelfHr){
    const sr=$('shelf-result');
    if(sr) sr.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--t2);margin-bottom:14px">ไม่พบ type "'+type+'" ในตาราง</div>';
    return;
  }

  const prodDt=new Date(prodDate+'T'+startTime);
  const expireDt=new Date(prodDt.getTime()+shelfHr*3600000);
  const now=new Date();
  const remainMs=expireDt-now;
  const remainHr=remainMs/3600000;
  const elapsed=(now-prodDt)/3600000;
  const barPct=Math.min(100,Math.max(0,(elapsed/shelfHr)*100));

  const isExpired=remainHr<=0;
  const isCritical=remainHr>0&&remainHr<=6;
  const isWarning=remainHr>6&&remainHr<=24;
  const statusCol=isExpired?'#ff4560':isCritical?'#ff8c42':isWarning?'#ffd040':'#00e87a';
  const statusTxt=isExpired?'❌ หมดอายุแล้ว':isCritical?'⚠️ ใกล้หมดอายุ':isWarning?'🟡 ควรระวัง':'✅ ยังอยู่ในอายุ';

  const sr=$('shelf-result');
  if(!sr) return;

  let remTxt='';
  if(isExpired){
    remTxt='เกินอายุมาแล้ว '+Math.abs(remainHr).toFixed(1)+' ชั่วโมง';
  } else {
    const rH=Math.floor(remainHr),rM=Math.round((remainHr-rH)*60);
    remTxt='เหลืออายุ '+rH+' ชั่วโมง '+rM+' นาที';
  }

  sr.innerHTML=`
    <div style="display:inline-block;background:${statusCol}18;color:${statusCol};border:1px solid ${statusCol}44;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;margin-bottom:14px">${statusTxt}</div>
    <div class="expire-box">
      <div class="expire-label">⏰ วันและเวลาหมดอายุ</div>
      <div class="expire-date" style="color:${statusCol}">${expireDt.toLocaleDateString('th-TH',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
      <div class="expire-time">เวลา ${expireDt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.</div>
      <div class="expire-remain" style="background:${statusCol}15;color:${statusCol};border:1px solid ${statusCol}30">${remTxt}</div>
    </div>
    <div style="font-family:var(--mono);font-size:10px;color:var(--t2);display:flex;justify-content:space-between;margin-bottom:4px">
      <span>เริ่มผลิต ${startTime} น.</span><span>${barPct.toFixed(0)}% ผ่านไปแล้ว</span><span>หมดอายุ</span>
    </div>
    <div class="status-bar"><div class="status-fill" style="width:${barPct}%;background:linear-gradient(90deg,${statusCol},${statusCol}88)"></div></div>
    <div class="shelf-stats">
      <div class="stat-box"><div class="stat-label">อายุรวมที่ ${temp}°C</div><div class="stat-val" style="color:var(--cyan)">${shelfHr} hr</div></div>
      <div class="stat-box"><div class="stat-label">เหลืออายุ</div><div class="stat-val" style="color:${statusCol}">${isExpired?'0':remainHr.toFixed(1)} hr</div></div>
    </div>`;

  clearInterval(window._shelfTimer);
  window._shelfTimer=setInterval(()=>updateShelf(temp,type,prodDate,startTime),60000);
};

function calcDuration(start,end){
  if(!start||!end) return '—';
  const[sh,sm]=start.split(':').map(Number);
  const[eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<0) mins+=1440;
  const h=Math.floor(mins/60),m=mins%60;
  return h>0?h+' ชม. '+m+' น.':(m+' น.');
}

function ingRow(name,set,actual,confirmed){
  if(!+set) return '';
  const s=+(set||0),a=+(actual||0);
  const diff=a-s;
  const pct=s>0?(diff/s*100):0;
  const cls=Math.abs(pct)<=2?'diff-ok':Math.abs(pct)<=5?'diff-warn':'diff-bad';
  const diffTxt=diff===0?'ตรง':(diff>0?'+':'')+diff.toFixed(1)+' ('+pct.toFixed(1)+'%)';
  return'<tr><td>'+name+'</td><td>'+s+' kg</td><td>'+(a||'—')+'</td><td class="'+cls+'">'+diffTxt+'</td><td>'+(confirmed?'✅':'⏳')+'</td></tr>';
}
</script>
</body>
</html>
