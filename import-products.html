    return;
  }
  L(`📦 เริ่ม Import ${products.length} รายการ...`);
  let ok=0,fail=0;
  for(const p of products){
    try{
      await setDoc(doc(db,'products',p.mix_code),{
        mix_code:p.mix_code,
        mix_name:p.mix_name,
        density:p.density||0,
        speed_paste_1:p.speed_paste_1||null,
        speed_paste_2:p.speed_paste_2||null,
        stage1:p.stage1||null,
        stage2:p.stage2||null,
        type:p.type,
      });
      L(`✅ ${p.mix_code} — ${p.mix_name}`,'ok');
      ok++;
    }catch(e){
      L(`❌ ${p.mix_code} — ${e.message}`,'err');
      fail++;
    }
    await new Promise(r=>setTimeout(r,80));
  }
  L(`\n🏁 เสร็จแล้ว: ✅ ${ok} รายการ | ❌ ${fail} รายการ`,'info');
};
