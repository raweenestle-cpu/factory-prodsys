<!DOCTYPE html><!-- build:20260617210000 -->
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Timeline — PROD.SYS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;600;700;900&family=Sarabun:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b1120;--card:#1e293b;--card2:#263348;--border:#334155;--border2:#475569;
  --text:#f1f5f9;--t2:#cbd5e1;--t3:#94a3b8;--t4:#64748b;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#10b981;--green2:#34d399;
  --orange:#f97316;--red:#ef4444;--yellow:#f59e0b;--purple:#a855f7;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* NAV */
nav{display:flex;align-items:center;height:52px;background:#0f172a;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;padding:0 20px;gap:12px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:900;letter-spacing:.06em;color:var(--text)}
.nav-logo b{color:var(--orange)}
.nav-title{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-home{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--t3);cursor:pointer;text-decoration:none;font-family:var(--mono)}
.btn-home:hover{color:var(--text);border-color:var(--border2)}

/* DATE BAR */
.date-bar{display:flex;align-items:center;gap:12px;padding:14px 24px;background:#0f172a;border-bottom:1px solid var(--border)}
.date-label{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--t4);letter-spacing:2px;text-transform:uppercase;flex-shrink:0}
.date-input{font-family:var(--mono);font-size:22px;font-weight:900;color:var(--text);background:transparent;border:none;outline:none;cursor:pointer;color-scheme:dark}
.date-day{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--blue2);flex-shrink:0}

/* ADD FORM */
.add-form{background:var(--card);border:2px solid var(--border);border-radius:16px;padding:20px 24px;margin:20px 24px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.add-form-title{font-family:var(--mono);font-size:11px;font-weight:900;color:var(--t4);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.add-form-title::before{content:'';display:block;width:3px;height:14px;background:var(--blue);border-radius:2px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-family:var(--mono);font-size:10px;font-weight:900;color:var(--t4);letter-spacing:1px;text-transform:uppercase}
.form-input{font-family:var(--mono);font-size:14px;font-weight:700;padding:10px 14px;background:#0f172a;border:1.5px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border-color .2s;color-scheme:dark}
.form-input:focus{border-color:var(--blue)}
.form-input-time{width:140px}
.form-input-reason{flex:1;min-width:220px;font-family:var(--sans);font-size:14px}
.form-input-cat{width:150px}
.img-upload-wrap{position:relative;cursor:pointer}
.img-upload-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#0f172a;border:1.5px dashed var(--border);border-radius:10px;color:var(--t3);font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.img-upload-btn:hover{border-color:var(--blue);color:var(--blue2)}
.img-upload-btn.has-img{border-style:solid;border-color:var(--green);color:var(--green2)}
#file-input{display:none}
.img-preview-small{width:40px;height:40px;border-radius:8px;object-fit:cover;border:2px solid var(--green)}
.btn-add{display:flex;align-items:center;gap:8px;padding:10px 24px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;border-radius:10px;color:#fff;font-family:var(--mono);font-size:14px;font-weight:900;cursor:pointer;white-space:nowrap;box-shadow:0 3px 12px rgba(37,99,235,.4);transition:all .15s;flex-shrink:0}
.btn-add:hover{background:linear-gradient(135deg,#1e40af,#1d4ed8);transform:translateY(-1px)}
.btn-add:active{transform:translateY(0)}

/* CATEGORY COLORS */
.cat-normal{--cat:#3b82f6}
.cat-stop{--cat:#ef4444}
.cat-maintenance{--cat:#f59e0b}
.cat-meeting{--cat:#a855f7}
.cat-other{--cat:#64748b}

/* TIMELINE */
.tl-wrap{padding:24px 24px 60px;position:relative}
.tl-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;color:var(--t4);gap:12px}
.tl-empty-ico{font-size:48px;opacity:.4}
.tl-empty-txt{font-family:var(--mono);font-size:13px}

/* SCOPE BAR */
.scope-bar{background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:12px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.scope-stat{display:flex;flex-direction:column;gap:2px}
.scope-stat-label{font-family:var(--mono);font-size:9px;font-weight:900;color:var(--t4);letter-spacing:1.5px;text-transform:uppercase}
.scope-stat-val{font-family:var(--mono);font-size:16px;font-weight:900;color:var(--text)}
.scope-divider{width:1px;height:32px;background:var(--border)}

/* TIMELINE AXIS */
.tl-axis{position:relative;margin-left:80px;margin-bottom:0}
.tl-line{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--blue) 0%,var(--purple) 50%,var(--orange) 100%);border-radius:2px;margin-left:28px}

/* TIME TICK */
.tl-tick{display:flex;align-items:flex-start;gap:0;margin-bottom:0;position:relative}
.tl-tick-time{width:80px;margin-left:-80px;font-family:var(--mono);font-size:13px;font-weight:900;color:var(--t3);text-align:right;padding-right:16px;flex-shrink:0;padding-top:22px}
.tl-tick-dot{width:59px;flex-shrink:0;display:flex;justify-content:center;align-items:flex-start;padding-top:16px}
.tl-dot{width:18px;height:18px;border-radius:50%;border:3px solid var(--bg);flex-shrink:0;margin-top:4px;box-shadow:0 0 0 2px currentColor}
.tl-content{flex:1;padding:0 0 32px 16px}

/* EVENT CARD */
.ev-card{background:var(--card);border:2px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.ev-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.35)}
.ev-card-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1.5px solid var(--border)}
.ev-cat-bar{width:4px;height:36px;border-radius:2px;flex-shrink:0;background:var(--cat,var(--blue))}
.ev-time-big{font-family:var(--mono);font-size:20px;font-weight:900;color:var(--text)}
.ev-meta{flex:1;min-width:0}
.ev-cat-badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;font-weight:900;padding:2px 10px;border-radius:20px;letter-spacing:.5px;border:1.5px solid currentColor;margin-bottom:4px}
.ev-reason{font-size:16px;font-weight:700;color:var(--text);line-height:1.3}
.ev-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-del{background:none;border:1.5px solid var(--border);border-radius:8px;color:var(--t4);padding:6px 10px;cursor:pointer;font-size:13px;transition:all .15s}
.btn-del:hover{border-color:var(--red);color:var(--red)}
.ev-img-wrap{position:relative;overflow:hidden;max-height:320px;background:#0f172a}
.ev-img{width:100%;max-height:320px;object-fit:cover;display:block;transition:transform .3s}
.ev-card:hover .ev-img{transform:scale(1.02)}
.ev-img-caption{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(transparent,rgba(0,0,0,.7));font-size:12px;color:#e2e8f0;font-weight:600}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1d4ed8;color:#fff;padding:10px 24px;border-radius:10px;font-family:var(--mono);font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .add-form{margin:12px;padding:16px}
  .form-row{flex-direction:column}
  .form-input-time,.form-input-cat{width:100%}
  .form-input-reason{min-width:0;width:100%}
  .tl-wrap{padding:16px 12px 60px}
  .tl-axis{margin-left:64px}
  .tl-tick-time{width:64px;font-size:11px;padding-right:10px}
  .ev-time-big{font-size:16px}
  .ev-reason{font-size:14px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">PROD<b>.</b>SYS</div>
  <div class="nav-title">⏱ Timeline</div>
  <div class="nav-right">
    <a href="index.html" class="btn-home">🏠 Home</a>
  </div>
</nav>

<!-- DATE BAR -->
<div class="date-bar">
  <div class="date-label">📅 วันที่</div>
  <input type="date" id="date-pick" class="date-input" onchange="onDateChange()">
  <div class="date-day" id="date-day-label"></div>
</div>

<!-- ADD FORM -->
<div class="add-form">
  <div class="add-form-title">เพิ่มกิจกรรม</div>
  <div class="form-row">
    <div class="form-group">
      <div class="form-label">⏰ เวลา</div>
      <input type="time" id="f-time" class="form-input form-input-time" step="60">
    </div>
    <div class="form-group" style="flex:1;min-width:200px">
      <div class="form-label">📝 เหตุการณ์ / เหตุผล</div>
      <input type="text" id="f-reason" class="form-input form-input-reason" placeholder="เช่น หยุดสายการผลิต เพราะ...">
    </div>
    <div class="form-group">
      <div class="form-label">🏷️ ประเภท</div>
      <select id="f-cat" class="form-input form-input-cat">
        <option value="normal">🔵 ปกติ</option>
        <option value="stop">🔴 หยุดสาย</option>
        <option value="maintenance">🟡 ซ่อมบำรุง</option>
        <option value="meeting">🟣 ประชุม</option>
        <option value="other">⚫ อื่นๆ</option>
      </select>
    </div>
    <div class="form-group">
      <div class="form-label">🖼️ รูปภาพ</div>
      <div class="img-upload-wrap" onclick="document.getElementById('file-input').click()">
        <div class="img-upload-btn" id="upload-btn-label">
          <span>📎</span><span>เลือกรูป</span>
        </div>
        <input type="file" id="file-input" accept="image/*" onchange="onFileSelect(this)">
      </div>
    </div>
    <div class="form-group" style="justify-content:flex-end">
      <button class="btn-add" onclick="addEvent()">＋ เพิ่ม</button>
    </div>
  </div>
  <div id="img-preview-wrap" style="margin-top:12px;display:none">
    <img id="img-preview" style="height:80px;border-radius:10px;border:2px solid var(--green);object-fit:cover">
    <button onclick="clearImg()" style="margin-left:8px;background:none;border:1.5px solid var(--border);border-radius:6px;color:var(--t3);padding:4px 8px;cursor:pointer;font-size:12px">✕ ลบรูป</button>
  </div>
</div>

<!-- TIMELINE -->
<div class="tl-wrap" id="tl-wrap">
  <div class="tl-empty" id="tl-empty">
    <div class="tl-empty-ico">📋</div>
    <div class="tl-empty-txt">ยังไม่มีกิจกรรม — กรอกข้อมูลด้านบนแล้วกด เพิ่ม</div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const db = getFirestore(app);

// ── STATE ──────────────────────────────────────────────────────────────
let currentDate = '';
let unsub = null;
let imgBase64 = null;

const $ = id => document.getElementById(id);
const DAYS = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์'];
const CAT_META = {
  normal:      {label:'ปกติ',      color:'#3b82f6', emoji:'🔵'},
  stop:        {label:'หยุดสาย',   color:'#ef4444', emoji:'🔴'},
  maintenance: {label:'ซ่อมบำรุง', color:'#f59e0b', emoji:'🟡'},
  meeting:     {label:'ประชุม',    color:'#a855f7', emoji:'🟣'},
  other:       {label:'อื่นๆ',     color:'#64748b', emoji:'⚫'},
};

function toast(msg, type='blue'){
  const el=$('toast');
  el.textContent=msg;
  el.style.background=type==='green'?'#065f46':type==='red'?'#991b1b':'#1d4ed8';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

function today(){
  return new Date().toISOString().slice(0,10);
}

function formatDayLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const day = DAYS[d.getDay()];
  const [y,m,dd] = dateStr.split('-');
  return `วัน${day} ${dd}/${m}/${+y+543}`;
}

// ── INIT ───────────────────────────────────────────────────────────────
(function init(){
  const d = today();
  $('date-pick').value = d;
  onDateChange();
  // set default time = now
  const now = new Date();
  $('f-time').value = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
})();

window.onDateChange = function(){
  currentDate = $('date-pick').value || today();
  $('date-day-label').textContent = formatDayLabel(currentDate);
  loadEvents();
};

// ── FILE SELECT ────────────────────────────────────────────────────────
window.onFileSelect = function(input){
  const file = input.files[0];
  if(!file) return;
  // compress ก่อน store เป็น base64
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1200;
      let w = img.width, h = img.height;
      if(w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      imgBase64 = canvas.toDataURL('image/jpeg', 0.82);
      // show preview
      $('img-preview').src = imgBase64;
      $('img-preview-wrap').style.display = 'flex';
      $('img-preview-wrap').style.alignItems = 'center';
      const btn = $('upload-btn-label');
      btn.classList.add('has-img');
      btn.innerHTML = '<span>✅</span><span>มีรูปแล้ว</span>';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
};

window.clearImg = function(){
  imgBase64 = null;
  $('file-input').value = '';
  $('img-preview-wrap').style.display = 'none';
  const btn = $('upload-btn-label');
  btn.classList.remove('has-img');
  btn.innerHTML = '<span>📎</span><span>เลือกรูป</span>';
};

// ── ADD EVENT ──────────────────────────────────────────────────────────
window.addEvent = async function(){
  const time = $('f-time').value;
  const reason = $('f-reason').value.trim();
  const cat = $('f-cat').value;
  if(!time){ toast('กรุณาใส่เวลา','red'); return; }
  if(!reason){ toast('กรุณาใส่เหตุการณ์','red'); return; }
  try{
    await addDoc(collection(db,'timeline_events'),{
      date: currentDate,
      time,
      reason,
      cat,
      img: imgBase64||'',
      created_at: new Date().toISOString(),
    });
    // clear form
    $('f-reason').value = '';
    $('f-cat').value = 'normal';
    clearImg();
    // set time to now
    const now = new Date();
    $('f-time').value = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    toast('✅ เพิ่มกิจกรรมแล้ว','green');
  }catch(e){
    toast('❌ บันทึกไม่สำเร็จ: '+e.message,'red');
  }
};

// ── DELETE ─────────────────────────────────────────────────────────────
window.deleteEvent = async function(id){
  if(!confirm('ลบกิจกรรมนี้?')) return;
  try{
    await deleteDoc(doc(db,'timeline_events',id));
    toast('ลบแล้ว');
  }catch(e){
    toast('❌ ลบไม่สำเร็จ','red');
  }
};

// ── LOAD & RENDER ──────────────────────────────────────────────────────
function loadEvents(){
  if(unsub) unsub();
  const q = query(
    collection(db,'timeline_events'),
    where('date','==',currentDate),
    orderBy('time','asc')
  );
  unsub = onSnapshot(q, snap => {
    const events = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>a.time.localeCompare(b.time));
    renderTimeline(events);
  }, e => console.error('timeline error:',e));
}

function renderTimeline(events){
  const wrap = $('tl-wrap');
  if(!events.length){
    wrap.innerHTML = `<div class="tl-empty"><div class="tl-empty-ico">📋</div><div class="tl-empty-txt">ยังไม่มีกิจกรรม — กรอกข้อมูลด้านบนแล้วกด เพิ่ม</div></div>`;
    return;
  }

  // SCOPE: หาช่วงเวลาที่มีกิจกรรม
  const times = events.map(e=>e.time);
  const firstTime = times[0];
  const lastTime = times[times.length-1];
  const [fh,fm] = firstTime.split(':').map(Number);
  const [lh,lm] = lastTime.split(':').map(Number);
  const spanMin = (lh*60+lm)-(fh*60+fm);
  const totalMin = spanMin || 1;

  // SCOPE BAR
  const scopeHtml = `
  <div class="scope-bar">
    <div class="scope-stat"><div class="scope-stat-label">กิจกรรมทั้งหมด</div><div class="scope-stat-val">${events.length} รายการ</div></div>
    <div class="scope-divider"></div>
    <div class="scope-stat"><div class="scope-stat-label">เริ่มต้น</div><div class="scope-stat-val" style="color:var(--green2)">${firstTime}</div></div>
    <div class="scope-divider"></div>
    <div class="scope-stat"><div class="scope-stat-label">ล่าสุด</div><div class="scope-stat-val" style="color:var(--orange)">${lastTime}</div></div>
    <div class="scope-divider"></div>
    <div class="scope-stat"><div class="scope-stat-label">ช่วงเวลา</div><div class="scope-stat-val" style="color:var(--blue2)">${Math.floor(totalMin/60)}ชม. ${totalMin%60}น.</div></div>
  </div>`;

  // TIMELINE ITEMS
  const itemsHtml = events.map((ev,i) => {
    const cat = CAT_META[ev.cat||'normal']||CAT_META.normal;
    const [h,m] = ev.time.split(':').map(Number);
    const minuteFromFirst = (h*60+m)-(fh*60+fm);
    const pct = totalMin>0?(minuteFromFirst/totalMin*100).toFixed(1):0;

    const imgHtml = ev.img ? `
      <div class="ev-img-wrap">
        <img class="ev-img" src="${ev.img}" alt="รูปประกอบ" loading="lazy">
      </div>` : '';

    return `
    <div class="tl-tick">
      <div class="tl-tick-time">${ev.time}</div>
      <div class="tl-tick-dot">
        <div class="tl-dot" style="color:${cat.color};background:${cat.color}"></div>
      </div>
      <div class="tl-content">
        <div class="ev-card cat-${ev.cat||'normal'}" style="--cat:${cat.color}">
          <div class="ev-card-head">
            <div class="ev-cat-bar" style="background:${cat.color}"></div>
            <div class="ev-time-big">${ev.time}</div>
            <div class="ev-meta">
              <div class="ev-cat-badge" style="color:${cat.color}">${cat.emoji} ${cat.label}</div>
              <div class="ev-reason">${ev.reason}</div>
            </div>
            <div class="ev-actions">
              <button class="btn-del" onclick="deleteEvent('${ev.id}')" title="ลบ">🗑️</button>
            </div>
          </div>
          ${imgHtml}
        </div>
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML = scopeHtml + `
  <div class="tl-axis">
    <div class="tl-line"></div>
    ${itemsHtml}
  </div>`;
}

// ── ENTER KEY ──────────────────────────────────────────────────────────
document.getElementById('f-reason').addEventListener('keydown', e=>{
  if(e.key==='Enter') window.addEvent();
});
</script>
