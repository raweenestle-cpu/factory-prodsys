<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pasteurize — PROD.SYS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0e1118;--s2:#141820;--s3:#1a2030;
  --b1:#1e2535;--b2:#2a3348;
  --text:#dde3f0;--t2:#7a8499;--t3:#3d4560;
  --blue:#3b82f6;--green:#22c55e;--yellow:#eab308;
  --red:#ef4444;--cyan:#06b6d4;--orange:#f97316;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.95);border-bottom:1px solid var(--b1);
  backdrop-filter:blur(10px);display:flex;align-items:center;height:48px;padding:0 14px;gap:10px}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--cyan)}
.nav-tab{font-size:11px;font-weight:600;padding:5px 11px;border-radius:6px;border:none;
  background:none;color:var(--t2);cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-tab:hover{color:var(--text);background:var(--s3)}
.nav-tab.on{color:var(--cyan);background:rgba(6,182,212,.12)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.nbtn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;
  border:1px solid var(--b2);background:none;color:var(--t2);cursor:pointer;text-decoration:none}
.nbtn:hover{color:var(--text);border-color:var(--cyan)}
.date-input{font-family:var(--mono);font-size:12px;background:var(--s2);border:1px solid var(--b1);
  border-radius:6px;color:var(--text);padding:4px 8px;outline:none}

/* LAYOUT */
main{padding:14px;max-width:1400px;margin:0 auto}
.page{display:none}.page.on{display:block}

/* SECTION TITLE */
.sec{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-line{flex:1;height:1px;background:var(--b1)}
.sec-title{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--t2);white-space:nowrap}

/* TABLE */
.tw{overflow-x:auto;margin-bottom:20px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-family:var(--mono);font-size:10px;color:var(--t2);font-weight:600;
  padding:8px 10px;text-align:left;border-bottom:1px solid var(--b1);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid rgba(30,37,53,.5);vertical-align:middle}
tr.row-past{background:rgba(6,182,212,.04)}
tr.row-done{background:rgba(34,197,94,.04)}
tr:hover{background:var(--s2)}
.ci{font-family:var(--mono);font-size:11px;background:var(--s2);border:1px solid var(--b1);
  border-radius:5px;color:var(--text);padding:4px 7px;outline:none;width:100%}
.ci:focus{border-color:var(--cyan)}
.btn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-weight:700;transition:all .2s}
.btn-b{background:var(--blue);color:#fff}.btn-b:hover{opacity:.85}
.btn-g{background:var(--green);color:#fff}.btn-g:hover{opacity:.85}
.btn-r{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-r:hover{background:rgba(239,68,68,.25)}
.btn-s{background:var(--s3);color:var(--t2);border:1px solid var(--b2)}
.btn-s:hover{color:var(--text)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* STATUS BADGE */
.sb{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;white-space:nowrap}
.sb-mixing{background:rgba(234,179,8,.12);color:var(--yellow);border:1px solid rgba(234,179,8,.25)}
.sb-past{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.25)}
.sb-done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.sb-ready{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.25)}

/* STAMP CELL */
.stamp-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stamp-time{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text)}
.stamp-sig{height:22px;vertical-align:middle;opacity:.9}
.stamp-by{font-family:var(--mono);font-size:9px;color:var(--t2)}

/* SIG BTN */
.sig-btn{background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;
  color:var(--t2);transition:all .2s;display:inline-flex;align-items:center}
.sig-btn:hover{background:rgba(99,102,241,.15);color:#818cf8}
.sig-btn svg{width:16px;height:16px}

/* TANK VISUAL */
.tank-wrap{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.tank-card{background:var(--s1);border:1.5px solid var(--b1);border-radius:12px;padding:14px;min-width:160px;flex:1}
.tank-label{font-family:var(--mono);font-size:10px;color:var(--t2);margin-bottom:8px;font-weight:700;letter-spacing:.08em}
.tank-name{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--text)}
.tank-vol{font-family:var(--mono);font-size:18px;font-weight:800;margin-bottom:2px}
.tank-pct{font-family:var(--mono);font-size:11px;color:var(--t2)}

/* SVG TANK */
.svg-wrap{width:100%;max-width:120px;margin:8px auto}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:9px 20px;border-radius:9px;font-size:12px;opacity:0;transition:all .3s;
  z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff;font-weight:700}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* CARD INFO */
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.info-card{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px}
.info-label{font-family:var(--mono);font-size:9px;color:var(--t2);margin-bottom:3px;letter-spacing:.08em}
.info-val{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.info-val.accent{color:var(--cyan)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">PROD.SYS / PAST.</div>
  <button class="nav-tab on" onclick="showPage('p1',this)">🔴 Past. 1</button>
  <button class="nav-tab" onclick="showPage('p2',this)">🔴 Past. 2</button>
  <div class="nav-r">
    <input type="date" id="date-p1" class="date-input" oninput="loadPlan('p1')">
    <a href="index.html" class="nbtn">🏠 Home</a>
    <button class="nbtn" onclick="doLogout()">Logout</button>
  </div>
</nav>
<main>
  <div id="page-p1" class="page on"></div>
  <div id="page-p2" class="page"></div>
</main>
<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,orderBy,onSnapshot,updateDoc,doc,getDocs}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const nowHHMM=()=>{const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`};

// State
const rows={p1:[],p2:[]};
const unsub={p1:null,p2:null};
let productMap={},lineMap={};
let curPage='p1';

// Employee from sessionStorage
const empName=sessionStorage.getItem('emp_name')||'';
const empSig=sessionStorage.getItem('emp_sig')||'';

// Expose globals
window._rows=rows;
window._productMap=productMap;

function toast(msg,col='blue'){
  const el=$('toast');el.textContent=msg;
  el.style.background=col==='green'?'#15803d':col==='red'?'#991b1b':'#1d4ed8';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);
}

function planCol(m){return m==='p1'?'production_plans':'production_plans_m2';}

// Auth
onAuthStateChanged(auth,async u=>{
  if(!u){location.href='index.html';return;}
  // Load products
  onSnapshot(collection(db,'products'),snap=>{
    snap.docs.forEach(d=>{const p={id:d.id,...d.data()};if(p.mix_code)productMap[p.mix_code]=p;});
    window._productMap=productMap;
  });
  // Load lines
  const ls=await getDocs(collection(db,'lines'));
  ls.docs.forEach(d=>{lineMap[d.id]={id:d.id,...d.data()};});
  // Set default date
  const d=today();
  $('date-p1').value=d;
  loadPlan('p1');
  loadPlan('p2');
  startInterval();
});

window.doLogout=async()=>{await signOut(auth);location.href='index.html';};

// Show page
window.showPage=(p,btn)=>{
  curPage=p;
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));
  $('page-'+p).classList.add('on');
};

// Load plan
window.loadPlan=(m)=>{
  const d=$('date-p1').value||today();
  if(unsub[m])unsub[m]();
  const q=query(collection(db,planCol(m)),where('date','==',d));
  unsub[m]=onSnapshot(q,snap=>{
    rows[m]=snap.docs.map(d=>({id:d.id,...d.data()}))
      .filter(r=>r.status!=='sent_filling'&&r.status!=='filling'&&r.status!=='curing')
      .sort((a,b)=>(a.seq||0)-(b.seq||0));
    renderPage(m);
  });
};

// ── RENDER ────────────────────────────────────────────────────────────
function renderPage(m){
  const el=$('page-'+m);
  if(!el)return;
  let html=renderTankVisual(m);
  html+=renderTable(m);
  el.innerHTML=html;
}

// ── TANK VISUAL ───────────────────────────────────────────────────────
function renderTankVisual(m){
  // หา agRow ที่กำลัง past อยู่
  const allRows=[...rows.p1,...rows.p2];
  const agRow=rows[m].find(r=>r.status==='pasteurising'&&r.past_start_time)
    ||rows[m].find(r=>r.status==='pasteurising')
    ||null;
  if(!agRow)return'';

  const prod=productMap[agRow.mix_code]||{};
  const col=prod.color||'#3b82f6';
  const density=+(prod.density||1);
  const speed=m==='p1'?+(prod.speed_m1||prod.speed||0):+(prod.speed_m2||prod.speed||0);
  const batchVol=+(agRow.volume_liter||0);

  // Mixing capacity
  const mixCap=m==='p1'?3000:3500;

  // คำนวณ flow ตาม elapsed time
  let mixFlow=0;
  if(speed>0&&batchVol>0&&agRow.past_start_time){
    const totalMin=(batchVol*density*60)/speed;
    const[h,mi]=agRow.past_start_time.split(':').map(Number);
    const start=new Date((agRow.date||today())+'T'+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00');
    const elMin=Math.max(0,(Date.now()-start)/60000);
    mixFlow=totalMin>0?Math.min(batchVol,(elMin/totalMin)*batchVol):0;
  }

  // Mixing tank volume ที่เหลือ
  const groupRows=agRow.process_order&&agRow.aging_tank
    ?allRows.filter(r=>r.process_order===agRow.process_order&&r.aging_tank===agRow.aging_tank)
    :[agRow];
  const doneBatchesVol=groupRows
    .filter(r=>r.id!==agRow.id&&(r.status==='past_done'||r.status==='ready'))
    .reduce((s,r)=>s+(+(r.volume_liter||0)),0);
  const thisBatchFlowed=Math.min(batchVol,mixFlow);
  const mixRemain=Math.max(0,batchVol-thisBatchFlowed);

  // Aging tank volume
  const totalVol=groupRows.reduce((s,r)=>s+(+(r.volume_liter||0)),0)||batchVol;
  const agVol=Math.min(totalVol,doneBatchesVol+thisBatchFlowed);
  const agCap=getTankCap(agRow.aging_tank||'');
  const agPct=agCap>0?(agVol/agCap)*100:0;
  const mixPct=(mixRemain/mixCap)*100;

  // คำนวณ ETA
  let etaStr='—';
  if(speed>0&&batchVol>0&&agRow.past_start_time){
    const totalMin=(batchVol*density*60)/speed;
    const[h,mi]=agRow.past_start_time.split(':').map(Number);
    const eta=new Date((agRow.date||today())+'T'+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00');
    eta.setMinutes(eta.getMinutes()+totalMin);
    etaStr=`${String(eta.getHours()).padStart(2,'0')}:${String(eta.getMinutes()).padStart(2,'0')}`;
  }

  return`
  <div class="tank-wrap">
    <div class="tank-card">
      <div class="tank-label">🧪 MIXING ${m==='p1'?'1':'2'} (${mixCap.toLocaleString()}L)</div>
      <div class="tank-name" style="color:${col}">${prod.mix_name||agRow.mix_name||'—'}</div>
      ${tankSVG('mix-'+m, Math.min(100,mixPct), col, true)}
      <div class="tank-vol" style="color:${col}">${mixRemain.toFixed(0)} L</div>
      <div class="tank-pct">${mixPct.toFixed(1)}% เหลือ</div>
    </div>
    <div class="tank-card">
      <div class="tank-label">🧊 AGING ${agRow.aging_tank||'—'} (${agCap.toLocaleString()}L)</div>
      <div class="tank-name" style="color:${col}">${agRow.mix_name||'—'}</div>
      ${tankSVG('ag-'+m, Math.min(100,agPct), col, thisBatchFlowed>0)}
      <div class="tank-vol" style="color:${col}">${agVol.toFixed(0)} L</div>
      <div class="tank-pct">${agPct.toFixed(1)}%</div>
    </div>
    <div class="tank-card">
      <div class="tank-label">📋 INFO</div>
      <div class="info-grid" style="grid-template-columns:1fr;gap:6px">
        <div class="info-card"><div class="info-label">BATCH</div><div class="info-val accent">${agRow.batch_no||'—'}</div></div>
        <div class="info-card"><div class="info-label">VOL รวม PO</div><div class="info-val">${totalVol.toLocaleString()} L</div></div>
        <div class="info-card"><div class="info-label">ETA เสร็จ</div><div class="info-val">${etaStr}</div></div>
        <div class="info-card"><div class="info-label">DENSITY</div><div class="info-val">${density}</div></div>
      </div>
    </div>
  </div>`;
}

function getTankCap(tid){
  for(const l of Object.values(lineMap)){
    if((l.aging_tanks||[]).includes(tid)&&l.tank_capacity) return +(l.tank_capacity)||5000;
  }
  return 5000;
}

// SVG Tank
function tankSVG(id,pct,col,wave){
  const W=100,H=160,bX=8,bY=10,bW=84,bH=130,rx=8;
  const fillH=Math.max(0,(bH-4)*(pct/100));
  const fillY=bY+2+(bH-4)-fillH;
  const rgba=(a)=>col+(Math.round(a*255).toString(16).padStart(2,'0'));
  const wAmp=8;
  const waveContent=wave
    ?('<path d="M'+bX+','+(fillY+wAmp)+' C'+(bX+bW*.3)+','+(fillY)+' '+(bX+bW*.7)+','+(fillY)+' '+(bX+bW)+','+(fillY+wAmp)+'\" fill="'+rgba(.5)+'"><animateTransform attributeName="transform" type="translate" from="0,0" to="'+(-bW)+',0" dur="1.5s" repeatCount="indefinite"/></path>')
    :('<rect x="'+(bX+1)+'" y="'+(fillY+1)+'" width="'+(bW-2)+'" height="4" rx="2" fill="'+rgba(.5)+'"/>');

  return`<div class="svg-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
  <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${col}" stop-opacity=".9"/>
    <stop offset="100%" stop-color="${col}" stop-opacity=".4"/>
  </linearGradient></defs>
  <rect x="${bX}" y="${bY}" width="${bW}" height="${bH}" rx="${rx}" fill="rgba(0,0,0,.4)" stroke="${col}44" stroke-width="1.5"/>
  ${fillH>0?`<clipPath id="cp${id}"><rect x="${bX+1}" y="${fillY}" width="${bW-2}" height="${fillH+2}" rx="${rx}"/></clipPath>
  <rect x="${bX+1}" y="${fillY}" width="${bW-2}" height="${fillH}" rx="4" fill="url(#g${id})" opacity=".85" clip-path="url(#cp${id})"/>
  <g clip-path="url(#cp${id})">${waveContent}</g>`:''}
  <text x="${W/2}" y="${bY+bH+14}" text-anchor="middle" font-family="DM Mono" font-size="9" fill="${col}" opacity=".7">${pct.toFixed(0)}%</text>
</svg></div>`;
}

// ── TABLE ─────────────────────────────────────────────────────────────
function renderTable(m){
  const col=planCol(m);
  if(!rows[m].length) return`<div style="text-align:center;padding:40px;color:var(--t3);font-family:var(--mono);font-size:13px">ไม่มีข้อมูล</div>`;

  let html=`<div class="tw"><table>
  <thead><tr>
    <th>#</th><th>Mix Code</th><th>Mix Name</th><th>Batch</th>
    <th>Vol (L)</th><th>Tank</th>
    <th>⏱ เริ่ม Past.</th><th>✅ Past.เสร็จ</th>
    <th>Eff%</th><th>ส่งข้อมูล</th>
    <th>✍️</th><th>Status</th>
  </tr></thead><tbody>`;

  rows[m].forEach((row,i)=>{
    const prod=productMap[row.mix_code]||{};
    const col2=prod.color||'var(--blue)';
    const isPast=row.status==='pasteurising'&&!!row.past_start_time;
    const isDone=row.status==='past_done'||row.status==='ready';
    const canStart=row.status==='pasteurising'&&!row.past_start_time;
    const canStop=isPast&&!row.past_end_time;

    // Status badge
    let sb='';
    if(row.status==='pasteurising'&&!row.past_start_time) sb=`<span class="sb sb-past">รอเริ่ม</span>`;
    else if(isPast) sb=`<span class="sb sb-past">Pasteurising</span>`;
    else if(isDone) sb=`<span class="sb sb-done">${row.status==='ready'?'Ready':'Done'}</span>`;
    else sb=`<span class="sb sb-mixing">${row.status||'—'}</span>`;

    // Eff
    let eff='—';
    if(row.eff) eff=row.eff+'%';

    // Stamp cell start
    const startCell=`<td><div class="stamp-cell">
      ${row.past_start_time?('<span class="stamp-time">'+row.past_start_time+'</span>'):''}
      ${canStart?('<button class="btn btn-b" onclick="_stampStart(\''+col+'\',\''+row.id+'\',\''+m+'\')">▶ Start</button>'):''}
      ${canStart?'':(row.past_start_time?'':'')}
    </div></td>`;

    // Stamp cell stop
    const stopCell=`<td><div class="stamp-cell">
      ${row.past_end_time?('<span class="stamp-time">'+row.past_end_time+'</span>'):''}
      ${canStop?('<button class="btn btn-g" onclick="_stampStop(\''+col+'\',\''+row.id+'\',\''+m+'\')">⏹ เสร็จ</button>'):''}
    </div></td>`;

    // ส่งข้อมูล
    const sendCell='<td>'+(isDone&&!row.eff?('<button class="btn btn-s" onclick="_sendData(\''+col+'\',\''+row.id+'\',\''+m+'\')">ส่ง</button>'):(row.eff?('<span style="font-family:var(--mono);font-size:10px;color:var(--green)">'+row.eff+'%</span>'):'—'))+'</td>';

    // Signature
    const sigCell=`<td style="text-align:center">
      ${row.past_sig
        ?`<img src="${row.past_sig}" class="stamp-sig" title="${row.past_by||''}">`
        :`<button class="sig-btn" onclick="_stampSig('${col}','${row.id}')" title="เซ็นชื่อ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg></button>`}
    </td>`;

    html+=`<tr class="${isPast?'row-past':''} ${isDone?'row-done':''}">
      <td style="font-family:var(--mono);color:var(--t2)">${i+1}</td>
      <td style="font-family:var(--mono);font-weight:700;color:${col2}">${row.mix_code||'—'}</td>
      <td style="font-weight:600">${row.mix_name||'—'}</td>
      <td style="font-family:var(--mono)">${row.batch_no||'—'}</td>
      <td style="font-family:var(--mono)">${row.volume_liter||'—'}</td>
      <td style="font-family:var(--mono);color:var(--cyan)">${row.aging_tank||'—'}</td>
      ${startCell}
      ${stopCell}
      <td style="font-family:var(--mono)">${eff}</td>
      ${sendCell}
      ${sigCell}
      <td>${sb}</td>
    </tr>`;
  });

  html+='</tbody></table></div>';
  return html;
}

// ── ACTIONS ───────────────────────────────────────────────────────────
window._stampStart=async(col,id,m)=>{
  const time=nowHHMM();
  try{
    await updateDoc(doc(db,col,id),{status:'pasteurising',past_start_time:time,past_end_time:''});
    toast(`▶ เริ่ม Past. ${time}`,'blue');
  }catch(e){toast('ไม่สำเร็จ','red');}
};

window._stampStop=async(col,id,m)=>{
  const time=nowHHMM();
  const row=rows[m].find(r=>r.id===id);
  if(!row)return;
  const batchVol=+(row.volume_liter||0);
  const prod=productMap[row.mix_code]||{};
  const density=+(prod.density||1);
  const speed=m==='p1'?+(prod.speed_m1||prod.speed||0):+(prod.speed_m2||prod.speed||0);
  let eff=100;
  if(speed>0&&batchVol>0&&row.past_start_time){
    const totalMin=(batchVol*density*60)/speed;
    const[h,mi]=row.past_start_time.split(':').map(Number);
    const start=new Date((row.date||today())+'T'+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00');
    const[he,me]=time.split(':').map(Number);
    const end=new Date((row.date||today())+'T'+String(he).padStart(2,'0')+':'+String(me).padStart(2,'0')+':00');
    const actual=Math.max(1,(end-start)/60000);
    eff=Math.round((totalMin/actual)*100);
  }
  // cumulative current_vol
  const allRows=[...rows.p1,...rows.p2];
  const groupRows=row.process_order&&row.aging_tank
    ?allRows.filter(r=>r.process_order===row.process_order&&r.aging_tank===row.aging_tank)
    :[row];
  const prevVol=groupRows
    .filter(r=>r.id!==id&&(r.status==='past_done'||r.status==='ready'))
    .reduce((s,r)=>s+(+(r.volume_liter||0)),0);
  const finalCumVol=prevVol+batchVol;
  try{
    await updateDoc(doc(db,col,id),{
      status:'past_done',past_end_time:time,eff,current_vol:finalCumVol
    });
    toast(`✅ Past. เสร็จ ${time} | Eff ${eff}%`,'green');
  }catch(e){toast('ไม่สำเร็จ','red');}
};

window._sendData=async(col,id,m)=>{
  const row=rows[m].find(r=>r.id===id);
  if(!row)return;
  try{
    await updateDoc(doc(db,col,id),{status:'ready'});
    toast('ส่งข้อมูลแล้ว','green');
  }catch(e){toast('ไม่สำเร็จ','red');}
};

window._stampSig=async(col,id)=>{
  if(!empSig){toast('กรุณา login ด้วย PIN ก่อน','red');return;}
  const time=nowHHMM();
  try{
    await updateDoc(doc(db,col,id),{past_sig:empSig,past_by:empName,past_sig_time:time});
    toast('บันทึกลายเซ็นแล้ว','green');
  }catch(e){toast('ไม่สำเร็จ','red');}
};

// ── INTERVAL: update current_vol ทุก 3 วินาที ─────────────────────────
function startInterval(){
  setInterval(async()=>{
    for(const m of['p1','p2']){
      const agRow=rows[m].find(r=>r.status==='pasteurising'&&r.past_start_time);
      if(!agRow)continue;
      const prod=productMap[agRow.mix_code]||{};
      const density=+(prod.density||1);
      const speed=m==='p1'?+(prod.speed_m1||prod.speed||0):+(prod.speed_m2||prod.speed||0);
      const batchVol=+(agRow.volume_liter||0);
      if(!speed||!batchVol)continue;
      const totalMin=(batchVol*density*60)/speed;
      const[h,mi]=agRow.past_start_time.split(':').map(Number);
      const start=new Date((agRow.date||today())+'T'+String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')+':00');
      const elMin=Math.max(0,(Date.now()-start)/60000);
      const flow=Math.min(batchVol,(elMin/totalMin)*batchVol);
      // prevVol จาก batch ที่ past_done แล้ว
      const allRows=[...rows.p1,...rows.p2];
      const prevVol=agRow.process_order&&agRow.aging_tank
        ?allRows.filter(r=>r.id!==agRow.id&&r.process_order===agRow.process_order&&r.aging_tank===agRow.aging_tank&&(r.status==='past_done'||r.status==='ready')).reduce((s,r)=>s+(+(r.volume_liter||0)),0)
        :0;
      const cumVol=Math.round((prevVol+flow)*10)/10;
      try{await updateDoc(doc(db,planCol(m),agRow.id),{current_vol:cumVol});}catch{}
      // Re-render tank visual only
      const el=$('page-'+m);
      if(el){
        const tank=renderTankVisual(m);
        const existing=el.querySelector('.tank-wrap');
        if(existing){
          const tmp=document.createElement('div');
          tmp.innerHTML=tank;
          existing.replaceWith(tmp.firstElementChild||existing);
        }
      }
    }
  },3000);
}
