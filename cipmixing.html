<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>CIP Mixing — PROD.SYS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8ecf0;--s1:#f2f4f7;--s2:#e0e4ea;--s3:#d0d6de;
  --b1:#b0bac8;--b2:#8896aa;
  --text:#111827;--t2:#374151;--t3:#6b7280;
  --blue:#1d4ed8;--green:#15803d;--cyan:#0e7490;--orange:#c2410c;--red:#b91c1c;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;min-height:100vh}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* NAV */
nav{background:#fff;border-bottom:2px solid var(--b1);padding:0 14px;height:52px;
  display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.07);
  position:sticky;top:0;z-index:100}
.nav-logo{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--cyan)}
.nav-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.nbtn{font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:6px;
  border:1.5px solid var(--b1);background:none;color:var(--t2);cursor:pointer;font-weight:700;text-decoration:none}

main{padding:14px}

/* DATE ROW */
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.date-input{font-family:var(--mono);font-size:12px;background:#fff;border:1.5px solid var(--b1);
  border-radius:7px;color:var(--text);padding:6px 10px;outline:none;font-weight:700}
.date-input:focus{border-color:var(--blue)}
.load-btn{font-family:var(--mono);font-size:12px;font-weight:800;padding:7px 16px;
  border-radius:7px;border:none;background:var(--blue);color:#fff;cursor:pointer}
.load-btn:hover{opacity:.85}

/* LEGEND */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:10px 14px;
  background:#fff;border-radius:10px;border:1.5px solid var(--b1)}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--t2)}
.leg-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}

/* ORDER GROUP */
.order-group{margin-bottom:14px}
.group-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}
.seq-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:13px;font-weight:900;color:#fff;flex-shrink:0}
.group-line-name{font-family:var(--mono);font-size:13px;font-weight:800}
.group-prod{font-size:11px;color:var(--t2);font-weight:600}
.hd-chips{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:8px;background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.chip-hi{background:rgba(29,78,216,.08);color:var(--blue);border-color:rgba(29,78,216,.3)}

/* TANK ROWS */
.tank-list{display:flex;flex-direction:column;gap:6px}
.tank-row{background:#fff;border:1.5px solid var(--b1);border-radius:12px;
  padding:10px 14px;display:flex;align-items:center;gap:12px;
  box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* STATUS CIRCLE */
.st-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-size:9px;font-weight:800;
  color:#fff;flex-shrink:0}
.st-circle.pulse{animation:blink 1.2s ease-in-out infinite}

/* TANK INFO */
.t-info{flex:1;min-width:0}
.t-id{font-family:var(--mono);font-size:14px;font-weight:900}
.t-line{font-size:10px;color:var(--t2);font-weight:600;margin-left:6px}
.t-mix{font-size:11px;color:var(--t2);font-weight:600;margin-top:2px}
.t-status-txt{font-family:var(--mono);font-size:11px;font-weight:800;margin-top:2px}

/* CIP GROUP SELECT */
.grp-sel{font-family:var(--mono);font-size:11px;background:var(--s2);
  border:1.5px solid var(--b1);border-radius:7px;color:var(--text);
  padding:6px 8px;outline:none;font-weight:700;width:88px;cursor:pointer;flex-shrink:0}
.grp-sel:focus{border-color:var(--blue)}

/* ACTION BUTTONS */
.t-btns{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.tb{font-family:var(--mono);font-size:11px;font-weight:800;padding:7px 12px;
  border-radius:8px;border:none;cursor:pointer;white-space:nowrap}
.tb-cip{background:var(--blue);color:#fff}
.tb-san{background:var(--green);color:#fff}
.tb-stop{background:var(--red);color:#fff}
.tb:hover{opacity:.85}

/* EMPTY */
.empty-state{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.empty-state .ico{font-size:36px;margin-bottom:8px}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:9px 20px;border-radius:9px;font-size:12px;opacity:0;transition:all .3s;
  z-index:9999;pointer-events:none;font-family:var(--mono);color:#fff;font-weight:700}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">CIP MIXING</div>
  <div class="nav-r">
    <a href="index.html" class="nbtn">🏠 Home</a>
    <button class="nbtn" onclick="doLogout()">ออกจากระบบ</button>
  </div>
</nav>

<main>
  <!-- DATE -->
  <div class="date-row">
    <input type="date" class="date-input" id="inp-date">
    <button class="load-btn" onclick="loadAll()">🔄 โหลด</button>
    <span style="font-family:var(--mono);font-size:11px;color:var(--t2)" id="emp-name"></span>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#94a3b8"></div>ว่าง</div>
    <div class="leg"><div class="leg-dot" style="background:#3b82f6;animation:blink 1.2s infinite"></div>กำลัง CIP</div>
    <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>CIP เสร็จ</div>
    <div class="leg"><div class="leg-dot" style="background:#22c55e;animation:blink 1.2s infinite"></div>กำลัง San.</div>
    <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>San. เสร็จ</div>
    <div class="leg"><div class="leg-dot" style="background:#ef4444;animation:blink 1.2s infinite"></div>กำลัง Past.</div>
    <div class="leg"><div class="leg-dot" style="background:#ef4444"></div>มีของ</div>
    <div class="leg"><div class="leg-dot" style="background:#f97316;animation:blink 1.2s infinite"></div>กำลัง Fill.</div>
  </div>

  <!-- MAIN LIST -->
  <div id="main-list">
    <div class="empty-state"><div class="ico">📅</div>เลือกวันที่แล้วกดโหลด</div>
  </div>
</main>

<div id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,onSnapshot,doc,setDoc,updateDoc}
  from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app=initializeApp({
  apiKey:"AIzaSyC3f6jMuhugE6BNfRfkpOA9BMrIKWR9YgQ",
  authDomain:"production-filling.firebaseapp.com",
  projectId:"production-filling",
  storageBucket:"production-filling.firebasestorage.app",
  messagingSenderId:"89098393458",
  appId:"1:89098393458:web:b723f2886e8a341935afeb"
});
const auth=getAuth(app);
const db=getFirestore(app);

const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().slice(0,10);
const nowHHMMSS=()=>{const n=new Date();return[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>x.toString().padStart(2,'0')).join(':');};

const _empName=sessionStorage.getItem('emp_name')||'';
const _empSig=sessionStorage.getItem('emp_sig')||'';

function toast(msg,col='blue'){
  const el=$('toast');el.textContent=msg;
  el.style.background=col==='green'?'#15803d':col==='red'?'#991b1b':'#1d4ed8';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

let linesData=[],tankStates={},planRows=[],unsubTankStates=null;

$('inp-date').value=today();
if(_empName) $('emp-name').textContent='👤 '+_empName;

onAuthStateChanged(auth,u=>{
  if(!u){window.location.href='index.html';return;}
  initTankStates();
});

function initTankStates(){
  if(unsubTankStates) unsubTankStates();
  unsubTankStates=onSnapshot(collection(db,'aging_tank_states'),snap=>{
    snap.docs.forEach(d=>{tankStates[d.id]={id:d.id,...d.data()};});
    renderMain();
  });
}

window.loadAll=async()=>{
  const d=$('inp-date').value||today();
  const lSnap=await getDocs(collection(db,'lines'));
  linesData=lSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.seq||0)-(b.seq||0));
  const q1=query(collection(db,'production_plans'),where('date','==',d));
  const q2=query(collection(db,'production_plans_m2'),where('date','==',d));
  const[s1,s2]=await Promise.all([getDocs(q1),getDocs(q2)]);
  const r1=s1.docs.map(d=>({...d.data(),id:d.id,_col:'production_plans'}));
  const r2=s2.docs.map(d=>({...d.data(),id:d.id,_col:'production_plans_m2'}));
  planRows=[...r1,...r2].sort((a,b)=>(a.seq||0)-(b.seq||0));
  renderMain();
};

const ST={
  empty:       {color:'#94a3b8',label:'ว่าง',       pulse:false, text:'ว่าง — รอ CIP'},
  cip:         {color:'#3b82f6',label:'CIP',         pulse:true,  text:'กำลัง CIP...'},
  cip_done:    {color:'#3b82f6',label:'CIP✓',        pulse:false, text:'CIP เสร็จ — รอ Sanitize'},
  san:         {color:'#22c55e',label:'San.',         pulse:true,  text:'กำลัง Sanitize...'},
  san_done:    {color:'#22c55e',label:'San.✓',        pulse:false, text:'✅ Sanitize เสร็จ'},
  pasteurising:{color:'#ef4444',label:'Past.',        pulse:true,  text:'กำลัง Pasteurise'},
  busy:        {color:'#ef4444',label:'มีของ',       pulse:false, text:'มีของบ่มอยู่'},
  filling:     {color:'#f97316',label:'Fill.',        pulse:true,  text:'กำลัง Filling'},
};

function grpSel(tid,grp){
  var o='<option value="">Grp...</option>';
  ['A','B','C','D','E'].forEach(function(g){
    o+='<option value="'+g+'"'+(grp===g?' selected':'')+'>'+g+'</option>';
  });
  return '<select class="grp-sel" data-tid="'+tid+'" onchange="setGroup(this.dataset.tid,this.value)">'+o+'</select>';
}

function renderMain(){
  const el=$('main-list');
  if(!planRows.length){
    el.innerHTML='<div class="empty-state"><div class="ico">📭</div>ไม่มีงานในวันที่เลือก</div>';
    return;
  }

  // group ตาม aging_tank — แต่ละ row ที่มี aging_tank
  const seen=new Set();
  let html='';

  planRows.forEach((row,idx)=>{
    if(!row.aging_tank) return;
    const tankId=row.aging_tank;
    if(seen.has(tankId)) return;
    seen.add(tankId);

    const ts=tankStates[tankId]||{};
    const st=ts.status||'empty';
    const sc=ST[st]||ST.empty;
    const group=ts.cip_group||'';

    // lineColor
    const line=linesData.find(l=>l.name===row.filling_line);
    const lineColor=line?.color||'#6b7280';

    // ปุ่มตาม status
    let btns='';
    if(st==='empty')
      btns=`<button class="tb tb-cip" onclick="doAction('${tankId}','start_cip')">▶ CIP</button>`;
    else if(st==='cip')
      btns=`<button class="tb tb-stop" onclick="doAction('${tankId}','stop_cip')">⏹ CIP เสร็จ</button>`;
    else if(st==='cip_done')
      btns=`<button class="tb tb-cip" style="opacity:.7;font-size:10px" onclick="doAction('${tankId}','start_cip')">↺ CIP อีก</button>
            <button class="tb tb-san" onclick="doAction('${tankId}','start_san')">▶ Sanitize</button>`;
    else if(st==='san')
      btns=`<button class="tb tb-stop" onclick="doAction('${tankId}','stop_san')">⏹ San. เสร็จ</button>`;

    html+=`<div class="tank-row">
      <div class="st-circle ${sc.pulse?'pulse':''}" style="background:${sc.color}">${sc.label}</div>
      <div class="t-info">
        <div style="display:flex;align-items:center">
          <span class="t-id" style="color:${lineColor}">${tankId}</span>
          <span class="t-line">${row.filling_line||'—'}</span>
        </div>
        <div class="t-mix"><span style="font-family:var(--mono);font-weight:800">${row.mix_code||'—'}</span> ${row.mix_name||''}</div>
        <div class="t-status-txt" style="color:${sc.color}">${sc.text}</div>
      </div>
      ${grpSel(tankId,group)}
      <div class="t-btns">${btns}</div>
    </div>`;
  });

  el.innerHTML=html||'<div class="empty-state"><div class="ico">✅</div>ไม่มีถังที่ต้อง CIP</div>';
}

window.doAction=async(tankId,act)=>{
  const statusMap={start_cip:'cip',stop_cip:'cip_done',start_san:'san',stop_san:'san_done'};
  const newStatus=statusMap[act];
  if(!newStatus) return;
  try{
    const now=nowHHMMSS();
    const upd={status:newStatus,updated_at:new Date().toISOString()};
    if(act==='start_cip') upd.cip_start_time=now;
    if(act==='stop_cip')  upd.cip_stop_time=now;
    if(act==='start_san') upd.san_start_time=now;
    if(act==='stop_san')  upd.san_stop_time=now;
    await setDoc(doc(db,'aging_tank_states',tankId),upd,{merge:true});
    const labels={start_cip:'▶ CIP เริ่ม',stop_cip:'✅ CIP เสร็จ',start_san:'▶ Sanitize เริ่ม',stop_san:'✅ Sanitize เสร็จ'};
    toast(labels[act]+' ถัง '+tankId,'green');
  }catch(e){toast('เกิดข้อผิดพลาด: '+e.message,'red');}
};

window.setGroup=async(tankId,val)=>{
  try{
    await setDoc(doc(db,'aging_tank_states',tankId),{cip_group:val,updated_at:new Date().toISOString()},{merge:true});
  }catch(e){console.warn(e);}
};

window.doLogout=async()=>{await signOut(auth);location.href='index.html';};
</script>
</body>
</html>
